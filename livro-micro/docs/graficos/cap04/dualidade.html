<!DOCTYPE html>
<!--
  Duality: Utility Maximization vs Expenditure Minimization — Interactive Graph (Chapter 4)
  Library: JSXGraph
  Reason: JSXGraph supports toggling visibility of geometric objects natively,
  allowing the primal/dual views to coexist on the same coordinate system
  with smooth transitions, ideal for demonstrating duality graphically.
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dualidade — Primal e Dual</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'CMU Serif', Georgia, serif;
      background: #ffffff;
      color: #333;
      padding: 1rem;
    }
    .graph-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #C8102E;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .graph-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-start;
      justify-content: center;
    }
    #jxgbox {
      width: 520px;
      height: 420px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .controls {
      width: 300px;
      padding: 1rem;
      background: #f8f8f8;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .controls h3 {
      font-size: 0.95rem;
      color: #C8102E;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.4rem;
    }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .toggle-group {
      margin-bottom: 0.8rem;
      display: flex;
      gap: 0.5rem;
    }
    .toggle-btn {
      flex: 1;
      padding: 0.45rem 0.3rem;
      border: 2px solid #C8102E;
      border-radius: 4px;
      background: #fff;
      color: #C8102E;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      font-weight: 600;
    }
    .toggle-btn.active {
      background: #C8102E;
      color: #fff;
    }
    .info-box {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.8rem;
      line-height: 1.7;
    }
    .info-box .eq { text-align: center; margin: 0.2rem 0; color: #333; }
    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.5rem;
      background: #C8102E;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { width: 100%; max-width: 520px; }
      .controls { width: 100%; max-width: 520px; }
    }
  </style>
</head>
<body>
  <div class="graph-title">Dualidade: Maximizacao de Utilidade vs. Minimizacao do Dispendio</div>
  <div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Visualizacao</h3>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-primal" onclick="setView('primal')">Primal (max U)</button>
        <button class="toggle-btn" id="btn-dual" onclick="setView('dual')">Dual (min E)</button>
        <button class="toggle-btn" id="btn-both" onclick="setView('both')">Ambos</button>
      </div>
      <h3>Parametros</h3>
      <div class="slider-group">
        <label>Renda \(I\): <span class="val" id="val-I">60</span></label>
        <input type="range" id="slider-I" min="10" max="100" step="1" value="60">
      </div>
      <div class="slider-group">
        <label>Preco \(p_1\): <span class="val" id="val-p1">4</span></label>
        <input type="range" id="slider-p1" min="1" max="20" step="0.5" value="4">
      </div>
      <div class="slider-group">
        <label>Preco \(p_2\): <span class="val" id="val-p2">3</span></label>
        <input type="range" id="slider-p2" min="1" max="20" step="0.5" value="3">
      </div>

      <div class="info-box" id="info">
        <div class="eq" id="eq-problem"></div>
        <div class="eq" id="eq-solution"></div>
        <div class="eq" id="eq-V"></div>
        <div class="eq" id="eq-E"></div>
        <div class="eq" id="eq-identity"></div>
      </div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    var ALPHA = 0.5;
    var currentView = 'primal';

    var board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [-1, 25, 25, -1],
      axis: false,
      showCopyright: false,
      showNavigation: false,
      keepAspectRatio: false
    });

    board.create('axis', [[0,0],[1,0]], {
      ticks: { drawLabels: true, minorTicks: 0, ticksDistance: 5 },
      name: '\\(x_1\\)', withLabel: true, label: { position: 'rt', offset: [-15, 15] }
    });
    board.create('axis', [[0,0],[0,1]], {
      ticks: { drawLabels: true, minorTicks: 0, ticksDistance: 5 },
      name: '\\(x_2\\)', withLabel: true, label: { position: 'rt', offset: [15, -5] }
    });

    function getP() {
      return {
        I: parseFloat(document.getElementById('slider-I').value),
        p1: parseFloat(document.getElementById('slider-p1').value),
        p2: parseFloat(document.getElementById('slider-p2').value)
      };
    }

    function compute() {
      var p = getP();
      // Primal: max U s.t. budget
      var x1s = ALPHA * p.I / p.p1;
      var x2s = (1 - ALPHA) * p.I / p.p2;
      var Us = Math.pow(x1s, ALPHA) * Math.pow(x2s, 1 - ALPHA);

      // V(p,I) for Cobb-Douglas with a=b=0.5
      var V = Math.pow(ALPHA / p.p1, ALPHA) * Math.pow((1 - ALPHA) / p.p2, 1 - ALPHA) * p.I;

      // E(p,U*) = I (duality identity)
      var E = Math.pow(p.p1 / ALPHA, ALPHA) * Math.pow(p.p2 / (1 - ALPHA), 1 - ALPHA) * Us;

      return { x1: x1s, x2: x2s, U: Us, V: V, E: E };
    }

    // --- Primal elements (red budget line, blue ICs moving up) ---
    var blA = board.create('point', [function() { return getP().I / getP().p1; }, 0], { visible: false });
    var blB = board.create('point', [0, function() { return getP().I / getP().p2; }], { visible: false });
    var budgetLine = board.create('segment', [blA, blB], {
      strokeColor: '#C8102E', strokeWidth: 3
    });

    // Primal ICs — lower, optimal, higher
    var primalICs = [];
    [0.6, 1.0, 1.3].forEach(function(factor, i) {
      primalICs.push(board.create('curve', [
        function(x) { return x; },
        function(x) {
          if (x <= 0.01) return NaN;
          var c = compute();
          var Utarget = c.U * factor;
          var x2 = Math.pow(Utarget / Math.pow(x, ALPHA), 1 / (1 - ALPHA));
          return (x2 > 0 && x2 < 50) ? x2 : NaN;
        },
        0.05, 25
      ], {
        strokeColor: '#1565c0',
        strokeWidth: (i === 1) ? 2.5 : 1.5,
        dash: (i === 1) ? 0 : 2
      }));
    });

    // Primal arrow annotation
    var primalArrow = board.create('text', [
      function() { return compute().x1 + 3; },
      function() { return compute().x2 + 3; },
      function() { return 'max U \\(\\uparrow\\)'; }
    ], { fontSize: 12, color: '#1565c0', useMathJax: true });

    // --- Dual elements (teal iso-expenditure lines, target IC) ---
    // Iso-expenditure lines at different E levels
    var dualLines = [];
    [0.7, 1.0, 1.3].forEach(function(factor, i) {
      var lA = board.create('point', [
        function() { var c = compute(); return (c.E * factor) / getP().p1; }, 0
      ], { visible: false });
      var lB = board.create('point', [
        0, function() { var c = compute(); return (c.E * factor) / getP().p2; }
      ], { visible: false });
      dualLines.push(board.create('segment', [lA, lB], {
        strokeColor: '#00897b',
        strokeWidth: (i === 1) ? 2.5 : 1.5,
        dash: (i === 1) ? 0 : 2,
        visible: false
      }));
    });

    // Dual target IC (the fixed utility level)
    var dualIC = board.create('curve', [
      function(x) { return x; },
      function(x) {
        if (x <= 0.01) return NaN;
        var c = compute();
        var x2 = Math.pow(c.U / Math.pow(x, ALPHA), 1 / (1 - ALPHA));
        return (x2 > 0 && x2 < 50) ? x2 : NaN;
      },
      0.05, 25
    ], { strokeColor: '#00897b', strokeWidth: 2.5, visible: false });

    var dualArrow = board.create('text', [
      function() { return compute().x1 - 4; },
      function() { return compute().x2 - 2; },
      function() { return 'min E \\(\\downarrow\\)'; }
    ], { fontSize: 12, color: '#00897b', visible: false, useMathJax: true });

    // --- Tangency point (always shown) ---
    var tangPt = board.create('point', [
      function() { return compute().x1; },
      function() { return compute().x2; }
    ], { name: '', size: 6, strokeColor: '#C8102E', fillColor: '#C8102E' });

    // Dashed lines to axes
    board.create('segment', [tangPt, [function() { return compute().x1; }, 0]], {
      strokeColor: '#888', dash: 2, strokeWidth: 1
    });
    board.create('segment', [tangPt, [0, function() { return compute().x2; }]], {
      strokeColor: '#888', dash: 2, strokeWidth: 1
    });

    board.create('text', [
      function() { return compute().x1 + 0.6; },
      function() { return compute().x2 + 1.0; },
      function() {
        var c = compute();
        return '(' + c.x1.toFixed(2) + ', ' + c.x2.toFixed(2) + ')';
      }
    ], { fontSize: 12, color: '#C8102E', fontWeight: 'bold' });

    function setView(view) {
      currentView = view;
      // Toggle buttons
      document.getElementById('btn-primal').classList.toggle('active', view === 'primal');
      document.getElementById('btn-dual').classList.toggle('active', view === 'dual');
      document.getElementById('btn-both').classList.toggle('active', view === 'both');

      var showPrimal = (view === 'primal' || view === 'both');
      var showDual = (view === 'dual' || view === 'both');

      budgetLine.setAttribute({ visible: showPrimal });
      primalICs.forEach(function(ic) { ic.setAttribute({ visible: showPrimal }); });
      primalArrow.setAttribute({ visible: showPrimal });

      dualLines.forEach(function(l) { l.setAttribute({ visible: showDual }); });
      dualIC.setAttribute({ visible: showDual });
      dualArrow.setAttribute({ visible: showDual });

      board.update();
      updateInfo();
    }

    function updateInfo() {
      var p = getP();
      var c = compute();
      document.getElementById('val-I').textContent = p.I.toFixed(0);
      document.getElementById('val-p1').textContent = p.p1.toFixed(1);
      document.getElementById('val-p2').textContent = p.p2.toFixed(1);

      if (currentView === 'primal') {
        document.getElementById('eq-problem').innerHTML =
          '\\(\\max U = x_1^{0.5} x_2^{0.5}\\) s.a. \\(p_1 x_1 + p_2 x_2 \\leq I\\)';
      } else if (currentView === 'dual') {
        document.getElementById('eq-problem').innerHTML =
          '\\(\\min E = p_1 x_1 + p_2 x_2\\) s.a. \\(U(x_1,x_2) \\geq \\bar{u}\\)';
      } else {
        document.getElementById('eq-problem').innerHTML =
          'Primal e Dual: mesmo ponto de tangencia';
      }

      document.getElementById('eq-solution').innerHTML =
        '\\(x_1^* = ' + c.x1.toFixed(2) + ',\\; x_2^* = ' + c.x2.toFixed(2) + '\\)';
      document.getElementById('eq-V').innerHTML =
        '\\(V(\\mathbf{p}, I) = ' + c.V.toFixed(3) + '\\)';
      document.getElementById('eq-E').innerHTML =
        '\\(E(\\mathbf{p}, \\bar{u}) = ' + c.E.toFixed(2) + '\\)';
      document.getElementById('eq-identity').innerHTML =
        'Identidade: \\(E(\\mathbf{p}, V(\\mathbf{p}, I)) = ' + c.E.toFixed(2) + ' = I = ' + p.I.toFixed(0) + '\\) &#10003;';

      board.update();
      if (window.MathJax && MathJax.typeset) MathJax.typeset();
    }

    function resetAll() {
      document.getElementById('slider-I').value = 60;
      document.getElementById('slider-p1').value = 4;
      document.getElementById('slider-p2').value = 3;
      setView('primal');
      updateInfo();
    }

    ['slider-I', 'slider-p1', 'slider-p2'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', updateInfo);
    });

    setView('primal');
  </script>
</body>
</html>
