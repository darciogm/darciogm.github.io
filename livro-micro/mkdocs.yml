site_name: "Microeconomia: Do Zero ao Equilíbrio (e Além)"
site_url: https://darciogm.github.io/livro-micro/
site_description: "Livro didático interativo de Microeconomia em português"
site_author: "Darcio GM"
docs_dir: docs

theme:
  name: material
  language: pt-BR
  font: false
  palette:
    - scheme: default
      primary: custom
      accent: red
      toggle:
        icon: material/brightness-7
        name: Alternar para modo escuro
    - scheme: slate
      primary: custom
      accent: red
      toggle:
        icon: material/brightness-4
        name: Alternar para modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.prune
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
  icon:
    logo: material/book-open-page-variant

nav:
  - Início:
    - index.md
  - Fundamentos:
    - fundamentos/index.md
    - "Parte I — Introdução":
      - "Cap. 1 — Modelos Econômicos": cap01/index.md
      - "Cap. 2 — Ferramentas Matemáticas": cap02/index.md
    - "Parte II — Escolha e Demanda":
      - "Cap. 3 — Por Que Você Compra o Que Compra": cap03/index.md
      - "Cap. 4 — O Consumidor Racional": cap04/index.md
      - "Cap. 5 — Quando o Preço Muda": cap05/index.md
      - "Cap. 6 — Bens que Amamos, Bens que Odiamos": cap06/index.md
  - Mercados:
    - mercados/index.md
    - "Parte III — Incerteza e Estratégia":
      - "Cap. 7 — Decidindo no Escuro": cap07/index.md
      - "Cap. 8 — Teoria dos Jogos": cap08/index.md
    - "Parte IV — Produção e Oferta":
      - "Cap. 9 — A Alquimia da Produção": cap09/index.md
      - "Cap. 10 — Anatomia dos Custos": cap10/index.md
      - "Cap. 11 — Lucro, Receita e Sobrevivência": cap11/index.md
    - "Parte V — Mercados Competitivos":
      - "Cap. 12 — O Mercado em Ação": cap12/index.md
      - "Cap. 13 — Equilíbrio Geral": cap13/index.md
  - Poder & Insumos:
    - poder/index.md
    - "Parte VI — Poder de Mercado":
      - "Cap. 14 — Monopólio": cap14/index.md
      - "Cap. 15 — Oligopólios": cap15/index.md
    - "Parte VII — Mercados de Insumos":
      - "Cap. 16 — Economia do Trabalho": cap16/index.md
      - "Cap. 17 — Capital, Juros e o Valor do Amanhã": cap17/index.md
  - Fronteiras:
    - fronteiras/index.md
    - "Parte VIII — Falhas de Mercado":
      - "Cap. 18 — Informação Assimétrica": cap18/index.md
      - "Cap. 19 — Externalidades e Bens Públicos": cap19/index.md
  - Referência:
    - referencia/index.md
    - Notação: notacao.md
    - Glossário: glossario.md
    - Referências: referencias.md

plugins:
  - search:
      lang: pt
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: "100%"
      height: auto
      zoomable: true
      draggable: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - footnotes
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css
  - assets/extra.css
