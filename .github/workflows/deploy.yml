name: Deploy MkDocs
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install mkdocs-material mkdocs-glightbox

      # Build main site
      - run: mkdocs build

      # Copy pre-built procure meeting site
      - run: |
          if [ -d "procure_meeting_0326" ]; then
            mkdir -p site/procure/meeting_0326
            cp -r procure_meeting_0326/* site/procure/meeting_0326/
          fi

      # Copy MPE 2026/32 pre-aula platform (served at /mpe-platform/)
      - run: |
          if [ -d "docs/micro-book/mpe/platform" ]; then
            mkdir -p site/mpe-platform
            cp -r docs/micro-book/mpe/platform/* site/mpe-platform/
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
