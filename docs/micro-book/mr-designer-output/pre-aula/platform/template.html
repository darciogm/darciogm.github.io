<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$title$ — Microeconomia II</title>
<link rel="stylesheet" href="css/platform.css">
<script>window.MathJax={tex:{inlineMath:[['\\(','\\)']],displayMath:[['\\[','\\]']]},options:{enableMenu:false}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="topbar">
  <h1><a href="portal.html" style="color:#fff;text-decoration:none">&#128218; Microeconomia II</a></h1>
  <div class="user-info">
    <span class="name" id="user-name"></span>
    <button class="btn-logout" onclick="MicroAuth.logout();location.href='index.html'">Sair</button>
  </div>
</div>
<div class="content-wrapper">
$body$
</div>
<script src="js/tracker.js"></script>
<script>
if (!MicroAuth.requireAuth()) throw 'redirect';
var session = MicroAuth.getSession();
document.getElementById('user-name').textContent = session.nome;
MicroTracker.startPage('$pageid$');
MicroQuiz.init('$pageid$');

/* Auto-resize iframes — delayed to let JSXGraph/MathJax render first */
function resizeIframe(iframe) {
  try {
    var doc = iframe.contentDocument || iframe.contentWindow.document;
    var gc = doc.querySelector('.graph-container');
    var h = gc ? gc.scrollHeight : Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight);
    if (h > 200) iframe.style.height = Math.max(h + 40, 520) + 'px';
  } catch(e) { /* cross-origin: keep CSS default */ }
}
document.querySelectorAll('.content-wrapper iframe').forEach(function(f) {
  f.addEventListener('load', function() {
    setTimeout(function(){ resizeIframe(f); }, 1000);
    setTimeout(function(){ resizeIframe(f); }, 3000);
  });
});
</script>
</body>
</html>
