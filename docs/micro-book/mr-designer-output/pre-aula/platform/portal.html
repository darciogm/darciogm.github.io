<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Pre-Aula — Microeconomia II</title>
<link rel="stylesheet" href="css/platform.css">
</head>
<body>
<div class="topbar">
  <h1>&#128218; Microeconomia II — Pre-Aula</h1>
  <div class="user-info">
    <span class="name" id="user-name"></span>
    <button class="btn-logout" onclick="MicroAuth.logout();location.href='index.html'">Sair</button>
  </div>
</div>

<div class="portal-header">
  <h2>Material Pre-Aula</h2>
  <p>Estude o material antes de cada aula. Complete o quiz para registrar sua preparacao.</p>
  <div class="portal-stats">
    <div class="stat-badge"><div class="val" id="stat-done">0</div><div class="lbl">Completas</div></div>
    <div class="stat-badge"><div class="val" id="stat-total">24</div><div class="lbl">Total</div></div>
    <div class="stat-badge"><div class="val" id="stat-time">0</div><div class="lbl">Min. estudados</div></div>
    <div class="stat-badge"><div class="val" id="stat-avg">—</div><div class="lbl">Media Quizzes</div></div>
  </div>
  <div class="progress-bar" style="max-width:400px;margin:0 auto"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<div class="aulas-grid" id="aulas-grid"></div>

<script src="js/tracker.js"></script>
<script>
if (!MicroAuth.requireAuth()) throw 'redirect';

var session = MicroAuth.getSession();
document.getElementById('user-name').textContent = session.nome + ' (' + session.matricula + ')';

var AULAS = [
  {n:1, title:'Ferramentas Matematicas do Economista', desc:'Otimizacao, Lagrangiano, estatica comparativa, elasticidade', cap:'Cap. 2', time:50},
  {n:2, title:'Oficina: Lagrangiano (Teoria+Pratica)', desc:'Teorema do envelope, Kuhn-Tucker, exercicios cronometrados', cap:'Cap. 2', time:40},
  {n:3, title:'Preferencias, Axiomas e Utilidade', desc:'Axiomas de racionalidade, funcoes utilidade, TMS', cap:'Cap. 3', time:50},
  {n:4, title:'Lab: Curvas de Indiferenca (Teoria+Pratica)', desc:'Elasticidade de substituicao, CES, Jigsaw de funcoes', cap:'Cap. 3', time:40},
  {n:5, title:'Escolha Otima do Consumidor', desc:'Restricao orcamentaria, tangencia, demandas Marshallianas', cap:'Cap. 4', time:50},
  {n:6, title:'Dualidade: Hicksiana e Funcao Gasto (T+P)', desc:'Problema dual, identidades de Roy e Shephard', cap:'Cap. 4', time:50},
  {n:7, title:'Efeitos Renda e Substituicao', desc:'Slutsky, Hicks, bens normais/inferiores/Giffen', cap:'Cap. 5', time:50},
  {n:8, title:'Decomposicao Slutsky + Case Brasil (T+P)', desc:'Substitutos/complementares, elasticidade cruzada, casos reais', cap:'Cap. 5-6', time:45},
  {n:9, title:'Dotacoes, Trabalho e Escolha Intertemporal', desc:'Oferta de trabalho, backward-bending, Fisher 2 periodos', cap:'Cap. 5/17', time:50},
  {n:10, title:'Simulacao: Mercado de Trabalho (T+P)', desc:'Salario de reserva, monopsonio, FIES e poupanca', cap:'Cap. 17', time:40},
  {n:11, title:'Incerteza e Utilidade Esperada', desc:'VNM, aversao ao risco, equivalente certo, seguros', cap:'Cap. 7', time:50},
  {n:12, title:'Loterias + Seguro (T+P)', desc:'Allais, diversificacao, prospect theory, design de seguro', cap:'Cap. 7', time:40},
  {n:13, title:'Funcao de Producao e Tecnologia', desc:'PMg, PMe, isoquantas, TMST, rendimentos de escala', cap:'Cap. 9', time:50},
  {n:14, title:'Lab: Isoquantas e Rendimentos (T+P)', desc:'CES producao, progresso tecnico, diagnostico tecnologico', cap:'Cap. 9', time:40},
  {n:15, title:'Custos de Producao', desc:'Custo economico, minimizacao, isocusto, curvas de custo', cap:'Cap. 10', time:50},
  {n:16, title:'Custos CP vs LP + Envelope (T+P)', desc:'Custos fixos/variaveis, envoltoria, economias de escala', cap:'Cap. 10', time:40},
  {n:17, title:'Maximizacao de Lucro e Oferta', desc:'P=CMg, shutdown, curva de oferta, excedente do produtor', cap:'Cap. 11', time:50},
  {n:18, title:'Simulacao: Decisao de Producao (T+P)', desc:'Coase, agregacao de oferta, equilibrio LP, startup case', cap:'Cap. 11-12', time:40},
  {n:19, title:'Equilibrio Competitivo e Bem-Estar', desc:'Oferta/demanda de mercado, excedentes, Pareto, peso morto', cap:'Cap. 12', time:50},
  {n:20, title:'Politicas Publicas no Brasil (T+P)', desc:'Impostos, controles de preco, subsidios, 4 cases', cap:'Cap. 12', time:45},
  {n:21, title:'Monopolio e Discriminacao de Precos', desc:'RMg=CMg, Lerner, DWL, discriminacao 1o/2o/3o grau', cap:'Cap. 14', time:50},
  {n:22, title:'Discriminacao + Regulacao (T+P)', desc:'Monopolio natural, CADE, tarifa em duas partes', cap:'Cap. 14', time:40},
  {n:23, title:'Oligopolio: Cournot, Bertrand, Stackelberg', desc:'Best response, Nash, paradoxo de Bertrand, first-mover', cap:'Cap. 15', time:50},
  {n:24, title:'Torneio de Oligopolio (T+P)', desc:'Jogos repetidos, colusao, concorrencia monopolistica', cap:'Cap. 15', time:40}
];

function renderPortal() {
  var data = MicroTracker.getData();
  var mat = session.matricula;
  var studentData = data[mat] || { pages: {}, quizzes: {} };

  var done = 0, totalTime = 0, quizScores = [];
  var gridHtml = '';
  AULAS.forEach(function(a) {
    var pageId = 'aula-' + String(a.n).padStart(2,'0');
    var pg = studentData.pages[pageId] || {};
    var qz = studentData.quizzes[pageId] || {};
    var visited = pg.visits > 0;
    var quizDone = qz.attempts > 0;
    var badge, badgeClass;
    if (quizDone) { badge = 'Completa'; badgeClass = 'badge-done'; done++; }
    else if (visited) { badge = 'Em andamento'; badgeClass = 'badge-progress'; }
    else { badge = 'Nova'; badgeClass = 'badge-new'; }
    if (pg.totalTime) totalTime += pg.totalTime;
    if (qz.bestScore !== undefined && qz.attempts > 0) quizScores.push(qz.bestScore);

    gridHtml += '<div class="aula-card"><a href="aula-' + String(a.n).padStart(2,'0') + '.html">'
      + '<div class="aula-num">Aula ' + String(a.n).padStart(2,'0') + ' | ' + a.cap + '</div>'
      + '<div class="aula-title">' + a.title + '</div>'
      + '<div class="aula-desc">' + a.desc + '</div>'
      + '<div class="aula-meta"><span class="time">&#9201; ' + a.time + ' min</span>'
      + '<span class="badge ' + badgeClass + '">' + badge + '</span></div></a></div>';
  });

  document.getElementById('aulas-grid').innerHTML = gridHtml;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-time').textContent = Math.round(totalTime / 60000);
  document.getElementById('stat-avg').textContent = quizScores.length > 0
    ? Math.round(quizScores.reduce(function(a,b){return a+b},0) / quizScores.length) + '%' : '—';
  document.getElementById('progress-fill').style.width = Math.round(done / 24 * 100) + '%';
}

renderPortal();
</script>
</body>
</html>
