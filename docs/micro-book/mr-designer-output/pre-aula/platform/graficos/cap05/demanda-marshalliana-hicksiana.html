<!DOCTYPE html>
<!--
  Demanda Marshalliana vs Hicksiana — Interactive Graph
  Library: JSXGraph
  Reason: Dual-panel layout with linked indifference curves and demand curves.
  Chapter 5 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demanda Marshalliana vs Hicksiana</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'CMU Serif', Georgia, serif;
      background: #ffffff;
      color: #333;
      padding: 1rem;
    }
.graph-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: stretch;
      justify-content: center;
    }
    .panels {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      flex: 1 1 480px;
      max-width: 560px;
    }
    .panel-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #555;
      text-align: center;
    }
    .jxgbox {
      width: 100%;
      height: 300px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .controls {
      flex: 0 1 260px;
      padding: 1rem;
      background: #f8f8f8;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .controls h3 {
      font-size: 0.95rem;
      color: #C8102E;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.4rem;
    }
    .slider-group {
      margin-bottom: 0.8rem;
    }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }
    .slider-group label .val {
      font-weight: 700;
      color: #C8102E;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #C8102E;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      margin-bottom: 0.2rem;
    }
    .legend-swatch {
      width: 20px;
      height: 3px;
      display: inline-block;
    }
    .info-box {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.82rem;
      line-height: 1.6;
    }
    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.5rem;
      background: #C8102E;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 700px) {
      .graph-container { flex-direction: column; align-items: center; }
      .jxgbox { flex-basis: 100%; max-width: 100%; }
      .controls { flex-basis: 100%; max-width: 100%; }
    }
    /* anti-inflation-fix */
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div class="panels">
      <div class="panel-label">Curvas de indiferença e restrições orçamentárias</div>
      <div id="jxgbox1" class="jxgbox"></div>
      <div class="panel-label">Curvas de demanda</div>
      <div id="jxgbox2" class="jxgbox"></div>
    </div>
    <div class="controls">
      <h3>Parâmetros</h3>

      <div class="slider-group">
        <label>Preço \(p_1\): <span class="val" id="val-p1">2.00</span></label>
        <input type="range" id="slider-p1" min="0.5" max="6" step="0.1" value="2">
      </div>

      <div class="slider-group">
        <label>\(\alpha\): <span class="val" id="val-alpha">0.40</span></label>
        <input type="range" id="slider-alpha" min="0.10" max="0.90" step="0.05" value="0.40">
      </div>

      <div class="slider-group">
        <label>Renda \(M\): <span class="val" id="val-M">100</span></label>
        <input type="range" id="slider-M" min="40" max="200" step="5" value="100">
      </div>

      <div style="margin-bottom:0.6rem;">
        <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> Marshalliana (não-compensada)</div>
        <div class="legend-item"><span class="legend-swatch" style="background:#1565c0;"></span> Hicksiana (compensada)</div>
        <div class="legend-item"><span class="legend-swatch" style="background:rgba(200,16,46,0.15);height:12px;width:20px;"></span> Excedente do consumidor</div>
      </div>

      <div class="info-box" id="info"></div>
      <label style="font-size:0.82rem; cursor:pointer;">
        <input type="checkbox" id="chk-labels" checked onchange="toggleLabels()"> Mostrar labels
      </label>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    var p2 = 1;
    // Reference price for Hicksian: at slider midpoint p1=2
    var p1ref = 2;

    function getState() {
      return {
        p1: parseFloat(document.getElementById('slider-p1').value),
        alpha: parseFloat(document.getElementById('slider-alpha').value),
        M: parseFloat(document.getElementById('slider-M').value)
      };
    }

    function marshDemand(alpha, M, p1) {
      return alpha * M / p1;
    }

    function utility(alpha, x1, x2) {
      return Math.pow(x1, alpha) * Math.pow(x2, 1 - alpha);
    }

    function hicksDemand(alpha, p1, U) {
      return U * Math.pow(alpha * p2 / ((1 - alpha) * p1), 1 - alpha);
    }

    function expenditure(alpha, p1, U) {
      return U * Math.pow(p1 / alpha, alpha) * Math.pow(p2 / (1 - alpha), 1 - alpha);
    }

    function indiffY(alpha, U, x) {
      if (x <= 0.01) return 999;
      var val = U / Math.pow(x, alpha);
      return Math.pow(val, 1 / (1 - alpha));
    }

    // --- Top panel: Goods space ---
    var board1 = JXG.JSXGraph.initBoard('jxgbox1', {
      boundingbox: [-14, 133, 128, -14],
      axis: false,
      showCopyright: false,
      showNavigation: false,
      keepaspectratio: false
    });

    board1.create('axis', [[0,0],[110,0]], {
      ticks: { drawLabels: true, label: { fontSize: 9 }, minorTicks: 0, ticksDistance: 20 },
      name: '', withLabel: false
    });
    board1.create('axis', [[0,0],[0,110]], {
      ticks: { drawLabels: true, label: { fontSize: 9, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 20 },
      name: '', withLabel: false
    });

    // Y-axis label: centered vertically, rotated 90°, bold italic
    board1.create('text', [
      -14 * 0.55, 133 / 2,
      '<b><i>x</i><sub>2</sub></b>'
    ], { fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false });

    // X-axis label: centered horizontally, below ticks, bold italic
    board1.create('text', [
      128 / 2, -14 * 0.65,
      '<b><i>x</i><sub>1</sub></b>'
    ], { fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false });

    // Budget line at current p1
    board1.create('segment', [
      function() { var s = getState(); return [s.M / s.p1, 0]; },
      function() { var s = getState(); return [0, s.M / p2]; }
    ], { strokeColor: '#C8102E', strokeWidth: 2 });

    // Show a few budget lines at different p1 values (faded)
    var pSamples = [1, 2, 3, 4, 5];
    for (var k = 0; k < pSamples.length; k++) {
      (function(pp) {
        board1.create('segment', [
          function() { var s = getState(); return [s.M / pp, 0]; },
          function() { var s = getState(); return [0, s.M / p2]; }
        ], { strokeColor: '#eee', strokeWidth: 1 });
      })(pSamples[k]);
    }

    // Indifference curve at current optimum
    board1.create('curve', [
      function(t) { return t; },
      function(t) {
        var s = getState();
        var x1s = marshDemand(s.alpha, s.M, s.p1);
        var x2s = (1 - s.alpha) * s.M / p2;
        var U = utility(s.alpha, x1s, x2s);
        return indiffY(s.alpha, U, t);
      },
      0.3, 110
    ], { strokeColor: '#00897b', strokeWidth: 1.5, dash: 3 });

    // Optimal point
    board1.create('point', [
      function() { var s = getState(); return marshDemand(s.alpha, s.M, s.p1); },
      function() { var s = getState(); return (1 - s.alpha) * s.M / p2; }
    ], { size: 4, fillColor: '#C8102E', strokeColor: '#C8102E', name: '', fixed: true });

    // --- Bottom panel: Demand curves ---
    var board2 = JXG.JSXGraph.initBoard('jxgbox2', {
      boundingbox: [-10, 8.5, 90, -1.1],
      axis: false,
      showCopyright: false,
      showNavigation: false,
      keepaspectratio: false
    });

    board2.create('axis', [[0,0],[75,0]], {
      ticks: { drawLabels: true, label: { fontSize: 9 }, minorTicks: 0, ticksDistance: 10 },
      name: '', withLabel: false
    });
    board2.create('axis', [[0,0],[0,7]], {
      ticks: { drawLabels: true, label: { fontSize: 9, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 1 },
      name: '', withLabel: false
    });

    // Y-axis label: centered vertically, rotated 90°, bold italic
    board2.create('text', [
      -10 * 0.55, 8.5 / 2,
      '<b><i>p</i><sub>1</sub></b>'
    ], { fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false });

    // X-axis label: centered horizontally, below ticks, bold italic
    board2.create('text', [
      90 / 2, -1.1 * 0.65,
      '<b><i>x</i><sub>1</sub></b>'
    ], { fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false });

    // Consumer surplus shaded area (under marshallian, above p1)
    var csPolygon = board2.create('curve', [[], []], {
      strokeWidth: 0, fillColor: 'rgba(200,16,46,0.12)', fillOpacity: 1, vertices: { visible: false }
    });

    // We'll draw the CS area using a filled curve
    var csFill = board2.create('curve', [
      function(t) { var s = getState(); return marshDemand(s.alpha, s.M, t); },
      function(t) { return t; },
      function() { return getState().p1; },
      6.5
    ], { strokeWidth: 0, fillColor: 'rgba(200,16,46,0.15)', fillOpacity: 1 });

    // Marshallian demand curve: p1 -> x1 = alpha*M/p1
    board2.create('curve', [
      function(t) { var s = getState(); return marshDemand(s.alpha, s.M, t); },
      function(t) { return t; },
      0.3, 6.5
    ], { strokeColor: '#C8102E', strokeWidth: 2.5 });

    // Hicksian demand curve: h1(p1, U0) where U0 is utility at reference price
    board2.create('curve', [
      function(t) {
        var s = getState();
        var x1ref = marshDemand(s.alpha, s.M, p1ref);
        var x2ref = (1 - s.alpha) * s.M / p2;
        var U0 = utility(s.alpha, x1ref, x2ref);
        return hicksDemand(s.alpha, t, U0);
      },
      function(t) { return t; },
      0.3, 6.5
    ], { strokeColor: '#1565c0', strokeWidth: 2.5, dash: 2 });

    // Vertical line at current p1
    board2.create('line', [
      function() { var s = getState(); return [marshDemand(s.alpha, s.M, s.p1), 0]; },
      function() { var s = getState(); return [marshDemand(s.alpha, s.M, s.p1), 1]; }
    ], { strokeColor: '#aaa', strokeWidth: 1, dash: 3, straightFirst: true, straightLast: true });

    // Horizontal line at current p1
    board2.create('segment', [
      function() { return [0, getState().p1]; },
      function() { var s = getState(); return [marshDemand(s.alpha, s.M, s.p1) + 5, s.p1]; }
    ], { strokeColor: '#aaa', strokeWidth: 1, dash: 3 });

    // Point on Marshallian
    board2.create('point', [
      function() { var s = getState(); return marshDemand(s.alpha, s.M, s.p1); },
      function() { return getState().p1; }
    ], { size: 4, fillColor: '#C8102E', strokeColor: '#C8102E', name: '', fixed: true });

    // Point on Hicksian
    board2.create('point', [
      function() {
        var s = getState();
        var x1ref = marshDemand(s.alpha, s.M, p1ref);
        var x2ref = (1 - s.alpha) * s.M / p2;
        var U0 = utility(s.alpha, x1ref, x2ref);
        return hicksDemand(s.alpha, s.p1, U0);
      },
      function() { return getState().p1; }
    ], { size: 4, fillColor: '#1565c0', strokeColor: '#1565c0', name: '', fixed: true });

    // Intersection point label
    board2.create('point', [
      function() { return marshDemand(getState().alpha, getState().M, p1ref); },
      p1ref
    ], { size: 3, fillColor: '#333', strokeColor: '#333', name: 'Cruzamento',
         fixed: true, label: { fontSize: 9, offset: [5, 10] } });

    // Legend in bottom panel
    var _legMarsh = board2.create('text', [50, 6.2, function() { return '<span style="color:#C8102E;font-weight:bold">Marshalliana</span>'; }],
      { fontSize: 10, anchorX: 'left' });
    var _legHicks = board2.create('text', [50, 5.6, function() { return '<span style="color:#1565c0;font-weight:bold">Hicksiana</span>'; }],
      { fontSize: 10, anchorX: 'left' });
    var textLabels = [_legMarsh, _legHicks];
    function toggleLabels() {
      var show = document.getElementById('chk-labels').checked;
      textLabels.forEach(function(t) { t.setAttribute({visible: show}); });
      board1.update();
      board2.update();
    }

    function update() {
      var s = getState();
      document.getElementById('val-p1').textContent = s.p1.toFixed(2);
      document.getElementById('val-alpha').textContent = s.alpha.toFixed(2);
      document.getElementById('val-M').textContent = s.M.toFixed(0);

      var x1m = marshDemand(s.alpha, s.M, s.p1);
      var x1ref_val = marshDemand(s.alpha, s.M, p1ref);
      var x2ref_val = (1 - s.alpha) * s.M / p2;
      var U0 = utility(s.alpha, x1ref_val, x2ref_val);
      var x1h = hicksDemand(s.alpha, s.p1, U0);

      // Consumer surplus (approximate with numerical integration)
      var cs = 0;
      var pMax = 6.5;
      var dp = 0.01;
      for (var p = s.p1; p <= pMax; p += dp) {
        cs += marshDemand(s.alpha, s.M, p) * dp;
      }

      var html = '\\(x_1^{Marsh} = ' + x1m.toFixed(2) + '\\)<br>';
      html += '\\(x_1^{Hicks} = ' + x1h.toFixed(2) + '\\)<br>';
      html += 'Excedente do consumidor \\(\\approx ' + cs.toFixed(2) + '\\)<br>';
      html += '<div style="margin-top:0.4rem;font-size:0.78rem;color:#666;">';
      html += 'Para bem normal (\\(\\alpha > 0\\)): a hicksiana é mais inclinada que a marshalliana (menos elástica), pois captura apenas o efeito substituição.';
      html += '</div>';

      document.getElementById('info').innerHTML = html;
      board1.update();
      board2.update();
      if (window.MathJax && MathJax.typeset) MathJax.typeset();
    }

    function resetAll() {
      document.getElementById('slider-p1').value = 2;
      document.getElementById('slider-alpha').value = 0.40;
      document.getElementById('slider-M').value = 100;
      update();
    }

    document.getElementById('slider-p1').addEventListener('input', update);
    document.getElementById('slider-alpha').addEventListener('input', update);
    document.getElementById('slider-M').addEventListener('input', update);

    update();
  </script>
</body>
</html>
