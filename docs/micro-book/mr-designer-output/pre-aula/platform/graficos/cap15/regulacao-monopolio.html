<!DOCTYPE html>
<!--
  Monopoly Regulation — Chapter 15
  Library: JSXGraph
  Shows: natural monopoly with declining AC, three regulation regimes
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regulação de Monopólio Natural</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 420px; max-width: 520px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 320px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.7rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.83rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .toggle-group { margin-bottom: 0.8rem; display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .toggle-btn { padding: 0.35rem 0.6rem; border: 1px solid #C8102E; background: #fff; color: #C8102E; border-radius: 4px; cursor: pointer; font-size: 0.78rem; font-family: inherit; }
    .toggle-btn.active { background: #C8102E; color: #fff; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.7; }
    .info-box .section-title { font-weight: 700; color: #1565c0; margin-top: 0.3rem; }
    .info-box .section-title:first-child { margin-top: 0; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 880px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { flex-basis: 100%; width: 100%; max-width: 520px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 520px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Regime Regulatório</h3>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-unreg" onclick="setMode('unreg')">Sem Regulação</button>
        <button class="toggle-btn" id="btn-mc" onclick="setMode('mc')">P = CMg</button>
        <button class="toggle-btn" id="btn-ac" onclick="setMode('ac')">P = CMe</button>
      </div>
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>Intercepto demanda \(a\): <span class="val" id="val-a">100</span></label>
        <input type="range" id="slider-a" min="50" max="150" step="1" value="100">
      </div>
      <div class="slider-group">
        <label>Inclinação demanda \(b\): <span class="val" id="val-b">1.0</span></label>
        <input type="range" id="slider-b" min="0.5" max="3" step="0.1" value="1">
      </div>
      <div class="slider-group">
        <label>Custo fixo \(F\): <span class="val" id="val-F">1000</span></label>
        <input type="range" id="slider-F" min="200" max="3000" step="50" value="1000">
      </div>
      <div class="slider-group">
        <label>Custo marginal \(c\): <span class="val" id="val-c">10</span></label>
        <input type="range" id="slider-c" min="1" max="50" step="1" value="10">
      </div>
      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

<script>
  var BB = [-18, 140, 140, -18];
  var regMode = 'unreg';
  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: BB, axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
  });

  function rebuildBoard() {
    JXG.JSXGraph.freeBoard(board);
    board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: BB, axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
    });
  }

  function addAxes() {
    board.create('axis', [[0,0],[1,0]], {
      ticks: { drawLabels: true, minorTicks: 0, ticksDistance: 20, label: { fontSize: 11 } },
      name: '', withLabel: false
    });
    board.create('text', [70, -12, '<b><i>Q</i></b>'], {
      fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false
    });
    board.create('axis', [[0,0],[0,1]], {
      ticks: { drawLabels: true, minorTicks: 0, ticksDistance: 20, label: { fontSize: 11, anchorX: 'right', offset: [-8, 0] } },
      name: '', withLabel: false
    });
    board.create('text', [-13, 70, '<b><i>P</i></b>'], {
      fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
    });
  }

  function setMode(m) {
    regMode = m;
    document.querySelectorAll('.toggle-btn').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('btn-' + m).classList.add('active');
    updateGraph();
  }

  function updateGraph() {
    var a = parseFloat(document.getElementById('slider-a').value);
    var b = parseFloat(document.getElementById('slider-b').value);
    var F = parseFloat(document.getElementById('slider-F').value);
    var c = parseFloat(document.getElementById('slider-c').value);
    document.getElementById('val-a').textContent = a.toFixed(0);
    document.getElementById('val-b').textContent = b.toFixed(1);
    document.getElementById('val-F').textContent = F.toFixed(0);
    document.getElementById('val-c').textContent = c.toFixed(0);

    rebuildBoard();
    addAxes();

    var maxQ = a / b;

    // --- Common curves (1st quadrant) ---

    // Demand
    board.create('functiongraph', [function(q) {
      if (q < 0) return NaN; var v = a - b*q; return v >= 0 ? v : NaN;
    }], { strokeColor: '#1565c0', strokeWidth: 2.5 });
    board.create('text', [maxQ + 3, 3, '<i>D</i>'], { fontSize: 13, color: '#1565c0', fixed: true, highlight: false });

    // MR
    board.create('functiongraph', [function(q) {
      if (q < 0) return NaN; return a - 2*b*q;
    }], { strokeColor: '#C8102E', strokeWidth: 2, dash: 2 });
    board.create('text', [maxQ / 2 + 3, 3, '<i>RMg</i>'], { fontSize: 12, color: '#C8102E', fixed: true, highlight: false });

    // CMg
    board.create('functiongraph', [function(q) { return q >= 0 ? c : NaN; }],
      { strokeColor: '#00897b', strokeWidth: 2.5 });
    board.create('text', [maxQ + 3, c + 4, '<i>CMg</i>'], { fontSize: 12, color: '#00897b', fixed: true, highlight: false });

    // CMe = F/q + c (q > 0.5)
    board.create('functiongraph', [function(q) { return q > 0.5 ? F/q + c : NaN; }],
      { strokeColor: '#9c27b0', strokeWidth: 2, dash: 1 });
    // Position CMe label where curve is visible
    var qLabel = Math.min(maxQ * 0.75, Math.max(5, F / 50));
    board.create('text', [qLabel + 3, F/qLabel + c + 4, '<i>CMe</i>'], {
      fontSize: 12, color: '#9c27b0', fixed: true, highlight: false
    });

    // --- Computed values ---
    var qm = (a - c) / (2 * b);
    var pm = (a + c) / 2;
    var acm = F / qm + c;

    var qmc = (a - c) / b;
    var acmc = F / qmc + c;
    var subsidy = (acmc - c) * qmc; // = F

    // AC pricing: bq² - (a-c)q + F = 0
    var discr = (a - c) * (a - c) - 4 * b * F;
    var qac = 0, pac = 0;
    if (discr >= 0) {
      qac = ((a - c) + Math.sqrt(discr)) / (2 * b);
      pac = a - b * qac;
    }

    var dwlMon = 0.5 * (pm - c) * (qmc - qm);
    var html = '';

    // --- Mode-specific drawing ---
    if (regMode === 'unreg') {
      // DWL triangle
      board.create('polygon', [[qm, pm], [qmc, c], [qm, c]], {
        fillColor: '#ff9800', fillOpacity: 0.25,
        borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false, highlight: false
      });
      // Profit rectangle (pm - acm)
      if (pm > acm) {
        board.create('polygon', [[0, acm], [qm, acm], [qm, pm], [0, pm]], {
          fillColor: '#00897b', fillOpacity: 0.15,
          borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false, highlight: false
        });
      }
      board.create('point', [qm, pm], { name: '', size: 4, strokeColor: '#C8102E', fillColor: '#C8102E', fixed: true });
      board.create('segment', [[qm,pm],[qm,0]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });
      board.create('segment', [[qm,pm],[0,pm]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });

      var cs = 0.5 * (a - pm) * qm;
      var profitM = (pm - acm) * qm;
      html += '<div class="section-title">Curvas</div>';
      html += '\\(P = ' + a.toFixed(0) + ' - ' + b.toFixed(1) + '\\,Q\\)<br>';
      html += '\\(CMg = ' + c.toFixed(0) + '\\), \\(CMe = ' + F.toFixed(0) + '/Q + ' + c.toFixed(0) + '\\)';
      html += '<div class="section-title">Monopólio Não Regulado</div>';
      html += '\\(Q^m = ' + qm.toFixed(1) + '\\), \\(P^m = ' + pm.toFixed(1) + '\\)<br>';
      html += '\\(CMe = ' + acm.toFixed(1) + '\\)<br>';
      html += '\\(\\pi = ' + profitM.toFixed(1) + '\\)<br>';
      html += '\\(EC = ' + cs.toFixed(1) + '\\), \\(PPM = ' + dwlMon.toFixed(1) + '\\)';

    } else if (regMode === 'mc') {
      // Subsidy rectangle (loss area)
      board.create('polygon', [[0, c], [qmc, c], [qmc, acmc], [0, acmc]], {
        fillColor: '#C8102E', fillOpacity: 0.15,
        borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false, highlight: false
      });
      board.create('text', [qmc * 0.4, (c + acmc) / 2, 'Subsídio'], {
        fontSize: 11, color: '#C8102E', fontWeight: 'bold', fixed: true, highlight: false
      });
      board.create('point', [qmc, c], { name: '', size: 4, strokeColor: '#C8102E', fillColor: '#C8102E', fixed: true });
      board.create('segment', [[qmc,c],[qmc,0]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });

      html += '<div class="section-title">Curvas</div>';
      html += '\\(P = ' + a.toFixed(0) + ' - ' + b.toFixed(1) + '\\,Q\\)<br>';
      html += '\\(CMg = ' + c.toFixed(0) + '\\), \\(CMe = ' + F.toFixed(0) + '/Q + ' + c.toFixed(0) + '\\)';
      html += '<div class="section-title">Regulação P = CMg (First-Best)</div>';
      html += '\\(Q = ' + qmc.toFixed(1) + '\\), \\(P = CMg = ' + c.toFixed(0) + '\\)<br>';
      html += '\\(CMe = ' + acmc.toFixed(1) + '\\)<br>';
      html += '\\(\\pi = -' + subsidy.toFixed(1) + '\\) (prejuízo)<br>';
      html += 'Subsídio necessário: \\(' + subsidy.toFixed(1) + '\\)<br>';
      html += '\\(PPM = 0\\) (eficiente)<br>';
      html += 'Problema: financiar o subsídio gera distorções.';

    } else {
      if (discr < 0) {
        html += '<div class="section-title">Regulação P = CMe</div>';
        html += '<strong style="color:#C8102E">Não há interseção demanda/CMe.</strong><br>';
        html += 'Custos fixos muito altos para o mercado.';
      } else {
        // DWL triangle (residual)
        board.create('polygon', [[qac, pac], [qmc, c], [qac, c]], {
          fillColor: '#ff9800', fillOpacity: 0.2,
          borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false, highlight: false
        });
        board.create('point', [qac, pac], { name: '', size: 4, strokeColor: '#C8102E', fillColor: '#C8102E', fixed: true });
        board.create('segment', [[qac,pac],[qac,0]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });
        board.create('segment', [[qac,pac],[0,pac]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });

        var dwlAC = 0.5 * (pac - c) * (qmc - qac);
        var csAC = 0.5 * (a - pac) * qac;

        html += '<div class="section-title">Curvas</div>';
        html += '\\(P = ' + a.toFixed(0) + ' - ' + b.toFixed(1) + '\\,Q\\)<br>';
        html += '\\(CMg = ' + c.toFixed(0) + '\\), \\(CMe = ' + F.toFixed(0) + '/Q + ' + c.toFixed(0) + '\\)';
        html += '<div class="section-title">Regulação P = CMe (Second-Best)</div>';
        html += '\\(Q = ' + qac.toFixed(1) + '\\), \\(P = CMe = ' + pac.toFixed(1) + '\\)<br>';
        html += '\\(\\pi = 0\\) (lucro zero)<br>';
        html += '\\(EC = ' + csAC.toFixed(1) + '\\)<br>';
        html += '\\(PPM = ' + dwlAC.toFixed(1) + '\\) (residual)<br>';
        html += 'PPM sem regulação: \\(' + dwlMon.toFixed(1) + '\\)<br>';
        html += 'Redução: \\(' + (dwlMon - dwlAC).toFixed(1) + '\\)';
      }
    }

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-a').value = 100;
    document.getElementById('slider-b').value = 1;
    document.getElementById('slider-F').value = 1000;
    document.getElementById('slider-c').value = 10;
    regMode = 'unreg';
    document.querySelectorAll('.toggle-btn').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('btn-unreg').classList.add('active');
    updateGraph();
  }

  document.querySelectorAll('input[type="range"]').forEach(function(el) {
    el.addEventListener('input', updateGraph);
  });
  updateGraph();
</script>
</body>
</html>
