<!DOCTYPE html>
<!--
  Library: Plotly.js
  Reason: Plotly.js provides native 3D surface rendering with built-in rotation,
  zoom, and contour projection — ideal for visualizing utility function surfaces
  and their level curves (indifference curves) in 3D space.
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superficie de Utilidade 3D</title>

  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'CMU Serif', Georgia, serif;
      background: #ffffff;
      color: #333;
      padding: 1rem;
    }
    .graph-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #C8102E;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .graph-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-start;
      justify-content: center;
    }
    #plotly-div {
      flex: 1 1 400px;
      max-width: 560px;
      height: 480px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .controls {
      flex: 0 1 300px;
      padding: 1rem;
      background: #f8f8f8;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .controls h3 {
      font-size: 0.95rem;
      color: #C8102E;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.4rem;
    }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    select {
      width: 100%;
      padding: 0.4rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.85rem;
      margin-bottom: 0.8rem;
    }
    .info-box {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .info-box .eq { text-align: center; margin: 0.3rem 0; color: #333; }
    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.5rem;
      background: #C8102E;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 920px) {
      .graph-container { flex-direction: column; align-items: center; }
      #plotly-div { flex-basis: 100%; max-width: 100%; }
      .controls { flex-basis: 100%; max-width: 100%; }
    }
    /* anti-inflation-fix */
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
  <div class="graph-title">Figura 3.4 — Superfície da Função de Utilidade</div>
  <div class="graph-container">
    <div id="plotly-div"></div>
    <div class="controls">
      <h3>Parâmetros</h3>

      <div class="slider-group">
        <label>Tipo de função:</label>
        <select id="sel-type">
          <option value="cobb-douglas">Cobb-Douglas</option>
          <option value="ces">CES</option>
          <option value="quase-linear">Quase-linear</option>
        </select>
      </div>

      <div class="slider-group" id="grp-a">
        <label>\(a\): <span class="val" id="val-a">0.50</span></label>
        <input type="range" id="slider-a" min="0.1" max="2" step="0.05" value="0.5">
      </div>

      <div class="slider-group" id="grp-b">
        <label>\(b\): <span class="val" id="val-b">0.50</span></label>
        <input type="range" id="slider-b" min="0.1" max="2" step="0.05" value="0.5">
      </div>

      <div class="slider-group" id="grp-rho" style="display:none;">
        <label>\(\rho\): <span class="val" id="val-rho">0.50</span></label>
        <input type="range" id="slider-rho" min="-3" max="0.95" step="0.05" value="0.5">
      </div>

      <div class="info-box" id="info">
        <div class="eq" id="eq-func"></div>
        <div class="eq" id="eq-sigma" style="margin-top:0.3rem;"></div>
      </div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    var N = 50;

    function getType() { return document.getElementById('sel-type').value; }
    function getA() { return parseFloat(document.getElementById('slider-a').value); }
    function getB() { return parseFloat(document.getElementById('slider-b').value); }
    function getRho() { return parseFloat(document.getElementById('slider-rho').value); }

    function utilFunc(x1, x2) {
      var type = getType();
      var a = getA(), b = getB(), rho = getRho();
      if (x1 <= 0) x1 = 0.01;
      if (x2 <= 0) x2 = 0.01;
      switch(type) {
        case 'cobb-douglas':
          return Math.pow(x1, a) * Math.pow(x2, b);
        case 'ces':
          if (Math.abs(rho) < 0.01) return Math.sqrt(x1 * x2);
          return Math.pow(Math.pow(x1, rho) + Math.pow(x2, rho), 1/rho);
        case 'quase-linear':
          return a * Math.pow(x1, 0.5) + x2;
      }
    }

    function computeSurface() {
      var x1 = [], x2 = [], z = [];
      var step = 8 / N;
      for (var j = 0; j <= N; j++) {
        var row_x1 = [], row_x2 = [], row_z = [];
        var v2 = 0.1 + j * step;
        for (var i = 0; i <= N; i++) {
          var v1 = 0.1 + i * step;
          row_x1.push(v1);
          row_x2.push(v2);
          row_z.push(utilFunc(v1, v2));
        }
        x1.push(row_x1);
        x2.push(row_x2);
        z.push(row_z);
      }
      return { x: x1, y: x2, z: z };
    }

    function plotSurface() {
      var data = computeSurface();
      var surface = {
        x: data.x, y: data.y, z: data.z,
        type: 'surface',
        colorscale: [
          [0, '#1565c0'],
          [0.3, '#00897b'],
          [0.6, '#e65100'],
          [1, '#C8102E']
        ],
        contours: {
          z: {
            show: true,
            usecolormap: true,
            highlightcolor: '#ffffff',
            project: { z: true }
          }
        },
        opacity: 0.9
      };

      var layout = {
        scene: {
          xaxis: { title: 'x\u2081', range: [0, 8] },
          yaxis: { title: 'x\u2082', range: [0, 8] },
          zaxis: { title: 'u(x\u2081, x\u2082)' },
          camera: {
            eye: { x: 1.8, y: -1.8, z: 1.2 }
          }
        },
        margin: { l: 0, r: 0, b: 0, t: 30 },
        paper_bgcolor: '#fff',
        title: { text: '' }
      };

      Plotly.react('plotly-div', [surface], layout, { responsive: true });
    }

    function showHideControls() {
      var type = getType();
      document.getElementById('grp-rho').style.display = type === 'ces' ? '' : 'none';
      document.getElementById('grp-b').style.display = type === 'quase-linear' ? 'none' : '';
    }

    function updateInfo() {
      var type = getType();
      var a = getA(), b = getB(), rho = getRho();
      var eqFunc = '', eqSigma = '';
      switch(type) {
        case 'cobb-douglas':
          eqFunc = '\\(u(x_1, x_2) = x_1^{' + a.toFixed(2) + '} \\cdot x_2^{' + b.toFixed(2) + '}\\)';
          eqSigma = '\\(\\sigma = 1\\)';
          break;
        case 'ces':
          eqFunc = '\\(u = (x_1^{' + rho.toFixed(2) + '} + x_2^{' + rho.toFixed(2) + '})^{1/' + rho.toFixed(2) + '}\\)';
          var sigma = 1 / (1 - rho);
          eqSigma = '\\(\\sigma = \\frac{1}{1-\\rho} = ' + sigma.toFixed(2) + '\\)';
          break;
        case 'quase-linear':
          eqFunc = '\\(u(x_1, x_2) = ' + a.toFixed(2) + '\\sqrt{x_1} + x_2\\)';
          eqSigma = 'TMS depende apenas de \\(x_1\\)';
          break;
      }
      document.getElementById('eq-func').innerHTML = eqFunc;
      document.getElementById('eq-sigma').innerHTML = eqSigma;
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([document.getElementById('info')]);
      }
    }

    function update() {
      document.getElementById('val-a').textContent = getA().toFixed(2);
      document.getElementById('val-b').textContent = getB().toFixed(2);
      document.getElementById('val-rho').textContent = getRho().toFixed(2);
      showHideControls();
      plotSurface();
      updateInfo();
    }

    function resetAll() {
      document.getElementById('sel-type').value = 'cobb-douglas';
      document.getElementById('slider-a').value = 0.5;
      document.getElementById('slider-b').value = 0.5;
      document.getElementById('slider-rho').value = 0.5;
      update();
    }

    document.getElementById('sel-type').addEventListener('change', update);
    document.getElementById('slider-a').addEventListener('input', update);
    document.getElementById('slider-b').addEventListener('input', update);
    document.getElementById('slider-rho').addEventListener('input', update);

    update();
  </script>
<script>(function(){function r(){var c=document.body.children,m=0;for(var i=0;i<c.length;i++){var b=c[i].getBoundingClientRect();var h=b.top+b.height;if(h>m)m=h}var height=Math.ceil(m)+20;if(height>50&&window.parent!==window)window.parent.postMessage({type:"iframeResize",height:height},"*")}if(document.readyState==="complete")setTimeout(r,200);else window.addEventListener("load",function(){setTimeout(r,200)});setTimeout(r,2000);setTimeout(r,5000);var t;new MutationObserver(function(){clearTimeout(t);t=setTimeout(r,300)}).observe(document.body,{childList:true,subtree:true,attributes:true})})();</script>
</body>
</html>
