<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>R Interativo — Tipos de Preferências</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'CMU Serif',Georgia,serif;background:#fff;color:#333;padding:1rem}.main-container{max-width:780px;margin:0 auto}.status-bar{padding:.5rem 1rem;border-radius:4px;font-size:.85rem;margin-bottom:1rem;text-align:center}.status-loading{background:#fff3e0;border:1px solid #ff9800;color:#e65100}.status-ready{background:#e8f5e9;border:1px solid #4caf50;color:#2e7d32}.status-error{background:#ffebee;border:1px solid #f44336;color:#c62828}.editor-container{border:1px solid #ddd;border-radius:6px;overflow:hidden;margin-bottom:1rem}.editor-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}.editor-header .lang-tag{background:#C8102E;color:#fff;padding:.15rem .5rem;border-radius:3px;font-size:.75rem;font-weight:700}textarea#r-code{width:100%;min-height:300px;padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.85rem;border:none;outline:none;resize:vertical;background:#fafafa;color:#333;line-height:1.5;tab-size:2}.btn-row{display:flex;gap:.5rem;margin-bottom:1rem}.btn-run{padding:.5rem 1.5rem;background:#C8102E;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:700}.btn-run:hover{background:#9a0c23}.btn-run:disabled{background:#ccc;cursor:not-allowed}.btn-reset{padding:.5rem 1.5rem;background:#fff;color:#666;border:1px solid #ddd;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit}.btn-reset:hover{background:#f5f5f5}.output-container{border:1px solid #ddd;border-radius:6px;overflow:hidden}.output-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd}#r-output{padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.82rem;background:#1e1e1e;color:#d4d4d4;min-height:120px;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}#r-plot{text-align:center;padding:.5rem;background:#fff}#r-plot img,#r-plot canvas{max-width:100%;border-radius:4px}.info-box{margin-top:1rem;padding:.8rem;background:#f8f8f8;border:1px solid #eee;border-radius:4px;font-size:.8rem;color:#666;line-height:1.5}html,body{margin:0!important;padding:0!important;overflow:visible!important}</style>
</head>
<body>
<div class="main-container">
  <div class="status-bar status-loading" id="status">Carregando WebR (~10s na primeira vez)...</div>
  <div class="editor-container">
    <div class="editor-header"><span>Edite o código e clique "Executar"</span><span class="lang-tag">R</span></div>
    <textarea id="r-code">
# Zoológico de Preferências: 4 tipos em 1 gráfico
# Cap. 3 — Cada forma de CI conta uma história diferente

par(mfrow = c(2, 2), mar = c(4, 4, 3, 1))
x <- seq(0.1, 10, length.out = 300)

# 1) Cobb-Douglas: U = x^a * y^(1-a)
a <- 0.5
U_vals <- c(3, 5, 7)
plot(NA, xlim = c(0, 10), ylim = c(0, 10),
     xlab = "x", ylab = "y", main = "Cobb-Douglas")
for (u in U_vals) {
  y_ci <- (u / x^a)^(1/(1-a))
  lines(x[y_ci <= 10], y_ci[y_ci <= 10], col = "steelblue", lwd = 2)
}
text(8, 8, sprintf("a=%.1f", a), col = "steelblue", font = 2)
text(5, 1, "TMS decrescente\n(suave)", cex = 0.8)

# 2) Substitutos Perfeitos: U = ax + by
a_s <- 1; b_s <- 2
U_sub <- c(6, 12, 18)
plot(NA, xlim = c(0, 10), ylim = c(0, 10),
     xlab = "x", ylab = "y", main = "Substitutos Perfeitos")
for (u in U_sub) {
  y_ci <- (u - a_s * x) / b_s
  keep <- y_ci >= 0 & y_ci <= 10
  lines(x[keep], y_ci[keep], col = "#C8102E", lwd = 2)
}
text(7, 8, sprintf("TMS = -%.0f/%.0f\n(constante)", a_s, b_s),
     col = "#C8102E", font = 2, cex = 0.8)

# 3) Complementos Perfeitos (Leontief): U = min(x/a, y/b)
a_l <- 1; b_l <- 2
U_leo <- c(1, 2, 3)
plot(NA, xlim = c(0, 10), ylim = c(0, 10),
     xlab = "x", ylab = "y", main = "Complementos (Leontief)")
for (u in U_leo) {
  # Parte vertical: x = a*u, y >= b*u
  segments(a_l*u, b_l*u, a_l*u, 10, col = "#2a7f2a", lwd = 2)
  # Parte horizontal: y = b*u, x >= a*u
  segments(a_l*u, b_l*u, 10, b_l*u, col = "#2a7f2a", lwd = 2)
  points(a_l*u, b_l*u, pch = 19, col = "#2a7f2a", cex = 1)
}
text(7, 2, "Proporcao fixa\n(L em cada CI)", cex = 0.8)

# 4) Quase-linear: U = v(x) + y, v(x) = sqrt(x)
U_ql <- c(2, 3.5, 5)
plot(NA, xlim = c(0, 10), ylim = c(0, 10),
     xlab = "x", ylab = "y", main = "Quase-linear")
for (u in U_ql) {
  y_ci <- u - sqrt(x)
  keep <- y_ci >= 0 & y_ci <= 10
  lines(x[keep], y_ci[keep], col = "#ff9800", lwd = 2)
}
text(6, 8, "CIs paralelas\nverticalmente!", col = "#ff9800", font = 2, cex = 0.8)
text(6, 2, "Sem efeito-renda\npara x", cex = 0.8)

cat("=== Zoologico de Preferencias ===\n\n")
cat("Cobb-Douglas: CIs suaves, convexas, TMS decrescente.\n")
cat("Substitutos:  CIs retas, TMS constante.\n")
cat("Leontief:     CIs em L, proporcao fixa.\n")
cat("Quase-linear: CIs verticalmente paralelas,\n")
cat("              sem efeito-renda para x.\n")
</textarea>
  </div>
  <div class="btn-row">
    <button class="btn-run" id="btn-run" onclick="runCode()" disabled>Executar (R)</button>
    <button class="btn-reset" onclick="resetCode()">Restaurar código original</button>
  </div>
  <div class="output-container">
    <div class="output-header">Saída do R</div>
    <div id="r-output">Aguardando execução...</div>
    <div id="r-plot"></div>
  </div>
  <div class="info-box">
    <strong>WebR</strong> executa R no navegador. Quatro famílias de preferências, quatro geometrias. A forma da curva de indiferença determina toda a teoria da demanda que vem depois.
  </div>
</div>
<script type="module">
import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:620,height:520}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
</body>
</html>
