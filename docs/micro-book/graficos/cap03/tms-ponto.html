<!DOCTYPE html>
<!--
  Library: JSXGraph
  Reason: JSXGraph provides precise geometric construction — tangent lines, slopes,
  and draggable constrained points — making it ideal for visualizing the marginal
  rate of substitution as the slope of the tangent to an indifference curve.
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualizacao da TMS</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'CMU Serif', Georgia, serif;
      background: #ffffff;
      color: #333;
      padding: 1rem;
    }
    .graph-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #C8102E;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .graph-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-start;
      justify-content: center;
    }
    #jxgbox {
      width: 520px;
      height: 420px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .controls {
      width: 300px;
      padding: 1rem;
      background: #f8f8f8;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .controls h3 {
      font-size: 0.95rem;
      color: #C8102E;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.4rem;
    }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.85rem;
      line-height: 1.8;
    }
    .info-box .eq { text-align: center; margin: 0.3rem 0; color: #333; }
    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.5rem;
      background: #C8102E;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-reset:hover { background: #9a0c23; }
    .highlight { color: #C8102E; font-weight: 700; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { width: 100%; max-width: 520px; }
      .controls { width: 100%; max-width: 520px; }
    }
  </style>
</head>
<body>
  <div class="graph-title">Taxa Marginal de Substituicao (TMS)</div>
  <div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Parametros Cobb-Douglas</h3>

      <div class="slider-group">
        <label>\(\alpha\): <span class="val" id="val-alpha">0.50</span></label>
        <input type="range" id="slider-alpha" min="0.1" max="2" step="0.05" value="0.5">
      </div>

      <div class="slider-group">
        <label>\(\beta\): <span class="val" id="val-beta">0.50</span></label>
        <input type="range" id="slider-beta" min="0.1" max="2" step="0.05" value="0.5">
      </div>

      <div class="info-box" id="info">
        <div class="eq" id="eq-func"></div>
        <div class="eq" id="eq-tms-formula"></div>
        <hr style="margin:0.5rem 0; border:none; border-top:1px solid #eee;">
        <div id="info-umg"></div>
        <div id="info-tms"></div>
        <div id="info-slope"></div>
      </div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    var board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [-0.5, 10.5, 10.5, -0.5],
      axis: false,
      showCopyright: false,
      showNavigation: false,
      keepAspectRatio: false
    });

    // Axes
    board.create('axis', [[0,0],[10,0]], {
      ticks: { drawLabels: true, label: { fontSize: 11 } },
      name: '\\(x_1\\)', withLabel: true,
      label: { position: 'rt', offset: [-15, -20], fontSize: 14 }
    });
    board.create('axis', [[0,0],[0,10]], {
      ticks: { drawLabels: true, label: { fontSize: 11 } },
      name: '\\(x_2\\)', withLabel: true,
      label: { position: 'rt', offset: [-25, -5], fontSize: 14 }
    });

    var alpha = 0.5, beta = 0.5;
    var icCurves = [];
    var tangent = null;
    var tmsDot = null;
    var annotations = [];

    // Draggable point
    var dragPt = board.create('point', [3, 4], {
      name: 'P', size: 5, color: '#C8102E',
      strokeColor: '#C8102E', fillColor: '#C8102E',
      label: { fontSize: 13, offset: [8, 8], color: '#C8102E' }
    });

    function getAlpha() { return parseFloat(document.getElementById('slider-alpha').value); }
    function getBeta() { return parseFloat(document.getElementById('slider-beta').value); }

    function solveX2(x1, U, a, b) {
      if (x1 <= 0.01 || U <= 0) return NaN;
      var val = U / Math.pow(x1, a);
      if (val <= 0) return NaN;
      return Math.pow(val, 1/b);
    }

    function clearDynamic() {
      for (var i = annotations.length - 1; i >= 0; i--) {
        board.removeObject(annotations[i]);
      }
      annotations = [];
      for (var i = icCurves.length - 1; i >= 0; i--) {
        board.removeObject(icCurves[i]);
      }
      icCurves = [];
    }

    function drawAll() {
      clearDynamic();
      var a = getAlpha(), b = getBeta();
      var px = dragPt.X(), py = dragPt.Y();
      if (px < 0.1) px = 0.1;
      if (py < 0.1) py = 0.1;

      var U0 = Math.pow(px, a) * Math.pow(py, b);

      // Draw 3 indifference curves: one through P, one above, one below
      var levels = [U0 * 0.5, U0, U0 * 1.8];
      var colors = ['#1565c0', '#C8102E', '#1565c0'];
      var widths = [1.5, 2.5, 1.5];
      var dashes = [2, 0, 2];

      for (var k = 0; k < levels.length; k++) {
        var Uk = levels[k];
        var c = board.create('curve', [
          function(Uval, ak, bk) {
            return function(t) { return t; };
          }(Uk, a, b),
          function(Uval, ak, bk) {
            return function(t) {
              return solveX2(t, Uval, ak, bk);
            };
          }(Uk, a, b),
          0.05, 10.5
        ], {
          strokeColor: colors[k], strokeWidth: widths[k],
          dash: dashes[k], numberPointsHigh: 300
        });
        icCurves.push(c);
      }

      // TMS computation
      var umg1 = a * Math.pow(px, a - 1) * Math.pow(py, b);
      var umg2 = b * Math.pow(px, a) * Math.pow(py, b - 1);
      var tms = umg1 / umg2; // = (a * py) / (b * px)

      // Tangent line through P with slope = -tms
      var slope = -tms;
      var p1x = Math.max(0.1, px - 3);
      var p1y = py + slope * (p1x - px);
      var p2x = Math.min(10, px + 3);
      var p2y = py + slope * (p2x - px);

      var tLine = board.create('line', [
        [px, py],
        [px + 1, py - tms]
      ], {
        strokeColor: '#00897b', strokeWidth: 2, dash: 3,
        straightFirst: true, straightLast: true, fixed: true,
        point1: { visible: false }, point2: { visible: false }
      });
      annotations.push(tLine);

      // Slope label on tangent
      var labelX = Math.min(9, px + 1.5);
      var labelY = py + slope * 1.5;
      if (labelY > 0.5 && labelY < 10) {
        var slopeLabel = board.create('text', [
          labelX, labelY,
          'inclinacao = -TMS'
        ], {
          fontSize: 11, color: '#00897b', fixed: true, anchorX: 'left'
        });
        annotations.push(slopeLabel);
      }

      // dx1, dx2 arrows to show the trade-off
      var dx1 = 1;
      var dx2 = -tms * dx1;
      if (px + dx1 < 10 && py + dx2 > 0.3) {
        var arr1 = board.create('arrow', [[px, py], [px + dx1, py]], {
          strokeColor: '#1565c0', strokeWidth: 2, fixed: true,
          lastArrow: { type: 2, size: 6 }
        });
        var arr2 = board.create('arrow', [[px + dx1, py], [px + dx1, py + dx2]], {
          strokeColor: '#C8102E', strokeWidth: 2, fixed: true,
          lastArrow: { type: 2, size: 6 }
        });
        var lbl1 = board.create('text', [px + dx1/2, py + 0.3, '\\(\\Delta x_1 = 1\\)'], {
          fontSize: 10, color: '#1565c0', fixed: true, anchorX: 'middle'
        });
        var lbl2 = board.create('text', [px + dx1 + 0.4, py + dx2/2, '\\(\\Delta x_2\\)'], {
          fontSize: 10, color: '#C8102E', fixed: true, anchorX: 'left'
        });
        annotations.push(arr1, arr2, lbl1, lbl2);
      }

      // Update info panel
      document.getElementById('eq-func').innerHTML =
        '\\(u(x_1, x_2) = x_1^{' + a.toFixed(2) + '} \\cdot x_2^{' + b.toFixed(2) + '}\\)';
      document.getElementById('eq-tms-formula').innerHTML =
        '\\(\\text{TMS}_{12} = \\frac{\\alpha \\cdot x_2}{\\beta \\cdot x_1}\\)';
      document.getElementById('info-umg').innerHTML =
        '\\(\\text{UMg}_1 = ' + umg1.toFixed(4) + '\\)<br>' +
        '\\(\\text{UMg}_2 = ' + umg2.toFixed(4) + '\\)';
      document.getElementById('info-tms').innerHTML =
        '<span class="highlight">\\(\\text{TMS}_{12} = \\frac{\\text{UMg}_1}{\\text{UMg}_2} = \\frac{' +
        umg1.toFixed(4) + '}{' + umg2.toFixed(4) + '} = ' + tms.toFixed(4) + '\\)</span>';
      document.getElementById('info-slope').innerHTML =
        'Ponto: \\((' + px.toFixed(2) + ',\\; ' + py.toFixed(2) + ')\\)<br>' +
        'Utilidade: \\(U = ' + U0.toFixed(4) + '\\)';

      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([document.getElementById('info')]);
      }
    }

    function update() {
      document.getElementById('val-alpha').textContent = getAlpha().toFixed(2);
      document.getElementById('val-beta').textContent = getBeta().toFixed(2);
      drawAll();
      board.update();
    }

    function resetAll() {
      document.getElementById('slider-alpha').value = 0.5;
      document.getElementById('slider-beta').value = 0.5;
      dragPt.moveTo([3, 4]);
      update();
    }

    document.getElementById('slider-alpha').addEventListener('input', update);
    document.getElementById('slider-beta').addEventListener('input', update);
    dragPt.on('drag', function() { drawAll(); });

    update();
  </script>
</body>
</html>
