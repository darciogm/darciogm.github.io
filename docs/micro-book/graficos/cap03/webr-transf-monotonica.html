<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>R Interativo — Transformação Monotônica</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'CMU Serif',Georgia,serif;background:#fff;color:#333;padding:1rem}.main-container{max-width:780px;margin:0 auto}.status-bar{padding:.5rem 1rem;border-radius:4px;font-size:.85rem;margin-bottom:1rem;text-align:center}.status-loading{background:#fff3e0;border:1px solid #ff9800;color:#e65100}.status-ready{background:#e8f5e9;border:1px solid #4caf50;color:#2e7d32}.status-error{background:#ffebee;border:1px solid #f44336;color:#c62828}.editor-container{border:1px solid #ddd;border-radius:6px;overflow:hidden;margin-bottom:1rem}.editor-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}.editor-header .lang-tag{background:#C8102E;color:#fff;padding:.15rem .5rem;border-radius:3px;font-size:.75rem;font-weight:700}textarea#r-code{width:100%;min-height:300px;padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.85rem;border:none;outline:none;resize:vertical;background:#fafafa;color:#333;line-height:1.5;tab-size:2}.btn-row{display:flex;gap:.5rem;margin-bottom:1rem}.btn-run{padding:.5rem 1.5rem;background:#C8102E;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:700}.btn-run:hover{background:#9a0c23}.btn-run:disabled{background:#ccc;cursor:not-allowed}.btn-reset{padding:.5rem 1.5rem;background:#fff;color:#666;border:1px solid #ddd;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit}.btn-reset:hover{background:#f5f5f5}.output-container{border:1px solid #ddd;border-radius:6px;overflow:hidden}.output-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd}#r-output{padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.82rem;background:#1e1e1e;color:#d4d4d4;min-height:120px;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}#r-plot{text-align:center;padding:.5rem;background:#fff}#r-plot img,#r-plot canvas{max-width:100%;border-radius:4px}.info-box{margin-top:1rem;padding:.8rem;background:#f8f8f8;border:1px solid #eee;border-radius:4px;font-size:.8rem;color:#666;line-height:1.5}html,body{margin:0!important;padding:0!important;overflow:visible!important}</style>
</head>
<body>
<div class="main-container">
  <div class="status-bar status-loading" id="status">Carregando WebR (~10s na primeira vez)...</div>
  <div class="editor-container">
    <div class="editor-header"><span>Edite o código e clique "Executar"</span><span class="lang-tag">R</span></div>
    <textarea id="r-code">
# Transformação Monotônica Preserva TMS e Curvas de Indiferença
# Cap. 3 — A utilidade é ordinal, não cardinal!

# U original: U = x^0.5 * y^0.5 (Cobb-Douglas)
# Transformações monotônicas:
#   V = ln(U) = 0.5*ln(x) + 0.5*ln(y)
#   W = U^2  = x * y
# Todas representam AS MESMAS preferências!

x0 <- 4; y0 <- 9   # ponto para calcular TMS

cat("=== Transformacao Monotonica: 3 funcoes, mesma TMS ===\n\n")

# U = x^0.5 * y^0.5
U  <- x0^0.5 * y0^0.5
TMS_U <- -(0.5 * x0^(-0.5) * y0^0.5) / (x0^0.5 * 0.5 * y0^(-0.5))
cat(sprintf("U = x^0.5 * y^0.5:\n  U(%d,%d) = %.2f,  TMS = %.4f\n\n", x0, y0, U, TMS_U))

# V = ln(U) = 0.5*ln(x) + 0.5*ln(y)
V  <- 0.5*log(x0) + 0.5*log(y0)
TMS_V <- -(0.5/x0) / (0.5/y0)
cat(sprintf("V = ln(U) = 0.5*ln(x) + 0.5*ln(y):\n  V(%d,%d) = %.4f,  TMS = %.4f\n\n", x0, y0, V, TMS_V))

# W = U^2 = x*y
W  <- x0 * y0
TMS_W <- -y0 / x0
cat(sprintf("W = U^2 = x*y:\n  W(%d,%d) = %.0f,  TMS = %.4f\n\n", x0, y0, W, TMS_W))

cat("TMS identica em todas! A utilidade e ORDINAL.\n")
cat("Nao importa se U=3 ou V=1.1 ou W=36;\n")
cat("o ranking e a taxa de troca sao os mesmos.\n")

# Gráfico
par(mfrow = c(1, 3), mar = c(4, 4, 3, 1))
x <- seq(0.3, 15, length.out = 300)

# CI para U
u_bar <- U
y_ci <- (u_bar / x^0.5)^2
plot(x, y_ci, type = "l", col = "steelblue", lwd = 2,
     xlim = c(0, 15), ylim = c(0, 15),
     xlab = "x", ylab = "y",
     main = expression(U == x^{0.5} * y^{0.5}))
points(x0, y0, pch = 19, col = "#C8102E", cex = 1.5)
# Tangente
dx <- 3; slope <- TMS_U
segments(x0-dx, y0-slope*(-dx), x0+dx, y0-slope*dx,
         col = "#C8102E", lwd = 1.5, lty = 2)

# CI para V = ln(U)
v_bar <- V
y_ci2 <- exp((v_bar - 0.5*log(x)) / 0.5)
plot(x, y_ci2, type = "l", col = "#2a7f2a", lwd = 2,
     xlim = c(0, 15), ylim = c(0, 15),
     xlab = "x", ylab = "y",
     main = "V = ln(U)")
points(x0, y0, pch = 19, col = "#C8102E", cex = 1.5)
segments(x0-dx, y0-slope*(-dx), x0+dx, y0-slope*dx,
         col = "#C8102E", lwd = 1.5, lty = 2)

# CI para W = U^2 = xy
w_bar <- W
y_ci3 <- w_bar / x
plot(x, y_ci3, type = "l", col = "#ff9800", lwd = 2,
     xlim = c(0, 15), ylim = c(0, 15),
     xlab = "x", ylab = "y",
     main = expression(W == U^2 == x*y))
points(x0, y0, pch = 19, col = "#C8102E", cex = 1.5)
segments(x0-dx, y0-slope*(-dx), x0+dx, y0-slope*dx,
         col = "#C8102E", lwd = 1.5, lty = 2)
</textarea>
  </div>
  <div class="btn-row">
    <button class="btn-run" id="btn-run" onclick="runCode()" disabled>Executar (R)</button>
    <button class="btn-reset" onclick="resetCode()">Restaurar código original</button>
  </div>
  <div class="output-container">
    <div class="output-header">Saída do R</div>
    <div id="r-output">Aguardando execução...</div>
    <div id="r-plot"></div>
  </div>
  <div class="info-box">
    <strong>WebR</strong> executa R no navegador. Três funções utilidade diferentes — <em>mesma</em> curva de indiferença e <em>mesma</em> TMS. A utilidade é ordinal: só o ranking importa, não o número.
  </div>
</div>
<script type="module">
import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:700,height:300}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
</body>
</html>
