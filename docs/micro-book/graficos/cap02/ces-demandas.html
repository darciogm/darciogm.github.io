<!DOCTYPE html>
<!--
  CES Utility Maximization — Marshallian Demands
  Library: JSXGraph 1.8.0 + MathJax 3
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demandas Marshallianas CES</title>

  <!-- JSXGraph -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.8.0/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.8.0/distrib/jsxgraphcore.js"></script>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'CMU Serif', Georgia, serif;
      background: #ffffff;
      color: #333;
      padding: 1rem;
    }
    .graph-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #C8102E;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .graph-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-start;
      justify-content: center;
    }
    #jxgbox {
      width: 520px;
      height: 420px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .controls {
      width: 300px;
      padding: 1rem;
      background: #f8f8f8;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .controls h3 {
      font-size: 0.95rem;
      color: #C8102E;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.4rem;
    }
    .slider-group {
      margin-bottom: 0.8rem;
    }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }
    .slider-group label .val {
      font-weight: 700;
      color: #C8102E;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #C8102E;
    }
    .info-box {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.82rem;
      line-height: 1.7;
    }
    .info-box .info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .info-box .info-label {
      color: #666;
    }
    .info-box .info-val {
      font-weight: 700;
      color: #333;
    }
    .info-box .info-val.accent { color: #C8102E; }
    .info-box .info-val.green { color: #00897b; }
    .info-box .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 0.4rem 0;
    }
    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.5rem;
      background: #C8102E;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-reset:hover { background: #9a0c23; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 0.6rem;
      font-size: 0.78rem;
      color: #666;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .legend-swatch {
      width: 18px;
      height: 3px;
      border-radius: 2px;
    }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { width: 100%; max-width: 520px; }
      .controls { width: 100%; max-width: 520px; }
    }
  </style>
</head>
<body>
  <div class="graph-title">Figura 2.1 — Demandas Marshallianas CES</div>
  <div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>

      <div class="slider-group">
        <label>\(\alpha\): <span class="val" id="val-alpha">0.50</span></label>
        <input type="range" id="slider-alpha" min="0.1" max="0.9" step="0.05" value="0.5">
      </div>
      <div class="slider-group">
        <label>\(\rho\): <span class="val" id="val-rho">0.50</span></label>
        <input type="range" id="slider-rho" min="-3" max="0.9" step="0.1" value="0.5">
      </div>
      <div class="slider-group">
        <label>\(p_1\): <span class="val" id="val-p1">2.0</span></label>
        <input type="range" id="slider-p1" min="0.5" max="10" step="0.5" value="2">
      </div>
      <div class="slider-group">
        <label>\(p_2\): <span class="val" id="val-p2">3.0</span></label>
        <input type="range" id="slider-p2" min="0.5" max="10" step="0.5" value="3">
      </div>
      <div class="slider-group">
        <label>\(m\): <span class="val" id="val-m">120</span></label>
        <input type="range" id="slider-m" min="10" max="300" step="10" value="120">
      </div>

      <div class="info-box" id="info">
        <div class="info-row">
          <span class="info-label">Ponto ótimo</span>
          <span class="info-val green" id="info-opt">—</span>
        </div>
        <hr class="divider">
        <div class="info-row">
          <span class="info-label">\(U^*\)</span>
          <span class="info-val accent" id="info-u">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">\(\lambda^*\)</span>
          <span class="info-val" id="info-lambda">—</span>
        </div>
        <hr class="divider">
        <div class="info-row">
          <span class="info-label">TMS</span>
          <span class="info-val" id="info-tms">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">\(\sigma = \frac{1}{1-\rho}\)</span>
          <span class="info-val" id="info-sigma">—</span>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:#C8102E"></div> Restrição orçamentária</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#1565c0"></div> Curvas de indiferença</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#00897b; border-radius:50%; width:10px; height:10px;"></div> Ótimo</div>
      </div>

      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    // ---- State ----
    var board;
    var curves = [];    // indifference curves
    var budgetLine;
    var optPoint;

    // Default values
    var DEFAULTS = { alpha: 0.5, rho: 0.5, p1: 2, p2: 3, m: 120 };

    function getParams() {
      return {
        alpha: parseFloat(document.getElementById('slider-alpha').value),
        rho:   parseFloat(document.getElementById('slider-rho').value),
        p1:    parseFloat(document.getElementById('slider-p1').value),
        p2:    parseFloat(document.getElementById('slider-p2').value),
        m:     parseFloat(document.getElementById('slider-m').value)
      };
    }

    // ---- CES Demands ----
    function isCobbDouglas(rho) {
      return Math.abs(rho) < 0.05;
    }

    function demands(par) {
      var a = par.alpha, r = par.rho, p1 = par.p1, p2 = par.p2, m = par.m;
      var x1, x2;
      if (isCobbDouglas(r)) {
        // Cobb-Douglas limit
        x1 = a * m / p1;
        x2 = (1 - a) * m / p2;
      } else {
        var sig = 1 / (1 - r);
        var a_s = Math.pow(a, sig);
        var b_s = Math.pow(1 - a, sig);
        var denom = a_s * Math.pow(p1, 1 - sig) + b_s * Math.pow(p2, 1 - sig);
        x1 = a_s * Math.pow(p1, -sig) / denom * m;
        x2 = b_s * Math.pow(p2, -sig) / denom * m;
      }
      return { x1: x1, x2: x2 };
    }

    function cesUtility(x1, x2, a, r) {
      if (x1 <= 0 || x2 <= 0) return 0;
      if (isCobbDouglas(r)) {
        return Math.pow(x1, a) * Math.pow(x2, 1 - a);
      }
      var val = a * Math.pow(x1, r) + (1 - a) * Math.pow(x2, r);
      if (val <= 0) return 0;
      return Math.pow(val, 1 / r);
    }

    // x2 from indifference curve: U(x1,x2) = k
    // a*x1^r + (1-a)*x2^r = k^r  =>  x2 = ((k^r - a*x1^r)/(1-a))^(1/r)
    function icX2(x1, k, a, r) {
      if (isCobbDouglas(r)) {
        // k = x1^a * x2^(1-a)  =>  x2 = (k / x1^a)^(1/(1-a))
        if (x1 <= 0) return NaN;
        var val = k / Math.pow(x1, a);
        if (val <= 0) return NaN;
        return Math.pow(val, 1 / (1 - a));
      }
      if (x1 <= 0) return NaN;
      var kr = Math.pow(k, r);
      var inner = (kr - a * Math.pow(x1, r)) / (1 - a);
      if (r > 0) {
        // For rho > 0 (substitutes), inner must be > 0
        if (inner <= 0) return NaN;
        return Math.pow(inner, 1 / r);
      } else {
        // For rho < 0 (complements), inner must be > 0
        if (inner <= 0) return NaN;
        return Math.pow(inner, 1 / r);
      }
    }

    // TMS = (a/(1-a)) * (x2/x1)^(1-rho)
    function tms(x1, x2, a, r) {
      if (x1 <= 0 || x2 <= 0) return NaN;
      return (a / (1 - a)) * Math.pow(x2 / x1, 1 - r);
    }

    // Lambda: from FOC, lambda = dU/dx1 / p1
    function lambdaStar(par) {
      var d = demands(par);
      var a = par.alpha, r = par.rho, p1 = par.p1;
      if (d.x1 <= 0) return 0;
      if (isCobbDouglas(r)) {
        // U = x1^a * x2^(1-a), dU/dx1 = a * U / x1
        var u = cesUtility(d.x1, d.x2, a, r);
        return a * u / (d.x1 * p1);
      }
      // dU/dx1 = U^(1-r) * a * x1^(r-1)
      var u = cesUtility(d.x1, d.x2, a, r);
      if (u <= 0) return 0;
      return Math.pow(u, 1 - r) * a * Math.pow(d.x1, r - 1) / p1;
    }

    // ---- Drawing ----
    function initBoard() {
      board = JXG.JSXGraph.initBoard('jxgbox', {
        boundingbox: [-8, 82, 78, -8],
        axis: true,
        showCopyright: false,
        showNavigation: false,
        defaultAxes: {
          x: { name: '', withLabel: false },
          y: { name: '', withLabel: false, ticks: { label: { anchorX: 'right', offset: [-8, 0] } } }
        }
      });

      // Manual axis labels
      board.create('text', [-2.5, 80, '\\(x_2\\)'], { fontSize: 14, fixed: true, anchorX: 'right', useMathJax: true });
      board.create('text', [80, -2.5, '\\(x_1\\)'], { fontSize: 14, fixed: true, anchorX: 'left', useMathJax: true });

      fullUpdate();
    }

    function clearAll() {
      curves.forEach(function(c) { board.removeObject(c); });
      curves = [];
      if (budgetLine) { board.removeObject(budgetLine); budgetLine = null; }
      if (optPoint)   { board.removeObject(optPoint);   optPoint = null; }
    }

    function fullUpdate() {
      var par = getParams();
      var d = demands(par);
      var uStar = cesUtility(d.x1, d.x2, par.alpha, par.rho);

      // Bounding box
      var maxX1 = par.m / par.p1;
      var maxX2 = par.m / par.p2;
      var bbMax = Math.max(maxX1, maxX2) * 1.25;
      var bbMargin = bbMax * 0.10;

      board.suspendUpdate();
      clearAll();
      board.setBoundingBox([-bbMax*0.12, bbMax*1.08, bbMax*1.08, -bbMax*0.12]);

      // --- Indifference curves ---
      var nCurves = 7;
      var levels = [];
      for (var i = 1; i <= nCurves; i++) {
        levels.push(uStar * i / ((nCurves + 1) / 2));
      }
      // Add the optimal level if not already close
      var hasOpt = false;
      for (var i = 0; i < levels.length; i++) {
        if (Math.abs(levels[i] - uStar) / (uStar + 1e-12) < 0.05) { hasOpt = true; break; }
      }
      if (!hasOpt) levels.push(uStar);
      levels.sort(function(a,b) { return a - b; });

      var a = par.alpha, r = par.rho;
      levels.forEach(function(k, idx) {
        if (k <= 0) return;
        var isOpt = Math.abs(k - uStar) / (uStar + 1e-12) < 0.05;
        // Create curve data
        var xData = [];
        var yData = [];
        var xMax = bbMax * 1.1;
        var steps = 300;
        for (var s = 1; s <= steps; s++) {
          var x1 = s / steps * xMax;
          var x2 = icX2(x1, k, a, r);
          if (!isNaN(x2) && isFinite(x2) && x2 > 0 && x2 < bbMax * 2) {
            xData.push(x1);
            yData.push(x2);
          }
        }
        if (xData.length < 2) return;
        var c = board.create('curve', [xData, yData], {
          strokeColor: isOpt ? '#00897b' : '#1565c0',
          strokeWidth: isOpt ? 2.5 : 1.3,
          strokeOpacity: isOpt ? 0.9 : 0.35 + 0.08 * idx,
          dash: isOpt ? 0 : 1
        });
        curves.push(c);
      });

      // --- Budget constraint ---
      budgetLine = board.create('functiongraph', [
        function(x) { return (par.m - par.p1 * x) / par.p2; },
        0, maxX1
      ], {
        strokeColor: '#C8102E',
        strokeWidth: 2.5
      });

      // --- Optimal point ---
      if (d.x1 > 0 && d.x2 > 0) {
        optPoint = board.create('point', [d.x1, d.x2], {
          size: 5,
          fillColor: '#00897b',
          strokeColor: '#00897b',
          name: '',
          fixed: true
        });
      }

      board.unsuspendUpdate();

      // --- Info panel ---
      var sig = isCobbDouglas(par.rho) ? Infinity : 1 / (1 - par.rho);
      var tmsVal = tms(d.x1, d.x2, par.alpha, par.rho);
      var lamVal = lambdaStar(par);

      document.getElementById('info-opt').textContent =
        '(' + d.x1.toFixed(2) + ', ' + d.x2.toFixed(2) + ')';
      document.getElementById('info-u').textContent = uStar.toFixed(3);
      document.getElementById('info-lambda').textContent = lamVal.toFixed(4);
      document.getElementById('info-tms').textContent = isFinite(tmsVal) ? tmsVal.toFixed(3) : '—';
      document.getElementById('info-sigma').textContent =
        isFinite(sig) ? sig.toFixed(3) : '\u221E (Cobb-Douglas)';

      // Update slider labels
      document.getElementById('val-alpha').textContent = par.alpha.toFixed(2);
      document.getElementById('val-rho').textContent   = par.rho.toFixed(1);
      document.getElementById('val-p1').textContent     = par.p1.toFixed(1);
      document.getElementById('val-p2').textContent     = par.p2.toFixed(1);
      document.getElementById('val-m').textContent      = par.m.toFixed(0);
    }

    function resetAll() {
      document.getElementById('slider-alpha').value = DEFAULTS.alpha;
      document.getElementById('slider-rho').value   = DEFAULTS.rho;
      document.getElementById('slider-p1').value    = DEFAULTS.p1;
      document.getElementById('slider-p2').value    = DEFAULTS.p2;
      document.getElementById('slider-m').value     = DEFAULTS.m;
      fullUpdate();
    }

    // Attach listeners
    ['slider-alpha','slider-rho','slider-p1','slider-p2','slider-m'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', fullUpdate);
    });

    initBoard();
  </script>
</body>
</html>
