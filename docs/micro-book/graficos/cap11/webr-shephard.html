<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebR — Lema de Shephard e Concavidade da Função Custo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f9fa;padding:12px;overflow-x:hidden}
.status-bar{padding:6px 12px;border-radius:6px;font-size:.85rem;margin-bottom:10px;text-align:center}
.status-loading{background:#fff3cd;color:#856404}
.status-ready{background:#d4edda;color:#155724}
.status-error{background:#f8d7da;color:#721c24}
textarea{width:100%;min-height:280px;font-family:'Fira Code',monospace;font-size:.85rem;padding:10px;border:2px solid #dee2e6;border-radius:8px;background:#1e1e1e;color:#d4d4d4;resize:vertical;tab-size:2;line-height:1.5}
.btn-group{display:flex;gap:8px;margin:10px 0}
button{padding:8px 20px;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:.9rem;transition:background .2s}
#btn-run{background:#0d6efd;color:#fff}
#btn-run:hover{background:#0b5ed7}
#btn-run:disabled{background:#6c757d;cursor:not-allowed}
#btn-reset{background:#6c757d;color:#fff}
#btn-reset:hover{background:#5a6268}
#r-output{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;font-family:'Fira Code',monospace;font-size:.82rem;white-space:pre-wrap;max-height:400px;overflow-y:auto;margin-top:8px;min-height:60px}
#r-plot{text-align:center;margin-top:8px}
#r-plot canvas{max-width:100%;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
</style>
</head>
<body>
<div id="status" class="status-bar status-loading">Carregando WebR...</div>
<textarea id="r-code">
# ============================================
# Lema de Shephard: verificacao numerica
# + Concavidade da funcao custo nos precos
# ============================================

# Cobb-Douglas: q = K^alpha * L^beta
alpha <- 1/3;  beta <- 2/3
q0 <- 10

# --- Funcao custo CD analitica ---
custo_cd <- function(w, v, q, a = alpha, b = beta) {
  s <- a + b
  kappa <- s * (a^(-a) * b^(-b))^(1/s)
  kappa * w^(b/s) * v^(a/s) * q^(1/s)
}

# --- Demandas condicionais analiticas ---
Lc_cd <- function(w, v, q, a = alpha, b = beta) {
  s <- a + b
  q^(1/s) * (b * v / (a * w))^(a/s)
}
Kc_cd <- function(w, v, q, a = alpha, b = beta) {
  s <- a + b
  q^(1/s) * (a * w / (b * v))^(b/s)
}

# --- Verificacao do Lema de Shephard ---
w0 <- 8; v0 <- 2; eps <- 1e-6

dC_dw_num <- (custo_cd(w0+eps, v0, q0) - custo_cd(w0-eps, v0, q0)) / (2*eps)
dC_dv_num <- (custo_cd(w0, v0+eps, q0) - custo_cd(w0, v0-eps, q0)) / (2*eps)

Lc_analitico <- Lc_cd(w0, v0, q0)
Kc_analitico <- Kc_cd(w0, v0, q0)

cat("====== LEMA DE SHEPHARD: VERIFICACAO ======\n")
cat("Parametros: alpha =", alpha, " beta =", beta, " q =", q0, "\n")
cat("Precos: w =", w0, " v =", v0, "\n\n")
cat("dC/dw (numerico):  ", round(dC_dw_num, 4), "\n")
cat("L^c (analitico):   ", round(Lc_analitico, 4), "\n")
cat("Diferenca:         ", round(abs(dC_dw_num - Lc_analitico), 8), "\n\n")
cat("dC/dv (numerico):  ", round(dC_dv_num, 4), "\n")
cat("K^c (analitico):   ", round(Kc_analitico, 4), "\n")
cat("Diferenca:         ", round(abs(dC_dv_num - Kc_analitico), 8), "\n\n")
cat("=> Lema de Shephard verificado!\n\n")

# --- Grafico: Concavidade de C(w, v0, q0) em w ---
par(mfrow = c(1, 2), mar = c(4.5, 4.5, 3, 1), bg = "#f8f9fa")

# Painel 1: C como funcao de w (fixando v)
w_seq <- seq(1, 20, length = 200)
C_w <- sapply(w_seq, function(w) custo_cd(w, v0, q0))

# Tangente no ponto w0 (pelo Lema, inclinacao = L^c)
tangente_w <- custo_cd(w0, v0, q0) + Lc_analitico * (w_seq - w0)

plot(w_seq, C_w, type = "l", lwd = 3, col = "#0d6efd",
     xlab = "w (salario)", ylab = "C(w, v0, q)",
     main = "Concavidade em w", cex.lab = 1.1)
lines(w_seq, tangente_w, lwd = 2, col = "#dc3545", lty = 2)
points(w0, custo_cd(w0, v0, q0), pch = 19, col = "#dc3545", cex = 1.5)
text(w0, custo_cd(w0, v0, q0), paste0("  w=", w0, "\n  incl = L^c = ", round(Lc_analitico, 2)),
     pos = 4, cex = 0.8, col = "#dc3545")
legend("topleft", legend = c("C(w, v0, q)", "Tangente (Shephard)"),
       col = c("#0d6efd", "#dc3545"), lwd = c(3, 2), lty = c(1, 2),
       cex = 0.85, bg = "white")

# Painel 2: C como funcao de v (fixando w)
v_seq <- seq(0.5, 15, length = 200)
C_v <- sapply(v_seq, function(v) custo_cd(w0, v, q0))

tangente_v <- custo_cd(w0, v0, q0) + Kc_analitico * (v_seq - v0)

plot(v_seq, C_v, type = "l", lwd = 3, col = "#198754",
     xlab = "v (custo do capital)", ylab = "C(w0, v, q)",
     main = "Concavidade em v", cex.lab = 1.1)
lines(v_seq, tangente_v, lwd = 2, col = "#dc3545", lty = 2)
points(v0, custo_cd(w0, v0, q0), pch = 19, col = "#dc3545", cex = 1.5)
text(v0, custo_cd(w0, v0, q0), paste0("  v=", v0, "\n  incl = K^c = ", round(Kc_analitico, 2)),
     pos = 4, cex = 0.8, col = "#dc3545")
legend("topleft", legend = c("C(w0, v, q)", "Tangente (Shephard)"),
       col = c("#198754", "#dc3545"), lwd = c(3, 2), lty = c(1, 2),
       cex = 0.85, bg = "white")
</textarea>
<div class="btn-group">
<button id="btn-run" disabled onclick="runCode()">&#9654; Executar</button>
<button id="btn-reset" onclick="resetCode()">&#8635; Resetar</button>
</div>
<div id="r-output">(Aguardando WebR...)</div>
<div id="r-plot"></div>
<script type="module">
import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:700,height:340}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
</body>
</html>
