<!DOCTYPE html>
<!--
  TEMPLATE — Interactive Graph for Microeconomia Book
  Library: JSXGraph (default) | Plotly.js | D3.js
  Reason: [Why this library was chosen]

  Usage: Copy this template and customize for each graph.
  Embed in .md via:
    <iframe src="../graficos/capXX/nome.html" width="100%" height="500" style="border:none;border-radius:8px;"></iframe>
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráfico Interativo — Template</title>

  <!-- JSXGraph -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <!-- MathJax for equations -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'CMU Serif', Georgia, serif;
      background: #ffffff;
      color: #333;
      padding: 1rem;
    }
    .graph-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #C8102E;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .graph-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-start;
      justify-content: center;
    }
    #jxgbox {
      width: 520px;
      height: 420px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .controls {
      width: 280px;
      padding: 1rem;
      background: #f8f8f8;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .controls h3 {
      font-size: 0.95rem;
      color: #C8102E;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.4rem;
    }
    .slider-group {
      margin-bottom: 0.8rem;
    }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }
    .slider-group label .val {
      font-weight: 700;
      color: #C8102E;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #C8102E;
    }
    .info-box {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .info-box .eq {
      text-align: center;
      margin: 0.3rem 0;
      color: #333;
    }
    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.5rem;
      background: #C8102E;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { width: 100%; max-width: 520px; }
      .controls { width: 100%; max-width: 520px; }
    }
  </style>
</head>
<body>
  <div class="graph-title">Título do Gráfico</div>
  <div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>Parâmetro: <span class="val" id="val-param">1.00</span></label>
        <input type="range" id="slider-param" min="0.1" max="5" step="0.1" value="1">
      </div>
      <div class="info-box" id="info">
        <div class="eq">\( f(x) = x \)</div>
      </div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    // --- Graph setup ---
    var board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [-1, 10, 10, -1],
      axis: true,
      showCopyright: false,
      showNavigation: false
    });

    // TODO: Add graph elements here

    function resetAll() {
      document.getElementById('slider-param').value = 1;
      update();
    }

    function update() {
      var p = parseFloat(document.getElementById('slider-param').value);
      document.getElementById('val-param').textContent = p.toFixed(2);
      // TODO: Update graph elements
      board.update();
      if (window.MathJax) MathJax.typeset();
    }

    document.getElementById('slider-param').addEventListener('input', update);
    update();
  </script>
</body>
</html>
