<!DOCTYPE html>
<!--
  Trabalho-Lazer: Escolha otima — Interactive Graph
  Library: JSXGraph
  Chapter 16 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolha Trabalho-Lazer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-title { font-size: 1.1rem; font-weight: 700; color: #C8102E; margin-bottom: 0.5rem; text-align: center; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    .jxgbox { width: 480px; height: 400px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { width: 300px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .jxgbox { width: 100%; max-width: 480px; }
      .controls { width: 100%; max-width: 480px; }
    }
  </style>
</head>
<body>
  <div class="graph-title">Escolha Trabalho-Lazer</div>
  <div class="graph-container">
    <div id="jxgbox1" class="jxgbox"></div>
    <div class="controls">
      <h3>Parametros</h3>
      <div class="slider-group">
        <label>Salario \(w\): <span class="val" id="val-w">10</span></label>
        <input type="range" id="slider-w" min="2" max="30" step="0.5" value="10">
      </div>
      <div class="slider-group">
        <label>Renda nao-salarial \(V\): <span class="val" id="val-V">0</span></label>
        <input type="range" id="slider-V" min="0" max="100" step="5" value="0">
      </div>
      <div class="slider-group">
        <label>\(\alpha\) (peso do consumo): <span class="val" id="val-alpha">0.50</span></label>
        <input type="range" id="slider-alpha" min="0.20" max="0.80" step="0.05" value="0.50">
      </div>
      <div class="slider-group">
        <label>\(T\) (horas disponiveis): <span class="val" id="val-T">24</span></label>
        <input type="range" id="slider-T" min="12" max="24" step="1" value="24">
      </div>
      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    /*
      Cobb-Douglas: U(C,L) = C^alpha * L^(1-alpha)
      Budget: C + wL = wT + V  =>  C = w(T-L) + V
      Optimal: L* = (1-alpha)(wT + V)/w, h* = T - L* = alpha*T - (1-alpha)*V/w
      C* = alpha*(wT + V)
    */
    var T_MAX = 24;

    var board = JXG.JSXGraph.initBoard('jxgbox1', {
      boundingbox: [-2, 320, 28, -15],
      axis: false, showCopyright: false, showNavigation: false, keepaspectratio: false
    });

    board.create('axis', [[0,0],[26,0]], {
      ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 4 },
      name: 'L (lazer)', withLabel: true, label: { position: 'rt', offset: [-20, 15], fontSize: 12 }
    });
    board.create('axis', [[0,0],[0,310]], {
      ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 50 },
      name: 'C (consumo)', withLabel: true, label: { position: 'rt', offset: [15, -5], fontSize: 12 }
    });

    // Budget line: C = w(T-L) + V = wT + V - wL
    var budgetLine = board.create('segment', [
      function() { var s = getState(); return [0, s.w * s.T + s.V]; },
      function() { var s = getState(); return [s.T + s.V / s.w, 0]; }
    ], { strokeColor: '#1565c0', strokeWidth: 2.5 });

    // Endowment point (T, V) — if works 0 hours
    var endowPt = board.create('point', [
      function() { return getState().T; },
      function() { return getState().V; }
    ], { size: 4, fillColor: '#666', strokeColor: '#666', name: '(T, V)', fixed: true,
         label: { fontSize: 10, offset: [8, -8] } });

    // Optimal point
    var optPt = board.create('point', [
      function() {
        var s = getState();
        var Ls = (1 - s.alpha) * (s.w * s.T + s.V) / s.w;
        return Math.min(Math.max(Ls, 0), s.T);
      },
      function() {
        var s = getState();
        var Ls = (1 - s.alpha) * (s.w * s.T + s.V) / s.w;
        Ls = Math.min(Math.max(Ls, 0), s.T);
        return s.w * (s.T - Ls) + s.V;
      }
    ], { size: 5, fillColor: '#C8102E', strokeColor: '#C8102E', name: '(L^*, C^*)', fixed: true,
         label: { fontSize: 11, offset: [10, 5] } });

    // Indifference curve through optimal
    var indiffCurve = board.create('curve', [
      function(t) { return t; },
      function(t) {
        var s = getState();
        var Ls = Math.min(Math.max((1 - s.alpha) * (s.w * s.T + s.V) / s.w, 0), s.T);
        var Cs = s.w * (s.T - Ls) + s.V;
        var U = Math.pow(Math.max(Cs, 0.01), s.alpha) * Math.pow(Math.max(Ls, 0.01), 1 - s.alpha);
        if (t <= 0.1) return 9999;
        var val = U / Math.pow(t, 1 - s.alpha);
        return Math.pow(val, 1 / s.alpha);
      },
      0.2, 27
    ], { strokeColor: '#00897b', strokeWidth: 2, dash: 3 });

    // Dashed lines to axes from optimal point
    board.create('segment', [
      function() { var s = getState(); var Ls = Math.min(Math.max((1-s.alpha)*(s.w*s.T+s.V)/s.w,0),s.T); return [Ls, 0]; },
      function() { var s = getState(); var Ls = Math.min(Math.max((1-s.alpha)*(s.w*s.T+s.V)/s.w,0),s.T); return [Ls, s.w*(s.T-Ls)+s.V]; }
    ], { strokeColor: '#aaa', strokeWidth: 1, dash: 3 });
    board.create('segment', [
      function() { var s = getState(); var Ls = Math.min(Math.max((1-s.alpha)*(s.w*s.T+s.V)/s.w,0),s.T); return [0, s.w*(s.T-Ls)+s.V]; },
      function() { var s = getState(); var Ls = Math.min(Math.max((1-s.alpha)*(s.w*s.T+s.V)/s.w,0),s.T); return [Ls, s.w*(s.T-Ls)+s.V]; }
    ], { strokeColor: '#aaa', strokeWidth: 1, dash: 3 });

    // Slope label
    board.create('text', [1, function() { var s = getState(); return s.w * s.T + s.V - 15; },
      function() { return '<span style="font-size:10px;color:#1565c0;">incl. = -w</span>'; }
    ], { fontSize: 10, anchorX: 'left', useMathJax: false });

    function getState() {
      return {
        w: parseFloat(document.getElementById('slider-w').value),
        V: parseFloat(document.getElementById('slider-V').value),
        alpha: parseFloat(document.getElementById('slider-alpha').value),
        T: parseFloat(document.getElementById('slider-T').value)
      };
    }

    function update() {
      var s = getState();
      document.getElementById('val-w').textContent = s.w.toFixed(1);
      document.getElementById('val-V').textContent = s.V.toFixed(0);
      document.getElementById('val-alpha').textContent = s.alpha.toFixed(2);
      document.getElementById('val-T').textContent = s.T.toFixed(0);

      var fullIncome = s.w * s.T + s.V;
      var Ls = (1 - s.alpha) * fullIncome / s.w;
      Ls = Math.min(Math.max(Ls, 0), s.T);
      var hs = s.T - Ls;
      var Cs = s.w * hs + s.V;

      // Update bounding box dynamically
      var maxC = Math.max(fullIncome * 1.1, 100);
      board.setBoundingBox([-2, maxC, s.T + 4, -maxC * 0.05]);

      var html = '<div style="text-align:center;">\\(U(C,L) = C^{\\alpha} L^{1-\\alpha}\\)</div>';
      html += '<div style="margin-top:0.4rem;">';
      html += 'Renda plena: \\(M^* = wT + V = ' + fullIncome.toFixed(0) + '\\)<br>';
      html += '\\(L^* = ' + Ls.toFixed(1) + '\\) horas de lazer<br>';
      html += '\\(h^* = T - L^* = ' + hs.toFixed(1) + '\\) horas de trabalho<br>';
      html += '\\(C^* = wh^* + V = ' + Cs.toFixed(1) + '\\)';
      html += '</div>';

      document.getElementById('info').innerHTML = html;
      board.update();
      if (window.MathJax && MathJax.typeset) MathJax.typeset();
    }

    function resetAll() {
      document.getElementById('slider-w').value = 10;
      document.getElementById('slider-V').value = 0;
      document.getElementById('slider-alpha').value = 0.50;
      document.getElementById('slider-T').value = 24;
      update();
    }

    ['slider-w','slider-V','slider-alpha','slider-T'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', update);
    });
    update();
  </script>
</body>
</html>
