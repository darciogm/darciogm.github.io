<!DOCTYPE html>
<!--
  Curva de Engel — Interactive Graph
  Library: JSXGraph
  Reason: Ideal for interactive 2D mathematical graphs with sliders and dynamic updates.
  Chapter 5 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curva de Engel</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'CMU Serif', Georgia, serif;
      background: #ffffff;
      color: #333;
      padding: 1rem;
    }
.graph-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-start;
      justify-content: center;
    }
    .boards-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .board-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #555;
      text-align: center;
    }
    .jxgbox {
      width: 420px;
      height: 320px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .controls {
      width: 300px;
      padding: 1rem;
      background: #f8f8f8;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .controls h3 {
      font-size: 0.95rem;
      color: #C8102E;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.4rem;
    }
    .slider-group {
      margin-bottom: 0.8rem;
    }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }
    .slider-group label .val {
      font-weight: 700;
      color: #C8102E;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #C8102E;
    }
    .toggle-group {
      margin-bottom: 0.8rem;
    }
    .toggle-group label {
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.3rem;
    }
    .toggle-group input[type="radio"] {
      accent-color: #C8102E;
    }
    .info-box {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.82rem;
      line-height: 1.6;
    }
    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.5rem;
      background: #C8102E;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .jxgbox { width: 100%; max-width: 420px; }
      .controls { width: 100%; max-width: 420px; }
    }
    /* anti-inflation-fix */
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div class="boards-wrapper">
      <div class="board-label">Espaço de Bens (caminho de expansão)</div>
      <div id="jxgbox1" class="jxgbox"></div>
      <div class="board-label">Curva de Engel</div>
      <div id="jxgbox2" class="jxgbox"></div>
    </div>
    <div class="controls">
      <h3>Parâmetros</h3>

      <div class="slider-group">
        <label>Renda \(M\): <span class="val" id="val-M">100</span></label>
        <input type="range" id="slider-M" min="10" max="200" step="1" value="100">
      </div>

      <div class="slider-group">
        <label>\(\alpha\) (Cobb-Douglas): <span class="val" id="val-alpha">0.40</span></label>
        <input type="range" id="slider-alpha" min="0.10" max="0.90" step="0.05" value="0.40">
      </div>

      <div class="slider-group">
        <label>\(p_1\): <span class="val" id="val-p1">2.00</span></label>
        <input type="range" id="slider-p1" min="0.5" max="5" step="0.1" value="2">
      </div>

      <div class="slider-group">
        <label>\(p_2\): <span class="val" id="val-p2">1.00</span></label>
        <input type="range" id="slider-p2" min="0.5" max="5" step="0.1" value="1">
      </div>

      <div class="toggle-group">
        <strong style="font-size:0.85rem;">Tipo de bem:</strong>
        <label><input type="radio" name="goodType" value="normal" checked> Bem normal (Cobb-Douglas)</label>
        <label><input type="radio" name="goodType" value="inferior"> Bem inferior (quase-linear)</label>
      </div>

      <div class="info-box" id="info">
      </div>
      <label style="font-size:0.82rem; cursor:pointer;">
        <input type="checkbox" id="chk-labels" checked onchange="toggleLabels()"> Mostrar labels
      </label>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    // --- Board 1: Goods space with budget lines and expansion path ---
    var board1 = JXG.JSXGraph.initBoard('jxgbox1', {
      boundingbox: [-13, 128, 123, -13],
      axis: false,
      showCopyright: false,
      showNavigation: false,
      keepaspectratio: false
    });

    // Axes
    board1.create('axis', [[0,0],[100,0]], {
      ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 20 },
      name: '', withLabel: false
    });
    board1.create('axis', [[0,0],[0,100]], {
      ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 20 },
      name: '', withLabel: false
    });

    // Y-axis label: centered vertically, rotated 90°, bold italic
    board1.create('text', [
      -13 * 0.55, 128 / 2,
      '<b><i>x</i><sub>2</sub></b>'
    ], { fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false });

    // X-axis label: centered horizontally, below ticks, bold italic
    board1.create('text', [
      123 / 2, -13 * 0.65,
      '<b><i>x</i><sub>1</sub></b>'
    ], { fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false });

    // Budget lines for multiple income levels (faded)
    var budgetLines1 = [];
    var incLevels = [30, 60, 90, 120, 150, 180];
    for (var k = 0; k < incLevels.length; k++) {
      (function(idx) {
        budgetLines1.push(board1.create('line', [
          function() { return getState().p1 * getState().p2; },
          function() { return getState().p2; },
          function() { return getState().p1; }
        ], {
          strokeColor: '#ccc', strokeWidth: 1, straightFirst: false, straightLast: false,
          visible: false
        }));
      })(k);
    }

    // We'll draw budget segments manually
    var budgetSegs = [];
    for (var k = 0; k < incLevels.length; k++) {
      (function(m) {
        budgetSegs.push(board1.create('segment', [
          function() { var s = getState(); return [m / s.p1, 0]; },
          function() { var s = getState(); return [0, m / s.p2]; }
        ], { strokeColor: '#ddd', strokeWidth: 1, dash: 2 }));
      })(incLevels[k]);
    }

    // Current budget line
    var budgetCurrent = board1.create('segment', [
      function() { var s = getState(); return [s.M / s.p1, 0]; },
      function() { var s = getState(); return [0, s.M / s.p2]; }
    ], { strokeColor: '#C8102E', strokeWidth: 2 });

    // Expansion path (collection of optimal points for M from 10 to 200)
    var expansionPath = board1.create('curve', [
      function(t) {
        var s = getState();
        if (s.type === 'normal') {
          return s.alpha * t / s.p1;
        } else {
          // Quasi-linear: U = ln(x1) + x2, x1* = p2/p1 (constant), x2* = (M - p2)/p2
          return Math.min(s.p2 / s.p1, t / s.p1);
        }
      },
      function(t) {
        var s = getState();
        if (s.type === 'normal') {
          return (1 - s.alpha) * t / s.p2;
        } else {
          var x1star = Math.min(s.p2 / s.p1, t / s.p1);
          return Math.max(0, (t - s.p1 * x1star) / s.p2);
        }
      },
      10, 200
    ], { strokeColor: '#1565c0', strokeWidth: 2.5 });

    // Current optimal point
    var optPoint1 = board1.create('point', [
      function() {
        var s = getState();
        if (s.type === 'normal') return s.alpha * s.M / s.p1;
        else return Math.min(s.p2 / s.p1, s.M / s.p1);
      },
      function() {
        var s = getState();
        if (s.type === 'normal') return (1 - s.alpha) * s.M / s.p2;
        else {
          var x1star = Math.min(s.p2 / s.p1, s.M / s.p1);
          return Math.max(0, (s.M - s.p1 * x1star) / s.p2);
        }
      }
    ], { size: 4, fillColor: '#C8102E', strokeColor: '#C8102E', name: '', fixed: true });

    // Indifference curve through optimal point
    var indiffCurve = board1.create('curve', [
      function(t) { return t; },
      function(t) {
        var s = getState();
        var x1s, x2s, U;
        if (s.type === 'normal') {
          x1s = s.alpha * s.M / s.p1;
          x2s = (1 - s.alpha) * s.M / s.p2;
          U = Math.pow(x1s, s.alpha) * Math.pow(x2s, 1 - s.alpha);
          if (t <= 0.1) return 999;
          var val = U / Math.pow(t, s.alpha);
          return Math.pow(val, 1 / (1 - s.alpha));
        } else {
          x1s = Math.min(s.p2 / s.p1, s.M / s.p1);
          x2s = Math.max(0, (s.M - s.p1 * x1s) / s.p2);
          U = Math.log(Math.max(x1s, 0.01)) + x2s;
          if (t <= 0.05) return 999;
          return Math.max(0, U - Math.log(t));
        }
      },
      0.1, 105
    ], { strokeColor: '#00897b', strokeWidth: 1.5, dash: 3 });

    // --- Board 2: Engel curve (M vertical, x horizontal) ---
    var board2 = JXG.JSXGraph.initBoard('jxgbox2', {
      boundingbox: [-13, 255, 123, -25],
      axis: false,
      showCopyright: false,
      showNavigation: false,
      keepaspectratio: false
    });

    board2.create('axis', [[0,0],[100,0]], {
      ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 20 },
      name: '', withLabel: false
    });
    board2.create('axis', [[0,0],[0,210]], {
      ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 40 },
      name: '', withLabel: false
    });

    // Y-axis label: centered vertically, rotated 90°, bold italic
    board2.create('text', [
      -13 * 0.55, 255 / 2,
      '<b><i>M</i></b>'
    ], { fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false });

    // X-axis label: centered horizontally, below ticks, bold italic
    board2.create('text', [
      123 / 2, -25 * 0.65,
      '<b><i>x</i><sub>1</sub></b>'
    ], { fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false });

    // Engel curve for x1
    var engelX1 = board2.create('curve', [
      function(t) {
        var s = getState();
        if (s.type === 'normal') return s.alpha * t / s.p1;
        else return Math.min(s.p2 / s.p1, t / s.p1);
      },
      function(t) { return t; },
      10, 200
    ], { strokeColor: '#C8102E', strokeWidth: 2.5, name: '' });

    // Engel curve for x2
    var engelX2 = board2.create('curve', [
      function(t) {
        var s = getState();
        if (s.type === 'normal') return (1 - s.alpha) * t / s.p2;
        else {
          var x1star = Math.min(s.p2 / s.p1, t / s.p1);
          return Math.max(0, (t - s.p1 * x1star) / s.p2);
        }
      },
      function(t) { return t; },
      10, 200
    ], { strokeColor: '#1565c0', strokeWidth: 2.5, dash: 2, name: '' });

    // Current income line
    var mLine = board2.create('line', [
      function() { return [0, getState().M]; },
      function() { return [100, getState().M]; }
    ], { strokeColor: '#aaa', strokeWidth: 1, dash: 3, straightFirst: false, straightLast: false });

    // Points on Engel curves at current M
    var engelPt1 = board2.create('point', [
      function() {
        var s = getState();
        if (s.type === 'normal') return s.alpha * s.M / s.p1;
        else return Math.min(s.p2 / s.p1, s.M / s.p1);
      },
      function() { return getState().M; }
    ], { size: 4, fillColor: '#C8102E', strokeColor: '#C8102E', name: 'x_1^*', fixed: true,
         label: { fontSize: 11, offset: [8, -5] } });

    var engelPt2 = board2.create('point', [
      function() {
        var s = getState();
        if (s.type === 'normal') return (1 - s.alpha) * s.M / s.p2;
        else {
          var x1star = Math.min(s.p2 / s.p1, s.M / s.p1);
          return Math.max(0, (s.M - s.p1 * x1star) / s.p2);
        }
      },
      function() { return getState().M; }
    ], { size: 4, fillColor: '#1565c0', strokeColor: '#1565c0', name: 'x_2^*', fixed: true,
         label: { fontSize: 11, offset: [8, -5] } });

    // Legend
    var _legX1 = board2.create('text', [65, 200, function() { return '<span style="color:#C8102E;font-weight:bold">--- x_1*</span>'; }],
      { fontSize: 11, anchorX: 'left', useMathJax: false });
    var _legX2 = board2.create('text', [65, 185, function() { return '<span style="color:#1565c0;font-weight:bold">- - x_2*</span>'; }],
      { fontSize: 11, anchorX: 'left', useMathJax: false });
    var textLabels = [_legX1, _legX2];
    function toggleLabels() {
      var show = document.getElementById('chk-labels').checked;
      textLabels.forEach(function(t) { t.setAttribute({visible: show}); });
      board1.update();
      board2.update();
    }

    // --- State management ---
    function getState() {
      return {
        M: parseFloat(document.getElementById('slider-M').value),
        alpha: parseFloat(document.getElementById('slider-alpha').value),
        p1: parseFloat(document.getElementById('slider-p1').value),
        p2: parseFloat(document.getElementById('slider-p2').value),
        type: document.querySelector('input[name="goodType"]:checked').value
      };
    }

    function update() {
      var s = getState();
      document.getElementById('val-M').textContent = s.M.toFixed(0);
      document.getElementById('val-alpha').textContent = s.alpha.toFixed(2);
      document.getElementById('val-p1').textContent = s.p1.toFixed(2);
      document.getElementById('val-p2').textContent = s.p2.toFixed(2);

      var x1, x2, elast1, elast2;
      if (s.type === 'normal') {
        x1 = s.alpha * s.M / s.p1;
        x2 = (1 - s.alpha) * s.M / s.p2;
        // Income elasticity for Cobb-Douglas is always 1
        elast1 = 1.0;
        elast2 = 1.0;
      } else {
        // Quasi-linear: U = ln(x1) + x2
        x1 = Math.min(s.p2 / s.p1, s.M / s.p1);
        x2 = Math.max(0, (s.M - s.p1 * x1) / s.p2);
        // If interior: dx1/dM = 0, so elasticity = 0 for x1
        if (s.M > s.p2) {
          elast1 = 0;
          elast2 = s.M / (s.p2 * x2);
        } else {
          elast1 = 1;
          elast2 = 0;
        }
      }

      var typeLabel = s.type === 'normal' ?
        'Cobb-Douglas: \\(U = x_1^{\\alpha} x_2^{1-\\alpha}\\)' :
        'Quase-linear: \\(U = \\ln x_1 + x_2\\)';

      var classif1 = elast1 > 1 ? 'luxo' : (elast1 > 0 ? (elast1 < 1 ? 'necessidade' : 'unit.') : (elast1 === 0 ? 'nenhum ef. renda' : 'inferior'));
      var classif2 = elast2 > 1 ? 'luxo' : (elast2 > 0 ? (elast2 < 1 ? 'necessidade' : 'unit.') : 'inferior');

      var html = '<div class="eq">' + typeLabel + '</div>';
      html += '<div style="margin-top:0.5rem;">';
      html += '\\(x_1^* = ' + x1.toFixed(2) + '\\), \\(x_2^* = ' + x2.toFixed(2) + '\\)<br>';
      html += '<strong>Elasticidade-renda:</strong><br>';
      html += '\\(\\varepsilon_{x_1,M} = ' + elast1.toFixed(2) + '\\) (' + classif1 + ')<br>';
      html += '\\(\\varepsilon_{x_2,M} = ' + elast2.toFixed(2) + '\\) (' + classif2 + ')';
      html += '</div>';
      if (s.type === 'inferior') {
        html += '<div style="margin-top:0.4rem;font-size:0.78rem;color:#666;">Nota: Na quase-linear, \\(x_1\\) não responde a renda (efeito renda zero) enquanto \\(x_2\\) absorve toda variação.</div>';
      }

      document.getElementById('info').innerHTML = html;

      board1.update();
      board2.update();
      if (window.MathJax && MathJax.typeset) MathJax.typeset();
    }

    function resetAll() {
      document.getElementById('slider-M').value = 100;
      document.getElementById('slider-alpha').value = 0.40;
      document.getElementById('slider-p1').value = 2;
      document.getElementById('slider-p2').value = 1;
      document.querySelector('input[name="goodType"][value="normal"]').checked = true;
      update();
    }

    document.getElementById('slider-M').addEventListener('input', update);
    document.getElementById('slider-alpha').addEventListener('input', update);
    document.getElementById('slider-p1').addEventListener('input', update);
    document.getElementById('slider-p2').addEventListener('input', update);
    document.querySelectorAll('input[name="goodType"]').forEach(function(el) {
      el.addEventListener('change', update);
    });

    update();
  </script>
<script>(function(){function r(){var c=document.body.children,m=0;for(var i=0;i<c.length;i++){var b=c[i].getBoundingClientRect();var h=b.top+b.height;if(h>m)m=h}var height=Math.ceil(m)+20;if(height>50&&window.parent!==window)window.parent.postMessage({type:"iframeResize",height:height},"*")}if(document.readyState==="complete")setTimeout(r,200);else window.addEventListener("load",function(){setTimeout(r,200)});setTimeout(r,2000);setTimeout(r,5000);var t;new MutationObserver(function(){clearTimeout(t);t=setTimeout(r,300)}).observe(document.body,{childList:true,subtree:true,attributes:true})})();</script>
</body>
</html>
