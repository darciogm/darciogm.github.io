<!DOCTYPE html>
<!--
  Efeito Renda e Substituição (Decomposição de Hicks e Slutsky) — Interactive Graph
  Library: JSXGraph
  Reason: Dynamic indifference curves, budget lines, and decomposition arrows with sliders.
  Chapter 5 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Efeito Renda e Substituição</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'CMU Serif', Georgia, serif;
      background: #ffffff;
      color: #333;
      padding: 1rem;
    }
.graph-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: stretch;
      justify-content: center;
    }
    #jxgbox {
      flex: 1 1 420px;
      max-width: 520px;
      height: 460px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .controls {
      flex: 0 1 280px;
      padding: 1rem;
      background: #f8f8f8;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .controls h3 {
      font-size: 0.95rem;
      color: #C8102E;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.4rem;
    }
    .slider-group {
      margin-bottom: 0.8rem;
    }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }
    .slider-group label .val {
      font-weight: 700;
      color: #C8102E;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #C8102E;
    }
    .toggle-group {
      margin-bottom: 0.8rem;
    }
    .toggle-group label {
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.3rem;
    }
    .toggle-group input[type="radio"] {
      accent-color: #C8102E;
    }
    .info-box {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.82rem;
      line-height: 1.6;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      margin-bottom: 0.2rem;
    }
    .legend-swatch {
      width: 20px;
      height: 3px;
      display: inline-block;
    }
    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.5rem;
      background: #C8102E;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 700px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { flex-basis: 100%; max-width: 100%; }
      .controls { flex-basis: 100%; max-width: 100%; }
    }
    /* anti-inflation-fix */
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>

      <div class="slider-group">
        <label>Novo preço \(p_1'\): <span class="val" id="val-p1new">1.00</span></label>
        <input type="range" id="slider-p1new" min="0.5" max="5" step="0.1" value="1">
      </div>

      <div class="slider-group">
        <label>\(\alpha\): <span class="val" id="val-alpha">0.40</span></label>
        <input type="range" id="slider-alpha" min="0.10" max="0.90" step="0.05" value="0.40">
      </div>

      <div class="slider-group">
        <label>Renda \(M\): <span class="val" id="val-M">120</span></label>
        <input type="range" id="slider-M" min="40" max="200" step="5" value="120">
      </div>

      <div class="toggle-group">
        <strong style="font-size:0.85rem;">Decomposição:</strong>
        <label><input type="radio" name="decomp" value="hicks" checked> Hicks (utilidade constante)</label>
        <label><input type="radio" name="decomp" value="slutsky"> Slutsky (poder de compra constante)</label>
      </div>

      <div style="margin-bottom:0.6rem;">
        <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> Reta original</div>
        <div class="legend-item"><span class="legend-swatch" style="background:#1565c0;"></span> Reta nova</div>
        <div class="legend-item"><span class="legend-swatch" style="background:#00897b;"></span> Reta compensada</div>
      </div>

      <div class="info-box" id="info"></div>
      <label style="font-size:0.82rem; cursor:pointer;">
        <input type="checkbox" id="chk-labels" checked onchange="toggleLabels()"> Mostrar labels
      </label>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    var p1_init = 2.5, p2 = 1;

    var board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [-17, 170, 162, -17],
      axis: false,
      showCopyright: false,
      showNavigation: false,
      keepaspectratio: false
    });

    board.create('axis', [[0,0],[140,0]], {
      ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 20 },
      name: '', withLabel: false
    });
    board.create('axis', [[0,0],[0,140]], {
      ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 20 },
      name: '', withLabel: false
    });

    // Y-axis label: centered vertically, rotated 90°, bold italic
    board.create('text', [
      -17 * 0.55, 170 / 2,
      '<b><i>x</i><sub>2</sub></b>'
    ], { fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false });

    // X-axis label: centered horizontally, below ticks, bold italic
    board.create('text', [
      162 / 2, -17 * 0.65,
      '<b><i>x</i><sub>1</sub></b>'
    ], { fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false });

    function getState() {
      return {
        p1new: parseFloat(document.getElementById('slider-p1new').value),
        alpha: parseFloat(document.getElementById('slider-alpha').value),
        M: parseFloat(document.getElementById('slider-M').value),
        decomp: document.querySelector('input[name="decomp"]:checked').value
      };
    }

    // Cobb-Douglas demand: x1* = alpha*M/p1, x2* = (1-alpha)*M/p2
    // Utility: U = x1^alpha * x2^(1-alpha)
    // Hicksian demand: h1 = U * (alpha*p2/((1-alpha)*p1))^(1-alpha)
    //                  h2 = U * ((1-alpha)*p1/(alpha*p2))^alpha
    // Expenditure: E(p, U) = U * (p1/alpha)^alpha * (p2/(1-alpha))^(1-alpha)

    function cobbDouglas(alpha, M, p1) {
      var x1 = alpha * M / p1;
      var x2 = (1 - alpha) * M / p2;
      return { x1: x1, x2: x2 };
    }

    function utility(alpha, x1, x2) {
      return Math.pow(x1, alpha) * Math.pow(x2, 1 - alpha);
    }

    function expenditure(alpha, p1, U) {
      return U * Math.pow(p1 / alpha, alpha) * Math.pow(p2 / (1 - alpha), 1 - alpha);
    }

    function hicksianDemand(alpha, p1, U) {
      var h1 = U * Math.pow(alpha * p2 / ((1 - alpha) * p1), 1 - alpha);
      var h2 = U * Math.pow((1 - alpha) * p1 / (alpha * p2), alpha);
      return { x1: h1, x2: h2 };
    }

    function indiffY(alpha, U, x) {
      if (x <= 0.01) return 999;
      var val = U / Math.pow(x, alpha);
      return Math.pow(val, 1 / (1 - alpha));
    }

    // Original budget line (red)
    board.create('segment', [
      function() { var s = getState(); return [s.M / p1_init, 0]; },
      function() { var s = getState(); return [0, s.M / p2]; }
    ], { strokeColor: '#C8102E', strokeWidth: 2 });

    // New budget line (blue)
    board.create('segment', [
      function() { var s = getState(); return [s.M / s.p1new, 0]; },
      function() { var s = getState(); return [0, s.M / p2]; }
    ], { strokeColor: '#1565c0', strokeWidth: 2 });

    // Compensated budget line (green)
    board.create('segment', [
      function() {
        var s = getState();
        var orig = cobbDouglas(s.alpha, s.M, p1_init);
        var U0 = utility(s.alpha, orig.x1, orig.x2);
        var Mc;
        if (s.decomp === 'hicks') {
          Mc = expenditure(s.alpha, s.p1new, U0);
        } else {
          Mc = s.p1new * orig.x1 + p2 * orig.x2;
        }
        return [Mc / s.p1new, 0];
      },
      function() {
        var s = getState();
        var orig = cobbDouglas(s.alpha, s.M, p1_init);
        var U0 = utility(s.alpha, orig.x1, orig.x2);
        var Mc;
        if (s.decomp === 'hicks') {
          Mc = expenditure(s.alpha, s.p1new, U0);
        } else {
          Mc = s.p1new * orig.x1 + p2 * orig.x2;
        }
        return [0, Mc / p2];
      }
    ], { strokeColor: '#00897b', strokeWidth: 2, dash: 2 });

    // Original indifference curve
    board.create('curve', [
      function(t) { return t; },
      function(t) {
        var s = getState();
        var orig = cobbDouglas(s.alpha, s.M, p1_init);
        var U0 = utility(s.alpha, orig.x1, orig.x2);
        return indiffY(s.alpha, U0, t);
      },
      0.5, 140
    ], { strokeColor: '#C8102E', strokeWidth: 1.5, dash: 3 });

    // Final indifference curve
    board.create('curve', [
      function(t) { return t; },
      function(t) {
        var s = getState();
        var fin = cobbDouglas(s.alpha, s.M, s.p1new);
        var U1 = utility(s.alpha, fin.x1, fin.x2);
        return indiffY(s.alpha, U1, t);
      },
      0.5, 140
    ], { strokeColor: '#1565c0', strokeWidth: 1.5, dash: 3 });

    // Points: A (original), B (intermediate/compensated), C (final)
    var ptA = board.create('point', [
      function() { var s = getState(); return cobbDouglas(s.alpha, s.M, p1_init).x1; },
      function() { var s = getState(); return cobbDouglas(s.alpha, s.M, p1_init).x2; }
    ], { size: 5, fillColor: '#C8102E', strokeColor: '#C8102E', name: 'A', fixed: true,
         label: { fontSize: 13, offset: [-15, 10], color: '#C8102E' } });

    var ptB = board.create('point', [
      function() {
        var s = getState();
        var orig = cobbDouglas(s.alpha, s.M, p1_init);
        var U0 = utility(s.alpha, orig.x1, orig.x2);
        if (s.decomp === 'hicks') {
          return hicksianDemand(s.alpha, s.p1new, U0).x1;
        } else {
          var Mc = s.p1new * orig.x1 + p2 * orig.x2;
          return cobbDouglas(s.alpha, Mc, s.p1new).x1;
        }
      },
      function() {
        var s = getState();
        var orig = cobbDouglas(s.alpha, s.M, p1_init);
        var U0 = utility(s.alpha, orig.x1, orig.x2);
        if (s.decomp === 'hicks') {
          return hicksianDemand(s.alpha, s.p1new, U0).x2;
        } else {
          var Mc = s.p1new * orig.x1 + p2 * orig.x2;
          return cobbDouglas(s.alpha, Mc, s.p1new).x2;
        }
      }
    ], { size: 5, fillColor: '#00897b', strokeColor: '#00897b', name: 'B', fixed: true,
         label: { fontSize: 13, offset: [0, 15], anchorX: 'middle', color: '#00897b' } });

    var ptC = board.create('point', [
      function() { var s = getState(); return cobbDouglas(s.alpha, s.M, s.p1new).x1; },
      function() { var s = getState(); return cobbDouglas(s.alpha, s.M, s.p1new).x2; }
    ], { size: 5, fillColor: '#1565c0', strokeColor: '#1565c0', name: 'C', fixed: true,
         label: { fontSize: 13, offset: [8, 10], color: '#1565c0' } });

    // Arrows: SE (A->B green), IE (B->C blue), Total (A->C red)
    // We'll draw them as segments with arrows at y = -8
    var arrowY = -8;
    // Substitution effect arrow (green)
    board.create('arrow', [
      function() { var s = getState(); return [cobbDouglas(s.alpha, s.M, p1_init).x1, arrowY]; },
      function() {
        var s = getState();
        var orig = cobbDouglas(s.alpha, s.M, p1_init);
        var U0 = utility(s.alpha, orig.x1, orig.x2);
        var bx;
        if (s.decomp === 'hicks') {
          bx = hicksianDemand(s.alpha, s.p1new, U0).x1;
        } else {
          var Mc = s.p1new * orig.x1 + p2 * orig.x2;
          bx = cobbDouglas(s.alpha, Mc, s.p1new).x1;
        }
        return [bx, arrowY];
      }
    ], { strokeColor: '#00897b', strokeWidth: 3, lastArrow: { type: 2, size: 6 } });

    var esLabelYBase = arrowY - 5;
    var _lblES = board.create('text', [
      function() {
        var s = getState();
        var orig = cobbDouglas(s.alpha, s.M, p1_init);
        var U0 = utility(s.alpha, orig.x1, orig.x2);
        var bx;
        if (s.decomp === 'hicks') bx = hicksianDemand(s.alpha, s.p1new, U0).x1;
        else { var Mc = s.p1new * orig.x1 + p2 * orig.x2; bx = cobbDouglas(s.alpha, Mc, s.p1new).x1; }
        return (orig.x1 + bx) / 2;
      },
      esLabelYBase, 'ES'
    ], { fontSize: 11, color: '#00897b', anchorX: 'middle' });

    // Income effect arrow (blue)
    board.create('arrow', [
      function() {
        var s = getState();
        var orig = cobbDouglas(s.alpha, s.M, p1_init);
        var U0 = utility(s.alpha, orig.x1, orig.x2);
        var bx;
        if (s.decomp === 'hicks') bx = hicksianDemand(s.alpha, s.p1new, U0).x1;
        else { var Mc = s.p1new * orig.x1 + p2 * orig.x2; bx = cobbDouglas(s.alpha, Mc, s.p1new).x1; }
        return [bx, arrowY];
      },
      function() { var s = getState(); return [cobbDouglas(s.alpha, s.M, s.p1new).x1, arrowY]; }
    ], { strokeColor: '#1565c0', strokeWidth: 3, lastArrow: { type: 2, size: 6 } });

    var _lblER = board.create('text', [
      function() {
        var s = getState();
        var orig = cobbDouglas(s.alpha, s.M, p1_init);
        var U0 = utility(s.alpha, orig.x1, orig.x2);
        var bx;
        if (s.decomp === 'hicks') bx = hicksianDemand(s.alpha, s.p1new, U0).x1;
        else { var Mc = s.p1new * orig.x1 + p2 * orig.x2; bx = cobbDouglas(s.alpha, Mc, s.p1new).x1; }
        var esLabelX = (orig.x1 + bx) / 2;
        var erLabelX = (bx + cobbDouglas(s.alpha, s.M, s.p1new).x1) / 2;
        return erLabelX;
      },
      function() {
        var s = getState();
        var orig = cobbDouglas(s.alpha, s.M, p1_init);
        var U0 = utility(s.alpha, orig.x1, orig.x2);
        var bx;
        if (s.decomp === 'hicks') bx = hicksianDemand(s.alpha, s.p1new, U0).x1;
        else { var Mc = s.p1new * orig.x1 + p2 * orig.x2; bx = cobbDouglas(s.alpha, Mc, s.p1new).x1; }
        var esLabelX = (orig.x1 + bx) / 2;
        var erLabelX = (bx + cobbDouglas(s.alpha, s.M, s.p1new).x1) / 2;
        // If ES and ER arrow midpoints are within 5 units of each other, stack vertically
        if (Math.abs(esLabelX - erLabelX) < 5) {
          return esLabelYBase - 4;
        }
        return esLabelYBase;
      },
      'ER'
    ], { fontSize: 11, color: '#1565c0', anchorX: 'middle' });

    // Total effect arrow (red, offset lower)
    var arrowY2 = -13;
    board.create('arrow', [
      function() { var s = getState(); return [cobbDouglas(s.alpha, s.M, p1_init).x1, arrowY2]; },
      function() { var s = getState(); return [cobbDouglas(s.alpha, s.M, s.p1new).x1, arrowY2]; }
    ], { strokeColor: '#C8102E', strokeWidth: 3, lastArrow: { type: 2, size: 6 } });

    var _lblTotal = board.create('text', [
      function() {
        var s = getState();
        return (cobbDouglas(s.alpha, s.M, p1_init).x1 + cobbDouglas(s.alpha, s.M, s.p1new).x1) / 2;
      },
      arrowY2 - 5, 'Total'
    ], { fontSize: 11, color: '#C8102E', anchorX: 'middle' });

    var textLabels = [_lblES, _lblER, _lblTotal];
    function toggleLabels() {
      var show = document.getElementById('chk-labels').checked;
      textLabels.forEach(function(t) { t.setAttribute({visible: show}); });
      board.update();
    }

    // Dashed drop lines from A and C to x-axis
    board.create('segment', [
      function() { var s = getState(); var x = cobbDouglas(s.alpha, s.M, p1_init).x1; return [x, 0]; },
      function() { var s = getState(); return [cobbDouglas(s.alpha, s.M, p1_init).x1, cobbDouglas(s.alpha, s.M, p1_init).x2]; }
    ], { strokeColor: '#C8102E', strokeWidth: 1, dash: 3 });

    board.create('segment', [
      function() { var s = getState(); return [cobbDouglas(s.alpha, s.M, s.p1new).x1, 0]; },
      function() { var s = getState(); return [cobbDouglas(s.alpha, s.M, s.p1new).x1, cobbDouglas(s.alpha, s.M, s.p1new).x2]; }
    ], { strokeColor: '#1565c0', strokeWidth: 1, dash: 3 });

    board.create('segment', [
      function() {
        var s = getState();
        var orig = cobbDouglas(s.alpha, s.M, p1_init);
        var U0 = utility(s.alpha, orig.x1, orig.x2);
        var bx;
        if (s.decomp === 'hicks') bx = hicksianDemand(s.alpha, s.p1new, U0).x1;
        else { var Mc = s.p1new * orig.x1 + p2 * orig.x2; bx = cobbDouglas(s.alpha, Mc, s.p1new).x1; }
        return [bx, 0];
      },
      function() {
        var s = getState();
        var orig = cobbDouglas(s.alpha, s.M, p1_init);
        var U0 = utility(s.alpha, orig.x1, orig.x2);
        if (s.decomp === 'hicks') {
          var h = hicksianDemand(s.alpha, s.p1new, U0);
          return [h.x1, h.x2];
        } else {
          var Mc = s.p1new * orig.x1 + p2 * orig.x2;
          var d = cobbDouglas(s.alpha, Mc, s.p1new);
          return [d.x1, d.x2];
        }
      }
    ], { strokeColor: '#00897b', strokeWidth: 1, dash: 3 });

    function update() {
      var s = getState();
      document.getElementById('val-p1new').textContent = s.p1new.toFixed(2);
      document.getElementById('val-alpha').textContent = s.alpha.toFixed(2);
      document.getElementById('val-M').textContent = s.M.toFixed(0);

      var orig = cobbDouglas(s.alpha, s.M, p1_init);
      var fin = cobbDouglas(s.alpha, s.M, s.p1new);
      var U0 = utility(s.alpha, orig.x1, orig.x2);
      var bx;

      if (s.decomp === 'hicks') {
        bx = hicksianDemand(s.alpha, s.p1new, U0).x1;
      } else {
        var Mc = s.p1new * orig.x1 + p2 * orig.x2;
        bx = cobbDouglas(s.alpha, Mc, s.p1new).x1;
      }

      var SE = bx - orig.x1;
      var IE = fin.x1 - bx;
      var total = fin.x1 - orig.x1;

      var dLabel = s.decomp === 'hicks' ? 'Hicks' : 'Slutsky';

      var html = '<strong>Decomposição de ' + dLabel + ':</strong><br>';
      html += '\\(p_1 = ' + p1_init.toFixed(2) + ' \\to p_1\' = ' + s.p1new.toFixed(2) + '\\)<br>';
      html += '\\(x_1^A = ' + orig.x1.toFixed(2) + '\\), ';
      html += '\\(x_1^B = ' + bx.toFixed(2) + '\\), ';
      html += '\\(x_1^C = ' + fin.x1.toFixed(2) + '\\)<br>';
      html += '<span style="color:#00897b;">ES = ' + SE.toFixed(2) + '</span> + ';
      html += '<span style="color:#1565c0;">ER = ' + IE.toFixed(2) + '</span> = ';
      html += '<span style="color:#C8102E;">Total = ' + total.toFixed(2) + '</span><br>';
      html += '<div class="eq" style="margin-top:0.3rem;">\\(\\Delta x_1 = \\underbrace{' + SE.toFixed(2) + '}_{ES} + \\underbrace{' + IE.toFixed(2) + '}_{ER} = ' + total.toFixed(2) + '\\)</div>';

      document.getElementById('info').innerHTML = html;
      board.update();
      if (window.MathJax && MathJax.typeset) MathJax.typeset();
    }

    function resetAll() {
      document.getElementById('slider-p1new').value = 1;
      document.getElementById('slider-alpha').value = 0.40;
      document.getElementById('slider-M').value = 120;
      document.querySelector('input[name="decomp"][value="hicks"]').checked = true;
      update();
    }

    document.getElementById('slider-p1new').addEventListener('input', update);
    document.getElementById('slider-alpha').addEventListener('input', update);
    document.getElementById('slider-M').addEventListener('input', update);
    document.querySelectorAll('input[name="decomp"]').forEach(function(el) {
      el.addEventListener('change', update);
    });

    update();
  </script>
</body>
</html>
