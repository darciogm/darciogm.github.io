<!DOCTYPE html>
<!--
  Monopoly Regulation — Interactive Graph (Chapter 14)
  Library: JSXGraph
  Shows: natural monopoly with declining AC, regulation regimes
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regulação de Monopólio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-title { font-size: 1.1rem; font-weight: 700; color: #C8102E; margin-bottom: 0.5rem; text-align: center; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { width: 520px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { width: 320px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.7rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.83rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .toggle-group { margin-bottom: 0.8rem; display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .toggle-btn { padding: 0.35rem 0.6rem; border: 1px solid #C8102E; background: #fff; color: #C8102E; border-radius: 4px; cursor: pointer; font-size: 0.78rem; font-family: inherit; transition: all 0.2s; }
    .toggle-btn.active { background: #C8102E; color: #fff; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.7; }
    .info-box .section-title { font-weight: 700; color: #1565c0; margin-top: 0.3rem; }
    .info-box .section-title:first-child { margin-top: 0; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 880px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { width: 100%; max-width: 520px; }
      .controls { width: 100%; max-width: 520px; }
    }
  </style>
</head>
<body>
  <div class="graph-title">Figura 15.3 — Regulação de Monopólio Natural</div>
  <div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Regime Regulatório</h3>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-unreg" onclick="setMode('unreg')">Sem Regulação</button>
        <button class="toggle-btn" id="btn-mc" onclick="setMode('mc')">P = CMg</button>
        <button class="toggle-btn" id="btn-ac" onclick="setMode('ac')">P = CMe</button>
      </div>
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>Intercepto demanda \(a\): <span class="val" id="val-a">100</span></label>
        <input type="range" id="slider-a" min="50" max="150" step="1" value="100">
      </div>
      <div class="slider-group">
        <label>Inclinação demanda \(b\): <span class="val" id="val-b">1.0</span></label>
        <input type="range" id="slider-b" min="0.3" max="3" step="0.1" value="1">
      </div>
      <div class="slider-group">
        <label>Custo fixo \(F\): <span class="val" id="val-F">1000</span></label>
        <input type="range" id="slider-F" min="200" max="3000" step="50" value="1000">
      </div>
      <div class="slider-group">
        <label>Custo marginal \(c\): <span class="val" id="val-c">10</span></label>
        <input type="range" id="slider-c" min="1" max="50" step="1" value="10">
      </div>
      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    var regMode = 'unreg';
    var board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [-25, 165, 550, -15],
      axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
    });

    function rebuildBoard() {
      JXG.JSXGraph.freeBoard(board);
      board = JXG.JSXGraph.initBoard('jxgbox', {
        boundingbox: [-25, 165, 550, -15],
        axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
      });
    }

    function setMode(m) {
      regMode = m;
      document.querySelectorAll('.toggle-btn').forEach(function(b){ b.classList.remove('active'); });
      document.getElementById('btn-' + m).classList.add('active');
      updateGraph();
    }

    function gp() {
      return {
        a: parseFloat(document.getElementById('slider-a').value),
        b: parseFloat(document.getElementById('slider-b').value),
        F: parseFloat(document.getElementById('slider-F').value),
        c: parseFloat(document.getElementById('slider-c').value)
      };
    }

    function updateGraph() {
      var p = gp();
      document.getElementById('val-a').textContent = p.a.toFixed(0);
      document.getElementById('val-b').textContent = p.b.toFixed(1);
      document.getElementById('val-F').textContent = p.F.toFixed(0);
      document.getElementById('val-c').textContent = p.c.toFixed(0);

      rebuildBoard();

      var maxQ = p.a / p.b;

      board.create('axis', [[0,0],[1,0]], { ticks: { drawLabels: true, minorTicks: 0 }, name: 'Q', withLabel: true, label: { position: 'rt', offset: [-15, 15] } });
      board.create('axis', [[0,0],[0,1]], { ticks: { drawLabels: true, minorTicks: 0 }, name: 'P', withLabel: true, label: { position: 'rt', offset: [15, -5] } });

      // Demand
      board.create('functiongraph', [function(q){ return p.a - p.b*q; }], { strokeColor: '#1565c0', strokeWidth: 2.5 });
      board.create('text', [maxQ*0.92, 4, 'D'], { fontSize: 13, color: '#1565c0' });

      // MR
      board.create('functiongraph', [function(q){ return p.a - 2*p.b*q; }], { strokeColor: '#C8102E', strokeWidth: 2, dash: 2 });
      board.create('text', [maxQ*0.45, 4, 'RMg'], { fontSize: 12, color: '#C8102E' });

      // MC
      board.create('functiongraph', [function(q){ return p.c; }], { strokeColor: '#00897b', strokeWidth: 2.5 });
      board.create('text', [maxQ*0.92, p.c + 3, 'CMg'], { fontSize: 12, color: '#00897b' });

      // AC = F/q + c (only for q > 0.5)
      board.create('functiongraph', [function(q){ return q > 0.5 ? p.F/q + p.c : NaN; }], { strokeColor: '#9c27b0', strokeWidth: 2, dash: 1 });
      board.create('text', [maxQ*0.7, p.F/(maxQ*0.7) + p.c + 3, 'CMe'], { fontSize: 12, color: '#9c27b0' });

      // Monopoly outcome (always computed for reference)
      var qm = (p.a - p.c) / (2 * p.b);
      var pm = (p.a + p.c) / 2;
      var acm = p.F / qm + p.c;
      var profitM = (pm - acm) * qm;

      // MC pricing
      var qmc = (p.a - p.c) / p.b;
      var pmc = p.c;
      var acmc = p.F / qmc + p.c;
      var profitMC = (pmc - acmc) * qmc; // negative: subsidy needed
      var subsidy = -profitMC;

      // AC pricing: p = F/q + c, p = a - bq => a - bq = F/q + c => bq^2 - (a-c)q + F = 0
      var discr = (p.a - p.c) * (p.a - p.c) - 4 * p.b * p.F;
      var qac = 0, pac = 0, profitAC = 0;
      if (discr >= 0) {
        qac = ((p.a - p.c) - Math.sqrt(discr)) / (2 * p.b); // smaller root (AC pricing)
        // Actually we want the larger root for the relevant intersection
        var qac2 = ((p.a - p.c) + Math.sqrt(discr)) / (2 * p.b);
        // Pick the one that gives more quantity (to the right of monopoly)
        qac = qac2;
        pac = p.a - p.b * qac;
      }

      // DWL calculations
      var csComp = 0.5 * (p.a - p.c) * qmc; // total surplus at competitive
      var qSel, pSel, piSel;

      if (regMode === 'unreg') {
        qSel = qm; pSel = pm;
        piSel = profitM;
        // DWL triangle
        board.create('polygon', [
          [qm, pm], [qmc, p.c], [qm, p.c]
        ], { fillColor: '#ff9800', fillOpacity: 0.25, borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false });
        // Profit
        board.create('polygon', [
          [0, acm], [qm, acm], [qm, pm], [0, pm]
        ], { fillColor: '#00897b', fillOpacity: 0.15, borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false });

        board.create('point', [qm, pm], { name: '', size: 4, strokeColor: '#C8102E', fillColor: '#C8102E' });
        board.create('segment', [[qm,pm],[qm,0]], { strokeColor: '#999', strokeWidth: 1, dash: 3 });
        board.create('segment', [[qm,pm],[0,pm]], { strokeColor: '#999', strokeWidth: 1, dash: 3 });

        var dwl = 0.5 * (pm - p.c) * (qmc - qm);
        var cs = 0.5 * (p.a - pm) * qm;
        var html = '<div class="section-title">Monopólio Não Regulado</div>';
        html += '\\(Q^m = ' + qm.toFixed(2) + '\\), \\(P^m = ' + pm.toFixed(1) + '\\)<br>';
        html += '\\(CMe = ' + acm.toFixed(1) + '\\)<br>';
        html += '\\(\\pi = ' + profitM.toFixed(1) + '\\)<br>';
        html += '\\(EC = ' + cs.toFixed(1) + '\\), \\(PPM = ' + dwl.toFixed(1) + '\\)';

      } else if (regMode === 'mc') {
        qSel = qmc; pSel = pmc;
        // Subsidy rectangle
        board.create('polygon', [
          [0, pmc], [qmc, pmc], [qmc, acmc], [0, acmc]
        ], { fillColor: '#C8102E', fillOpacity: 0.15, borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false });

        board.create('point', [qmc, pmc], { name: '', size: 4, strokeColor: '#C8102E', fillColor: '#C8102E' });
        board.create('segment', [[qmc,pmc],[qmc,0]], { strokeColor: '#999', strokeWidth: 1, dash: 3 });

        board.create('text', [qmc*0.4, (pmc+acmc)/2, 'Subsidio'], { fontSize: 11, color: '#C8102E', fontWeight: 'bold' });

        var html = '<div class="section-title">Regulação P = CMg (First-Best)</div>';
        html += '\\(Q = ' + qmc.toFixed(2) + '\\), \\(P = CMg = ' + pmc.toFixed(0) + '\\)<br>';
        html += '\\(CMe = ' + acmc.toFixed(1) + '\\)<br>';
        html += '\\(\\pi = ' + profitMC.toFixed(1) + '\\) (prejuizo)<br>';
        html += 'Subsidio necessário: \\(' + subsidy.toFixed(1) + '\\)<br>';
        html += '\\(PPM = 0\\) (eficiente)<br>';
        html += 'Problema: financiar o subsidio gera distorções.';

      } else {
        if (discr < 0) {
          var html = '<div class="section-title">Regulação P = CMe</div>';
          html += '<strong>Não ha interseção demanda/CMe.</strong><br>';
          html += 'Custos fixos muito altos para o mercado.';
        } else {
          // DWL between AC pricing and MC pricing
          board.create('polygon', [
            [qac, pac], [qmc, p.c], [qac, p.c]
          ], { fillColor: '#ff9800', fillOpacity: 0.2, borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false });

          board.create('point', [qac, pac], { name: '', size: 4, strokeColor: '#C8102E', fillColor: '#C8102E' });
          board.create('segment', [[qac,pac],[qac,0]], { strokeColor: '#999', strokeWidth: 1, dash: 3 });
          board.create('segment', [[qac,pac],[0,pac]], { strokeColor: '#999', strokeWidth: 1, dash: 3 });

          var dwlAC = 0.5 * (pac - p.c) * (qmc - qac);
          var csAC = 0.5 * (p.a - pac) * qac;
          var dwlMon = 0.5 * (pm - p.c) * (qmc - qm);

          var html = '<div class="section-title">Regulação P = CMe (Second-Best)</div>';
          html += '\\(Q = ' + qac.toFixed(2) + '\\), \\(P = CMe = ' + pac.toFixed(1) + '\\)<br>';
          html += '\\(\\pi = 0\\) (lucro zero)<br>';
          html += '\\(EC = ' + csAC.toFixed(1) + '\\)<br>';
          html += '\\(PPM = ' + dwlAC.toFixed(1) + '\\) (residual)<br>';
          html += 'PPM sem regulação: \\(' + dwlMon.toFixed(1) + '\\)<br>';
          html += 'Redução na PPM: \\(' + (dwlMon - dwlAC).toFixed(1) + '\\)';
        }
      }

      document.getElementById('info').innerHTML = html;
      board.update();
      if (window.MathJax && MathJax.typeset) MathJax.typeset();
    }

    function resetAll() {
      document.getElementById('slider-a').value = 100;
      document.getElementById('slider-b').value = 1;
      document.getElementById('slider-F').value = 1000;
      document.getElementById('slider-c').value = 10;
      regMode = 'unreg';
      document.querySelectorAll('.toggle-btn').forEach(function(b){ b.classList.remove('active'); });
      document.getElementById('btn-unreg').classList.add('active');
      updateGraph();
    }

    document.querySelectorAll('input[type="range"]').forEach(function(el) {
      el.addEventListener('input', updateGraph);
    });
    updateGraph();
  </script>
</body>
</html>
