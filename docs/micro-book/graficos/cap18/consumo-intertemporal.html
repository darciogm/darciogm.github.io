<!DOCTYPE html>
<!--
  Consumo Intertemporal (Modelo de Fisher) — Interactive Graph
  Library: JSXGraph
  Chapter 17 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consumo Intertemporal — Fisher</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-title { font-size: 1.1rem; font-weight: 700; color: #C8102E; margin-bottom: 0.5rem; text-align: center; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
 .jxgbox { width: 480px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { width: 300px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .jxgbox { width: 100%; max-width: 480px; }
      .controls { width: 100%; max-width: 480px; }
    }
  </style>
</head>
<body>
  <div class="graph-title">Figura 18.1 — Modelo de Consumo Intertemporal de Fisher</div>
  <div class="graph-container">
    <div id="jxgbox1" class="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>Renda período 1 (\(Y_1\)): <span class="val" id="val-Y1">100</span></label>
        <input type="range" id="slider-Y1" min="20" max="200" step="5" value="100">
      </div>
      <div class="slider-group">
        <label>Renda período 2 (\(Y_2\)): <span class="val" id="val-Y2">100</span></label>
        <input type="range" id="slider-Y2" min="20" max="200" step="5" value="100">
      </div>
      <div class="slider-group">
        <label>Taxa de juros \(r\): <span class="val" id="val-r">10%</span></label>
        <input type="range" id="slider-r" min="0" max="50" step="1" value="10">
      </div>
      <div class="slider-group">
        <label>\(\beta\) (desconto subjetivo): <span class="val" id="val-beta">0.90</span></label>
        <input type="range" id="slider-beta" min="0.50" max="1.00" step="0.01" value="0.90">
      </div>
      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    /*
      Model: U = ln(C1) + beta * ln(C2)
      Budget: C1 + C2/(1+r) = Y1 + Y2/(1+r) = W
      FOC: C2 = beta*(1+r)*C1
      C1 + beta*C1 = W => C1* = W/(1+beta)
      C2* = beta*(1+r)*W/(1+beta)
      Saving: S = Y1 - C1*
    */

    var board = JXG.JSXGraph.initBoard('jxgbox1', {
      boundingbox: [-50, 590, 470, -63],
      axis: false, showCopyright: false, showNavigation: false, keepaspectratio: false
    });

    board.create('axis', [[0,0],[400,0]], {
      ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 50 },
      name: '', withLabel: false
    });
    board.create('text', [418, -23.6, 'C\u2081'], { fontSize: 14, fixed: true, anchorX: 'left' });
    board.create('axis', [[0,0],[0,500]], {
      ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 50 },
      name: '', withLabel: false
    });
    board.create('text', [-18.8, 566, 'C\u2082'], { fontSize: 14, fixed: true, anchorX: 'right' });

    // Intertemporal budget line: C2 = (1+r)*(W - C1) = (1+r)*W - (1+r)*C1
    var budgetLine = board.create('segment', [
      function() {
        var s = getState();
        var W = s.Y1 + s.Y2 / (1 + s.r);
        return [W, 0]; // max C1
      },
      function() {
        var s = getState();
        var W = s.Y1 + s.Y2 / (1 + s.r);
        return [0, (1 + s.r) * W]; // max C2
      }
    ], { strokeColor: '#1565c0', strokeWidth: 2.5 });

    // Endowment point
    var endowPt = board.create('point', [
      function() { return getState().Y1; },
      function() { return getState().Y2; }
    ], { size: 5, fillColor: '#666', strokeColor: '#666', name: '(Y_1, Y_2)', fixed: true,
         label: { fontSize: 10, offset: [8, 8] } });

    // Optimal point
    var optPt = board.create('point', [
      function() {
        var s = getState();
        var W = s.Y1 + s.Y2 / (1 + s.r);
        return W / (1 + s.beta);
      },
      function() {
        var s = getState();
        var W = s.Y1 + s.Y2 / (1 + s.r);
        return s.beta * (1 + s.r) * W / (1 + s.beta);
      }
    ], { size: 5, fillColor: '#C8102E', strokeColor: '#C8102E', name: '(C_1^*, C_2^*)', fixed: true,
         label: { fontSize: 11, offset: [10, -5] } });

    // Indifference curve through optimal
    var indiffCurve = board.create('curve', [
      function(t) { return t; },
      function(t) {
        var s = getState();
        var W = s.Y1 + s.Y2 / (1 + s.r);
        var C1s = W / (1 + s.beta);
        var C2s = s.beta * (1 + s.r) * W / (1 + s.beta);
        var U = Math.log(Math.max(C1s, 0.01)) + s.beta * Math.log(Math.max(C2s, 0.01));
        if (t <= 0.5) return 9999;
        var val = (U - Math.log(t)) / s.beta;
        return Math.exp(val);
      },
      0.5, 420
    ], { strokeColor: '#00897b', strokeWidth: 2, dash: 3 });

    // Second indifference curve (lower utility)
    var indiffCurve2 = board.create('curve', [
      function(t) { return t; },
      function(t) {
        var s = getState();
        var W = s.Y1 + s.Y2 / (1 + s.r);
        var C1s = W / (1 + s.beta);
        var C2s = s.beta * (1 + s.r) * W / (1 + s.beta);
        var U = Math.log(Math.max(C1s, 0.01)) + s.beta * Math.log(Math.max(C2s, 0.01)) - 0.5;
        if (t <= 0.5) return 9999;
        var val = (U - Math.log(t)) / s.beta;
        return Math.exp(val);
      },
      0.5, 420
    ], { strokeColor: '#00897b', strokeWidth: 1, dash: 3, strokeOpacity: 0.35 });

    // Dashed lines to axes
    board.create('segment', [
      function() { var s = getState(); var W = s.Y1+s.Y2/(1+s.r); return [W/(1+s.beta), 0]; },
      function() { var s = getState(); var W = s.Y1+s.Y2/(1+s.r); return [W/(1+s.beta), s.beta*(1+s.r)*W/(1+s.beta)]; }
    ], { strokeColor: '#aaa', strokeWidth: 1, dash: 3 });
    board.create('segment', [
      function() { var s = getState(); var W = s.Y1+s.Y2/(1+s.r); return [0, s.beta*(1+s.r)*W/(1+s.beta)]; },
      function() { var s = getState(); var W = s.Y1+s.Y2/(1+s.r); return [W/(1+s.beta), s.beta*(1+s.r)*W/(1+s.beta)]; }
    ], { strokeColor: '#aaa', strokeWidth: 1, dash: 3 });

    // Arrow from endowment to optimal (saving/borrowing direction)
    var savingArrow = board.create('arrow', [
      function() { return [getState().Y1, getState().Y2]; },
      function() {
        var s = getState();
        var W = s.Y1 + s.Y2 / (1 + s.r);
        return [W / (1 + s.beta), s.beta * (1 + s.r) * W / (1 + s.beta)];
      }
    ], { strokeColor: '#C8102E', strokeWidth: 1.5, dash: 2, strokeOpacity: 0.6,
         lastArrow: { type: 2, size: 6 } });

    function getState() {
      return {
        Y1: parseFloat(document.getElementById('slider-Y1').value),
        Y2: parseFloat(document.getElementById('slider-Y2').value),
        r: parseFloat(document.getElementById('slider-r').value) / 100,
        beta: parseFloat(document.getElementById('slider-beta').value)
      };
    }

    function update() {
      var s = getState();
      document.getElementById('val-Y1').textContent = s.Y1.toFixed(0);
      document.getElementById('val-Y2').textContent = s.Y2.toFixed(0);
      document.getElementById('val-r').textContent = (s.r * 100).toFixed(0) + '%';
      document.getElementById('val-beta').textContent = s.beta.toFixed(2);

      var W = s.Y1 + s.Y2 / (1 + s.r);
      var C1s = W / (1 + s.beta);
      var C2s = s.beta * (1 + s.r) * W / (1 + s.beta);
      var saving = s.Y1 - C1s;

      var status = saving > 0.5 ? 'Poupador' : (saving < -0.5 ? 'Devedor' : 'Neutro');
      var statusColor = saving > 0.5 ? '#00897b' : (saving < -0.5 ? '#C8102E' : '#666');

      var html = '<div style="text-align:center;">\\(U = \\ln C_1 + \\beta \\ln C_2\\)</div>';
      html += '<div style="margin-top:0.4rem;">';
      html += 'Riqueza: \\(W = Y_1 + \\frac{Y_2}{1+r} = ' + W.toFixed(1) + '\\)<br>';
      html += '\\(C_1^* = ' + C1s.toFixed(1) + '\\), \\(C_2^* = ' + C2s.toFixed(1) + '\\)<br>';
      html += 'Poupanca: \\(S = Y_1 - C_1^* = ' + saving.toFixed(1) + '\\)<br>';
      html += '<strong style="color:' + statusColor + ';">' + status + '</strong>';
      if (saving > 0.5) {
        html += ' (\\(C_1 < Y_1\\))';
      } else if (saving < -0.5) {
        html += ' (\\(C_1 > Y_1\\))';
      }
      html += '</div>';
      html += '<div style="margin-top:0.4rem;font-size:0.78rem;color:#666;">';
      html += 'Inclinação da reta: \\(-(1+r) = ' + (-(1+s.r)).toFixed(2) + '\\)<br>';
      html += 'Taxa de pref. intertemporal: \\(\\rho = 1/\\beta - 1 = ' + (1/s.beta - 1).toFixed(3) + '\\)';
      html += '</div>';

      document.getElementById('info').innerHTML = html;
      board.update();
      if (window.MathJax && MathJax.typeset) MathJax.typeset();
    }

    function resetAll() {
      document.getElementById('slider-Y1').value = 100;
      document.getElementById('slider-Y2').value = 100;
      document.getElementById('slider-r').value = 10;
      document.getElementById('slider-beta').value = 0.90;
      update();
    }

    ['slider-Y1','slider-Y2','slider-r','slider-beta'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', update);
    });
    update();
  </script>
</body>
</html>
