<!DOCTYPE html>
<!--
  VPL e TIR — Interactive Graph
  Library: Plotly.js
  Chapter 17 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPL e TIR</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
.graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #plotly-chart { width: 520px; height: 400px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { width: 300px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.6rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .input-group { margin-bottom: 0.6rem; }
    .input-group label { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 0.2rem; }
    .input-group input[type="number"] { width: 100%; padding: 0.3rem; border: 1px solid #ddd; border-radius: 3px; font-size: 0.82rem; font-family: inherit; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    .cf-row { display: flex; gap: 0.3rem; align-items: center; margin-bottom: 0.3rem; font-size: 0.82rem; }
    .cf-row label { width: 35px; flex-shrink: 0; }
    .cf-row input { flex: 1; padding: 0.25rem; border: 1px solid #ddd; border-radius: 3px; font-size: 0.82rem; font-family: inherit; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #plotly-chart { width: 100%; max-width: 520px; }
      .controls { width: 100%; max-width: 520px; }
    }
    /* anti-inflation-fix */
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="plotly-chart"></div>
    <div class="controls">
      <h3>Fluxos de Caixa (R$)</h3>
      <div class="cf-row"><label>\\(F_0\\):</label><input type="number" id="cf0" value="-100000" step="1000"></div>
      <div class="cf-row"><label>\\(F_1\\):</label><input type="number" id="cf1" value="30000" step="1000"></div>
      <div class="cf-row"><label>\\(F_2\\):</label><input type="number" id="cf2" value="35000" step="1000"></div>
      <div class="cf-row"><label>\\(F_3\\):</label><input type="number" id="cf3" value="40000" step="1000"></div>
      <div class="cf-row"><label>\\(F_4\\):</label><input type="number" id="cf4" value="45000" step="1000"></div>
      <div class="cf-row"><label>\\(F_5\\):</label><input type="number" id="cf5" value="0" step="1000"></div>

      <h3 style="margin-top:0.8rem;">Taxa de Desconto</h3>
      <div class="slider-group">
        <label>\(r\): <span class="val" id="val-r">10%</span></label>
        <input type="range" id="slider-r" min="0" max="50" step="0.5" value="10">
      </div>

      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    function getCashFlows() {
      return [
        parseFloat(document.getElementById('cf0').value) || 0,
        parseFloat(document.getElementById('cf1').value) || 0,
        parseFloat(document.getElementById('cf2').value) || 0,
        parseFloat(document.getElementById('cf3').value) || 0,
        parseFloat(document.getElementById('cf4').value) || 0,
        parseFloat(document.getElementById('cf5').value) || 0
      ];
    }

    function computeNPV(cfs, r) {
      var npv = 0;
      for (var t = 0; t < cfs.length; t++) {
        npv += cfs[t] / Math.pow(1 + r, t);
      }
      return npv;
    }

    function computeIRR(cfs) {
      // Bisection method
      var lo = -0.5, hi = 5.0;
      var npvLo = computeNPV(cfs, lo);
      var npvHi = computeNPV(cfs, hi);
      if (npvLo * npvHi > 0) return null; // no IRR in range

      for (var i = 0; i < 100; i++) {
        var mid = (lo + hi) / 2;
        var npvMid = computeNPV(cfs, mid);
        if (Math.abs(npvMid) < 0.01) return mid;
        if (npvMid * npvLo > 0) {
          lo = mid;
          npvLo = npvMid;
        } else {
          hi = mid;
          npvHi = npvMid;
        }
      }
      return (lo + hi) / 2;
    }

    function update() {
      var cfs = getCashFlows();
      var r = parseFloat(document.getElementById('slider-r').value) / 100;
      document.getElementById('val-r').textContent = (r * 100).toFixed(1) + '%';

      // Generate NPV curve data
      var rValues = [];
      var npvValues = [];
      for (var ri = 0; ri <= 50; ri += 0.5) {
        rValues.push(ri);
        npvValues.push(computeNPV(cfs, ri / 100));
      }

      var npvAtR = computeNPV(cfs, r);
      var irr = computeIRR(cfs);

      // NPV curve
      var trace1 = {
        x: rValues,
        y: npvValues,
        type: 'scatter',
        mode: 'lines',
        name: 'VPL(r)',
        line: { color: '#C8102E', width: 3 }
      };

      // Zero line
      var trace2 = {
        x: [0, 50],
        y: [0, 0],
        type: 'scatter',
        mode: 'lines',
        name: '',
        line: { color: '#999', width: 1, dash: 'dash' },
        showlegend: false
      };

      // Vertical line at selected r
      var trace3 = {
        x: [r * 100, r * 100],
        y: [Math.min.apply(null, npvValues) * 1.1, Math.max.apply(null, npvValues) * 1.1],
        type: 'scatter',
        mode: 'lines',
        name: 'r selecionado',
        line: { color: '#1565c0', width: 2, dash: 'dot' }
      };

      // Point at current NPV
      var trace4 = {
        x: [r * 100],
        y: [npvAtR],
        type: 'scatter',
        mode: 'markers',
        name: 'VPL(r)',
        marker: { color: '#C8102E', size: 10 },
        showlegend: false
      };

      var traces = [trace1, trace2, trace3, trace4];

      // IRR point
      if (irr !== null && irr >= -0.5 && irr <= 5.0) {
        traces.push({
          x: [irr * 100],
          y: [0],
          type: 'scatter',
          mode: 'markers+text',
          name: 'TIR',
          marker: { color: '#00897b', size: 12, symbol: 'diamond' },
          text: ['TIR = ' + (irr * 100).toFixed(1) + '%'],
          textposition: 'top center',
          textfont: { color: '#00897b', size: 11 }
        });
      }

      // Fill above/below zero
      var posX = [], posY = [], negX = [], negY = [];
      for (var i = 0; i < rValues.length; i++) {
        if (npvValues[i] >= 0) {
          posX.push(rValues[i]); posY.push(npvValues[i]);
        } else {
          negX.push(rValues[i]); negY.push(npvValues[i]);
        }
      }

      var layout = {
        margin: { l: 60, r: 20, t: 30, b: 50 },
        xaxis: { title: 'Taxa de desconto r (%)', range: [0, 50] },
        yaxis: { title: 'VPL (R$)', zeroline: true },
        showlegend: true,
        legend: { x: 0.6, y: 0.95, font: { size: 10 } },
        font: { family: 'Georgia, serif' },
        paper_bgcolor: '#fff',
        plot_bgcolor: '#fafafa'
      };

      Plotly.newPlot('plotly-chart', traces, layout, { responsive: true, displayModeBar: false });

      // Info box
      var decision = npvAtR > 0.5 ? 'Aceitar' : (npvAtR < -0.5 ? 'Rejeitar' : 'Indiferente');
      var decColor = npvAtR > 0.5 ? '#00897b' : (npvAtR < -0.5 ? '#C8102E' : '#666');

      var html = '<div style="margin-bottom:0.4rem;">';
      html += '\\(VPL(r) = \\sum_{t=0}^{n} \\frac{F_t}{(1+r)^t}\\)';
      html += '</div>';
      html += '<div>';
      html += '\\(VPL(' + (r*100).toFixed(1) + '\\%) = \\text{R\\$}\\;' + npvAtR.toFixed(0) + '\\)<br>';
      if (irr !== null) {
        html += '\\(TIR = ' + (irr * 100).toFixed(1) + '\\%\\)<br>';
      } else {
        html += 'TIR: não encontrada no intervalo<br>';
      }
      html += '<strong style="color:' + decColor + ';">Decisao: ' + decision + '</strong>';
      if (npvAtR > 0.5) html += ' (VPL > 0)';
      else if (npvAtR < -0.5) html += ' (VPL < 0)';
      html += '</div>';

      document.getElementById('info').innerHTML = html;
      if (window.MathJax && MathJax.typeset) MathJax.typeset();
    }

    function resetAll() {
      document.getElementById('cf0').value = -100000;
      document.getElementById('cf1').value = 30000;
      document.getElementById('cf2').value = 35000;
      document.getElementById('cf3').value = 40000;
      document.getElementById('cf4').value = 45000;
      document.getElementById('cf5').value = 0;
      document.getElementById('slider-r').value = 10;
      update();
    }

    document.getElementById('slider-r').addEventListener('input', update);
    ['cf0','cf1','cf2','cf3','cf4','cf5'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', update);
    });
    update();
  </script>
</body>
</html>
