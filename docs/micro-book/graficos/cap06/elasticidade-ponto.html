<!DOCTYPE html>
<!--
  Elasticidade-Preço ao Longo da Demanda Linear
  Library: JSXGraph
  Chapter 6 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elasticidade ao Longo da Demanda Linear</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    .jxgbox { flex: 1 1 420px; max-width: 500px; height: 400px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .jxgbox { flex-basis: 100%; width: 100%; max-width: 500px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 500px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox1" class="jxgbox"></div>
  <div class="controls">
    <h3>Demanda Linear: \(p = a - bQ\)</h3>
    <div class="slider-group">
      <label>Intercepto \(a\): <span class="val" id="val-a">10</span></label>
      <input type="range" id="slider-a" min="4" max="20" step="0.5" value="10">
    </div>
    <div class="slider-group">
      <label>Inclinação \(b\): <span class="val" id="val-b">1.00</span></label>
      <input type="range" id="slider-b" min="0.2" max="3" step="0.1" value="1">
    </div>
    <div class="slider-group">
      <label>Preço \(p\): <span class="val" id="val-p">5.0</span></label>
      <input type="range" id="slider-p" min="0.5" max="19.5" step="0.25" value="5">
    </div>
    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  var board = JXG.JSXGraph.initBoard('jxgbox1', {
    boundingbox: [-2, 12, 14, -2],
    axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
  });

  board.create('axis', [[0,0],[14,0]], {
    ticks: { drawLabels: true, label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 2 }
  });
  board.create('text', [7, -1.3, '<b><i>Q</i></b>'], { fontSize: 13, fixed: true, anchorX: 'middle', highlight: false });
  board.create('axis', [[0,0],[0,12]], {
    ticks: { drawLabels: true, label: { fontSize: 11, anchorX: 'right', offset: [-8,0] }, minorTicks: 0, ticksDistance: 2 }
  });
  board.create('text', [-1.5, 11, '<b><i>p</i></b>'], { fontSize: 13, fixed: true, highlight: false });

  var objs = [];

  function draw() {
    for (var i = 0; i < objs.length; i++) board.removeObject(objs[i]);
    objs = [];

    var a = parseFloat(document.getElementById('slider-a').value);
    var b = parseFloat(document.getElementById('slider-b').value);
    var p = parseFloat(document.getElementById('slider-p').value);
    if (p >= a) p = a - 0.5;

    document.getElementById('val-a').textContent = a.toFixed(1);
    document.getElementById('val-b').textContent = b.toFixed(2);
    document.getElementById('val-p').textContent = p.toFixed(1);
    document.getElementById('slider-p').max = (a - 0.25).toFixed(2);

    var Qmax = a / b;
    var Q = (a - p) / b;
    var eps = -(p / (a - p)); // elasticity = -(p/Q) * (1/b) * b? Actually for p=a-bQ, dQ/dp = -1/b, eps = (dQ/dp)*(p/Q) = (-1/b)*(p/Q)
    var epsVal = (-1 / b) * (p / Q);
    var absEps = Math.abs(epsVal);
    var revenue = p * Q;
    var pUnit = a / 2;
    var QUnit = a / (2 * b);
    var revMax = pUnit * QUnit;

    board.setBoundingBox([-Qmax * 0.15, a * 1.15, Qmax * 1.15, -a * 0.15], false);

    // Demand line
    objs.push(board.create('segment', [[0, a], [Qmax, 0]], { strokeColor: '#1565c0', strokeWidth: 2.5 }));
    objs.push(board.create('text', [Qmax * 0.85, a * 0.08, '<i>D</i>'], { fontSize: 12, color: '#1565c0', fixed: true, highlight: false }));

    // Revenue rectangle
    objs.push(board.create('polygon', [[0,0],[Q,0],[Q,p],[0,p]], {
      fillColor: 'rgba(21,101,192,0.12)', borders: { strokeWidth: 0 },
      vertices: { visible: false }
    }));

    // Current point
    objs.push(board.create('point', [Q, p], { name: '', size: 5, fillColor: '#C8102E', strokeColor: '#C8102E', fixed: true }));
    objs.push(board.create('segment', [[Q,0],[Q,p]], { strokeColor: '#C8102E', dash: 3, strokeWidth: 1 }));
    objs.push(board.create('segment', [[0,p],[Q,p]], { strokeColor: '#C8102E', dash: 3, strokeWidth: 1 }));

    // Unitary elasticity point
    objs.push(board.create('point', [QUnit, pUnit], { name: '', size: 4, fillColor: '#00897b', strokeColor: '#00897b', fixed: true }));
    objs.push(board.create('text', [QUnit + Qmax * 0.03, pUnit + a * 0.04, '|ε|=1'], {
      fontSize: 10, color: '#00897b', fixed: true, highlight: false
    }));

    // Region labels
    objs.push(board.create('text', [Qmax * 0.15, a * 0.75, '|ε| > 1'], { fontSize: 11, color: '#1565c0', fixed: true, highlight: false }));
    objs.push(board.create('text', [Qmax * 0.65, a * 0.2, '|ε| < 1'], { fontSize: 11, color: '#e65100', fixed: true, highlight: false }));

    var region = absEps > 1.005 ? 'Elástica' : (absEps < 0.995 ? 'Inelástica' : 'Unitária');
    var regionColor = absEps > 1.005 ? '#1565c0' : (absEps < 0.995 ? '#e65100' : '#00897b');

    var html = '<div style="text-align:center;margin-bottom:0.3rem;">';
    html += '\\(\\varepsilon = \\frac{dQ}{dp} \\cdot \\frac{p}{Q}\\)';
    html += '</div>';
    html += '\\(Q = ' + Q.toFixed(2) + '\\), \\(p = ' + p.toFixed(1) + '\\)<br>';
    html += '\\(|\\varepsilon| = ' + absEps.toFixed(3) + '\\) — <strong style="color:' + regionColor + ';">' + region + '</strong><br>';
    html += 'Receita \\(R = p \\cdot Q = ' + revenue.toFixed(1) + '\\)<br>';
    html += '<span style="color:#00897b;">Receita máx:</span> \\(' + revMax.toFixed(1) + '\\) em \\(p = ' + pUnit.toFixed(1) + '\\)';
    html += '<hr style="margin:0.3rem 0">';
    html += '<div style="font-size:0.78rem;color:#666;">';
    if (absEps > 1) html += 'Reduzir \\(p\\) ↑ receita (efeito-quantidade domina).';
    else if (absEps < 1) html += 'Aumentar \\(p\\) ↑ receita (efeito-preço domina).';
    else html += 'Receita é máxima no ponto de elasticidade unitária.';
    html += '</div>';

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-a').value = 10;
    document.getElementById('slider-b').value = 1;
    document.getElementById('slider-p').value = 5;
    draw();
  }

  ['slider-a','slider-b','slider-p'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', draw);
  });
  draw();
</script>
</body>
</html>
