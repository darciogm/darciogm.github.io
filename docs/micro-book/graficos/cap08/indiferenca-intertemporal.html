<!DOCTYPE html>
<!--
  Curvas de Indiferença Intertemporal: Exponencial vs Quasi-Hiperbólico
  Library: JSXGraph
  Reason: Interactive sliders for β, δ and utility level
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curvas de Indiferença Intertemporal</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'CMU Serif', Georgia, serif;
      background: #ffffff;
      color: #333;
      padding: 1rem;
    }
.graph-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-start;
      justify-content: center;
    }
    #jxgbox {
      width: 520px;
      height: 420px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .controls {
      width: 280px;
      padding: 1rem;
      background: #f8f8f8;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .controls h3 {
      font-size: 0.95rem;
      color: #C8102E;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.4rem;
    }
    .slider-group {
      margin-bottom: 0.8rem;
    }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }
    .slider-group label .val {
      font-weight: 700;
      color: #C8102E;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #C8102E;
    }
    .info-box {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .info-box .eq {
      text-align: center;
      margin: 0.3rem 0;
      color: #333;
    }
    .legend {
      margin-top: 0.8rem;
      font-size: 0.8rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 0.3rem;
    }
    .legend-swatch {
      width: 24px;
      height: 3px;
      margin-right: 8px;
      border-radius: 2px;
    }
    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.5rem;
      background: #C8102E;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { width: 100%; max-width: 520px; }
      .controls { width: 100%; max-width: 520px; }
    }
    /* anti-inflation-fix */
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>\(\delta\) (desconto por período): <span class="val" id="val-delta">0.95</span></label>
        <input type="range" id="slider-delta" min="0.80" max="1.00" step="0.01" value="0.95">
      </div>
      <div class="slider-group">
        <label>\(\beta\) (viés do presente): <span class="val" id="val-beta">0.70</span></label>
        <input type="range" id="slider-beta" min="0.30" max="1.00" step="0.01" value="0.70">
      </div>
      <div class="slider-group">
        <label>Nível de utilidade \(\bar{U}\): <span class="val" id="val-ubar">15</span></label>
        <input type="range" id="slider-ubar" min="5" max="30" step="1" value="15">
      </div>
      <div class="info-box">
        <div class="eq">\(U = \sqrt{c_0} + \beta\delta\sqrt{c_1} = \bar{U}\)</div>
        <div class="eq" style="font-size:0.8rem;">\(c_1 = \left(\frac{\bar{U} - \sqrt{c_0}}{\beta\delta}\right)^2\)</div>
      </div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-swatch" style="background:#C8102E;"></div>
          Quasi-hiperbólico (\(\beta < 1\))
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:#2a7f2a;"></div>
          Exponencial (\(\beta = 1\))
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:#ccc;"></div>
          Linha de 45°
        </div>
      </div>
      <div class="info-box" style="margin-top:0.5rem; font-size:0.8rem; color:#666;">
        TMS em \(c_0 = c_1\):<br>
        Exp: <span id="tms-exp">—</span> |
        QH: <span id="tms-qh">—</span>
      </div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    var board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [-102, 615, 615, -82],
      showCopyright: false,
      showNavigation: false,
      defaultAxes: {
        x: { name: '', withLabel: false,
             ticks: { insertTicks: false, ticksDistance: 100, minorTicks: 0, label: { fontSize: 11 } } },
        y: { name: '', withLabel: false,
             ticks: { insertTicks: false, ticksDistance: 100, minorTicks: 0, label: { fontSize: 11, anchorX: 'right', offset: [-8, 0] } } }
      }
    });
    // Y-axis: centered, rotated, bold italic
    board.create('text', [-102 * 0.55, 615 / 2, '<b><i>c</i><sub>1</sub></b>'], {
        fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
    });
    // X-axis: centered, bold italic
    board.create('text', [615 / 2, -82 * 0.65, '<b><i>c</i><sub>0</sub></b>'], {
        fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false
    });

    // 45-degree line
    board.create('line', [[0,0],[1,1]], {
      strokeColor: '#ccc', strokeWidth: 1, dash: 2, fixed: true
    });

    var delta = 0.95, betaP = 0.70, ubar = 15;

    function getC1(c0, b, d, u) {
      var s = u - Math.sqrt(c0);
      if (s <= 0) return NaN;
      var val = s / (b * d);
      return val * val;
    }

    // Quasi-hyperbolic indifference curve
    var qhCurve = board.create('functiongraph', [
      function(c0) { return getC1(c0, betaP, delta, ubar); },
      0, 500
    ], { strokeColor: '#C8102E', strokeWidth: 2.5 });

    // Exponential indifference curve (beta=1, same utility level)
    var expCurve = board.create('functiongraph', [
      function(c0) { return getC1(c0, 1, delta, ubar); },
      0, 500
    ], { strokeColor: '#2a7f2a', strokeWidth: 2.5 });

    function resetAll() {
      document.getElementById('slider-delta').value = 0.95;
      document.getElementById('slider-beta').value = 0.70;
      document.getElementById('slider-ubar').value = 15;
      update();
    }

    function update() {
      delta = parseFloat(document.getElementById('slider-delta').value);
      betaP = parseFloat(document.getElementById('slider-beta').value);
      ubar = parseInt(document.getElementById('slider-ubar').value);

      document.getElementById('val-delta').textContent = delta.toFixed(2);
      document.getElementById('val-beta').textContent = betaP.toFixed(2);
      document.getElementById('val-ubar').textContent = ubar;

      qhCurve.Y = function(c0) { return getC1(c0, betaP, delta, ubar); };
      expCurve.Y = function(c0) { return getC1(c0, 1, delta, ubar); };

      // TMS at c0 = c1: MRS = dc1/dc0 = -1/(beta*delta) * sqrt(c1)/sqrt(c0) = -1/(beta*delta) at c0=c1
      var tmsExp = (1 / delta).toFixed(2);
      var tmsQH = (1 / (betaP * delta)).toFixed(2);
      document.getElementById('tms-exp').textContent = tmsExp;
      document.getElementById('tms-qh').textContent = tmsQH;

      board.update();
    }

    document.getElementById('slider-delta').addEventListener('input', update);
    document.getElementById('slider-beta').addEventListener('input', update);
    document.getElementById('slider-ubar').addEventListener('input', update);
    update();
  </script>
<script>(function(){function r(){var c=document.body.children,m=0;for(var i=0;i<c.length;i++){var b=c[i].getBoundingClientRect();var h=b.top+b.height;if(h>m)m=h}var height=Math.ceil(m)+20;if(height>50&&window.parent!==window)window.parent.postMessage({type:"iframeResize",height:height},"*")}if(document.readyState==="complete")setTimeout(r,200);else window.addEventListener("load",function(){setTimeout(r,200)});setTimeout(r,2000);setTimeout(r,5000);var t;new MutationObserver(function(){clearTimeout(t);t=setTimeout(r,300)}).observe(document.body,{childList:true,subtree:true,attributes:true})})();</script>
</body>
</html>
