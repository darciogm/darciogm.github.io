<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:'CMU Serif',Georgia,serif;background:#fff;color:#333;padding:1rem}.main-container{max-width:780px;margin:0 auto}.status-bar{padding:.5rem 1rem;border-radius:4px;font-size:.85rem;margin-bottom:1rem;text-align:center}.status-loading{background:#fff3e0;border:1px solid #ff9800;color:#e65100}.status-ready{background:#e8f5e9;border:1px solid #4caf50;color:#2e7d32}.status-error{background:#ffebee;border:1px solid #f44336;color:#c62828}.editor-container{border:1px solid #ddd;border-radius:6px;overflow:hidden;margin-bottom:1rem}.editor-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}.editor-header .lang-tag{background:#C8102E;color:#fff;padding:.15rem .5rem;border-radius:3px;font-size:.75rem;font-weight:700}textarea#r-code{width:100%;min-height:340px;padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.85rem;border:none;outline:none;resize:vertical;background:#fafafa;color:#333;line-height:1.5;tab-size:2}.btn-row{display:flex;gap:.5rem;margin-bottom:1rem}.btn-run{padding:.5rem 1.5rem;background:#C8102E;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:700}.btn-run:hover{background:#9a0c23}.btn-run:disabled{background:#ccc;cursor:not-allowed}.btn-reset{padding:.5rem 1.5rem;background:#fff;color:#666;border:1px solid #ddd;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit}.btn-reset:hover{background:#f5f5f5}.output-container{border:1px solid #ddd;border-radius:6px;overflow:hidden}.output-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd}#r-output{padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.82rem;background:#1e1e1e;color:#d4d4d4;min-height:120px;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}#r-plot{text-align:center;padding:.5rem;background:#fff}#r-plot img,#r-plot canvas{max-width:100%;border-radius:4px}.info-box{margin-top:1rem;padding:.8rem;background:#f8f8f8;border:1px solid #eee;border-radius:4px;font-size:.8rem;color:#666;line-height:1.5}html,body{margin:0!important;padding:0!important;overflow:visible!important}

<body>
<div class="main-container">
  <div class="status-bar status-loading" id="status">Carregando WebR (~10s na primeira vez)...</div>
  <div class="editor-container">
    <div class="editor-header"><span>Edite o código e clique "Executar"</span><span class="lang-tag">R</span></div>
    <textarea id="r-code">
# Teoria do Prospecto — Kahneman & Tversky (1979/1992)
# Cap. 8: Economia Comportamental

# Parâmetros da Prospect Theory (altere!)
alpha  <- 0.88   # curvatura para ganhos (< 1: concavidade)
beta   <- 0.88   # curvatura para perdas (< 1: convexidade)
lambda <- 2.25   # aversão à perda (> 1: perdas pesam mais)
delta  <- 0.65   # ponderação de probabilidades (Prelec)

# Função valor v(x)
v <- function(x) ifelse(x >= 0, x^alpha, -lambda * (-x)^beta)

# Ponderação de probabilidades w(p) — Prelec (1998)
w <- function(p) exp(-(-log(p))^delta)

par(mfrow = c(1, 2), mar = c(4, 4, 3, 1))

# === Painel 1: Função valor ===
x <- seq(-100, 100, length.out = 500)
plot(x, v(x), type = "l", col = "#C8102E", lwd = 2.5,
     xlab = "Resultado (x)", ylab = "v(x)",
     main = "Função Valor")
abline(h = 0, v = 0, col = "gray", lty = 2)

# Comparar com utilidade esperada (linear)
lines(x, x * 0.3, col = "#aaa", lwd = 1, lty = 3)

# Destacar assimetria
x_g <- 50; x_p <- -50
points(c(x_g, x_p), c(v(x_g), v(x_p)), pch = 19, cex = 1.3,
       col = c("#2a7f2a", "#C8102E"))
text(x_g + 8, v(x_g), sprintf("v(%d)=%.1f", x_g, v(x_g)),
     col = "#2a7f2a", cex = 0.75)
text(x_p - 8, v(x_p), sprintf("v(%d)=%.1f", x_p, v(x_p)),
     col = "#C8102E", cex = 0.75)

# === Painel 2: Ponderação de probabilidades ===
p <- seq(0.01, 0.99, length.out = 200)
plot(p, w(p), type = "l", col = "#C8102E", lwd = 2.5,
     xlab = "Probabilidade objetiva (p)",
     ylab = "Peso decisório w(p)",
     main = "Ponderação de Probabilidades")
lines(p, p, col = "gray", lty = 2, lwd = 1)  # 45 graus
grid()

legend("bottomright",
       legend = c("w(p) — Prelec", "p (racional)"),
       col = c("#C8102E", "gray"), lwd = c(2.5, 1), lty = c(1, 2),
       cex = 0.8)

cat("=== Assimetria ganhos vs. perdas ===\n")
cat(sprintf("  v(+50) = %.2f\n", v(50)))
cat(sprintf("  v(-50) = %.2f\n", v(-50)))
cat(sprintf("  |v(-50)/v(+50)| = %.2f  (λ torna perdas ~%.1fx piores)\n\n",
    abs(v(-50)/v(50)), abs(v(-50)/v(50))))

cat("=== Ponderação ===\n")
cat(sprintf("  w(0.01) = %.3f  (sobrepeso eventos raros: %.0f%% acima)\n",
    w(0.01), (w(0.01)/0.01 - 1)*100))
cat(sprintf("  w(0.50) = %.3f  (subpeso: %.0f%% abaixo)\n",
    w(0.50), (1 - w(0.50)/0.50)*100))
cat(sprintf("  w(0.99) = %.3f  (subpeso certezas: %.0f%% abaixo)\n",
    w(0.99), (1 - w(0.99)/0.99)*100))
</textarea>

  <div class="btn-row">
    <button class="btn-run" id="btn-run" onclick="runCode()" disabled>Executar (R)</button>

    <strong>WebR</strong> executa R no navegador. Altere <code>lambda</code> para ver como a aversão à perda distorce as decisões. Tente <code>lambda = 1</code> para "desligar" o efeito — a função valor fica quase simétrica.
  </div>
</div>
<script type="module">
  import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:620,height:340}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
</body>
