<!DOCTYPE html>
<!--
  Provisão de Bem Público — Chapter 20
  Library: JSXGraph
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provisão de Bem Público</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: .95rem; color: #C8102E; margin-bottom: .8rem; border-bottom: 1px solid #ddd; padding-bottom: .4rem; }
    .slider-group { margin-bottom: .7rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: .82rem; margin-bottom: .15rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: .8rem; padding: .8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: .82rem; line-height: 1.7; }
    .btn-reset { display: block; width: 100%; margin-top: .8rem; padding: .5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: .85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { flex-basis: 100%; width: 100%; max-width: 540px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>BMg consumidor 1 (\(a_1\)): <span class="val" id="val-a1">10</span></label>
        <input type="range" id="sl-a1" min="3" max="20" step="0.5" value="10">
      </div>
      <div class="slider-group">
        <label>BMg consumidor 2 (\(a_2\)): <span class="val" id="val-a2">6</span></label>
        <input type="range" id="sl-a2" min="2" max="15" step="0.5" value="6">
      </div>
      <div class="slider-group">
        <label>Custo marginal (\(c\)): <span class="val" id="val-c">8</span></label>
        <input type="range" id="sl-c" min="2" max="20" step="0.5" value="8">
      </div>
      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

<script>
  // MB_1(G) = max(a1 - G, 0), MB_2(G) = max(a2 - G, 0)
  // SMB = MB_1 + MB_2 (vertical sum)
  // MC = c (constant)
  // Samuelson: MB_1 + MB_2 = MC => G* = (a1 + a2 - c) / 2
  // Private: max individual => G_priv = max(a1, a2) - c

  var a1 = 10, a2 = 6, c = 8;

  function mb1(g) { return Math.max(a1 - g, 0); }
  function mb2(g) { return Math.max(a2 - g, 0); }
  function smb(g) { return mb1(g) + mb2(g); }
  function gStar() { return Math.max((a1 + a2 - c) / 2, 0); }
  function gPriv() { return Math.max(Math.max(a1, a2) - c, 0); }

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-3, 40, 25, -4],
    axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
  });

  // Axes
  board.create('axis', [[0,0],[22,0]], {
    ticks: { drawLabels: true, ticksDistance: 5, minorTicks: 0, label: { fontSize: 11 } },
    name: '', withLabel: false
  });
  board.create('text', [12, -2.8, '<b><i>G</i> (bem público)</b>'], {
    fontSize: 14, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false
  });
  board.create('axis', [[0,0],[0,38]], {
    ticks: { drawLabels: true, ticksDistance: 5, minorTicks: 0, label: { fontSize: 11, anchorX: 'right', offset: [-8, 0] } },
    name: '', withLabel: false
  });
  board.create('text', [-2, 20, '<b><i>$</i></b>'], {
    fontSize: 14, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
  });

  // --- Curves (1st quadrant only) ---

  // BMg_1
  board.create('functiongraph', [function(g) {
    if (g < 0) return NaN; var v = mb1(g); return v > 0 ? v : NaN;
  }], { strokeColor: '#1565c0', strokeWidth: 2, dash: 3 });

  // BMg_2
  board.create('functiongraph', [function(g) {
    if (g < 0) return NaN; var v = mb2(g); return v > 0 ? v : NaN;
  }], { strokeColor: '#00897b', strokeWidth: 2, dash: 3 });

  // ΣBMg (social)
  board.create('functiongraph', [function(g) {
    if (g < 0) return NaN; var v = smb(g); return v > 0 ? v : NaN;
  }], { strokeColor: '#C8102E', strokeWidth: 2.5 });

  // CMg
  board.create('functiongraph', [function(g) {
    return g >= 0 ? c : NaN;
  }], { strokeColor: '#333', strokeWidth: 2 });

  // --- Curve labels (near left side, above each curve) ---
  board.create('text', [0.5, function(){ return a1 + 1.5; }, '<i>BMg</i><sub>1</sub>'], {
    fontSize: 11, color: '#1565c0', fixed: true, highlight: false
  });
  board.create('text', [0.5, function(){ return a2 + 1.5; }, '<i>BMg</i><sub>2</sub>'], {
    fontSize: 11, color: '#00897b', fixed: true, highlight: false
  });
  board.create('text', [0.5, function(){ return a1 + a2 + 1.5; }, 'Σ<i>BMg</i>'], {
    fontSize: 12, color: '#C8102E', fixed: true, highlight: false
  });
  board.create('text', [function(){ return Math.max(a1, a2) + 2; }, function(){ return c + 1.5; }, '<i>CMg</i>'], {
    fontSize: 12, color: '#333', fixed: true, highlight: false
  });

  // --- Equilibrium points ---

  // G* (optimal - Samuelson)
  board.create('point', [
    function(){ return gStar(); }, function(){ return c; }
  ], { name: '<i>G</i>*', size: 5, fillColor: '#C8102E', strokeColor: '#C8102E', fixed: true,
       label: { offset: [12, -15], fontSize: 12, highlight: false, cssStyle: 'color:#C8102E;font-weight:700;' } });

  // G_priv (private provision)
  board.create('point', [
    function(){ return gPriv(); }, function(){ return c; }
  ], { name: '<i>G</i><sub>priv</sub>', size: 4, fillColor: '#999', strokeColor: '#999', fixed: true,
       label: { offset: [-20, -15], fontSize: 10, highlight: false, cssStyle: 'color:#999;font-weight:700;' } });

  // --- Dashed projection lines ---
  board.create('segment', [
    [function(){ return gStar(); }, function(){ return c; }],
    [function(){ return gStar(); }, 0]
  ], { strokeColor: '#C8102E', strokeWidth: 1, dash: 2, fixed: true });

  board.create('segment', [
    [function(){ return gPriv(); }, function(){ return c; }],
    [function(){ return gPriv(); }, 0]
  ], { strokeColor: '#999', strokeWidth: 1, dash: 2, fixed: true });

  // --- Lindahl prices ---
  board.create('segment', [
    [0, function(){ return mb1(gStar()); }],
    [function(){ return gStar(); }, function(){ return mb1(gStar()); }]
  ], { strokeColor: '#1565c0', strokeWidth: 1, dash: 4, fixed: true });

  board.create('segment', [
    [0, function(){ return mb2(gStar()); }],
    [function(){ return gStar(); }, function(){ return mb2(gStar()); }]
  ], { strokeColor: '#00897b', strokeWidth: 1, dash: 4, fixed: true });

  // Lindahl price labels on y-axis
  board.create('text', [-0.3, function(){ return mb1(gStar()) + 1; },
    function(){ return '<span style="color:#1565c0;font-size:9px;font-weight:700;">τ₁=' + mb1(gStar()).toFixed(1) + '</span>'; }
  ], { fontSize: 9, anchorX: 'right', fixed: true, highlight: false });

  board.create('text', [-0.3, function(){ return mb2(gStar()) - 1; },
    function(){ return '<span style="color:#00897b;font-size:9px;font-weight:700;">τ₂=' + mb2(gStar()).toFixed(1) + '</span>'; }
  ], { fontSize: 9, anchorX: 'right', fixed: true, highlight: false });

  // --- Underprovision arrow ---
  board.create('segment', [
    [function(){ return gPriv(); }, -1.2],
    [function(){ return gStar(); }, -1.2]
  ], { strokeColor: '#C8102E', strokeWidth: 2.5, fixed: true, lastArrow: true });

  board.create('text', [
    function(){ return (gPriv() + gStar()) / 2; }, -2.2,
    'Subprovisão'
  ], { fontSize: 9, anchorX: 'middle', fixed: true, highlight: false,
       cssStyle: 'color:#C8102E;font-style:italic;' });

  // --- Update ---
  function update() {
    a1 = parseFloat(document.getElementById('sl-a1').value);
    a2 = parseFloat(document.getElementById('sl-a2').value);
    c = parseFloat(document.getElementById('sl-c').value);
    document.getElementById('val-a1').textContent = a1.toFixed(1);
    document.getElementById('val-a2').textContent = a2.toFixed(1);
    document.getElementById('val-c').textContent = c.toFixed(1);

    var gs = gStar(), gp = gPriv();
    var t1 = mb1(gs), t2 = mb2(gs);

    var html = '<b>Condição de Samuelson:</b><br>';
    html += '\\(\\sum BMg_i = CMg\\)<br>';
    html += '\\(' + t1.toFixed(1) + ' + ' + t2.toFixed(1) + ' = ' + c.toFixed(1) + '\\)<br>';
    html += '<hr style="margin:.3rem 0;border:none;border-top:1px solid #ddd;">';
    html += '<span style="color:#C8102E;font-weight:700;">Provisão ótima: \\(G^* = ' + gs.toFixed(2) + '\\)</span><br>';
    html += '<span style="color:#999;font-weight:700;">Provisão privada: \\(G_{priv} = ' + gp.toFixed(2) + '\\)</span><br>';
    html += '<b>Subprovisão:</b> \\(\\Delta G = ' + (gs - gp).toFixed(2) + '\\)<br>';
    html += '<hr style="margin:.3rem 0;border:none;border-top:1px solid #ddd;">';
    html += '<b>Preços de Lindahl:</b><br>';
    html += '<span style="color:#1565c0;">\\(\\tau_1 = ' + t1.toFixed(2) + '\\)</span><br>';
    html += '<span style="color:#00897b;">\\(\\tau_2 = ' + t2.toFixed(2) + '\\)</span><br>';
    html += '\\(\\tau_1 + \\tau_2 = ' + (t1 + t2).toFixed(2) + ' = CMg\\)';

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('sl-a1').value = 10;
    document.getElementById('sl-a2').value = 6;
    document.getElementById('sl-c').value = 8;
    update();
  }

  ['sl-a1','sl-a2','sl-c'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
