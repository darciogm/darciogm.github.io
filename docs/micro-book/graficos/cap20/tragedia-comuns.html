<!DOCTYPE html>
<!--
  Interactive Tragedy of the Commons — Chapter 19
  Library: JSXGraph + MathJax
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tragédia dos Comuns</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-title { font-size: 1.1rem; font-weight: 700; color: #C8102E; margin-bottom: .5rem; text-align: center; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
 #jxgbox { width: 520px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { width: 320px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: .95rem; color: #C8102E; margin-bottom: .8rem; border-bottom: 1px solid #ddd; padding-bottom: .4rem; }
    .slider-group { margin-bottom: .7rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: .82rem; margin-bottom: .15rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: .8rem; padding: .8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: .82rem; line-height: 1.7; }
    .btn-reset { display: block; width: 100%; margin-top: .8rem; padding: .5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: .85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { width: 100%; max-width: 520px; }
      .controls { width: 100%; max-width: 520px; }
    }
  </style>
</head>
<body>
  <div class="graph-title">Figura 20.4 — Tragédia dos Comuns</div>
  <div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>Capacidade do recurso (\(K\)): <span class="val" id="val-K">100</span></label>
        <input type="range" id="sl-K" min="40" max="200" step="5" value="100">
      </div>
      <div class="slider-group">
        <label>Número de usuários (\(N\)): <span class="val" id="val-N">10</span></label>
        <input type="range" id="sl-N" min="2" max="50" step="1" value="10">
      </div>
      <div class="slider-group">
        <label>Custo por unidade de esforço (\(w\)): <span class="val" id="val-w">2.0</span></label>
        <input type="range" id="sl-w" min="0.5" max="5" step="0.1" value="2.0">
      </div>
      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    // Model: Common resource with capacity K
    // Total effort: E (aggregate from N users)
    // Total output: F(E) = E * (K - E) / K  for E in [0, K]  (concave)
    // Average product: AP(E) = F(E)/E = (K - E)/K
    // Marginal product: MP(E) = dF/dE = (K - 2E)/K
    // Cost per unit effort: w
    // Private optimum: AP(E) = w => (K - E)/K = w => E_priv = K(1 - w)  [scaled]
    // Social optimum: MP(E) = w => (K - 2E)/K = w => E_soc = K(1 - w)/2

    // Let's use a slightly different scaling for better visualization:
    // F(E) = a*E - b*E^2 where a = K/10, b = 1/10
    // AP = a - b*E
    // MP = a - 2b*E
    // Private: a - b*E = w => E_priv = (a-w)/b
    // Social: a - 2b*E = w => E_soc = (a-w)/(2b)

    var board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [-31, 24, 291, -2.5],
      axis: false, showCopyright: false, showNavigation: false
    });

    board.create('axis', [[0,0],[55,0]], {
      ticks: { drawLabels: true, ticksDistance: 10, minorTicks: 1, label:{fontSize:10} },
      name: 'Uso total (E)', withLabel: true,
      label: { position: 'rt', offset: [5, 20], fontSize: 11 }
    });
    board.create('axis', [[0,0],[0,13]], {
      ticks: { drawLabels: true, ticksDistance: 2, minorTicks: 0, label:{fontSize:10, anchorX: 'right', offset: [-8, 0]} },
      name: '$/unidade', withLabel: true,
      label: { position: 'rt', offset: [-5, -20], fontSize: 13 }
    });

    var K = 100, N = 10, w = 2.0;

    function a() { return K / 10; }
    function b() { return 0.1; }
    function ap(e) { return Math.max(a() - b() * e, 0); }
    function mp(e) { return a() - 2 * b() * e; }
    function ePriv() { return Math.max((a() - w) / b(), 0); }
    function eSoc() { return Math.max((a() - w) / (2 * b()), 0); }

    // AP curve
    board.create('functiongraph', [function(e){ return ap(e); }],
      { strokeColor: '#1565c0', strokeWidth: 2.5, name: 'Produto Medio (AP)', withLabel: true,
        label: { position: 'rt', offset: [5, 0], fontSize: 10 } });

    // MP curve
    board.create('functiongraph', [function(e){ return Math.max(mp(e), -1); }],
      { strokeColor: '#C8102E', strokeWidth: 2.5, name: 'Produto Marginal (MP)', withLabel: true,
        label: { position: 'rt', offset: [5, 0], fontSize: 10 } });

    // Cost line
    board.create('functiongraph', [function(e){ return w; }],
      { strokeColor: '#333', strokeWidth: 2, name: 'Custo (w)', withLabel: true,
        label: { position: 'rt', offset: [5, 0], fontSize: 10 } });

    // Overuse region shading between E_soc and E_priv
    var nShade = 25;
    for (var i = 0; i < nShade; i++) {
      (function(idx) {
        var t0 = idx / nShade, t1 = (idx + 1) / nShade;
        board.create('polygon', [
          [function(){ return eSoc() + t0*(ePriv()-eSoc()); },
           function(){ return w; }],
          [function(){ return eSoc() + t1*(ePriv()-eSoc()); },
           function(){ return w; }],
          [function(){ return eSoc() + t1*(ePriv()-eSoc()); },
           function(){ var e = eSoc()+t1*(ePriv()-eSoc()); return ap(e); }],
          [function(){ return eSoc() + t0*(ePriv()-eSoc()); },
           function(){ var e = eSoc()+t0*(ePriv()-eSoc()); return ap(e); }]
        ], {
          fillColor: '#C8102E', fillOpacity: 0.15, borders: {strokeWidth: 0},
          vertices: { visible: false }, hasInnerPoints: false, highlight: false
        });
      })(i);
    }

    // Private equilibrium point (AP = w)
    board.create('point', [
      function(){ return ePriv(); },
      function(){ return w; }
    ], { name: 'E_priv', size: 4, fillColor: '#1565c0', strokeColor: '#1565c0', fixed: true,
         label: { offset: [5, 8], fontSize: 11, cssStyle: 'color:#1565c0;font-weight:700;' } });

    // Social optimum (MP = w)
    board.create('point', [
      function(){ return eSoc(); },
      function(){ return w; }
    ], { name: 'E*', size: 4, fillColor: '#00897b', strokeColor: '#00897b', fixed: true,
         label: { offset: [-20, 8], fontSize: 11, cssStyle: 'color:#00897b;font-weight:700;' } });

    // Dashed lines
    board.create('segment', [
      [function(){ return ePriv(); }, function(){ return w; }],
      [function(){ return ePriv(); }, 0]
    ], { strokeColor: '#1565c0', strokeWidth: 1, dash: 2, fixed: true });
    board.create('segment', [
      [function(){ return eSoc(); }, function(){ return w; }],
      [function(){ return eSoc(); }, 0]
    ], { strokeColor: '#00897b', strokeWidth: 1, dash: 2, fixed: true });

    // Overuse label
    board.create('text', [
      function(){ return (ePriv() + eSoc()) / 2; },
      function(){ return w + 0.5; },
      'Sobreuso'
    ], { fontSize: 9, anchorX: 'middle', cssStyle: 'color:#C8102E;font-style:italic;font-weight:700;' });

    function updateInfo() {
      var ep = ePriv(), es = eSoc();
      var perUserPriv = ep / N;
      var perUserSoc = es / N;
      var outputPriv = a() * ep - b() * ep * ep;
      var outputSoc = a() * es - b() * es * es;
      var profitPriv = outputPriv - w * ep;
      var profitSoc = outputSoc - w * es;

      var html = '<b>Produto medio:</b> \\(AP(E) = ' + a().toFixed(0) + ' - ' + b().toFixed(1) + 'E\\)<br>';
      html += '<b>Produto marginal:</b> \\(MP(E) = ' + a().toFixed(0) + ' - ' + (2*b()).toFixed(1) + 'E\\)<br>';
      html += '<hr style="margin:.3rem 0;border:none;border-top:1px solid #ddd;">';
      html += '<span style="color:#1565c0;font-weight:700;">Equilíbrio privado (AP = w):</span><br>';
      html += '\\(E_{priv} = ' + ep.toFixed(1) + '\\) (' + perUserPriv.toFixed(1) + ' por usuário)<br>';
      html += 'Produção total: ' + outputPriv.toFixed(1) + ', Lucro: ' + profitPriv.toFixed(1) + '<br>';
      html += '<span style="color:#00897b;font-weight:700;">Ótimo social (MP = w):</span><br>';
      html += '\\(E^* = ' + es.toFixed(1) + '\\) (' + perUserSoc.toFixed(1) + ' por usuário)<br>';
      html += 'Produção total: ' + outputSoc.toFixed(1) + ', Lucro: ' + profitSoc.toFixed(1) + '<br>';
      html += '<hr style="margin:.3rem 0;border:none;border-top:1px solid #ddd;">';
      html += '<span style="color:#C8102E;font-weight:700;">Sobreuso: ' + (ep - es).toFixed(1) + ' unidades (' + (100*(ep-es)/es).toFixed(0) + '% acima do ótimo)</span><br>';
      html += '<b>Perda de lucro:</b> ' + (profitSoc - profitPriv).toFixed(1);

      document.getElementById('info').innerHTML = html;
      if (window.MathJax && MathJax.typeset) MathJax.typeset();
    }

    function update() {
      K = parseFloat(document.getElementById('sl-K').value);
      N = parseFloat(document.getElementById('sl-N').value);
      w = parseFloat(document.getElementById('sl-w').value);
      document.getElementById('val-K').textContent = K.toFixed(0);
      document.getElementById('val-N').textContent = N.toFixed(0);
      document.getElementById('val-w').textContent = w.toFixed(1);

      board.update();
      updateInfo();
    }

    function resetAll() {
      document.getElementById('sl-K').value = 100;
      document.getElementById('sl-N').value = 10;
      document.getElementById('sl-w').value = 2.0;
      update();
    }

    ['sl-K','sl-N','sl-w'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', update);
    });
    update();
  </script>
</body>
</html>
