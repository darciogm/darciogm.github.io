<!DOCTYPE html>
<!--
  WebR — Demandas Marshalliana e Hicksiana + Dualidade
  Cap. 4: Maximização de Utilidade e Escolha
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R Interativo — Demandas e Dualidade</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:'CMU Serif',Georgia,serif;background:#fff;color:#333;padding:1rem}.main-container{max-width:780px;margin:0 auto}.status-bar{padding:.5rem 1rem;border-radius:4px;font-size:.85rem;margin-bottom:1rem;text-align:center}.status-loading{background:#fff3e0;border:1px solid #ff9800;color:#e65100}.status-ready{background:#e8f5e9;border:1px solid #4caf50;color:#2e7d32}.status-error{background:#ffebee;border:1px solid #f44336;color:#c62828}.editor-container{border:1px solid #ddd;border-radius:6px;overflow:hidden;margin-bottom:1rem}.editor-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}.editor-header .lang-tag{background:#C8102E;color:#fff;padding:.15rem .5rem;border-radius:3px;font-size:.75rem;font-weight:700}textarea#r-code{width:100%;min-height:320px;padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.85rem;border:none;outline:none;resize:vertical;background:#fafafa;color:#333;line-height:1.5;tab-size:2}.btn-row{display:flex;gap:.5rem;margin-bottom:1rem}.btn-run{padding:.5rem 1.5rem;background:#C8102E;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:700}.btn-run:hover{background:#9a0c23}.btn-run:disabled{background:#ccc;cursor:not-allowed}.btn-reset{padding:.5rem 1.5rem;background:#fff;color:#666;border:1px solid #ddd;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit}.btn-reset:hover{background:#f5f5f5}.output-container{border:1px solid #ddd;border-radius:6px;overflow:hidden}.output-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd}#r-output{padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.82rem;background:#1e1e1e;color:#d4d4d4;min-height:120px;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}#r-plot{text-align:center;padding:.5rem;background:#fff}#r-plot img,#r-plot canvas{max-width:100%;border-radius:4px}.info-box{margin-top:1rem;padding:.8rem;background:#f8f8f8;border:1px solid #eee;border-radius:4px;font-size:.8rem;color:#666;line-height:1.5}html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="main-container">
  <div class="status-bar status-loading" id="status">Carregando WebR (~10s na primeira vez)...</div>
  <div class="editor-container">
    <div class="editor-header"><span>Edite o código e clique "Executar"</span><span class="lang-tag">R</span></div>
    <textarea id="r-code">
# Demandas Marshalliana e Hicksiana — Cobb-Douglas
# Cap. 4: Maximização de Utilidade e Escolha

# Parâmetros (altere!)
alpha <- 0.4   # peso do bem 1
py    <- 5     # preço do bem 2 (fixo)
m     <- 100   # renda

# Variação de p1
p1_grid <- seq(1, 20, length.out = 200)

# Demanda Marshalliana: x1(p1, py, m) = alpha * m / p1
x1_marsh <- alpha * m / p1_grid

# Utilidade no ponto base (p1 = 5)
p1_base <- 5
x1_base <- alpha * m / p1_base
x2_base <- (1 - alpha) * m / py
U_base  <- x1_base^alpha * x2_base^(1 - alpha)

# Demanda Hicksiana: h1(p1, py, U) = U * (alpha*py / ((1-alpha)*p1))^(1-alpha)
h1_hicks <- U_base * (alpha * py / ((1 - alpha) * p1_grid))^(1 - alpha)

# Função Dispêndio no ponto base
E_base <- m  # por construção

# Identidade de Roy: x1 = -(dV/dp1) / (dV/dm)
# Para CD: V = (alpha/p1)^alpha * ((1-alpha)/py)^(1-alpha) * m
# dV/dp1 = -alpha * V / p1,  dV/dm = V / m
# => x1 = alpha * m / p1 ✓

cat("=== Dualidade no ponto p1 =", p1_base, "===\n")
cat(sprintf("  Marshalliana:  x1* = %.2f\n", x1_base))
cat(sprintf("  Hicksiana:     h1* = %.2f\n",
    U_base * (alpha * py / ((1-alpha) * p1_base))^(1-alpha)))
cat(sprintf("  U* = %.4f,  E* = %.2f\n", U_base, E_base))
cat(sprintf("  V(p, m) = U ↔ E(p, U) = m ✓\n\n"))

# Gráfico
plot(p1_grid, x1_marsh, type = "l", col = "#C8102E", lwd = 2.5,
     xlab = expression(p[1]), ylab = expression(x[1]),
     main = "Marshalliana vs. Hicksiana",
     xlim = c(0, 20), ylim = c(0, max(x1_marsh) * 1.1))
lines(p1_grid, h1_hicks, col = "#2a7f2a", lwd = 2.5, lty = 2)
abline(v = p1_base, col = "gray", lty = 3)
points(p1_base, x1_base, pch = 19, col = "#333", cex = 1.5)
legend("topright",
       legend = c("Marshalliana x₁(p₁, m)",
                  "Hicksiana h₁(p₁, U*)"),
       col = c("#C8102E", "#2a7f2a"),
       lty = c(1, 2), lwd = 2.5, cex = 0.85)
text(p1_base + 0.8, x1_base + 1,
     sprintf("(%.0f, %.1f)", p1_base, x1_base),
     font = 2, cex = 0.85)
</textarea>
  </div>
  <div class="btn-row">
    <button class="btn-run" id="btn-run" onclick="runCode()" disabled>Executar (R)</button>
    <button class="btn-reset" onclick="resetCode()">Restaurar código original</button>
  </div>
  <div class="output-container">
    <div class="output-header">Saída do R</div>
    <div id="r-output">Aguardando execução...</div>
    <div id="r-plot"></div>
  </div>
  <div class="info-box">
    <strong>WebR</strong> executa R no navegador. Note como Marshalliana e Hicksiana se cruzam no ponto base — é a dualidade em ação. Altere <code>alpha</code> para ver como a proporção de gastos muda.
  </div>
</div>
<script type="module">
  import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:520,height:420}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
</body>
</html>
