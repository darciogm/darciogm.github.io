<!DOCTYPE html>
<!--
  Library: JSXGraph
  Reason: JSXGraph excels at 2D function plotting with interactive sliders,
  draggable points, and real-time calculation display. Ideal for visualizing
  firm profit maximization with cost, revenue, and marginal cost curves.
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maximização de Lucro — Firma Competitiva</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'CMU Serif', Georgia, serif;
      background: #ffffff;
      color: #333;
      padding: 1rem;
    }
.graph-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-start;
      justify-content: center;
    }
    #jxgbox {
      flex: 1 1 450px;
      max-width: 560px;
      height: 450px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .controls {
      flex: 0 1 300px;
      padding: 1rem;
      background: #f8f8f8;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .controls h3 {
      font-size: 0.95rem;
      color: #C8102E;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.4rem;
    }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.82rem;
      line-height: 1.7;
    }
    .info-box .info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .info-box .info-label { color: #666; }
    .info-box .info-val { font-weight: 700; color: #333; }
    .info-box .info-val.accent { color: #C8102E; }
    .info-box .info-val.green { color: #00897b; }
    .info-box .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 0.4rem 0;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 0.6rem;
      font-size: 0.78rem;
      color: #666;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .legend-swatch {
      width: 18px;
      height: 3px;
      border-radius: 2px;
    }
    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.5rem;
      background: #C8102E;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { flex-basis: 100%; max-width: 100%; }
      .controls { flex-basis: 100%; max-width: 100%; }
    }
    /* anti-inflation-fix */
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>

      <div class="slider-group">
        <label>Preço \(P\): <span class="val" id="val-price">20</span></label>
        <input type="range" id="slider-price" min="5" max="50" step="0.5" value="20">
      </div>

      <div class="info-box" id="info">
        <div class="eq" style="text-align:center; margin-bottom:0.4rem; color:#555;">
          \(CT(q) = 10 + 2q + 0{,}5q^2\)
        </div>
        <hr class="divider">
        <div class="info-row">
          <span class="info-label">Quantidade ótima \(q^*\)</span>
          <span class="info-val accent" id="info-qstar">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Lucro máximo \(\pi^*\)</span>
          <span class="info-val green" id="info-pistar">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">\(CMg(q^*)\)</span>
          <span class="info-val" id="info-mc">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">CPO: \(P - CMg\)</span>
          <span class="info-val" id="info-foc">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">\(dq^*/dP\)</span>
          <span class="info-val" id="info-dqdp">—</span>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:#1565c0"></div> \(R = Pq\)</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#C8102E"></div> \(CT(q)\)</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#00897b"></div> \(\pi(q)\)</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#ff9800; height:2px; border-top:2px dashed #ff9800"></div> \(CMg\)</div>
      </div>

      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    var board;
    var price = 20;

    // Economic functions
    function CT(q) { return 10 + 2*q + 0.5*q*q; }
    function MC(q) { return 2 + q; }
    function R(q) { return price * q; }
    function profit(q) { return R(q) - CT(q); }
    function qStar() { return Math.max(price - 2, 0); }

    // Board setup
    var bbLeft = -9, bbTop = 1600, bbRight = 58, bbBottom = -600;

    board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [bbLeft, bbTop, bbRight, bbBottom],
      axis: false,
      showCopyright: false,
      showNavigation: false,
      keepAspectRatio: false
    });

    // Axes
    board.create('axis', [[0,0],[55,0]], {
      name: '', withLabel: false,
      ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 10 }
    });
    board.create('axis', [[0,0],[0,1500]], {
      name: '', withLabel: false,
      ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 250 }
    });

    // Axis labels: centered, rotated Y, bold italic
    board.create('text', [bbLeft * 0.55, (0 + bbTop) / 2, '<b>$</b>'], {
      fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
    });
    board.create('text', [(0 + bbRight) / 2, bbBottom * 0.65, '<b><i>q</i></b>'], {
      fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false
    });

    // Zero line (horizontal at y=0)
    board.create('functiongraph', [function(){ return 0; }, -2, 55], {
      strokeColor: '#999', strokeWidth: 0.8, dash: 2
    });

    // Revenue
    board.create('functiongraph', [function(q){ return price*q; }, 0, 52], {
      strokeColor: '#1565c0', strokeWidth: 2.5
    });

    // Cost
    board.create('functiongraph', [CT, 0, 52], {
      strokeColor: '#C8102E', strokeWidth: 2.5
    });

    // Profit
    board.create('functiongraph', [profit, 0, 52], {
      strokeColor: '#00897b', strokeWidth: 2.5
    });

    // Marginal cost (dashed)
    board.create('functiongraph', [MC, 0, 52], {
      strokeColor: '#ff9800', strokeWidth: 2, dash: 3
    });

    // Optimal point on profit curve
    board.create('point', [
      function(){ return qStar(); },
      function(){ return profit(qStar()); }
    ], { size: 5, fillColor: '#00897b', strokeColor: '#00897b', name: '', fixed: true });

    // Optimal point on revenue curve
    board.create('point', [
      function(){ return qStar(); },
      function(){ return R(qStar()); }
    ], { size: 4, fillColor: '#1565c0', strokeColor: '#1565c0', name: '', fixed: true });

    // Vertical dashed line at q*
    board.create('segment', [
      [function(){ return qStar(); }, 0],
      [function(){ return qStar(); }, function(){ return R(qStar()); }]
    ], { strokeColor: '#999', dash: 2, strokeWidth: 1 });

    // Info panel update
    function updateInfo() {
      var qs = qStar();
      var pi = profit(qs);
      var mc = MC(qs);
      var dpi = price - mc;

      document.getElementById('info-qstar').textContent = qs.toFixed(2);
      document.getElementById('info-pistar').textContent = pi.toFixed(2);
      document.getElementById('info-mc').textContent = mc.toFixed(2) + ' = P';
      document.getElementById('info-foc').textContent = dpi.toFixed(2) + ' ≈ 0';
      document.getElementById('info-dqdp').textContent = '1 (= 1/CMg\')';

      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([document.getElementById('info')]);
      }
    }

    function update() {
      price = parseFloat(document.getElementById('slider-price').value);
      document.getElementById('val-price').textContent = price;
      board.update();
      updateInfo();
    }

    function resetAll() {
      document.getElementById('slider-price').value = 20;
      price = 20;
      update();
    }

    document.getElementById('slider-price').addEventListener('input', update);
    updateInfo();
  </script>
</body>
</html>
