<!DOCTYPE html>
<!--
  Monopsonio no Mercado de Trabalho — Interactive Graph
  Library: JSXGraph
  Chapter 16 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monopsonio no Mercado de Trabalho</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
.graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
 .jxgbox { width: 500px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { width: 300px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .jxgbox { width: 100%; max-width: 500px; }
      .controls { width: 100%; max-width: 500px; }
    }
    /* anti-inflation-fix */
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox1" class="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>Intercepto oferta \(a\): <span class="val" id="val-a">5</span></label>
        <input type="range" id="slider-a" min="0" max="15" step="0.5" value="5">
      </div>
      <div class="slider-group">
        <label>Inclinação oferta \(b\): <span class="val" id="val-b">0.50</span></label>
        <input type="range" id="slider-b" min="0.10" max="1.50" step="0.05" value="0.50">
      </div>
      <div class="slider-group">
        <label>VPMg (intercepto): <span class="val" id="val-mrp0">40</span></label>
        <input type="range" id="slider-mrp0" min="20" max="60" step="1" value="40">
      </div>
      <div class="slider-group">
        <label>VPMg (inclinação): <span class="val" id="val-mrp1">0.50</span></label>
        <input type="range" id="slider-mrp1" min="0.10" max="1.50" step="0.05" value="0.50">
      </div>
      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    /*
      Labor supply: w = a + b*H  =>  H = (w - a)/b
      Total labor cost: TCL = w*H = (a + bH)*H = aH + bH^2
      Marginal cost of labor: MCL = a + 2bH
      MRP (demand): VPMgL = mrp0 - mrp1*H
      Monopsony: MCL = MRP => a + 2bH = mrp0 - mrp1*H => H* = (mrp0 - a)/(2b + mrp1)
      Monopsony wage: w* = a + b*H*
      Competitive: S = MRP => a + bH = mrp0 - mrp1*H => Hc = (mrp0 - a)/(b + mrp1)
      Competitive wage: wc = a + b*Hc
    */

    var board = JXG.JSXGraph.initBoard('jxgbox1', {
      boundingbox: [-7, 62, 62, -7],
      axis: false, showCopyright: false, showNavigation: false, keepaspectratio: false
    });

    board.create('axis', [[0,0],[52,0]], {
      ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 10 },
      name: '', withLabel: false
    });
board.create('text', [31.0, -4.55, '<b><i>H</i> (trabalho)</b>'], {
    fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false
});
    board.create('axis', [[0,0],[0,52]], {
      ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 10 },
      name: '', withLabel: false
    });
board.create('text', [-3.8500000000000005, 31.0, '<b><i>w</i></b>'], {
    fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
});

    // Supply curve: w = a + bH
    var supplyCurve = board.create('functiongraph', [
      function(x) { var s = getState(); return s.a + s.b * x; }
    ], { strokeColor: '#1565c0', strokeWidth: 2.5 });

    // MCL curve: w = a + 2bH
    var mclCurve = board.create('functiongraph', [
      function(x) { var s = getState(); return s.a + 2 * s.b * x; }
    ], { strokeColor: '#C8102E', strokeWidth: 2.5 });

    // MRP (demand) curve: w = mrp0 - mrp1*H
    var mrpCurve = board.create('functiongraph', [
      function(x) { var s = getState(); return s.mrp0 - s.mrp1 * x; }
    ], { strokeColor: '#00897b', strokeWidth: 2.5 });

    // Monopsony equilibrium point: MCL = MRP
    var monopH = function() { var s = getState(); return Math.max(0, (s.mrp0 - s.a) / (2 * s.b + s.mrp1)); };
    var monopW = function() { var s = getState(); return s.a + s.b * monopH(); };
    var monopMRP = function() { var s = getState(); return s.mrp0 - s.mrp1 * monopH(); };

    // Competitive equilibrium
    var compH = function() { var s = getState(); return Math.max(0, (s.mrp0 - s.a) / (s.b + s.mrp1)); };
    var compW = function() { var s = getState(); return s.a + s.b * compH(); };

    // Monopsony intersection point (MCL = MRP)
    var monopIntPt = board.create('point', [monopH, monopMRP],
      { size: 4, fillColor: '#C8102E', strokeColor: '#C8102E', name: 'MCL=VPMg', fixed: true,
        label: { fontSize: 9, offset: [5, 10] } });

    // Monopsony wage point (on supply curve)
    var monopWPt = board.create('point', [monopH, monopW],
      { size: 5, fillColor: '#C8102E', strokeColor: '#fff', name: 'Monopsonio', fixed: true,
        label: { fontSize: 10, offset: [5, -12], color: '#C8102E' } });

    // Competitive equilibrium point
    var compPt = board.create('point', [compH, compW],
      { size: 5, fillColor: '#00897b', strokeColor: '#fff', name: 'Competitivo', fixed: true,
        label: { fontSize: 10, offset: [5, 10], color: '#00897b' } });

    // Dashed lines for monopsony
    board.create('segment', [
      function() { return [monopH(), 0]; },
      function() { return [monopH(), monopMRP()]; }
    ], { strokeColor: '#C8102E', strokeWidth: 1, dash: 3 });
    board.create('segment', [
      function() { return [0, monopW()]; },
      function() { return [monopH(), monopW()]; }
    ], { strokeColor: '#C8102E', strokeWidth: 1, dash: 3 });

    // Dashed lines for competitive
    board.create('segment', [
      function() { return [compH(), 0]; },
      function() { return [compH(), compW()]; }
    ], { strokeColor: '#00897b', strokeWidth: 1, dash: 3 });
    board.create('segment', [
      function() { return [0, compW()]; },
      function() { return [compH(), compW()]; }
    ], { strokeColor: '#00897b', strokeWidth: 1, dash: 3 });

    // Exploitation shading: area between MRP and w* at H*
    // Vertical line showing exploitation gap
    board.create('segment', [
      function() { return [monopH(), monopW()]; },
      function() { return [monopH(), monopMRP()]; }
    ], { strokeColor: '#C8102E', strokeWidth: 3, strokeOpacity: 0.5 });

    // Exploitation bracket label
    board.create('text', [
      function() { return monopH() + 1.5; },
      function() { return (monopW() + monopMRP()) / 2; },
      function() { return '<span style="color:#C8102E;font-size:10px;">Exploração</span>'; }
    ], { fontSize: 10, anchorX: 'left', useMathJax: false });

    // Legend
    board.create('text', [32, 50, '<span style="color:#1565c0;font-weight:bold">--- S(w)</span>'],
      { fontSize: 10, anchorX: 'left', useMathJax: false });
    board.create('text', [32, 47, '<span style="color:#C8102E;font-weight:bold">--- MCL</span>'],
      { fontSize: 10, anchorX: 'left', useMathJax: false });
    board.create('text', [32, 44, '<span style="color:#00897b;font-weight:bold">--- VPMgL</span>'],
      { fontSize: 10, anchorX: 'left', useMathJax: false });

    function getState() {
      return {
        a: parseFloat(document.getElementById('slider-a').value),
        b: parseFloat(document.getElementById('slider-b').value),
        mrp0: parseFloat(document.getElementById('slider-mrp0').value),
        mrp1: parseFloat(document.getElementById('slider-mrp1').value)
      };
    }

    function update() {
      var s = getState();
      document.getElementById('val-a').textContent = s.a.toFixed(1);
      document.getElementById('val-b').textContent = s.b.toFixed(2);
      document.getElementById('val-mrp0').textContent = s.mrp0.toFixed(0);
      document.getElementById('val-mrp1').textContent = s.mrp1.toFixed(2);

      var Hm = Math.max(0, (s.mrp0 - s.a) / (2 * s.b + s.mrp1));
      var wm = s.a + s.b * Hm;
      var mrpAtHm = s.mrp0 - s.mrp1 * Hm;
      var Hc = Math.max(0, (s.mrp0 - s.a) / (s.b + s.mrp1));
      var wc = s.a + s.b * Hc;
      var exploitation = mrpAtHm - wm;

      var html = '<div style="font-size:0.8rem;">';
      html += '<strong>Oferta:</strong> \\(w = ' + s.a.toFixed(1) + ' + ' + s.b.toFixed(2) + 'H\\)<br>';
      html += '<strong>MCL:</strong> \\(w = ' + s.a.toFixed(1) + ' + ' + (2*s.b).toFixed(2) + 'H\\)<br>';
      html += '<strong>VPMg:</strong> \\(w = ' + s.mrp0.toFixed(0) + ' - ' + s.mrp1.toFixed(2) + 'H\\)';
      html += '</div>';
      html += '<div style="margin-top:0.5rem;border-top:1px solid #ddd;padding-top:0.4rem;">';
      html += '<span style="color:#C8102E;font-weight:bold;">Monopsonio:</span><br>';
      html += '\\(H^* = ' + Hm.toFixed(1) + '\\), \\(w^* = ' + wm.toFixed(1) + '\\)<br>';
      html += '<span style="color:#00897b;font-weight:bold;">Competitivo:</span><br>';
      html += '\\(H_c = ' + Hc.toFixed(1) + '\\), \\(w_c = ' + wc.toFixed(1) + '\\)<br>';
      html += '<strong>Exploração:</strong> \\(VPMg - w^* = ' + exploitation.toFixed(1) + '\\)';
      html += '</div>';

      document.getElementById('info').innerHTML = html;
      board.update();
      if (window.MathJax && MathJax.typeset) MathJax.typeset();
    }

    function resetAll() {
      document.getElementById('slider-a').value = 5;
      document.getElementById('slider-b').value = 0.50;
      document.getElementById('slider-mrp0').value = 40;
      document.getElementById('slider-mrp1').value = 0.50;
      update();
    }

    ['slider-a','slider-b','slider-mrp0','slider-mrp1'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', update);
    });
    update();
  </script>
<script>(function(){function r(){var c=document.body.children,m=0;for(var i=0;i<c.length;i++){var b=c[i].getBoundingClientRect();var h=b.top+b.height;if(h>m)m=h}var height=Math.ceil(m)+20;if(height>50&&window.parent!==window)window.parent.postMessage({type:"iframeResize",height:height},"*")}if(document.readyState==="complete")setTimeout(r,200);else window.addEventListener("load",function(){setTimeout(r,200)});setTimeout(r,2000);setTimeout(r,5000);var t;new MutationObserver(function(){clearTimeout(t);t=setTimeout(r,300)}).observe(document.body,{childList:true,subtree:true,attributes:true})})();</script>
</body>
</html>
