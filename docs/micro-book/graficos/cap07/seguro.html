<!DOCTYPE html>
<!--
  Library: JSXGraph
  Reason: Insurance model in state-contingent wealth space with indifference
  curves, budget lines, 45-degree line, and optimal coverage.
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercado de Seguros</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-title { font-size: 1.1rem; font-weight: 700; color: #C8102E; margin-bottom: 0.5rem; text-align: center; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { width: 520px; height: 480px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { width: 320px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.7; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { width: 100%; max-width: 520px; }
      .controls { width: 100%; max-width: 520px; }
    }
    /* === FIX: anti-scrollHeight inflation === */
    html { height: auto !important; min-height: 0 !important; }
    body { height: auto !important; min-height: 0 !important; overflow: visible; }
  </style>
</head>
<body>
  <div class="graph-title">Figura 7.3 — Mercado de Seguros: Espaço Estado-Contingente</div>
  <div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>

      <div class="slider-group">
        <label>Riqueza inicial \(W_0\): <span class="val" id="val-w0">10.0</span></label>
        <input type="range" id="slider-w0" min="5" max="15" step="0.5" value="10">
      </div>

      <div class="slider-group">
        <label>Perda \(L\): <span class="val" id="val-L">6.0</span></label>
        <input type="range" id="slider-L" min="1" max="12" step="0.5" value="6">
      </div>

      <div class="slider-group">
        <label>Prob. de perda \(\pi\): <span class="val" id="val-pi">0.30</span></label>
        <input type="range" id="slider-pi" min="0.05" max="0.80" step="0.05" value="0.30">
      </div>

      <div class="slider-group">
        <label>Carregamento \(\lambda\): <span class="val" id="val-lam">0.00</span></label>
        <input type="range" id="slider-lam" min="0" max="1" step="0.05" value="0">
      </div>

      <div class="info-box" id="info"></div>
      <label style="font-size:0.82rem; cursor:pointer; display:block; margin-top:0.5rem;">
        <input type="checkbox" id="chk-labels" checked onchange="toggleLabels()"> Mostrar labels
      </label>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    var board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [-3.2, 19, 19, -2.6],
      axis: false,
      showCopyright: false,
      showNavigation: false,
      keepAspectRatio: true
    });

    board.create('axis', [[0,0],[17,0]], {
      ticks: { drawLabels: true, label: { fontSize: 11 } },
      name: '', withLabel: false
    });
    board.create('axis', [[0,0],[0,17]], {
      ticks: { drawLabels: true, label: { fontSize: 11, anchorX: 'right', offset: [-8, 0] } },
      name: '', withLabel: false
    });
    // Y-axis: centered, rotated, bold italic
    board.create('text', [-3.2 * 0.55, 19 / 2, '<b><i>W</i><sub>ruim</sub></b>'], {
        fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
    });
    // X-axis: centered, bold italic
    board.create('text', [19 / 2, -2.6 * 0.65, '<b><i>W</i><sub>bom</sub></b>'], {
        fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false
    });

    function getW0() { return parseFloat(document.getElementById('slider-w0').value); }
    function getL() { return parseFloat(document.getElementById('slider-L').value); }
    function getPi() { return parseFloat(document.getElementById('slider-pi').value); }
    function getLam() { return parseFloat(document.getElementById('slider-lam').value); }

    function u(w) { return w > 0 ? Math.sqrt(w) : 0; }

    // Expected utility given (Wg, Wb)
    function EU(wg, wb) {
      var pi = getPi();
      return (1 - pi) * u(wg) + pi * u(wb);
    }

    // Solve Wb for indifference curve given Wg and utility level U
    function solveWb(wg, Utarget) {
      var pi = getPi();
      // (1-pi)*u(wg) + pi*u(wb) = U => u(wb) = (U - (1-pi)*u(wg))/pi
      var uw = (Utarget - (1 - pi) * u(wg)) / pi;
      if (uw < 0) return NaN;
      return uw * uw; // inverse of sqrt
    }

    var drawObjects = [];

    function clearDraw() {
      for (var i = drawObjects.length - 1; i >= 0; i--) board.removeObject(drawObjects[i]);
      drawObjects = [];
    }

    function update() {
      clearDraw();
      var W0 = getW0(), L = getL(), pi = getPi(), lam = getLam();
      L = Math.min(L, W0 - 0.5); // Ensure W0-L > 0

      document.getElementById('val-w0').textContent = W0.toFixed(1);
      document.getElementById('val-L').textContent = L.toFixed(1);
      document.getElementById('val-pi').textContent = pi.toFixed(2);
      document.getElementById('val-lam').textContent = lam.toFixed(2);

      // 45-degree line (full insurance)
      var line45 = board.create('line', [[0,0],[1,1]], {
        strokeColor: '#aaa', strokeWidth: 1.5, dash: 2, fixed: true,
        name: '45^\\circ', withLabel: true,
        label: { fontSize: 11, position: 'rt', offset: [-20, 5] }
      });
      drawObjects.push(line45);

      // Endowment point: no insurance
      var Wg0 = W0;       // good state
      var Wb0 = W0 - L;   // bad state
      var pEndow = board.create('point', [Wg0, Wb0], {
        size: 5, color: '#C8102E', fillColor: '#C8102E', fixed: true,
        name: 'Dotação', label: { fontSize: 12, offset: [10, -12] }
      });
      drawObjects.push(pEndow);

      // Premium rate
      var premRate = (1 + lam) * pi;  // cost per unit of coverage

      // Budget line: buying q coverage costs premRate*q
      // Wg = W0 - premRate*q, Wb = W0 - L + q - premRate*q = W0 - L + q(1-premRate)
      // Eliminate q: q = (W0 - Wg)/premRate
      // Wb = W0 - L + (W0 - Wg)/premRate * (1 - premRate)
      // Slope dWb/dWg = -(1-premRate)/premRate
      var slope = -(1 - premRate) / premRate;

      var budgetLine = board.create('line', [[Wg0, Wb0], [Wg0 + 1, Wb0 + slope]], {
        strokeColor: '#1565c0', strokeWidth: 2, fixed: true,
        straightFirst: true, straightLast: true,
        name: 'Orcamento', withLabel: true,
        label: { fontSize: 11, position: 'rt', offset: [-30, 10] }
      });
      drawObjects.push(budgetLine);

      // Optimal coverage: maximize EU along budget line
      // q* found numerically
      var bestQ = 0, bestEU = -Infinity;
      var maxQ = L / (1 - premRate + 0.001);
      for (var q = 0; q <= maxQ + 0.1; q += 0.02) {
        var wg = W0 - premRate * q;
        var wb = W0 - L + q * (1 - premRate);
        if (wg < 0.01 || wb < 0.01) continue;
        var eu = EU(wg, wb);
        if (eu > bestEU) { bestEU = eu; bestQ = q; }
      }

      var optWg = W0 - premRate * bestQ;
      var optWb = W0 - L + bestQ * (1 - premRate);

      var pOpt = board.create('point', [optWg, optWb], {
        size: 5, color: '#00897b', fillColor: '#00897b', fixed: true,
        name: 'Ótimo', label: { fontSize: 12, offset: [-15, 10] }
      });
      drawObjects.push(pOpt);

      // Indifference curves
      var U0 = EU(Wg0, Wb0); // without insurance
      var Uopt = EU(optWg, optWb); // with optimal insurance

      var levels = [U0, Uopt];
      var icColors = ['#C8102E', '#00897b'];
      var icNames = ['Sem seguro', 'Seguro ótimo'];

      for (var k = 0; k < levels.length; k++) {
        var Ulev = levels[k];
        var col = icColors[k];
        var ic = board.create('curve', [
          function(Ul) { return function(t) { return t; }; }(Ulev),
          function(Ul) { return function(t) { return solveWb(t, Ul); }; }(Ulev),
          0.1, 17
        ], {
          strokeColor: col, strokeWidth: 2, numberPointsHigh: 400
        });
        drawObjects.push(ic);
      }

      // Dashed projections for optimal
      var dashOg = board.create('segment', [[optWg, 0], [optWg, optWb]], { strokeColor: '#00897b', strokeWidth: 0.8, dash: 3, fixed: true });
      var dashOb = board.create('segment', [[0, optWb], [optWg, optWb]], { strokeColor: '#00897b', strokeWidth: 0.8, dash: 3, fixed: true });
      drawObjects.push(dashOg, dashOb);

      // Info
      var coverage = bestQ;
      var premium = premRate * bestQ;
      var fairPrem = pi * L;

      document.getElementById('info').innerHTML =
        '\\(W_0 = ' + W0.toFixed(1) + '\\), \\(L = ' + L.toFixed(1) + '\\), \\(\\pi = ' + pi.toFixed(2) + '\\)<br>' +
        'Premio atuarial justo: \\(' + fairPrem.toFixed(2) + '\\)<br>' +
        'Taxa do premio: \\((1+\\lambda)\\pi = ' + premRate.toFixed(3) + '\\)<br>' +
        'Cobertura ótima \\(q^* = ' + coverage.toFixed(2) + '\\)<br>' +
        'Premio pago: \\(P = ' + premium.toFixed(2) + '\\)<br>' +
        '\\(W_{\\text{bom}} = ' + optWg.toFixed(2) + '\\), \\(W_{\\text{ruim}} = ' + optWb.toFixed(2) + '\\)<br>' +
        '<strong style="color:#C8102E">\\(E[u]\\) sem seguro: \\(' + U0.toFixed(3) + '\\)</strong><br>' +
        '<strong style="color:#00897b">\\(E[u]\\) com seguro: \\(' + Uopt.toFixed(3) + '\\)</strong>';

      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([document.getElementById('info')]);
      }
      board.update();
    }

    document.getElementById('slider-w0').addEventListener('input', update);
    document.getElementById('slider-L').addEventListener('input', update);
    document.getElementById('slider-pi').addEventListener('input', update);
    document.getElementById('slider-lam').addEventListener('input', update);

    function resetAll() {
      document.getElementById('slider-w0').value = 10;
      document.getElementById('slider-L').value = 6;
      document.getElementById('slider-pi').value = 0.3;
      document.getElementById('slider-lam').value = 0;
      update();
    }

    function toggleLabels() {
      var show = document.getElementById('chk-labels').checked;
      drawObjects.forEach(function(obj) {
        if (obj.hasLabel && obj.label) obj.label.setAttribute({ visible: show });
      });
      board.update();
    }

    update();
  </script>
</body>
</html>
