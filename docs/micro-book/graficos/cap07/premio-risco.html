<!DOCTYPE html>
<!--
  Library: JSXGraph
  Reason: Arrow-Pratt risk premium visualization with CARA/CRRA/Quadratic
  utility functions, wealth and variance sliders.
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premio de Risco de Arrow-Pratt</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-title { font-size: 1.1rem; font-weight: 700; color: #C8102E; margin-bottom: 0.5rem; text-align: center; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { width: 520px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { width: 320px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    select { width: 100%; padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 0.85rem; margin-bottom: 0.8rem; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.7; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { width: 100%; max-width: 520px; }
      .controls { width: 100%; max-width: 520px; }
    }
  </style>
</head>
<body>
  <div class="graph-title">Figura 7.2 — Prêmio de Risco de Arrow-Pratt</div>
  <div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>

      <div class="slider-group">
        <label>Tipo de utilidade:</label>
        <select id="sel-util">
          <option value="cara">CARA: \(u(W) = -e^{-aW}\)</option>
          <option value="crra">CRRA: \(u(W) = W^{1-\gamma}/(1-\gamma)\)</option>
          <option value="quad">Quadrática: \(u(W) = W - bW^2\)</option>
        </select>
      </div>

      <div class="slider-group">
        <label>Riqueza \(W\): <span class="val" id="val-w">5.00</span></label>
        <input type="range" id="slider-w" min="1" max="9" step="0.2" value="5">
      </div>

      <div class="slider-group">
        <label>Variância \(\sigma^2\): <span class="val" id="val-var">2.00</span></label>
        <input type="range" id="slider-var" min="0.5" max="6" step="0.25" value="2">
      </div>

      <div class="slider-group">
        <label>Curvatura: <span class="val" id="val-curv">0.50</span></label>
        <input type="range" id="slider-curv" min="0.05" max="1.5" step="0.05" value="0.5">
      </div>

      <div class="info-box" id="info"></div>
      <label style="font-size:0.82rem; cursor:pointer; display:block; margin-top:0.5rem;">
        <input type="checkbox" id="chk-labels" checked onchange="toggleLabels()"> Mostrar labels
      </label>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    var board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [-1.5, 14.5, 12, -1.8],
      axis: false,
      showCopyright: false,
      showNavigation: false,
      keepAspectRatio: false
    });

    board.create('axis', [[0,0],[10.5,0]], {
      ticks: { drawLabels: true, label: { fontSize: 11 } },
      name: '', withLabel: false
    });
    board.create('axis', [[0,0],[0,12]], {
      ticks: { drawLabels: true, label: { fontSize: 11, anchorX: 'right', offset: [-8, 0] } },
      name: '', withLabel: false
    });
    // Manual axis labels
    board.create('text', [11, -0.5, '\\(W\\)'], { fontSize: 14, fixed: true, anchorX: 'left', useMathJax: true });
    board.create('text', [-0.5, 12.5, '\\(u(W)\\)'], { fontSize: 14, fixed: true, anchorX: 'right', useMathJax: true });

    function getType() { return document.getElementById('sel-util').value; }
    function getW() { return parseFloat(document.getElementById('slider-w').value); }
    function getVar() { return parseFloat(document.getElementById('slider-var').value); }
    function getCurv() { return parseFloat(document.getElementById('slider-curv').value); }

    function uFunc(w) {
      var c = getCurv();
      if (w <= 0.01) w = 0.01;
      switch(getType()) {
        case 'cara': return -Math.exp(-c * w);
        case 'crra':
          if (Math.abs(c - 1) < 0.01) return Math.log(w);
          return Math.pow(w, 1 - c) / (1 - c);
        case 'quad':
          var val = w - c * w * w;
          return val;
      }
    }

    function uPrime(w) {
      var c = getCurv();
      if (w <= 0.01) w = 0.01;
      switch(getType()) {
        case 'cara': return c * Math.exp(-c * w);
        case 'crra':
          if (Math.abs(c - 1) < 0.01) return 1 / w;
          return Math.pow(w, -c);
        case 'quad': return 1 - 2 * c * w;
      }
    }

    function uDoublePrime(w) {
      var c = getCurv();
      if (w <= 0.01) w = 0.01;
      switch(getType()) {
        case 'cara': return -c * c * Math.exp(-c * w);
        case 'crra':
          if (Math.abs(c - 1) < 0.01) return -1 / (w * w);
          return -c * Math.pow(w, -c - 1);
        case 'quad': return -2 * c;
      }
    }

    function arrowPrattA(w) {
      var up = uPrime(w);
      if (Math.abs(up) < 1e-10) return Infinity;
      return -uDoublePrime(w) / up;
    }

    function arrowPrattR(w) {
      return w * arrowPrattA(w);
    }

    var drawObjects = [];

    function clearDraw() {
      for (var i = drawObjects.length - 1; i >= 0; i--) board.removeObject(drawObjects[i]);
      drawObjects = [];
    }

    function invertU(target) {
      // Numerical inversion via bisection
      var lo = 0.01, hi = 10, mid;
      for (var i = 0; i < 60; i++) {
        mid = (lo + hi) / 2;
        if (uFunc(mid) < target) lo = mid; else hi = mid;
      }
      return mid;
    }

    function update() {
      clearDraw();
      var W = getW(), sig2 = getVar(), c = getCurv();

      document.getElementById('val-w').textContent = W.toFixed(2);
      document.getElementById('val-var').textContent = sig2.toFixed(2);
      document.getElementById('val-curv').textContent = c.toFixed(2);

      // Utility curve
      var curve = board.create('functiongraph', [function(x) { return uFunc(x); }, 0.05, 10.2], {
        strokeColor: '#C8102E', strokeWidth: 2.5
      });
      drawObjects.push(curve);

      // Lottery: W +/- sigma (symmetric fair gamble)
      var sig = Math.sqrt(sig2);
      var w1 = Math.max(0.1, W - sig);
      var w2 = Math.min(10, W + sig);
      var uw1 = uFunc(w1), uw2 = uFunc(w2);
      var EuW = 0.5 * uw1 + 0.5 * uw2;
      var uW = uFunc(W);

      // Points on curve
      var p1 = board.create('point', [w1, uw1], { size: 4, color: '#1565c0', fixed: true, name: '' });
      var p2 = board.create('point', [w2, uw2], { size: 4, color: '#00897b', fixed: true, name: '' });
      drawObjects.push(p1, p2);

      // Chord
      var chord = board.create('segment', [[w1, uw1], [w2, uw2]], {
        strokeColor: '#999', strokeWidth: 1.5, dash: 2, fixed: true
      });
      drawObjects.push(chord);

      // E[u] and u(E[W])
      var pEu = board.create('point', [W, EuW], { size: 4, color: '#666', fixed: true, name: 'E[u]', label: { fontSize: 11, offset: [8, -12] } });
      var puW = board.create('point', [W, uW], { size: 4, color: '#C8102E', fixed: true, name: 'u(W)', label: { fontSize: 11, offset: [8, 15] } });
      drawObjects.push(pEu, puW);

      // CE
      var CE = invertU(EuW);
      var riskPrem = W - CE;
      var approxPrem = 0.5 * arrowPrattA(W) * sig2;

      // CE point
      if (CE > 0.05 && CE < 10.5) {
        var pCE = board.create('point', [CE, 0], { size: 3, color: '#1565c0', fixed: true, name: 'EC', label: { fontSize: 11, offset: [-5, -16] } });
        var segCE = board.create('segment', [[CE, 0], [CE, EuW]], { strokeColor: '#1565c0', strokeWidth: 1, dash: 3, fixed: true });
        drawObjects.push(pCE, segCE);
      }

      // Risk premium shading
      if (Math.abs(riskPrem) > 0.02) {
        var x1 = Math.min(CE, W), x2 = Math.max(CE, W);
        var poly = board.create('polygon', [
          [x1, 0], [x2, 0], [x2, EuW], [x1, EuW]
        ], {
          fillColor: '#C8102E', fillOpacity: 0.1,
          borders: { strokeColor: '#C8102E', strokeWidth: 1, dash: 2 },
          vertices: { visible: false }, fixed: true, name: ''
        });
        drawObjects.push(poly);
      }

      // Vertical at W
      var vW = board.create('segment', [[W, 0], [W, uW]], { strokeColor: '#aaa', strokeWidth: 1, dash: 3, fixed: true });
      drawObjects.push(vW);

      // Dashed at w1, w2
      var vw1 = board.create('segment', [[w1, 0], [w1, uw1]], { strokeColor: '#1565c0', strokeWidth: 0.8, dash: 3, fixed: true });
      var vw2 = board.create('segment', [[w2, 0], [w2, uw2]], { strokeColor: '#00897b', strokeWidth: 0.8, dash: 3, fixed: true });
      drawObjects.push(vw1, vw2);

      var Aw = arrowPrattA(W);
      var Rw = arrowPrattR(W);

      document.getElementById('info').innerHTML =
        '<strong>Função:</strong> ' + funcLabel() + '<br>' +
        '\\(W = ' + W.toFixed(2) + '\\), \\(\\sigma^2 = ' + sig2.toFixed(2) + '\\)<br>' +
        '\\(A(W) = ' + Aw.toFixed(4) + '\\)<br>' +
        '\\(R(W) = ' + Rw.toFixed(4) + '\\)<br>' +
        '\\(EC = ' + CE.toFixed(3) + '\\)<br>' +
        '<strong style="color:#C8102E">Premio exato: \\(' + riskPrem.toFixed(3) + '\\)</strong><br>' +
        '<strong style="color:#1565c0">Aprox. A-P: \\(\\tfrac{1}{2}\\sigma^2 A(W) = ' + approxPrem.toFixed(3) + '\\)</strong>';

      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([document.getElementById('info')]);
      }
      board.update();
    }

    function funcLabel() {
      var c = getCurv();
      switch(getType()) {
        case 'cara': return '\\(-e^{-' + c.toFixed(2) + 'W}\\)';
        case 'crra':
          if (Math.abs(c - 1) < 0.01) return '\\(\\ln(W)\\)';
          return '\\(\\frac{W^{' + (1-c).toFixed(2) + '}}{' + (1-c).toFixed(2) + '}\\)';
        case 'quad': return '\\(W - ' + c.toFixed(2) + 'W^2\\)';
      }
    }

    document.getElementById('sel-util').addEventListener('change', update);
    document.getElementById('slider-w').addEventListener('input', update);
    document.getElementById('slider-var').addEventListener('input', update);
    document.getElementById('slider-curv').addEventListener('input', update);

    function resetAll() {
      document.getElementById('sel-util').value = 'cara';
      document.getElementById('slider-w').value = 5;
      document.getElementById('slider-var').value = 2;
      document.getElementById('slider-curv').value = 0.5;
      update();
    }

    function toggleLabels() {
      var show = document.getElementById('chk-labels').checked;
      drawObjects.forEach(function(obj) {
        if (obj.hasLabel && obj.label) obj.label.setAttribute({ visible: show });
      });
      board.update();
    }

    update();
  </script>
</body>
</html>
