<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir senha — Microeconomia I | MPE 2026/32 | Insper</title>
<link rel="stylesheet" href="css/platform.css">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="insper-logo"><img src="assets/logo-insper.png" alt="Insper"></div>
    <h1>Redefinir senha</h1>
    <p class="subtitle">MPE 2026/32 &middot; Microeconomia I</p>

    <div class="login-error" id="msg"></div>

    <div id="state-loading" style="text-align:center;color:var(--text-muted);font-size:0.85rem;padding:1rem 0">
      Validando link de redefinição…
    </div>

    <div id="state-form" style="display:none">
      <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:1rem">
        Escolha uma nova senha. Mínimo 8 caracteres. Evite usar a senha inicial enviada no email de boas-vindas.
      </p>
      <div class="form-group">
        <label for="nova">Nova senha</label>
        <input type="password" id="nova" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="conf">Confirmar nova senha</label>
        <input type="password" id="conf" placeholder="Repita a nova senha" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" onclick="doReset()">Salvar nova senha</button>
      <div style="text-align:center;margin-top:0.8rem">
        <a href="index.html" style="color:var(--accent);font-size:0.78rem;text-decoration:underline">Voltar ao login</a>
      </div>
    </div>

    <div id="state-invalid" style="display:none;text-align:center;font-size:0.85rem;color:var(--text-muted);padding:1rem 0">
      <p style="margin-bottom:0.8rem">Este link de redefinição expirou ou é inválido.</p>
      <a href="index.html" class="btn btn-secondary" style="display:inline-block;text-decoration:none;padding:0.6rem 1rem">Voltar ao login</a>
    </div>
  </div>
</div>

<script src="js/supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Reset de senha: o Supabase devolve o usuario aqui com um hash contendo
// access_token + refresh_token + type=recovery. Com detectSessionInUrl=true,
// o SDK consome automaticamente e dispara evento PASSWORD_RECOVERY.
// Entao exigimos sessao valida de tipo 'recovery' antes de liberar o form.

var client = null;
var ready = false;

function showMsg(msg, isError) {
  var el = document.getElementById('msg');
  el.textContent = msg;
  if (isError === false) {
    el.style.background = '#D1FAE5';
    el.style.color = '#065F46';
  } else {
    el.style.background = '';
    el.style.color = '';
  }
  el.style.display = 'block';
}

function setState(name) {
  ['loading','form','invalid'].forEach(function(s){
    document.getElementById('state-'+s).style.display = (s === name) ? 'block' : 'none';
  });
}

async function init() {
  if (typeof window.SUPABASE_URL !== 'string' || !window.SUPABASE_URL) {
    setState('invalid');
    showMsg('Configuração do Supabase ausente. Contate a coordenação.');
    return;
  }
  if (typeof supabase === 'undefined' || typeof supabase.createClient !== 'function') {
    setState('invalid');
    showMsg('Não foi possível carregar o SDK. Tente recarregar a página.');
    return;
  }
  client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
  });

  // O evento PASSWORD_RECOVERY indica que o SDK consumiu o hash e abriu
  // sessao de recuperacao. Em alguns navegadores o evento chega antes do
  // DOMContentLoaded; em outros, depois. Tratamos ambos os casos.
  var liberado = false;
  function liberarForm() {
    if (liberado) return;
    liberado = true;
    ready = true;
    setState('form');
  }

  client.auth.onAuthStateChange(function(event, session) {
    if (event === 'PASSWORD_RECOVERY') liberarForm();
    else if (event === 'SIGNED_IN' && session) {
      // Alguns fluxos disparam SIGNED_IN; aceitar tambem.
      liberarForm();
    }
  });

  // Fallback: se ja ha sessao valida (ex.: usuario abriu o link, o SDK
  // processou antes do nosso listener), liberar.
  setTimeout(async function() {
    if (liberado) return;
    var res = await client.auth.getSession();
    if (res.data.session) {
      liberarForm();
    } else {
      // Sem sessao de recuperacao depois de 1.5s = link invalido/expirado.
      setState('invalid');
    }
  }, 1500);
}

async function doReset() {
  if (!ready || !client) {
    showMsg('Aguarde a validação do link e tente novamente.');
    return;
  }
  var nova = document.getElementById('nova').value;
  var conf = document.getElementById('conf').value;
  if (!nova || nova.length < 8) { showMsg('Senha precisa ter ao menos 8 caracteres.'); return; }
  if (nova !== conf) { showMsg('As senhas não conferem.'); return; }

  var btn = document.querySelector('#state-form .btn-primary');
  btn.disabled = true; btn.textContent = 'Salvando...';

  var res = await client.auth.updateUser({ password: nova });
  if (res.error) {
    showMsg('Erro ao atualizar senha: ' + (res.error.message || 'tente novamente.'));
    btn.disabled = false; btn.textContent = 'Salvar nova senha';
    return;
  }

  // Oportunidade de marcar password_changed_at no profile — tolerante
  // a ausencia da coluna (ainda nao migrada em producao).
  try {
    var sess = await client.auth.getSession();
    var uid = sess.data.session && sess.data.session.user && sess.data.session.user.id;
    if (uid) {
      var upd = await client.from('profiles')
        .update({ password_changed_at: new Date().toISOString() })
        .eq('id', uid);
      if (upd.error) {
        // Coluna ausente ou outro erro silencioso — nao bloqueia fluxo.
        console.warn('[reset-password] update password_changed_at falhou:', upd.error.message);
      }
    }
  } catch(e) {
    console.warn('[reset-password] marcacao opcional falhou:', e);
  }

  // Desloga para forcar login com a nova senha.
  try { await client.auth.signOut(); } catch(e) {}
  try { sessionStorage.removeItem('mpe_microI_session'); } catch(e) {}

  showMsg('Senha atualizada. Redirecionando para o login…', false);
  setTimeout(function(){ window.location.href = 'index.html'; }, 1500);
}

document.addEventListener('keypress', function(e){
  if (e.key === 'Enter' && ready) doReset();
});

init();
</script>
</body>
</html>
