<!DOCTYPE html>
<!--
  TMS Visualization — Interactive Graph (Chapter 3)
  Library: JSXGraph
  Function types: Cobb-Douglas, Linear, Leontief, CES
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualização da TMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 0.3rem 0.6rem; }
.graph-container { display: flex; flex-wrap: nowrap; gap: 0.8rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 420px; max-width: 520px; height: 520px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 0 280px; padding: 0.7rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .fn-selector { display: flex; gap: 0.3rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
    .fn-btn { flex: 1; min-width: 55px; padding: 0.35rem 0.2rem; border: 2px solid #C8102E; border-radius: 4px; background: #fff; color: #C8102E; font-size: 0.72rem; font-family: inherit; cursor: pointer; text-align: center; font-weight: 600; }
    .fn-btn.active { background: #C8102E; color: #fff; }
    .fn-btn:hover:not(.active) { background: rgba(200,16,46,0.08); }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.85rem; line-height: 1.8; }
    .info-box .eq { text-align: center; margin: 0.3rem 0; color: #333; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    .highlight { color: #C8102E; font-weight: 700; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { flex-basis: 100%; max-width: 100%; }
      .controls { flex-basis: 100%; max-width: 100%; }
    }
    /* anti-inflation-fix */
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Função Utilidade</h3>
      <div class="fn-selector">
        <button class="fn-btn active" data-fn="cd" onclick="setFn('cd')">Cobb-Douglas</button>
        <button class="fn-btn" data-fn="linear" onclick="setFn('linear')">Linear</button>
        <button class="fn-btn" data-fn="leontief" onclick="setFn('leontief')">Leontief</button>
        <button class="fn-btn" data-fn="ces" onclick="setFn('ces')">CES</button>
        <button class="fn-btn" data-fn="ql" onclick="setFn('ql')">Quase-linear</button>
      </div>
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>\(\alpha\): <span class="val" id="val-alpha">0.50</span></label>
        <input type="range" id="slider-alpha" min="0.1" max="2" step="0.05" value="0.5">
      </div>
      <div class="slider-group">
        <label>\(\beta\): <span class="val" id="val-beta">0.50</span></label>
        <input type="range" id="slider-beta" min="0.1" max="2" step="0.05" value="0.5">
      </div>
      <div class="slider-group" id="rho-group" style="display:none;">
        <label>\(\rho\) (CES): <span class="val" id="val-rho">-1.00</span></label>
        <input type="range" id="slider-rho" min="-5" max="0.9" step="0.1" value="-1">
      </div>
      <div class="info-box" id="info">
        <div class="eq" id="eq-func"></div>
        <div class="eq" id="eq-tms-formula"></div>
        <hr style="margin:0.5rem 0; border:none; border-top:1px solid #eee;">
        <div id="info-umg"></div>
        <div id="info-tms"></div>
        <div id="info-slope"></div>
      </div>
      <label style="font-size:0.82rem; cursor:pointer; display:block; margin-top:0.5rem;">
        <input type="checkbox" id="chk-labels" checked onchange="toggleLabels()"> Mostrar labels
      </label>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    var currentFn = 'cd';
    var board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [-2.0, 13, 12.5, -1.6],
      axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
    });

    board.create('axis', [[0,0],[11,0]], {
      ticks: { drawLabels: true, label: { fontSize: 11 } },
      name: '', withLabel: false
    });
    board.create('axis', [[0,0],[0,11]], {
      ticks: { drawLabels: true, label: { fontSize: 11, anchorX: 'right', offset: [-8, 0] } },
      name: '', withLabel: false
    });

    // Y-axis label: centered vertically, rotated 90°, bold italic
    board.create('text', [
      -2.0 * 0.55, 13 / 2,
      '<b><i>x</i><sub>2</sub></b>'
    ], { fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false });

    // X-axis label: centered horizontally, below ticks, bold italic
    board.create('text', [
      12.5 / 2, -1.6 * 0.65,
      '<b><i>x</i><sub>1</sub></b>'
    ], { fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false });

    var icCurves = [];
    var annotations = [];

    var dragPt = board.create('point', [3, 4], {
      name: 'P', size: 5, color: '#C8102E',
      strokeColor: '#C8102E', fillColor: '#C8102E',
      label: { fontSize: 13, offset: [-15, -15], anchorX: 'right', color: '#C8102E' }
    });

    function getAlpha() { return parseFloat(document.getElementById('slider-alpha').value); }
    function getBeta() { return parseFloat(document.getElementById('slider-beta').value); }
    function getRho() { return parseFloat(document.getElementById('slider-rho').value); }

    function setFn(fn) {
      currentFn = fn;
      document.querySelectorAll('.fn-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.fn === fn);
      });
      document.getElementById('rho-group').style.display = (fn === 'ces') ? '' : 'none';
      document.getElementById('slider-beta').closest('.slider-group').style.display = (fn === 'ql') ? 'none' : '';
      update();
    }

    function utilVal(x1, x2, a, b) {
      if (x1 <= 0 || x2 <= 0) return 0;
      switch (currentFn) {
        case 'cd': return Math.pow(x1, a) * Math.pow(x2, b);
        case 'linear': return a * x1 + b * x2;
        case 'leontief': return Math.min(x1 / a, x2 / b);
        case 'ces':
          var r = getRho();
          if (Math.abs(r) < 0.05) return Math.pow(x1, a/(a+b)) * Math.pow(x2, b/(a+b));
          return Math.pow(a * Math.pow(x1, r) + b * Math.pow(x2, r), 1/r);
        case 'ql':
          return a * Math.sqrt(x1) + x2;
      }
    }

    function icX2(x1, U, a, b) {
      if (x1 <= 0.01 || U <= 0) return NaN;
      switch (currentFn) {
        case 'cd': return Math.pow(U / Math.pow(x1, a), 1/b);
        case 'linear':
          var v = (U - a * x1) / b;
          return v >= 0 ? v : NaN;
        case 'leontief': return NaN;
        case 'ces':
          var r = getRho();
          if (Math.abs(r) < 0.05) {
            var wa = a/(a+b), wb = b/(a+b);
            return Math.pow(U / Math.pow(x1, wa), 1/wb);
          }
          var s = Math.pow(U, r) - a * Math.pow(x1, r);
          if (s <= 0) return NaN;
          return Math.pow(s / b, 1/r);
        case 'ql':
          var val = U - a * Math.sqrt(x1);
          return val >= 0 ? val : NaN;
      }
    }

    function tmsVal(x1, x2, a, b) {
      if (x1 <= 0.01 || x2 <= 0.01) return NaN;
      switch (currentFn) {
        case 'cd': return (a * x2) / (b * x1);
        case 'linear': return a / b;
        case 'leontief':
          var r1 = x1/a, r2 = x2/b;
          if (Math.abs(r1 - r2) < 0.15) return NaN;
          return r1 < r2 ? 9999 : 0;
        case 'ces':
          var r = getRho();
          if (Math.abs(r) < 0.05) return (a * x2) / (b * x1);
          return (a/b) * Math.pow(x1/x2, r - 1);
        case 'ql':
          return a / (2 * Math.sqrt(x1));
      }
    }

    function clearDynamic() {
      for (var i = annotations.length - 1; i >= 0; i--) board.removeObject(annotations[i]);
      annotations = [];
      for (var i = icCurves.length - 1; i >= 0; i--) board.removeObject(icCurves[i]);
      icCurves = [];
    }

    function drawAll() {
      clearDynamic();
      var a = getAlpha(), b = getBeta();
      var px = Math.max(dragPt.X(), 0.1), py = Math.max(dragPt.Y(), 0.1);

      var U0 = utilVal(px, py, a, b);
      var levels = [U0 * 0.5, U0, U0 * 1.8];
      var colors = ['#1565c0', '#C8102E', '#1565c0'];
      var widths = [1.5, 2.5, 1.5];
      var dashes = [2, 0, 2];

      for (var k = 0; k < levels.length; k++) {
        var Uk = levels[k];
        if (currentFn === 'leontief') {
          var vx = a * Uk, vy = b * Uk;
          icCurves.push(board.create('segment', [[vx, vy], [vx, 10.5]], {
            strokeColor: colors[k], strokeWidth: widths[k], dash: dashes[k]
          }));
          icCurves.push(board.create('segment', [[vx, vy], [10.5, vy]], {
            strokeColor: colors[k], strokeWidth: widths[k], dash: dashes[k]
          }));
          icCurves.push(board.create('point', [vx, vy], {
            size: 2, strokeColor: colors[k], fillColor: colors[k], fixed: true, name: '', withLabel: false
          }));
        } else {
          icCurves.push(board.create('curve', [
            function(t) { return t; },
            (function(Uval, ak, bk) {
              return function(t) {
                var v = icX2(t, Uval, ak, bk);
                return (v > 0 && v < 12) ? v : NaN;
              };
            })(Uk, a, b),
            0.05, 10.5
          ], { strokeColor: colors[k], strokeWidth: widths[k], dash: dashes[k], numberPointsHigh: 300 }));
        }
      }

      // TMS and tangent line
      var tms = tmsVal(px, py, a, b);
      var tmsFinite = isFinite(tms) && !isNaN(tms);

      if (tmsFinite && tms < 9000) {
        var slope = -tms;
        var tLine = board.create('line', [
          [px, py], [px + 1, py - tms]
        ], {
          strokeColor: '#00897b', strokeWidth: 2, dash: 3,
          straightFirst: true, straightLast: true, fixed: true,
          point1: { visible: false }, point2: { visible: false }
        });
        annotations.push(tLine);

        // Place tangent label avoiding overlap with P label
        var labelX, labelY;
        if (px > 3) {
            labelX = Math.max(0.5, px - 2.5);
            labelY = py - slope * (-2.5);
        } else {
            labelX = Math.min(10, px + 2);
            labelY = py + slope * 2;
        }
        if (labelY > 0.5 && labelY < 10) {
          annotations.push(board.create('text', [labelX, labelY, 'inclinação = −TMS'], {
            fontSize: 11, color: '#00897b', fixed: true, anchorX: 'left'
          }));
        }

        // Trade-off arrows (on the right side of the point)
        var dx1 = 1, dx2 = -tms * dx1;
        if (Math.abs(dx2) > 5) { dx1 = 3 / tms; dx2 = -3; }
        if (px + dx1 < 10 && py + dx2 > 0.3) {
          annotations.push(board.create('arrow', [[px, py], [px + dx1, py]], {
            strokeColor: '#1565c0', strokeWidth: 2, fixed: true, lastArrow: { type: 2, size: 6 }
          }));
          annotations.push(board.create('arrow', [[px + dx1, py], [px + dx1, py + dx2]], {
            strokeColor: '#C8102E', strokeWidth: 2, fixed: true, lastArrow: { type: 2, size: 6 }
          }));
          annotations.push(board.create('text', [px + dx1/2, py + 0.8, '\\(\\Delta x_1\\)'], {
            fontSize: 10, color: '#1565c0', fixed: true, anchorX: 'middle', anchorY: 'bottom', useMathJax: true
          }));
          annotations.push(board.create('text', [px + dx1 + 0.6, py + dx2/2, '\\(\\Delta x_2\\)'], {
            fontSize: 10, color: '#C8102E', fixed: true, anchorX: 'left', useMathJax: true
          }));
        }
      } else if (currentFn === 'leontief') {
        // At vertex or near it: show vertex marker
        var r1 = px/a, r2 = py/b;
        if (r1 < r2) {
          // Vertical arm: TMS → ∞
          annotations.push(board.create('line', [[px, py], [px, py+1]], {
            strokeColor: '#00897b', strokeWidth: 2, dash: 3,
            straightFirst: true, straightLast: true, fixed: true,
            point1: { visible: false }, point2: { visible: false }
          }));
        } else if (r1 > r2) {
          // Horizontal arm: TMS = 0
          annotations.push(board.create('line', [[px, py], [px+1, py]], {
            strokeColor: '#00897b', strokeWidth: 2, dash: 3,
            straightFirst: true, straightLast: true, fixed: true,
            point1: { visible: false }, point2: { visible: false }
          }));
        }
      }

      // Info panel
      updateInfoPanel(a, b, px, py, U0, tms);
    }

    function updateInfoPanel(a, b, px, py, U0, tms) {
      var funcStr, tmsFormulaStr, umgStr, tmsStr;

      switch (currentFn) {
        case 'cd':
          funcStr = '\\(u(x_1, x_2) = x_1^{' + a.toFixed(2) + '} \\cdot x_2^{' + b.toFixed(2) + '}\\)';
          tmsFormulaStr = '\\(\\text{TMS}_{12} = \\frac{\\alpha \\cdot x_2}{\\beta \\cdot x_1}\\)';
          var umg1 = a * Math.pow(px, a-1) * Math.pow(py, b);
          var umg2 = b * Math.pow(px, a) * Math.pow(py, b-1);
          umgStr = '\\(\\text{UMg}_1 = ' + umg1.toFixed(4) + '\\)<br>\\(\\text{UMg}_2 = ' + umg2.toFixed(4) + '\\)';
          tmsStr = '<span class="highlight">\\(\\text{TMS}_{12} = ' + tms.toFixed(4) + '\\)</span>';
          break;
        case 'linear':
          funcStr = '\\(u(x_1, x_2) = ' + a.toFixed(2) + ' x_1 + ' + b.toFixed(2) + ' x_2\\)';
          tmsFormulaStr = '\\(\\text{TMS}_{12} = \\frac{\\alpha}{\\beta}\\) (constante)';
          umgStr = '\\(\\text{UMg}_1 = \\alpha = ' + a.toFixed(2) + '\\)<br>\\(\\text{UMg}_2 = \\beta = ' + b.toFixed(2) + '\\)';
          tmsStr = '<span class="highlight">\\(\\text{TMS}_{12} = ' + (a/b).toFixed(4) + '\\)</span>';
          break;
        case 'leontief':
          funcStr = '\\(u(x_1, x_2) = \\min\\!\\left(\\frac{x_1}{\\alpha},\\; \\frac{x_2}{\\beta}\\right)\\)';
          var r1 = px/a, r2 = py/b;
          if (Math.abs(r1 - r2) < 0.15) {
            tmsFormulaStr = 'TMS <b>indefinida</b> no vértice';
            tmsStr = '<span class="highlight">Ponto no vértice da CI</span>';
          } else if (r1 < r2) {
            tmsFormulaStr = 'Braco vertical: \\(\\text{TMS} \\to \\infty\\)';
            tmsStr = '<span class="highlight">\\(\\text{TMS} \\to \\infty\\)</span>';
          } else {
            tmsFormulaStr = 'Braco horizontal: \\(\\text{TMS} = 0\\)';
            tmsStr = '<span class="highlight">\\(\\text{TMS} = 0\\)</span>';
          }
          umgStr = 'Vertice: \\((' + (a*U0).toFixed(2) + ',\\; ' + (b*U0).toFixed(2) + ')\\)';
          break;
        case 'ces':
          var rho = getRho();
          var sigma = 1 / (1 - rho);
          funcStr = '\\(u = (\\alpha x_1^{\\rho} + \\beta x_2^{\\rho})^{1/\\rho}\\)';
          tmsFormulaStr = '\\(\\text{TMS} = \\frac{\\alpha}{\\beta}\\left(\\frac{x_1}{x_2}\\right)^{\\rho-1}\\),&ensp;\\(\\sigma = ' + sigma.toFixed(2) + '\\)';
          var umg1c = a * Math.pow(px, rho-1) * Math.pow(U0, 1-rho);
          var umg2c = b * Math.pow(py, rho-1) * Math.pow(U0, 1-rho);
          umgStr = '\\(\\text{UMg}_1 = ' + umg1c.toFixed(4) + '\\)<br>\\(\\text{UMg}_2 = ' + umg2c.toFixed(4) + '\\)';
          tmsStr = '<span class="highlight">\\(\\text{TMS}_{12} = ' + tms.toFixed(4) + '\\)</span>';
          break;
        case 'ql':
          funcStr = '\\(u(x_1, x_2) = ' + a.toFixed(2) + '\\sqrt{x_1} + x_2\\)';
          tmsFormulaStr = '\\(\\text{TMS}_{12} = \\frac{\\alpha}{2\\sqrt{x_1}}\\) (indep. de \\(x_2\\))';
          var umg1q = a / (2 * Math.sqrt(px));
          umgStr = '\\(\\text{UMg}_1 = ' + umg1q.toFixed(4) + '\\)<br>\\(\\text{UMg}_2 = 1\\)';
          tmsStr = '<span class="highlight">\\(\\text{TMS}_{12} = ' + tms.toFixed(4) + '\\)</span>';
          break;
      }

      document.getElementById('eq-func').innerHTML = funcStr;
      document.getElementById('eq-tms-formula').innerHTML = tmsFormulaStr;
      document.getElementById('info-umg').innerHTML = umgStr;
      document.getElementById('info-tms').innerHTML = tmsStr;
      document.getElementById('info-slope').innerHTML =
        'Ponto: \\((' + px.toFixed(2) + ',\\; ' + py.toFixed(2) + ')\\)<br>Utilidade: \\(U = ' + U0.toFixed(4) + '\\)';

      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([document.getElementById('info')]);
      }
    }

    function toggleLabels() {
      var show = document.getElementById('chk-labels').checked;
      for (var i = 0; i < annotations.length; i++) {
        annotations[i].setAttribute({visible: show});
      }
      board.update();
    }

    function update() {
      document.getElementById('val-alpha').textContent = getAlpha().toFixed(2);
      document.getElementById('val-beta').textContent = getBeta().toFixed(2);
      if (currentFn === 'ces') document.getElementById('val-rho').textContent = getRho().toFixed(2);
      drawAll();
      board.update();
    }

    function resetAll() {
      document.getElementById('slider-alpha').value = 0.5;
      document.getElementById('slider-beta').value = 0.5;
      document.getElementById('slider-rho').value = -1;
      dragPt.moveTo([3, 4]);
      currentFn = 'cd';
      document.querySelectorAll('.fn-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.fn === 'cd'); });
      document.getElementById('rho-group').style.display = 'none';
      update();
    }

    ['slider-alpha', 'slider-beta', 'slider-rho'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', update);
    });
    dragPt.on('drag', function() { drawAll(); });
    update();
  </script>
</body>
</html>
