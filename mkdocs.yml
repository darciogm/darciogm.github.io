site_name: "Darcio Genicolo-Martins"
site_url: https://darciogm.github.io/
site_description: "Academic website — Darcio Genicolo-Martins, Assistant Professor of Economics at Insper"
site_author: "Darcio Genicolo-Martins"

theme:
  name: material
  font: false
  palette:
    - scheme: default
      primary: custom
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
  icon:
    logo: material/school

nav:
  - Home: index.md
  - Research:
    - Overview:
      - Working Papers: research/working-papers.md
      - Works in Progress: research/works-in-progress.md
      - Policy Papers: research/policy-papers.md
      - Media: research/media.md
    - Bitter Pills:
      - Summary: research/bitter-pills/index.md
      - Content: research/bitter-pills/paper.md
      - Results: research/bitter-pills/results.md
      - Replication: research/bitter-pills/replication.md
      - Authors: research/bitter-pills/authors.md
    - SME Public:
      - Summary: research/sme-public/index.md
      - Content: research/sme-public/paper.md
      - Results: research/sme-public/results.md
      - Replication: research/sme-public/replication.md
      - Authors: research/sme-public/autores.md
  - Teaching:
    - Insper Institute of Education and Research:
      - Intermediate Microeconomics (Micro II): teaching/intermediate-microeconomics.md
      - Microeconomics 101 for Lawyers: teaching/microeconomics-101-lawyers.md
      - Good Economics for Hard Times (DEDP - J-Pal / Insper): teaching/good-economics-hard-times.md
  - Code: code.md

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: "100%"
      height: auto
      zoomable: true
      draggable: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - footnotes
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:darciogm1@insper.edu.br
      name: Email
    - icon: fontawesome/brands/google-scholar
      link: https://scholar.google.com/citations?user=ywp2nq0AAAAJ&hl=en&oi=ao
      name: Google Scholar
    - icon: simple/orcid
      link: https://orcid.org/0000-0003-2223-6930
      name: ORCID
    - icon: fontawesome/brands/github
      link: https://github.com/darciogm
      name: GitHub
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/darcio_martins
      name: Twitter
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/darcio-genicolo-martins-a7a3b7
      name: LinkedIn

extra_css:
  - stylesheets/extra.css
