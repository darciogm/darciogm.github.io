site_name: "Darcio Genicolo-Martins"
site_url: https://darciogm.github.io/
site_description: "Academic website — Darcio Genicolo-Martins, Assistant Professor of Economics at Insper"
site_author: "Darcio Genicolo-Martins"

hooks:
  - hooks/paper_sidebar.py
  - hooks/book_version.py

theme:
  name: material
  custom_dir: overrides
  font: false
  palette:
    - scheme: default
      primary: custom
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.footer
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
  icon:
    logo: material/school
    admonition:
      idea: material/lightbulb-outline
      definition: material/book-open-variant
      theorem: material/certificate-outline
      proof: material/math-compass
      tip: material/fire
      warning: material/alert
      exercicio-resolvido: material/bullseye-arrow
      exercicio-proposto: material/pencil-outline
      example: material/flask-outline
      box-brasil: material/flag-variant
      box-mundo: material/earth
      question: material/trophy-outline
      note: material/information-outline
      info: material/information
      code: material/language-r
      pesquisa: material/microscope
      classroom: material/flask

nav:
  - Home: index.md
  - Research:
    - Overview:
      - Working Papers: research/working-papers.md
      - Works in Progress: research/works-in-progress.md
      - Policy Papers: research/policy-papers.md
      - Media: research/media.md
