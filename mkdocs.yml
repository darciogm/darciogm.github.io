site_name: "Darcio Genicolo-Martins"
site_url: https://darciogm.github.io/
site_description: "Academic website — Darcio Genicolo-Martins, Assistant Professor of Economics at Insper"
site_author: "Darcio Genicolo-Martins"

hooks:
  - hooks/paper_sidebar.py
  - hooks/book_version.py

theme:
  name: material
  custom_dir: overrides
  font: false
  palette:
    - scheme: default
      primary: custom
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - navigation.indexes
    - navigation.footer
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
  icon:
    logo: material/school

nav:
  - Home: index.md
  - Research:
    - Overview:
      - Working Papers: research/working-papers.md
      - Works in Progress: research/works-in-progress.md
      - Policy Papers: research/policy-papers.md
      - Media: research/media.md
  - Teaching:
    - Insper Institute of Education and Research:
      - Intermediate Microeconomics (Micro II): teaching/intermediate-microeconomics.md
      - Microeconomics 101 for Lawyers: teaching/microeconomics-101-lawyers.md
      - Good Economics for Hard Times (DEDP - J-Pal / Insper): teaching/good-economics-hard-times.md
  - Micro Book:
    - micro-book/index.md
    - Fundamentos:
      - micro-book/fundamentos/index.md
      - "Cap. 1 — Todos os Modelos Estão Errados": micro-book/cap01/index.md
      - "Cap. 2 — O Manual de Sobrevivência Matemática": micro-book/cap02/index.md
      - "Cap. 3 — Mais É Melhor — Será?": micro-book/cap03/index.md
      - "Cap. 4 — Você Quer Tudo. Mas Não Pode.": micro-book/cap04/index.md
      - "Cap. 5 — Slutsky no Supermercado": micro-book/cap05/index.md
      - "Cap. 6 — Substitutos, Complementos e Relações Complicadas": micro-book/cap06/index.md
    - Mercados:
      - micro-book/mercados/index.md
      - "Cap. 7 — O Preço do Talvez": micro-book/cap07/index.md
      - "Cap. 8 — Nem Tão Racionais Assim": micro-book/cap08/index.md
      - "Cap. 9 — Nash no Bar":
        - "9a — Jogos Estáticos": micro-book/cap09a/index.md
        - "9b — Jogos Dinâmicos": micro-book/cap09b/index.md
        - "9c — Informação Incompleta": micro-book/cap09c/index.md
        - "9d — Sinais e Contratos": micro-book/cap09d/index.md
      - "Cap. 10 — Mais Mãos, Mais Máquinas — Mais Produto?": micro-book/cap10/index.md
      - "Cap. 11 — Por Que Nada É de Graça": micro-book/cap11/index.md
      - "Cap. 12 — A Firma Nua": micro-book/cap12/index.md
      - "Cap. 13 — O Leiloeiro que Ninguém Vê": micro-book/cap13/index.md
      - "Cap. 14 — Equilíbrio Geral": micro-book/cap14/index.md
    - Poder & Insumos:
      - micro-book/poder/index.md
      - "Cap. 15 — Sem Concorrente, Sem Piedade": micro-book/cap15/index.md
      - "Cap. 16 — Quando Gigantes Competem": micro-book/cap16/index.md
      - "Cap. 17 — Economia do Trabalho": micro-book/cap17/index.md
      - "Cap. 18 — A Paciência Tem Preço": micro-book/cap18/index.md
    - Fronteiras:
      - micro-book/fronteiras/index.md
      - "Cap. 19 — Limões, Sinais e Contratos": micro-book/cap19/index.md
      - "Cap. 20 — Fumaça, Caronas e Tragédias": micro-book/cap20/index.md
    - Referência:
      - micro-book/referencia/index.md
      - Notação: micro-book/notacao.md
      - Glossário: micro-book/glossario.md
      - Referências: micro-book/referencias.md
      - Soluções Exercícios:
        - micro-book/solucoes/index.md
        - "Cap. 1": micro-book/solucoes/cap01.md
        - "Cap. 2": micro-book/solucoes/cap02.md
        - "Cap. 3": micro-book/solucoes/cap03.md
        - "Cap. 4": micro-book/solucoes/cap04.md
        - "Cap. 5": micro-book/solucoes/cap05.md
        - "Cap. 6": micro-book/solucoes/cap06.md
        - "Cap. 7": micro-book/solucoes/cap07.md
        - "Cap. 8": micro-book/solucoes/cap08.md
        - "Cap. 9a": micro-book/solucoes/cap09a.md
        - "Cap. 9b": micro-book/solucoes/cap09b.md
        - "Cap. 9c": micro-book/solucoes/cap09c.md
        - "Cap. 9d": micro-book/solucoes/cap09d.md
        - "Cap. 10": micro-book/solucoes/cap10.md
        - "Cap. 11": micro-book/solucoes/cap11.md
        - "Cap. 12": micro-book/solucoes/cap12.md
        - "Cap. 13": micro-book/solucoes/cap13.md
        - "Cap. 14": micro-book/solucoes/cap14.md
        - "Cap. 15": micro-book/solucoes/cap15.md
        - "Cap. 16": micro-book/solucoes/cap16.md
        - "Cap. 17": micro-book/solucoes/cap17.md
        - "Cap. 18": micro-book/solucoes/cap18.md
        - "Cap. 19": micro-book/solucoes/cap19.md
        - "Cap. 20": micro-book/solucoes/cap20.md

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: "100%"
      height: auto
      zoomable: true
      draggable: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - footnotes
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/iframe-resize.js

