site_name: "Darcio Genicolo-Martins"
site_url: https://darciogm.github.io/
site_description: "Academic website — Darcio Genicolo-Martins, Assistant Professor of Economics at Insper"
site_author: "Darcio Genicolo-Martins"

hooks:
  - hooks/paper_sidebar.py

theme:
  name: material
  custom_dir: overrides
  font: false
  palette:
    - scheme: default
      primary: custom
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - navigation.indexes
    - navigation.footer
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
  icon:
    logo: material/school

nav:
  - Home: index.md
  - Research:
    - Overview:
      - Working Papers: research/working-papers.md
      - Works in Progress: research/works-in-progress.md
      - Policy Papers: research/policy-papers.md
      - Media: research/media.md
  - Teaching:
    - Insper Institute of Education and Research:
      - Intermediate Microeconomics (Micro II): teaching/intermediate-microeconomics.md
      - Microeconomics 101 for Lawyers: teaching/microeconomics-101-lawyers.md
      - Good Economics for Hard Times (DEDP - J-Pal / Insper): teaching/good-economics-hard-times.md
  - Micro Book:
    - micro-book/index.md
    - Fundamentos:
      - micro-book/fundamentos/index.md
      - "Parte I — Introdução":
        - "Cap. 1 — Modelos Econômicos": micro-book/cap01/index.md
        - "Cap. 2 — Ferramentas Matemáticas": micro-book/cap02/index.md
      - "Parte II — Escolha e Demanda":
        - "Cap. 3 — Por Que Você Compra o Que Compra": micro-book/cap03/index.md
        - "Cap. 4 — O Consumidor Racional": micro-book/cap04/index.md
        - "Cap. 5 — Quando o Preço Muda": micro-book/cap05/index.md
        - "Cap. 6 — Bens que Amamos, Bens que Odiamos": micro-book/cap06/index.md
    - Mercados:
      - micro-book/mercados/index.md
      - "Parte III — Incerteza e Estratégia":
        - "Cap. 7 — Decidindo no Escuro": micro-book/cap07/index.md
        - "Cap. 8 — Teoria dos Jogos": micro-book/cap08/index.md
      - "Parte IV — Produção e Oferta":
        - "Cap. 9 — A Alquimia da Produção": micro-book/cap09/index.md
        - "Cap. 10 — Anatomia dos Custos": micro-book/cap10/index.md
        - "Cap. 11 — Lucro, Receita e Sobrevivência": micro-book/cap11/index.md
      - "Parte V — Mercados Competitivos":
        - "Cap. 12 — O Mercado em Ação": micro-book/cap12/index.md
        - "Cap. 13 — Equilíbrio Geral": micro-book/cap13/index.md
    - Poder & Insumos:
      - micro-book/poder/index.md
      - "Parte VI — Poder de Mercado":
        - "Cap. 14 — Monopólio": micro-book/cap14/index.md
        - "Cap. 15 — Oligopólios": micro-book/cap15/index.md
      - "Parte VII — Mercados de Insumos":
        - "Cap. 16 — Economia do Trabalho": micro-book/cap16/index.md
        - "Cap. 17 — Capital, Juros e o Valor do Amanhã": micro-book/cap17/index.md
    - Fronteiras:
      - micro-book/fronteiras/index.md
      - "Parte VIII — Falhas de Mercado":
        - "Cap. 18 — Informação Assimétrica": micro-book/cap18/index.md
        - "Cap. 19 — Externalidades e Bens Públicos": micro-book/cap19/index.md
    - Referência:
      - micro-book/referencia/index.md
      - Notação: micro-book/notacao.md
      - Glossário: micro-book/glossario.md
      - Referências: micro-book/referencias.md

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: "100%"
      height: auto
      zoomable: true
      draggable: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - footnotes
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:darciogm1@insper.edu.br
      name: Email
    - icon: fontawesome/brands/google-scholar
      link: https://scholar.google.com/citations?user=ywp2nq0AAAAJ&hl=en&oi=ao
      name: Google Scholar
    - icon: simple/orcid
      link: https://orcid.org/0000-0003-2223-6930
      name: ORCID
    - icon: fontawesome/brands/github
      link: https://github.com/darciogm
      name: GitHub
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/darcio_martins
      name: Twitter
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/darcio-genicolo-martins-a7a3b7
      name: LinkedIn

extra_css:
  - stylesheets/extra.css
  - stylesheets/micro-book.css
