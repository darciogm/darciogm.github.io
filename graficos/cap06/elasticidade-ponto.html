<!DOCTYPE html>
<!--
  Elasticidade-preço ao longo de uma curva de demanda linear
  Library: JSXGraph
  Reason: Slider de preço mostra como a elasticidade varia de 0 a -∞
          ao longo da curva, e o ponto unitário onde a receita é máxima.
  Chapter 6 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elasticidade ao Longo da Demanda Linear</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 440px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 290px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 3px; display: inline-block; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Elasticidade na Demanda Linear</h3>

    <div class="slider-group">
      <label>Preço \(p\): <span class="val" id="val-p">5.00</span></label>
      <input type="range" id="slider-p" min="0.5" max="9.5" step="0.1" value="5">
    </div>
    <div class="slider-group">
      <label>Intercepto \(a\): <span class="val" id="val-a">10.00</span></label>
      <input type="range" id="slider-a" min="5" max="20" step="0.5" value="10">
    </div>
    <div class="slider-group">
      <label>Inclinação \(b\): <span class="val" id="val-b">1.00</span></label>
      <input type="range" id="slider-b" min="0.2" max="3" step="0.1" value="1">
    </div>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> Demanda \(Q = a - bp\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#1565c0;"></span> Receita \(R = p \cdot Q\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#00897b;"></span> \(|\varepsilon| = 1\) (receita máxima)</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // Demand: Q = a - b*p (inverse: p = a/b - Q/b)
  // Elasticity: eps = dQ/dp * p/Q = -b * p / (a - b*p)
  // Revenue: R = p * Q = p*(a - b*p) = a*p - b*p^2
  // Max revenue at p = a/(2b), where |eps| = 1

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-1, 12, 22, -3],
    axis: false,
    showCopyright: false,
    showNavigation: false,
    keepaspectratio: false
  });

  board.create('axis', [[0,0],[20,0]], {
    ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 5 },
    name: '', withLabel: false
  });
  board.create('axis', [[0,0],[0,11]], {
    ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 2 },
    name: '', withLabel: false
  });

  board.create('text', [-0.8, 5.5, '<b><i>p</i></b>'], {
    fontSize: 14, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
  });
  board.create('text', [11, -1.5, '<b><i>Q</i></b>'], {
    fontSize: 14, fixed: true, anchorX: 'middle', highlight: false
  });

  function getState() {
    return {
      p: parseFloat(document.getElementById('slider-p').value),
      a: parseFloat(document.getElementById('slider-a').value),
      b: parseFloat(document.getElementById('slider-b').value)
    };
  }

  // Inverse demand: p = a/b - Q/b
  board.create('functiongraph', [
    function(Q) {
      var s = getState();
      return s.a/s.b - Q/s.b;
    }, 0, function() { return getState().a; }
  ], { strokeColor: '#C8102E', strokeWidth: 2.5 });

  // Revenue curve (scaled): R = p*Q plotted on secondary implicit axis
  // We plot R/Rmax * (a/b) so it fits on the same chart
  // Actually let's draw it differently — on the Q axis, revenue at each Q
  // R(Q) = (a/b - Q/b)*Q, max at Q = a/2
  // Let's scale: plot R/(a^2/(4b)) * (a/(2b)) so the peak aligns with midpoint price

  // Midpoint line where |eps| = 1
  board.create('segment', [
    function() { var s = getState(); return [s.a/2, 0]; },
    function() { var s = getState(); return [s.a/2, s.a/(2*s.b)]; }
  ], { strokeColor: '#00897b', strokeWidth: 1.5, dash: 3 });

  board.create('segment', [
    function() { var s = getState(); return [0, s.a/(2*s.b)]; },
    function() { var s = getState(); return [s.a/2, s.a/(2*s.b)]; }
  ], { strokeColor: '#00897b', strokeWidth: 1.5, dash: 3 });

  // Current point on demand
  var ptCurrent = board.create('point', [
    function() { var s = getState(); return s.a - s.b*s.p; },
    function() { return getState().p; }
  ], { size: 6, fillColor: '#C8102E', strokeColor: '#C8102E', name: '', fixed: true });

  // Midpoint
  board.create('point', [
    function() { return getState().a/2; },
    function() { var s = getState(); return s.a/(2*s.b); }
  ], { size: 4, fillColor: '#00897b', strokeColor: '#00897b', name: '', fixed: true });

  // Revenue rectangle (shaded)
  board.create('polygon', [
    [0, 0],
    function() { var s = getState(); return [s.a - s.b*s.p, 0]; },
    function() { var s = getState(); return [s.a - s.b*s.p, s.p]; },
    function() { var s = getState(); return [0, s.p]; }
  ], {
    fillColor: '#1565c0', fillOpacity: 0.12,
    borders: { strokeColor: '#1565c0', strokeWidth: 1, dash: 2 },
    vertices: { visible: false }
  });

  // Labels for elastic/inelastic regions
  board.create('text', [
    function() { return getState().a * 0.15; },
    function() { var s = getState(); return s.a/(2*s.b) + 0.8; },
    '<span style="color:#C8102E;font-size:11px;">|ε| > 1<br>elástica</span>'
  ], { fixed: true, anchorX: 'middle' });

  board.create('text', [
    function() { return getState().a * 0.85; },
    function() { return 0.8; },
    '<span style="color:#C8102E;font-size:11px;">|ε| < 1<br>inelástica</span>'
  ], { fixed: true, anchorX: 'middle' });

  board.create('text', [
    function() { return getState().a/2 + 1; },
    function() { var s = getState(); return s.a/(2*s.b) + 0.5; },
    '<span style="color:#00897b;font-size:10px;">|ε| = 1</span>'
  ], { fixed: true });

  function update() {
    var s = getState();
    document.getElementById('val-p').textContent = s.p.toFixed(2);
    document.getElementById('val-a').textContent = s.a.toFixed(2);
    document.getElementById('val-b').textContent = s.b.toFixed(2);

    // Clamp price
    var pMax = (s.a/s.b) - 0.01;
    if (s.p > pMax) { s.p = pMax; document.getElementById('slider-p').value = s.p; }

    var Q = s.a - s.b * s.p;
    var eps = -s.b * s.p / Q;
    var R = s.p * Q;
    var Rmax = s.a * s.a / (4 * s.b);
    var pUnit = s.a / (2 * s.b);

    var html = 'Demanda: \\(Q = ' + s.a.toFixed(0) + ' - ' + s.b.toFixed(1) + 'p = ' + Q.toFixed(1) + '\\)<br>';
    html += 'Elasticidade: \\(\\varepsilon = ' + eps.toFixed(2) + '\\)<br>';
    html += '<span style="color:#1565c0;">Receita: \\(R = ' + R.toFixed(1) + '\\)</span>';
    html += ' (máx: ' + Rmax.toFixed(1) + ' em \\(p = ' + pUnit.toFixed(1) + '\\))<br>';

    if (Math.abs(eps) > 1.01) {
      html += '<span style="color:#C8102E;">Região <strong>elástica</strong>: ↑p → ↓R</span>';
    } else if (Math.abs(eps) < 0.99) {
      html += '<span style="color:#C8102E;">Região <strong>inelástica</strong>: ↑p → ↑R</span>';
    } else {
      html += '<span style="color:#00897b;"><strong>Elasticidade unitária!</strong> Receita máxima.</span>';
    }

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-p').value = 5;
    document.getElementById('slider-a').value = 10;
    document.getElementById('slider-b').value = 1;
    update();
  }

  ['slider-p','slider-a','slider-b'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });

  update();
</script>
</body>
</html>
