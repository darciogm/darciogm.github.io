<!DOCTYPE html>
<!--
  Elasticidade-Preço Cruzada — Substitutos vs Complementos
  Library: JSXGraph
  Reason: Slider de preço cruzado mostra deslocamento da demanda e sinal da elasticidade.
  Chapter 6 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elasticidade Cruzada</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 290px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 3px; display: inline-block; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Elasticidade Cruzada</h3>

    <div class="slider-group">
      <label>Preço do bem 2 (\(p_2\)): <span class="val" id="val-p2">4.00</span></label>
      <input type="range" id="slider-p2" min="1" max="8" step="0.1" value="4">
    </div>
    <div class="slider-group">
      <label>Grau de relação (\(\gamma\)): <span class="val" id="val-gamma">0.50</span></label>
      <input type="range" id="slider-gamma" min="-1" max="1" step="0.05" value="0.5">
    </div>

    <p style="font-size:0.78rem; color:#666; margin-top:0.5rem;">
      \(\gamma > 0\): substitutos | \(\gamma < 0\): complementos | \(\gamma = 0\): independentes
    </p>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#888;"></span> Demanda original (\(p_2 = 4\))</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> Demanda deslocada</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // Demand for good 1: Q1 = 10 - p1 + gamma*(p2 - 4)
  // When p2 = 4 (baseline), Q1 = 10 - p1
  // gamma > 0: substitutes (p2 up -> Q1 up -> demand shifts right)
  // gamma < 0: complements (p2 up -> Q1 down -> demand shifts left)

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-1, 14, 18, -1],
    axis: false,
    showCopyright: false,
    showNavigation: false,
    keepaspectratio: false
  });

  board.create('axis', [[0,0],[16,0]], {
    ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 5 },
    name: '', withLabel: false
  });
  board.create('axis', [[0,0],[0,13]], {
    ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 2 },
    name: '', withLabel: false
  });

  board.create('text', [-0.8, 6.5, '<b>\\(p_1\\)</b>'], {
    fontSize: 13, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
  });
  board.create('text', [9, -0.7, '<b>\\(Q_1\\)</b>'], {
    fontSize: 13, fixed: true, anchorX: 'middle', highlight: false
  });

  // Baseline demand (p2=4): inverse p1 = 10 - Q1
  board.create('functiongraph', [
    function(Q) { return 10 - Q; }, 0, 10
  ], { strokeColor: '#888', strokeWidth: 2, dash: 3 });

  // Current demand: p1 = (10 + gamma*(p2-4)) - Q1
  board.create('functiongraph', [
    function(Q) {
      var g = parseFloat(document.getElementById('slider-gamma').value);
      var p2 = parseFloat(document.getElementById('slider-p2').value);
      return (10 + g*(p2-4)) - Q;
    }, 0, function() {
      var g = parseFloat(document.getElementById('slider-gamma').value);
      var p2 = parseFloat(document.getElementById('slider-p2').value);
      return Math.max(0, 10 + g*(p2-4));
    }
  ], { strokeColor: '#C8102E', strokeWidth: 2.5 });

  // Arrow showing shift
  board.create('arrow', [
    function() {
      var g = parseFloat(document.getElementById('slider-gamma').value);
      var p2 = parseFloat(document.getElementById('slider-p2').value);
      var shift = g * (p2 - 4);
      if (Math.abs(shift) < 0.1) return [5, 5.1];
      return [5, 5]; // on baseline at Q1=5, p=5
    },
    function() {
      var g = parseFloat(document.getElementById('slider-gamma').value);
      var p2 = parseFloat(document.getElementById('slider-p2').value);
      var shift = g * (p2 - 4);
      if (Math.abs(shift) < 0.1) return [5, 5.1];
      return [5 + shift, 5]; // shifted
    }
  ], { strokeColor: '#C8102E', strokeWidth: 2.5, lastArrow: { type: 2, size: 6 } });

  board.create('text', [10.5, function() { return 10 - 10; }, '\\(D_0\\)'], {
    fontSize: 11, color: '#888', fixed: true, offset: [5, 5]
  });

  board.create('text', [
    function() { var g = parseFloat(document.getElementById('slider-gamma').value);
                 var p2 = parseFloat(document.getElementById('slider-p2').value);
                 return Math.max(0, 10 + g*(p2-4)) + 0.5; },
    0.3, '\\(D_1\\)'
  ], { fontSize: 11, color: '#C8102E', fixed: true });

  function update() {
    var p2 = parseFloat(document.getElementById('slider-p2').value);
    var gamma = parseFloat(document.getElementById('slider-gamma').value);
    document.getElementById('val-p2').textContent = p2.toFixed(2);
    document.getElementById('val-gamma').textContent = gamma.toFixed(2);

    var shift = gamma * (p2 - 4);
    // At Q=5 baseline, cross elasticity:
    // eps_cross = dQ1/dp2 * p2/Q1 = gamma * p2 / (10 - p1 + gamma*(p2-4))
    // At p1 = 5: Q1_baseline = 5, Q1_new = 5 + shift
    var Q1new = 5 + shift;
    var epsCross = gamma * p2 / Q1new;

    var relation;
    if (gamma > 0.01) relation = '<span style="color:#C8102E;">Substitutos</span>';
    else if (gamma < -0.01) relation = '<span style="color:#1565c0;">Complementos</span>';
    else relation = 'Independentes';

    var html = 'Relação: <strong>' + relation + '</strong><br>';
    html += '\\(\\Delta p_2 = ' + (p2-4).toFixed(1) + '\\) → Deslocamento: \\(' + shift.toFixed(2) + '\\)<br>';
    html += '\\(\\varepsilon_{1,2} = \\frac{\\partial Q_1}{\\partial p_2} \\cdot \\frac{p_2}{Q_1} = ' + epsCross.toFixed(2) + '\\)<br>';
    if (shift > 0) {
      html += 'Demanda por bem 1 <strong>aumenta</strong> → ';
      html += 'preço do substituto subiu';
    } else if (shift < 0) {
      html += 'Demanda por bem 1 <strong>cai</strong> → ';
      html += 'preço do complemento subiu';
    } else {
      html += 'Sem deslocamento (\\(p_2\\) no nível base ou \\(\\gamma = 0\\))';
    }

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-p2').value = 4;
    document.getElementById('slider-gamma').value = 0.5;
    update();
  }

  document.getElementById('slider-p2').addEventListener('input', update);
  document.getElementById('slider-gamma').addEventListener('input', update);

  update();
</script>
</body>
</html>
