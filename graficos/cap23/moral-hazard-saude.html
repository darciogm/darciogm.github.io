<!DOCTYPE html>
<!--
  Risco Moral em Saúde — Copagamento e demanda por cuidados
  Library: JSXGraph
  Reason: Slider de coparticipação mostra como o preço efetivo ao paciente
          afeta a utilização e o peso morto do seguro.
  Chapter 23 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risco Moral em Saúde</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(','\\)']] }, options: { enableMenu: false } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 3px; display: inline-block; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Risco Moral em Saúde</h3>

    <div class="slider-group">
      <label>Coparticipação \(r\): <span class="val" id="val-r">0.20</span></label>
      <input type="range" id="slider-r" min="0" max="1" step="0.05" value="0.20">
    </div>
    <div class="slider-group">
      <label>Custo por consulta \(c\): <span class="val" id="val-c">100</span></label>
      <input type="range" id="slider-c" min="50" max="300" step="10" value="100">
    </div>

    <p style="font-size:0.78rem; color:#666; margin-top:0.3rem;">
      Paciente paga \(r \times c\); plano paga \((1-r) \times c\).<br>
      \(r = 0\): cobertura total. \(r = 1\): sem seguro.
    </p>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> Demanda por cuidados</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#333; height:1px; border-top:2px dashed #333;"></span> Custo marginal \(c\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#1565c0;"></span> Preço efetivo \(r \cdot c\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#ff9800; opacity:0.3; height:10px;"></span> Peso morto do risco moral</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // Demand for care: Q = 20 - 0.05*p (p = out-of-pocket price)
  // Efficient: p = c, Q* = 20 - 0.05*c
  // With insurance: p_eff = r*c, Q_ins = 20 - 0.05*r*c
  // Moral hazard: Q_ins > Q* when r < 1
  // DWL = 0.5 * (c - r*c) * (Q_ins - Q*) = 0.5 * c*(1-r) * 0.05*c*(1-r) = 0.025*c^2*(1-r)^2

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-2, 350, 22, -30],
    axis: false, showCopyright: false, showNavigation: false
  });

  board.create('axis', [[0,0],[20,0]], {
    ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 5 }
  });
  board.create('axis', [[0,0],[0,330]], {
    ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 50 }
  });
  board.create('text', [-1.5, 165, '<b>\\(p\\)</b>'], { fontSize: 13, fixed: true, anchorX: 'middle', rotate: 90 });
  board.create('text', [10, -20, '<b>Consultas/ano</b>'], { fontSize: 11, fixed: true, anchorX: 'middle' });

  function getS() {
    return {
      r: parseFloat(document.getElementById('slider-r').value),
      c: parseFloat(document.getElementById('slider-c').value)
    };
  }

  // Demand: inverse p = 400 - 20*Q => Q = 20 - p/20
  board.create('functiongraph', [function(Q) { return 400 - 20*Q; }, 0, 20], {
    strokeColor: '#C8102E', strokeWidth: 2.5
  });

  // MC line
  board.create('functiongraph', [function(Q) { return getS().c; }, 0, 20], {
    strokeColor: '#333', strokeWidth: 1.5, dash: 3
  });

  // Effective price line
  board.create('functiongraph', [function(Q) { var s = getS(); return s.r * s.c; }, 0, 20], {
    strokeColor: '#1565c0', strokeWidth: 2
  });

  // DWL triangle
  board.create('polygon', [
    function() { var s = getS(); var Qeff = 20 - s.c/20; return [Qeff, s.c]; },
    function() { var s = getS(); var Qins = 20 - s.r*s.c/20; return [Qins, s.c]; },
    function() { var s = getS(); var Qins = 20 - s.r*s.c/20; return [Qins, s.r*s.c]; }
  ], {
    fillColor: '#ff9800', fillOpacity: 0.25,
    borders: { strokeColor: '#ff9800', strokeWidth: 1 },
    vertices: { visible: false }
  });

  // Efficient point
  board.create('point', [
    function() { return 20 - getS().c/20; },
    function() { return getS().c; }
  ], { size: 5, fillColor: '#00897b', strokeColor: '#00897b', name: '', fixed: true });

  // Insured point
  board.create('point', [
    function() { var s = getS(); return 20 - s.r*s.c/20; },
    function() { var s = getS(); return s.r * s.c; }
  ], { size: 5, fillColor: '#1565c0', strokeColor: '#1565c0', name: '', fixed: true });

  // Labels
  board.create('text', [20.5, function() { return getS().c; }, '\\(c\\)'], { fontSize: 10, color: '#333', fixed: true });
  board.create('text', [20.5, function() { return getS().r * getS().c; }, '\\(rc\\)'], { fontSize: 10, color: '#1565c0', fixed: true });

  function update() {
    var s = getS();
    document.getElementById('val-r').textContent = s.r.toFixed(2);
    document.getElementById('val-c').textContent = s.c.toFixed(0);

    var Qeff = 20 - s.c / 20;
    var Qins = 20 - s.r * s.c / 20;
    var excess = Qins - Qeff;
    var dwl = 0.5 * (s.c - s.r * s.c) * excess;
    var costPlano = (1 - s.r) * s.c * Qins;

    var html = 'Preço efetivo: \\(r \\cdot c = ' + (s.r * s.c).toFixed(0) + '\\)<br>';
    html += 'Uso eficiente: \\(Q^* = ' + Qeff.toFixed(1) + '\\) consultas<br>';
    html += 'Uso com seguro: \\(Q^{ins} = ' + Qins.toFixed(1) + '\\) consultas<br>';
    html += '<span style="color:#C8102E;">Excesso (moral hazard): \\(+' + excess.toFixed(1) + '\\) consultas</span><br>';
    html += '<span style="color:#ff9800;">Peso morto: \\(R\\$ ' + dwl.toFixed(0) + '\\)</span><br>';

    if (s.r === 0) {
      html += '<em>Cobertura total: risco moral máximo!</em>';
    } else if (s.r === 1) {
      html += '<em>Sem seguro: zero moral hazard, mas zero proteção.</em>';
    } else {
      html += '<em>Copagamento equilibra proteção e incentivos.</em>';
    }

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-r').value = 0.20;
    document.getElementById('slider-c').value = 100;
    update();
  }

  ['slider-r','slider-c'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
