<!DOCTYPE html>
<!--
  Seleção Adversa em Seguros de Saúde — Rothschild-Stiglitz
  Library: JSXGraph
  Reason: Sliders para riscos e custos mostram equilíbrio separador
          e por que seguro completo é impossível com informação assimétrica.
  Chapter 23 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seleção Adversa em Seguros de Saúde</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(','\\)']] }, options: { enableMenu: false } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 3px; display: inline-block; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Seleção Adversa em Saúde</h3>

    <div class="slider-group">
      <label>Prob. doença (alto risco) \(\pi_H\): <span class="val" id="val-pH">0.60</span></label>
      <input type="range" id="slider-pH" min="0.2" max="0.9" step="0.05" value="0.60">
    </div>
    <div class="slider-group">
      <label>Prob. doença (baixo risco) \(\pi_L\): <span class="val" id="val-pL">0.15</span></label>
      <input type="range" id="slider-pL" min="0.05" max="0.5" step="0.05" value="0.15">
    </div>
    <div class="slider-group">
      <label>Fração alto risco \(\lambda\): <span class="val" id="val-lam">0.30</span></label>
      <input type="range" id="slider-lam" min="0.1" max="0.9" step="0.05" value="0.30">
    </div>

    <p style="font-size:0.78rem; color:#666; margin-top:0.3rem;">
      Riqueza \(W=100\), perda \(L=60\).<br>
      Seguradora não observa o tipo do indivíduo.
    </p>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> Lucro zero alto risco</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#1565c0;"></span> Lucro zero baixo risco</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#ff9800; height:1px; border-top:2px dashed #ff9800;"></span> Lucro zero pooling</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#333; height:1px; border-top:1px dashed #333;"></span> Linha de 45° (seguro completo)</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // Rothschild-Stiglitz in (W_good, W_bad) space
  // W = 100, L = 60
  // No insurance: (100, 40)
  // Fair odds line type i: slope = -(1-πi)/πi through endowment
  // Full insurance: 45° line

  var W = 100, L = 60;

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [25, 110, 110, 25],
    axis: false, showCopyright: false, showNavigation: false
  });

  board.create('axis', [[30,30],[105,30]], {
    ticks: { drawLabels: true, label: { fontSize: 9 }, minorTicks: 0, ticksDistance: 10 }
  });
  board.create('axis', [[30,30],[30,105]], {
    ticks: { drawLabels: true, label: { fontSize: 9, anchorX: 'right', offset: [-6, 0] }, minorTicks: 0, ticksDistance: 10 }
  });
  board.create('text', [27, 67, '<b>\\(W_{\\text{doente}}\\)</b>'], { fontSize: 10, fixed: true, anchorX: 'middle', rotate: 90 });
  board.create('text', [67, 27, '<b>\\(W_{\\text{saudável}}\\)</b>'], { fontSize: 10, fixed: true, anchorX: 'middle' });

  // 45° line (full insurance)
  board.create('line', [[30,30],[100,100]], {
    strokeColor: '#333', strokeWidth: 1, dash: 3,
    straightFirst: false, straightLast: true,
    point1: { visible: false }, point2: { visible: false }
  });

  function getS() {
    return {
      piH: parseFloat(document.getElementById('slider-pH').value),
      piL: parseFloat(document.getElementById('slider-pL').value),
      lam: parseFloat(document.getElementById('slider-lam').value)
    };
  }

  // Endowment point (W, W-L) = (100, 40)
  board.create('point', [W, W - L], {
    size: 6, fillColor: '#333', strokeColor: '#333', name: 'E', fixed: true,
    label: { fontSize: 10, offset: [5, -10] }
  });

  // Fair odds line for high risk: through E with slope -(1-πH)/πH
  board.create('line', [
    [W, W - L],
    function() {
      var s = getS();
      return [W - 10, W - L + 10 * (1 - s.piH) / s.piH];
    }
  ], { strokeColor: '#C8102E', strokeWidth: 2, straightFirst: true, straightLast: true, point1: { visible: false }, point2: { visible: false } });

  // Fair odds line for low risk
  board.create('line', [
    [W, W - L],
    function() {
      var s = getS();
      return [W - 10, W - L + 10 * (1 - s.piL) / s.piL];
    }
  ], { strokeColor: '#1565c0', strokeWidth: 2, straightFirst: true, straightLast: true, point1: { visible: false }, point2: { visible: false } });

  // Pooling fair odds line
  board.create('line', [
    [W, W - L],
    function() {
      var s = getS();
      var piP = s.lam * s.piH + (1 - s.lam) * s.piL;
      return [W - 10, W - L + 10 * (1 - piP) / piP];
    }
  ], { strokeColor: '#ff9800', strokeWidth: 1.5, dash: 2, straightFirst: true, straightLast: true, point1: { visible: false }, point2: { visible: false } });

  // Full insurance points on 45° line
  // High risk full insurance: W - πH*L on both axes? No.
  // Premium = πi * coverage. Full coverage: premium = πi * L.
  // After: W_good = W - premium = W - πi*L, W_bad = W - L - premium + coverage = W - πi*L
  board.create('point', [
    function() { return W - getS().piH * L; },
    function() { return W - getS().piH * L; }
  ], { size: 5, fillColor: '#C8102E', strokeColor: '#C8102E', name: '', fixed: true });

  board.create('point', [
    function() { return W - getS().piL * L; },
    function() { return W - getS().piL * L; }
  ], { size: 5, fillColor: '#1565c0', strokeColor: '#1565c0', name: '', fixed: true });

  board.create('text', [
    function() { return W - getS().piH * L - 2; },
    function() { return W - getS().piH * L + 3; },
    'H*'
  ], { fontSize: 9, color: '#C8102E', fixed: true });

  board.create('text', [
    function() { return W - getS().piL * L - 2; },
    function() { return W - getS().piL * L + 3; },
    'L*'
  ], { fontSize: 9, color: '#1565c0', fixed: true });

  function update() {
    var s = getS();
    if (s.piL >= s.piH) { s.piL = s.piH - 0.05; document.getElementById('slider-pL').value = s.piL; }

    document.getElementById('val-pH').textContent = s.piH.toFixed(2);
    document.getElementById('val-pL').textContent = s.piL.toFixed(2);
    document.getElementById('val-lam').textContent = s.lam.toFixed(2);

    var piP = s.lam * s.piH + (1 - s.lam) * s.piL;
    var premH = s.piH * L;
    var premL = s.piL * L;
    var premP = piP * L;

    var html = '<strong>Prêmio justo:</strong><br>';
    html += 'Alto risco: R$' + premH.toFixed(0) + ' | Baixo risco: R$' + premL.toFixed(0) + '<br>';
    html += 'Pooling: R$' + premP.toFixed(0) + '<br>';
    html += '<hr style="margin:0.3rem 0;">';
    html += '<strong>Rothschild-Stiglitz:</strong><br>';
    html += 'H recebe seguro completo ao prêmio \\(\\pi_H L\\).<br>';
    html += 'L recebe seguro <em>parcial</em> (senão H mimetiza).<br>';
    html += '<span style="color:#C8102E;"><em>Baixo risco paga o custo da assimetria de informação!</em></span>';

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-pH').value = 0.60;
    document.getElementById('slider-pL').value = 0.15;
    document.getElementById('slider-lam').value = 0.30;
    update();
  }

  ['slider-pH','slider-pL','slider-lam'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
