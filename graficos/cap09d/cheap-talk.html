<!DOCTYPE html>
<!--
  Cheap Talk — Crawford-Sobel: Comunicação estratégica e partição de equilíbrio
  Library: JSXGraph
  Reason: Slider de viés (b) mostra como a partição se torna mais grosseira
          e a informação transmitida diminui.
  Chapter 9d — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cheap Talk — Crawford-Sobel</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 440px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 300px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 3px; display: inline-block; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Crawford-Sobel (Cheap Talk)</h3>

    <div class="slider-group">
      <label>Viés do remetente \(b\): <span class="val" id="val-b">0.10</span></label>
      <input type="range" id="slider-b" min="0" max="0.30" step="0.005" value="0.10">
    </div>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#1565c0;"></span> Ação do receptor \(a(\theta)\) (equilíbrio)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> Ação ideal do receptor: \(a = \theta\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#ff9800;"></span> Ação ideal do remetente: \(a = \theta + b\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#00897b; height:8px; width:8px; border-radius:50%;"></span> Limites da partição</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // Crawford-Sobel: theta ~ U[0,1], sender wants a = theta + b, receiver wants a = theta
  // Equilibrium with N intervals: partition points t_0=0, t_1, ..., t_N=1
  // t_i = t_{i-1} + (t_i - t_{i-1})
  // Indifference of types at boundaries: t_i = i/N + 2b*i*(i-N)
  // (using the explicit formula for uniform-quadratic case)
  // Max N such that equilibrium exists: largest N with b < 1/(2*N*(N-1))
  // Partition: t_i = i/N + 2*b*i*(i - N)

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-0.08, 1.35, 1.12, -0.1],
    axis: false,
    showCopyright: false,
    showNavigation: false,
    keepaspectratio: false
  });

  board.create('axis', [[0,0],[1.05,0]], {
    ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 0.2 },
    name: '', withLabel: false
  });
  board.create('axis', [[0,0],[0,1.3]], {
    ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 0.2 },
    name: '', withLabel: false
  });

  board.create('text', [-0.07, 0.65, '<b><i>a</i></b>'], {
    fontSize: 14, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
  });
  board.create('text', [0.55, -0.07, '<b>\\(\\theta\\)</b> (estado)'], {
    fontSize: 12, fixed: true, anchorX: 'middle', highlight: false
  });

  // 45-degree line: ideal receiver action a = theta
  board.create('functiongraph', [function(t) { return t; }, 0, 1], {
    strokeColor: '#C8102E', strokeWidth: 1.5, dash: 3
  });

  // Sender ideal: a = theta + b
  board.create('functiongraph', [
    function(t) { return t + parseFloat(document.getElementById('slider-b').value); }, 0, 1
  ], { strokeColor: '#ff9800', strokeWidth: 1.5, dash: 3 });

  board.create('text', [1.02, 1, '\\(a=\\theta\\)'], { fontSize: 10, color: '#C8102E', fixed: true });
  board.create('text', [1.02, function() { return 1 + parseFloat(document.getElementById('slider-b').value); }, '\\(a=\\theta+b\\)'],
    { fontSize: 10, color: '#ff9800', fixed: true });

  function getMaxN(b) {
    if (b <= 0) return 100; // perfect revelation
    var N = 1;
    while (b < 1/(2*N*(N+1))) { // condition for N+1 intervals
      N++;
      if (N > 50) break;
    }
    return N;
  }

  function getPartition(b, N) {
    // t_i = i/N + 2*b*i*(i - N)
    var pts = [];
    for (var i = 0; i <= N; i++) {
      pts.push(i/N + 2*b*i*(i - N));
    }
    return pts;
  }

  // Draw step function and partition points
  var maxSteps = 30;
  var stepSegs = [];
  var partPts = [];

  for (var k = 0; k < maxSteps; k++) {
    (function(idx) {
      // Horizontal segment for step k
      board.create('segment', [
        function() {
          var b = parseFloat(document.getElementById('slider-b').value);
          var N = getMaxN(b);
          if (idx >= N) return [0, -5];
          var part = getPartition(b, N);
          var left = part[idx];
          var mid = (part[idx] + part[idx+1]) / 2;
          return [left, mid];
        },
        function() {
          var b = parseFloat(document.getElementById('slider-b').value);
          var N = getMaxN(b);
          if (idx >= N) return [0, -5];
          var part = getPartition(b, N);
          var mid = (part[idx] + part[idx+1]) / 2;
          return [part[idx+1], mid];
        }
      ], { strokeColor: '#1565c0', strokeWidth: 2.5 });

      // Partition point
      board.create('point', [
        function() {
          var b = parseFloat(document.getElementById('slider-b').value);
          var N = getMaxN(b);
          if (idx === 0 || idx >= N) return -5;
          var part = getPartition(b, N);
          return part[idx];
        },
        0
      ], { size: 4, fillColor: '#00897b', strokeColor: '#00897b', name: '', fixed: true });
    })(k);
  }

  function update() {
    var b = parseFloat(document.getElementById('slider-b').value);
    document.getElementById('val-b').textContent = b.toFixed(3);

    var N = getMaxN(b);
    var part = getPartition(b, N);

    // Expected loss = E[(a - theta)^2] for the step function
    var loss = 0;
    for (var i = 0; i < N; i++) {
      var left = part[i], right = part[i+1];
      var mid = (left + right) / 2;
      // E[(mid - theta)^2] for theta ~ U[left, right] = (right-left)^2 / 12
      var width = right - left;
      loss += width * width * width / 12; // integral of (theta - mid)^2 over [left,right] with density 1
    }

    var infoLoss = loss;
    var maxLoss = 1.0/12; // loss from babbling (N=1)

    var html = '<strong>Equilíbrio mais informativo:</strong><br>';
    html += '\\(N = ' + N + '\\) intervalo' + (N > 1 ? 's' : '') + '<br>';

    if (N <= 6) {
      html += 'Partição: [';
      for (var i = 0; i <= N; i++) {
        html += part[i].toFixed(3);
        if (i < N) html += ', ';
      }
      html += ']<br>';
    }

    html += 'Perda informacional: \\(' + infoLoss.toFixed(4) + '\\)<br>';
    html += 'Perda máx (babbling): \\(' + maxLoss.toFixed(4) + '\\)<br>';

    var pctInfo = (1 - infoLoss / maxLoss) * 100;
    html += '<span style="color:#1565c0;">Informação transmitida: <strong>' + pctInfo.toFixed(1) + '%</strong></span><br>';

    if (b === 0) {
      html += '<span style="color:#00897b;">\\(b = 0\\): revelação completa!</span>';
    } else if (N === 1) {
      html += '<span style="color:#C8102E;">Babbling: nenhuma informação transmitida.</span>';
    }

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-b').value = 0.10;
    update();
  }

  document.getElementById('slider-b').addEventListener('input', update);
  update();
</script>
</body>
</html>
