<!DOCTYPE html>
<!--
  Moral Hazard — Principal-Agente: trade-off incentivos vs seguro
  Library: JSXGraph
  Reason: Sliders para aversão ao risco, custo de esforço e ruído permitem
          visualizar o contrato ótimo de segundo melhor vs primeiro melhor.
  Chapter 9d — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moral Hazard — Principal-Agente</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container {
      display: flex; flex-wrap: wrap; gap: 1rem;
      align-items: flex-start; justify-content: center;
    }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls {
      flex: 0 1 300px; padding: 1rem; background: #f8f8f8;
      border-radius: 6px; border: 1px solid #eee;
    }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 3px; display: inline-block; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Principal-Agente</h3>

    <div class="slider-group">
      <label>Aversão ao risco \(r\): <span class="val" id="val-r">2.00</span></label>
      <input type="range" id="slider-r" min="0.1" max="5" step="0.1" value="2">
    </div>
    <div class="slider-group">
      <label>Custo do esforço \(c\): <span class="val" id="val-c">1.00</span></label>
      <input type="range" id="slider-c" min="0.2" max="3" step="0.1" value="1">
    </div>
    <div class="slider-group">
      <label>Ruído \(\sigma\): <span class="val" id="val-sig">1.00</span></label>
      <input type="range" id="slider-sig" min="0.2" max="4" step="0.1" value="1">
    </div>
    <div class="slider-group">
      <label>Participação \(\beta\) (bônus): <span class="val" id="val-beta">0.50</span></label>
      <input type="range" id="slider-beta" min="0" max="1" step="0.02" value="0.5">
    </div>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> Utilidade do agente</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#1565c0;"></span> Lucro do principal</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#00897b;"></span> Excedente total</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#ff9800; height:1px; border-top:2px dashed #ff9800;"></span> \(\beta^*\) ótimo</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // Linear contract: w = alpha + beta * q, where q = e + epsilon, epsilon ~ N(0, sigma^2)
  // Agent: max_e E[u(w)] - c(e) with CARA utility u(w) = -exp(-r*w)
  // => Agent chooses e = beta/c  (FOC)
  // CE_agent = alpha + beta*e - c*e^2/2 - r*beta^2*sigma^2/2
  // Principal's expected profit: E[q - w] = e - alpha - beta*e = e(1-beta) - alpha
  // IR binds: CE_agent = 0 => alpha = beta*e - c*e^2/2 - r*beta^2*sigma^2/2
  // Substituting e = beta/c:
  //   alpha = beta^2/c - beta^2/(2c) - r*beta^2*sigma^2/2 = beta^2/(2c) - r*beta^2*sigma^2/2
  // Principal profit = e(1-beta) - alpha = (beta/c)(1-beta) - beta^2/(2c) + r*beta^2*sigma^2/2
  //                  = beta(1-beta)/c - beta^2/(2c) + r*beta^2*sigma^2/2
  //                  = beta/c - beta^2/c - beta^2/(2c) + r*beta^2*sigma^2/2
  //                  = beta/c - 3beta^2/(2c) + r*beta^2*sigma^2/2
  // Actually let me redo more carefully.
  // Principal profit = (1-beta)*e - alpha where e = beta/c
  //   = (1-beta)*beta/c - [beta^2/(2c) - r*beta^2*sigma^2/2]
  //   = beta/c - beta^2/c - beta^2/(2c) + r*beta^2*sigma^2/2
  // Wait, that gives increasing profit with risk aversion, which is wrong. Let me reconsider.
  //
  // CE_agent = E[w] - c(e) - risk_premium = alpha + beta*e - c*e^2/2 - (r/2)*beta^2*sigma^2
  // With IR binding: alpha = -beta*e + c*e^2/2 + (r/2)*beta^2*sigma^2
  //   (alpha can be negative — it's a fixed transfer)
  // E[profit] = e*(1-beta) - alpha = e - beta*e - alpha
  //   = e - beta*e + beta*e - c*e^2/2 - (r/2)*beta^2*sigma^2
  //   = e - c*e^2/2 - (r/2)*beta^2*sigma^2
  // Substituting e = beta/c:
  //   = beta/c - beta^2/(2c) - (r/2)*beta^2*sigma^2
  //
  // FOC wrt beta: 1/c - beta/c - r*beta*sigma^2 = 0
  //   beta* = 1/(1 + r*c*sigma^2)
  //
  // First best: e_FB = 1/c, surplus = 1/(2c)
  // Second best: e_SB = beta*/c, surplus = beta*/(c) - (beta*)^2/(2c) - (r/2)*(beta*)^2*sigma^2

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-0.08, 1.2, 1.08, -0.8],
    axis: false,
    showCopyright: false,
    showNavigation: false,
    keepaspectratio: false
  });

  board.create('axis', [[0,0],[1,0]], {
    ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 0.2 },
    name: '', withLabel: false
  });
  board.create('axis', [[0,-0.8],[0,1.2]], {
    ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 0.5 },
    name: '', withLabel: false
  });

  board.create('text', [-0.07, 0.2, '<b>Payoff</b>'], {
    fontSize: 12, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
  });
  board.create('text', [0.5, -0.7, '<b>\\(\\beta\\)</b> (participação no resultado)'], {
    fontSize: 12, fixed: true, anchorX: 'middle', highlight: false
  });

  function getState() {
    return {
      r: parseFloat(document.getElementById('slider-r').value),
      c: parseFloat(document.getElementById('slider-c').value),
      sig: parseFloat(document.getElementById('slider-sig').value),
      beta: parseFloat(document.getElementById('slider-beta').value)
    };
  }

  function calcSurplus(beta, c, r, sig) {
    var e = beta / c;
    var totalSurplus = e - c*e*e/2 - (r/2)*beta*beta*sig*sig;
    return totalSurplus;
  }

  function calcAgentCE(beta, c, r, sig) {
    // CE = 0 by IR constraint (reservation utility)
    return 0;
  }

  function calcPrincipalProfit(beta, c, r, sig) {
    return calcSurplus(beta, c, r, sig);
  }

  // Total surplus as function of beta
  board.create('functiongraph', [
    function(b) {
      var s = getState();
      return calcSurplus(b, s.c, s.r, s.sig);
    }, 0, 1
  ], { strokeColor: '#00897b', strokeWidth: 2.5 });

  // Agent effort curve: e(beta) = beta/c, scaled for visualization
  // Let's show the cost of risk premium instead
  // Risk premium: (r/2)*beta^2*sigma^2
  var riskPremCurve = board.create('functiongraph', [
    function(b) {
      var s = getState();
      return -(s.r/2)*b*b*s.sig*s.sig;
    }, 0, 1
  ], { strokeColor: '#C8102E', strokeWidth: 2, dash: 2 });

  // Gross surplus (no risk): e - ce^2/2 = beta/c - beta^2/(2c)
  var grossCurve = board.create('functiongraph', [
    function(b) {
      var s = getState();
      return b/s.c - b*b/(2*s.c);
    }, 0, 1
  ], { strokeColor: '#1565c0', strokeWidth: 2, dash: 2 });

  // Optimal beta line
  var optLine = board.create('segment', [
    function() { var s = getState(); var bs = 1/(1 + s.r*s.c*s.sig*s.sig); return [bs, -0.8]; },
    function() { var s = getState(); var bs = 1/(1 + s.r*s.c*s.sig*s.sig); return [bs, calcSurplus(bs, s.c, s.r, s.sig)]; }
  ], { strokeColor: '#ff9800', strokeWidth: 2, dash: 3 });

  // Current beta line
  var currLine = board.create('segment', [
    function() { var s = getState(); return [s.beta, -0.8]; },
    function() { var s = getState(); return [s.beta, calcSurplus(s.beta, s.c, s.r, s.sig)]; }
  ], { strokeColor: '#888', strokeWidth: 1, dash: 4 });

  // Point at optimal
  board.create('point', [
    function() { var s = getState(); return 1/(1 + s.r*s.c*s.sig*s.sig); },
    function() { var s = getState(); var bs = 1/(1 + s.r*s.c*s.sig*s.sig); return calcSurplus(bs, s.c, s.r, s.sig); }
  ], { size: 5, fillColor: '#ff9800', strokeColor: '#ff9800', name: '',
       fixed: true, label: { fontSize: 11, offset: [8, 8], color: '#ff9800' } });

  // Point at current beta
  board.create('point', [
    function() { return getState().beta; },
    function() { var s = getState(); return calcSurplus(s.beta, s.c, s.r, s.sig); }
  ], { size: 4, fillColor: '#888', strokeColor: '#888', name: '',
       fixed: true });

  // First best point (beta=1, but in practice the max of gross surplus is at beta=1)
  board.create('point', [
    1,
    function() { var s = getState(); return 1/s.c - 1/(2*s.c); }
  ], { size: 4, fillColor: '#1565c0', strokeColor: '#1565c0', name: 'FB',
       fixed: true, label: { fontSize: 11, offset: [5, 8], color: '#1565c0' } });

  function update() {
    var s = getState();
    document.getElementById('val-r').textContent = s.r.toFixed(2);
    document.getElementById('val-c').textContent = s.c.toFixed(2);
    document.getElementById('val-sig').textContent = s.sig.toFixed(2);
    document.getElementById('val-beta').textContent = s.beta.toFixed(2);

    var betaStar = 1 / (1 + s.r * s.c * s.sig * s.sig);
    var eFB = 1 / s.c;
    var eSB = betaStar / s.c;
    var surplusFB = 1 / (2 * s.c);
    var surplusSB = calcSurplus(betaStar, s.c, s.r, s.sig);
    var agencyCost = surplusFB - surplusSB;
    var currSurplus = calcSurplus(s.beta, s.c, s.r, s.sig);

    var html = '<strong>Contrato ótimo:</strong><br>';
    html += '\\(\\beta^* = \\frac{1}{1 + rc\\sigma^2} = ' + betaStar.toFixed(3) + '\\)<br>';
    html += 'Esforço SB: \\(e^{SB} = ' + eSB.toFixed(2) + '\\) vs FB: \\(e^{FB} = ' + eFB.toFixed(2) + '\\)<br>';
    html += '<span style="color:#00897b;">Excedente SB: ' + surplusSB.toFixed(3) + '</span><br>';
    html += '<span style="color:#1565c0;">Excedente FB: ' + surplusFB.toFixed(3) + '</span><br>';
    html += '<span style="color:#C8102E;">Custo de agência: ' + agencyCost.toFixed(3) + '</span><br>';
    html += 'Com \\(\\beta = ' + s.beta.toFixed(2) + '\\): excedente = ' + currSurplus.toFixed(3);

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-r').value = 2;
    document.getElementById('slider-c').value = 1;
    document.getElementById('slider-sig').value = 1;
    document.getElementById('slider-beta').value = 0.5;
    update();
  }

  ['slider-r','slider-c','slider-sig','slider-beta'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });

  update();
</script>
</body>
</html>
