<!DOCTYPE html>
<!--
  Seleção Adversa — Market Unraveling (Akerlof)
  Library: JSXGraph
  Reason: Slider para o ganho de troca (alpha) mostra como o mercado colapsa iterativamente.
  Chapter 9d — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seleção Adversa — Market Unraveling</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 300px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 3px; display: inline-block; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Mercado dos Limões</h3>

    <div class="slider-group">
      <label>Ganho de troca \(\alpha\): <span class="val" id="val-alpha">1.50</span></label>
      <input type="range" id="slider-alpha" min="1.01" max="3" step="0.01" value="1.5">
    </div>
    <div class="slider-group">
      <label>Rodadas de unraveling: <span class="val" id="val-rounds">10</span></label>
      <input type="range" id="slider-rounds" min="1" max="20" step="1" value="10">
    </div>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> Valor para vendedor \(v_S = q\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#1565c0;"></span> Valor para comprador \(v_B = \alpha q\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#00897b;"></span> Qualidade máxima no mercado</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#ff9800;"></span> Preço de equilíbrio</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // Akerlof model: q ~ U[0,1], seller value = q, buyer value = alpha*q
  // Round 0: all in market, E[q] = 0.5, price = alpha*0.5
  // Sellers with q > price leave => q_max = alpha*0.5
  // Round 1: q ~ U[0, q_max], E[q] = q_max/2, price = alpha*q_max/2
  // Continue...
  // q_max(n+1) = alpha * q_max(n) / 2
  // Converges to 0 if alpha < 2, converges to positive value if alpha >= 2

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-0.08, 1.6, 1.12, -0.15],
    axis: false,
    showCopyright: false,
    showNavigation: false,
    keepaspectratio: false
  });

  board.create('axis', [[0,0],[1.05,0]], {
    ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 0.2 },
    name: '', withLabel: false
  });
  board.create('axis', [[0,0],[0,1.5]], {
    ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 0.5 },
    name: '', withLabel: false
  });

  board.create('text', [-0.07, 0.75, '<b>Valor</b>'], {
    fontSize: 12, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
  });
  board.create('text', [0.55, -0.1, '<b><i>q</i></b> (qualidade)'], {
    fontSize: 12, fixed: true, anchorX: 'middle', highlight: false
  });

  // v_S = q (45 degree)
  board.create('functiongraph', [function(q) { return q; }, 0, 1], {
    strokeColor: '#C8102E', strokeWidth: 2
  });

  // v_B = alpha * q
  board.create('functiongraph', [
    function(q) { return parseFloat(document.getElementById('slider-alpha').value) * q; }, 0, 1
  ], { strokeColor: '#1565c0', strokeWidth: 2 });

  // Labels
  board.create('text', [1.02, 1, '\\(v_S\\)'], { fontSize: 11, color: '#C8102E', fixed: true });
  board.create('text', [1.02, function() { return parseFloat(document.getElementById('slider-alpha').value); }, '\\(v_B\\)'],
    { fontSize: 11, color: '#1565c0', fixed: true });

  // We'll draw steps showing the unraveling as bars/points
  var unravelPoints = [];
  var unravelLines = [];
  var maxPts = 20;

  for (var i = 0; i < maxPts; i++) {
    (function(idx) {
      // Horizontal line at price level
      var priceLine = board.create('segment', [
        function() {
          var alpha = parseFloat(document.getElementById('slider-alpha').value);
          var rounds = parseInt(document.getElementById('slider-rounds').value);
          if (idx >= rounds) return [0, -10]; // hide
          var qmax = 1;
          for (var r = 0; r <= idx; r++) {
            qmax = alpha * qmax / 2;
          }
          return [0, alpha * qmax / 2];
        },
        function() {
          var alpha = parseFloat(document.getElementById('slider-alpha').value);
          var rounds = parseInt(document.getElementById('slider-rounds').value);
          if (idx >= rounds) return [0, -10];
          var qmax = 1;
          for (var r = 0; r <= idx; r++) {
            qmax = alpha * qmax / 2;
          }
          return [qmax, alpha * qmax / 2];
        }
      ], {
        strokeColor: '#ff9800',
        strokeWidth: idx === 0 ? 2 : 1,
        strokeOpacity: Math.max(0.2, 1 - idx * 0.08)
      });

      // Vertical line showing q_max cutoff
      var cutoffLine = board.create('segment', [
        function() {
          var alpha = parseFloat(document.getElementById('slider-alpha').value);
          var rounds = parseInt(document.getElementById('slider-rounds').value);
          if (idx >= rounds) return [0, -10];
          var qmax = 1;
          for (var r = 0; r <= idx; r++) {
            qmax = alpha * qmax / 2;
          }
          return [qmax, 0];
        },
        function() {
          var alpha = parseFloat(document.getElementById('slider-alpha').value);
          var rounds = parseInt(document.getElementById('slider-rounds').value);
          if (idx >= rounds) return [0, -10];
          var qmax = 1;
          for (var r = 0; r <= idx; r++) {
            qmax = alpha * qmax / 2;
          }
          return [qmax, qmax]; // up to v_S line
        }
      ], {
        strokeColor: '#00897b',
        strokeWidth: 1,
        dash: 3,
        strokeOpacity: Math.max(0.2, 1 - idx * 0.08)
      });
    })(i);
  }

  // Final equilibrium point
  board.create('point', [
    function() {
      var alpha = parseFloat(document.getElementById('slider-alpha').value);
      var rounds = parseInt(document.getElementById('slider-rounds').value);
      var qmax = 1;
      for (var r = 0; r < rounds; r++) {
        qmax = alpha * qmax / 2;
      }
      return qmax;
    },
    function() {
      var alpha = parseFloat(document.getElementById('slider-alpha').value);
      var rounds = parseInt(document.getElementById('slider-rounds').value);
      var qmax = 1;
      for (var r = 0; r < rounds; r++) {
        qmax = alpha * qmax / 2;
      }
      return alpha * qmax / 2;
    }
  ], { size: 5, fillColor: '#ff9800', strokeColor: '#ff9800', name: '', fixed: true });

  function update() {
    var alpha = parseFloat(document.getElementById('slider-alpha').value);
    var rounds = parseInt(document.getElementById('slider-rounds').value);
    document.getElementById('val-alpha').textContent = alpha.toFixed(2);
    document.getElementById('val-rounds').textContent = rounds;

    var qmax = 1;
    var history = [1];
    for (var r = 0; r < rounds; r++) {
      qmax = alpha * qmax / 2;
      history.push(qmax);
    }

    var finalPrice = alpha * qmax / 2;
    var collapses = alpha < 2;

    var html = '<strong>Dinâmica do unraveling:</strong><br>';
    html += '\\(q_{max}\\) inicial: 1.00<br>';
    html += '\\(q_{max}\\) após ' + rounds + ' rodadas: ' + qmax.toFixed(4) + '<br>';
    html += 'Preço final: \\(' + finalPrice.toFixed(4) + '\\)<br>';
    if (collapses) {
      html += '<span style="color:#C8102E;"><strong>Mercado colapsa!</strong> (\\(\\alpha = ' + alpha.toFixed(2) + ' < 2\\))</span><br>';
      html += '\\(q_{max} \\to 0\\) quando \\(n \\to \\infty\\)';
    } else {
      var qStar = 1 - 2/alpha;
      // Actually for alpha >= 2, the fixed point of q' = alpha*q/2 starting from q=1:
      // if alpha/2 >= 1, then q_max stays at 1 (no unraveling)
      // Wait: round 0 q_max = 1, price = alpha/2.
      // If alpha/2 >= 1 then all sellers stay (price >= max seller value).
      // So for alpha >= 2, NO unraveling occurs.
      html += '<span style="color:#00897b;"><strong>Mercado sobrevive!</strong> (\\(\\alpha = ' + alpha.toFixed(2) + ' \\geq 2\\))</span><br>';
      html += 'Ganho de troca suficiente para sustentar o mercado.';
    }

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-alpha').value = 1.5;
    document.getElementById('slider-rounds').value = 10;
    update();
  }

  document.getElementById('slider-alpha').addEventListener('input', update);
  document.getElementById('slider-rounds').addEventListener('input', update);

  update();
</script>
</body>
</html>
