<!DOCTYPE html>
<!--
  Custo Social do Carbono e Taxa de Desconto
  Library: JSXGraph
  Reason: Sliders para taxa de desconto e sensibilidade climática mostram
          como o SCC varia dramaticamente — debate Nordhaus vs Stern.
  Chapter 24 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custo Social do Carbono (SCC)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(','\\)']] }, options: { enableMenu: false } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 3px; display: inline-block; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Custo Social do Carbono</h3>

    <div class="slider-group">
      <label>Taxa de desconto \(r\) (%): <span class="val" id="val-r">3.0</span></label>
      <input type="range" id="slider-r" min="0.5" max="7" step="0.25" value="3.0">
    </div>
    <div class="slider-group">
      <label>Crescimento do dano (%/ano): <span class="val" id="val-g">2.0</span></label>
      <input type="range" id="slider-g" min="0.5" max="4" step="0.25" value="2.0">
    </div>
    <div class="slider-group">
      <label>Dano base (US$/tCO₂ em t=0): <span class="val" id="val-d0">1.0</span></label>
      <input type="range" id="slider-d0" min="0.5" max="3" step="0.1" value="1.0">
    </div>

    <p style="font-size:0.78rem; color:#666; margin-top:0.3rem;">
      \(\text{SCC} = \sum_{t=0}^{T} \frac{D_0 (1+g)^t}{(1+r)^t}\)<br>
      \(= D_0 \cdot \frac{1 - [(1+g)/(1+r)]^{T+1}}{1 - (1+g)/(1+r)}\) se \(r > g\).
    </p>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> SCC em função de \(r\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#1565c0; height:1px; border-top:2px dashed #1565c0;"></span> Nordhaus (~3%)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#ff9800; height:1px; border-top:2px dashed #ff9800;"></span> Stern (~1.4%)</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // SCC = sum_{t=0}^{T} D0*(1+g)^t / (1+r)^t
  // = D0 * sum_{t=0}^{T} [(1+g)/(1+r)]^t
  // If r > g: converges to D0 / (r - g) as T -> infinity

  var T = 200; // horizon years

  function computeSCC(r, g, d0) {
    r = r / 100; g = g / 100;
    var scc = 0;
    var ratio = (1 + g) / (1 + r);
    for (var t = 0; t <= T; t++) {
      scc += d0 * Math.pow(ratio, t);
    }
    return scc;
  }

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-0.5, 400, 7.5, -30],
    axis: false, showCopyright: false, showNavigation: false
  });

  board.create('axis', [[0,0],[7,0]], {
    ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 1,
      generateLabelText: function(tick) { return tick.usrCoords[1].toFixed(0) + '%'; }
    }
  });
  board.create('axis', [[0,0],[0,380]], {
    ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 50 }
  });
  board.create('text', [-0.4, 190, '<b>SCC (US$/tCO₂)</b>'], { fontSize: 10, fixed: true, anchorX: 'middle', rotate: 90 });
  board.create('text', [3.5, -20, '<b>Taxa de desconto \\(r\\)</b>'], { fontSize: 10, fixed: true, anchorX: 'middle' });

  function getS() {
    return {
      r: parseFloat(document.getElementById('slider-r').value),
      g: parseFloat(document.getElementById('slider-g').value),
      d0: parseFloat(document.getElementById('slider-d0').value)
    };
  }

  // SCC curve as function of r
  board.create('functiongraph', [
    function(r) {
      if (r <= 0.3) return NaN;
      var s = getS();
      return Math.min(400, computeSCC(r, s.g, s.d0));
    }, 0.5, 7
  ], { strokeColor: '#C8102E', strokeWidth: 2.5 });

  // Nordhaus vertical line at 3%
  board.create('line', [[3, 0], [3, 380]], {
    strokeColor: '#1565c0', strokeWidth: 1.5, dash: 2,
    straightFirst: false, straightLast: false,
    point1: { visible: false }, point2: { visible: false }
  });
  board.create('text', [3.15, 350, 'Nordhaus'], { fontSize: 9, color: '#1565c0', fixed: true });

  // Stern vertical line at 1.4%
  board.create('line', [[1.4, 0], [1.4, 380]], {
    strokeColor: '#ff9800', strokeWidth: 1.5, dash: 2,
    straightFirst: false, straightLast: false,
    point1: { visible: false }, point2: { visible: false }
  });
  board.create('text', [1.55, 370, 'Stern'], { fontSize: 9, color: '#ff9800', fixed: true });

  // Current point
  board.create('point', [
    function() { return getS().r; },
    function() { var s = getS(); return Math.min(380, computeSCC(s.r, s.g, s.d0)); }
  ], { size: 6, fillColor: '#C8102E', strokeColor: '#C8102E', name: '', fixed: true });

  function update() {
    var s = getS();
    document.getElementById('val-r').textContent = s.r.toFixed(1);
    document.getElementById('val-g').textContent = s.g.toFixed(1);
    document.getElementById('val-d0').textContent = s.d0.toFixed(1);

    var scc = computeSCC(s.r, s.g, s.d0);
    var sccNord = computeSCC(3, s.g, s.d0);
    var sccStern = computeSCC(1.4, s.g, s.d0);

    var html = '<strong>SCC atual:</strong> US$ ' + Math.min(999, scc).toFixed(0) + '/tCO₂<br>';
    html += '<span style="color:#1565c0;">Nordhaus (\\(r=3\\%\\)): US$ ' + sccNord.toFixed(0) + '</span><br>';
    html += '<span style="color:#ff9800;">Stern (\\(r=1{,}4\\%\\)): US$ ' + Math.min(999, sccStern).toFixed(0) + '</span><br>';
    var ratio = sccStern / sccNord;
    html += 'Razão Stern/Nordhaus: <strong>' + ratio.toFixed(1) + 'x</strong><br>';
    html += '<em>A taxa de desconto determina se a mudança climática é uma emergência ou um problema gerenciável.</em>';

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-r').value = 3.0;
    document.getElementById('slider-g').value = 2.0;
    document.getElementById('slider-d0').value = 1.0;
    update();
  }

  ['slider-r','slider-g','slider-d0'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
