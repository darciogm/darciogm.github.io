<!DOCTYPE html>
<!--
  Desconto Hiperbólico vs Exponencial — Viés do presente
  Library: JSXGraph
  Reason: Sliders para β (present bias) e δ mostram como preferências
          se revertem com desconto hiperbólico mas não com exponencial.
  Chapter 18 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desconto Hiperbólico</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(','\\)']] }, options: { enableMenu: false } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 3px; display: inline-block; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Desconto Hiperbólico vs Exponencial</h3>

    <div class="slider-group">
      <label>Viés do presente \(\beta\): <span class="val" id="val-beta">0.70</span></label>
      <input type="range" id="slider-beta" min="0.3" max="1.0" step="0.05" value="0.70">
    </div>
    <div class="slider-group">
      <label>Fator de desconto \(\delta\): <span class="val" id="val-delta">0.95</span></label>
      <input type="range" id="slider-delta" min="0.80" max="0.99" step="0.01" value="0.95">
    </div>

    <p style="font-size:0.78rem; color:#666; margin-top:0.3rem;">
      Quasi-hiperbólico: \(D(t) = \beta \delta^t\) para \(t \geq 1\).<br>
      \(\beta = 1\): desconto exponencial padrão.<br>
      \(\beta < 1\): viés do presente (Laibson, 1997).
    </p>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#1565c0;"></span> Exponencial: \(D(t) = \delta^t\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> Quasi-hiperbólico: \(D(t) = \beta\delta^t\)</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // Exponential: D(t) = δ^t
  // Quasi-hyperbolic (β-δ): D(0) = 1, D(t) = β*δ^t for t >= 1
  // Present bias: β < 1 creates a "drop" between t=0 and t=1

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-0.8, 1.15, 12, -0.1],
    axis: false, showCopyright: false, showNavigation: false
  });

  board.create('axis', [[0,0],[11,0]], {
    ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 2 }
  });
  board.create('axis', [[0,0],[0,1.1]], {
    ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 0.2 }
  });
  board.create('text', [-0.6, 0.55, '<b>\\(D(t)\\)</b>'], { fontSize: 11, fixed: true, anchorX: 'middle', rotate: 90 });
  board.create('text', [5.5, -0.07, '<b>\\(t\\) (períodos)</b>'], { fontSize: 11, fixed: true, anchorX: 'middle' });

  function getS() {
    return {
      beta: parseFloat(document.getElementById('slider-beta').value),
      delta: parseFloat(document.getElementById('slider-delta').value)
    };
  }

  // Exponential discount curve (smooth)
  board.create('functiongraph', [
    function(t) { return Math.pow(getS().delta, t); }, 0, 11
  ], { strokeColor: '#1565c0', strokeWidth: 2.5 });

  // Quasi-hyperbolic: D(0)=1, D(t)=β*δ^t for t>=1
  // Draw as point at t=0 then curve from t=1
  board.create('point', [0, 1], { size: 5, fillColor: '#C8102E', strokeColor: '#C8102E', name: '', fixed: true });

  // Drop from 1 to β*δ
  board.create('segment', [
    [0, 1],
    function() { var s = getS(); return [1, s.beta * s.delta]; }
  ], { strokeColor: '#C8102E', strokeWidth: 2.5, dash: 3 });

  // Curve from t=1 onward
  board.create('functiongraph', [
    function(t) { if (t < 1) return NaN; var s = getS(); return s.beta * Math.pow(s.delta, t); }, 1, 11
  ], { strokeColor: '#C8102E', strokeWidth: 2.5 });

  // Discrete points for quasi-hyperbolic
  for (var tt = 1; tt <= 10; tt++) {
    (function(t) {
      board.create('point', [
        t,
        function() { var s = getS(); return s.beta * Math.pow(s.delta, t); }
      ], { size: 4, fillColor: '#C8102E', strokeColor: '#C8102E', name: '', fixed: true });
    })(tt);
  }

  // Gap annotation
  board.create('segment', [
    function() { return [0.5, Math.pow(getS().delta, 0.5)]; },
    function() { var s = getS(); return [0.5, s.beta * Math.pow(s.delta, 0.5)]; }
  ], { strokeColor: '#ff9800', strokeWidth: 2, lastArrow: true, firstArrow: true });

  board.create('text', [1.2, function() {
    var s = getS();
    return (1 + s.beta * s.delta) / 2;
  }, function() {
    return getS().beta < 1 ? 'viés do\\npresente' : '';
  }], { fontSize: 9, color: '#ff9800', fixed: true });

  function update() {
    var s = getS();
    document.getElementById('val-beta').textContent = s.beta.toFixed(2);
    document.getElementById('val-delta').textContent = s.delta.toFixed(2);

    // Example: $100 today vs $110 tomorrow vs $110 in 31 days
    var today100 = 100;
    var tom110_exp = 110 * s.delta;
    var tom110_hyp = 110 * s.beta * s.delta;
    var d30_110_exp = 110 * Math.pow(s.delta, 30);
    var d31_110_exp = 110 * Math.pow(s.delta, 31);
    var d30_110_hyp = 110 * s.beta * Math.pow(s.delta, 30);
    var d31_110_hyp = 110 * s.beta * Math.pow(s.delta, 31);

    var html = '<strong>Exemplo: R$100 hoje vs R$110 amanhã</strong><br>';
    html += 'Exponencial: \\(110\\delta = ' + tom110_exp.toFixed(1) + '\\) ';
    html += tom110_exp >= 100 ? '→ espera' : '→ <strong>hoje!</strong>';
    html += '<br>';
    html += 'Hiperbólico: \\(110\\beta\\delta = ' + tom110_hyp.toFixed(1) + '\\) ';
    html += tom110_hyp >= 100 ? '→ espera' : '→ <strong>hoje!</strong>';
    html += '<br>';

    if (s.beta < 1 && tom110_hyp < 100 && tom110_exp >= 100) {
      html += '<span style="color:#C8102E;"><strong>Reversão de preferência!</strong> Paciente no longo prazo, impaciente no curto.</span>';
    } else if (s.beta >= 1) {
      html += '<span style="color:#1565c0;">\\(\\beta = 1\\): sem viés — desconto é exponencial puro.</span>';
    } else {
      html += '<span style="color:#ff9800;">O "salto" entre t=0 e t=1 é o viés do presente.</span>';
    }

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-beta').value = 0.70;
    document.getElementById('slider-delta').value = 0.95;
    update();
  }

  ['slider-beta','slider-delta'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
