<!DOCTYPE html>
<!--
  Winner-Takes-All — Externalidades de rede e tipping
  Library: JSXGraph
  Reason: Sliders mostram dinâmica de adoção com externalidades de rede:
          múltiplos equilíbrios, massa crítica e tipping point.
  Chapter 21 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winner-Takes-All e Tipping</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(','\\)']] }, options: { enableMenu: false } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 3px; display: inline-block; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Externalidades de Rede e Tipping</h3>

    <div class="slider-group">
      <label>Força da rede \(\alpha\): <span class="val" id="val-alpha">2.0</span></label>
      <input type="range" id="slider-alpha" min="0.5" max="4" step="0.1" value="2.0">
    </div>
    <div class="slider-group">
      <label>Preço \(p\): <span class="val" id="val-p">0.30</span></label>
      <input type="range" id="slider-p" min="0" max="1" step="0.02" value="0.30">
    </div>
    <div class="slider-group">
      <label>Valor intrínseco \(v_0\): <span class="val" id="val-v0">0.10</span></label>
      <input type="range" id="slider-v0" min="0" max="0.5" step="0.02" value="0.10">
    </div>

    <p style="font-size:0.78rem; color:#666; margin-top:0.3rem;">
      Valor: \(v(n) = v_0 + \alpha \cdot n^2\).<br>
      Equilíbrio onde \(v(n^e) = p\).<br>
      \(n\) = fração de adotantes, \(n^e\) = expectativa.
    </p>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> Valor da rede \(v(n)\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#1565c0; height:1px; border-top:2px dashed #1565c0;"></span> Preço \(p\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#00897b; height:8px; width:8px; border-radius:50%;"></span> Equilíbrio estável</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#ff9800; height:8px; width:8px; border-radius:50%;"></span> Massa crítica (instável)</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // Network value: v(n) = v0 + α*n^2
  // Equilibrium: v(n) = p => v0 + α*n^2 = p => n = sqrt((p-v0)/α)
  // With fulfilled expectations, n = n^e
  // Multiple equilibria: n=0 (if v0 < p), critical mass n_c, winner-takes-all n_w

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-0.08, 1.5, 1.12, -0.15],
    axis: false, showCopyright: false, showNavigation: false
  });

  board.create('axis', [[0,0],[1.05,0]], {
    ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 0.2 }
  });
  board.create('axis', [[0,0],[0,1.4]], {
    ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 0.2 }
  });
  board.create('text', [-0.06, 0.7, '<b>Valor / Preço</b>'], { fontSize: 10, fixed: true, anchorX: 'middle', rotate: 90 });
  board.create('text', [0.5, -0.1, '<b>\\(n\\) (fração de adotantes)</b>'], { fontSize: 10, fixed: true, anchorX: 'middle' });

  function getS() {
    return {
      alpha: parseFloat(document.getElementById('slider-alpha').value),
      p: parseFloat(document.getElementById('slider-p').value),
      v0: parseFloat(document.getElementById('slider-v0').value)
    };
  }

  // Network value curve
  board.create('functiongraph', [
    function(n) { var s = getS(); return s.v0 + s.alpha * n * n; }, 0, 1
  ], { strokeColor: '#C8102E', strokeWidth: 2.5 });

  // Price line
  board.create('functiongraph', [
    function(n) { return getS().p; }, 0, 1
  ], { strokeColor: '#1565c0', strokeWidth: 2, dash: 3 });

  // Find equilibria: v0 + α*n^2 = p => n = sqrt((p-v0)/α)
  function getEquilibria() {
    var s = getS();
    var eqs = [];
    // n=0 is always an option if v0 < p
    if (s.v0 < s.p) {
      eqs.push({ n: 0, stable: true, label: 'n=0' });
    }
    var disc = (s.p - s.v0) / s.alpha;
    if (disc > 0 && disc <= 1) {
      var nc = Math.sqrt(disc);
      if (nc <= 1) {
        eqs.push({ n: nc, stable: false, label: 'massa crítica' });
      }
      // Also n=1 if v(1) >= p
      if (s.v0 + s.alpha >= s.p) {
        eqs.push({ n: 1, stable: true, label: 'winner-takes-all' });
      }
    } else if (disc <= 0) {
      // v0 >= p: everyone adopts
      eqs.push({ n: 1, stable: true, label: 'adoção universal' });
    }
    return eqs;
  }

  // Dynamic equilibrium points
  // Stable: n=0
  board.create('point', [
    0, function() { return getS().p; }
  ], {
    size: function() { return getS().v0 < getS().p ? 6 : 0; },
    fillColor: '#00897b', strokeColor: '#00897b', name: '', fixed: true
  });

  // Critical mass point
  board.create('point', [
    function() { var s = getS(); var d = (s.p - s.v0) / s.alpha; return d > 0 && d <= 1 ? Math.sqrt(d) : -1; },
    function() { return getS().p; }
  ], { size: 6, fillColor: '#ff9800', strokeColor: '#ff9800', name: '', fixed: true });

  // Winner-takes-all point (n=1)
  board.create('point', [
    1,
    function() { var s = getS(); return s.v0 + s.alpha >= s.p ? s.p : -1; }
  ], {
    size: function() { var s = getS(); return s.v0 + s.alpha >= s.p && s.v0 < s.p ? 6 : 0; },
    fillColor: '#00897b', strokeColor: '#00897b', name: '', fixed: true
  });

  // Arrows showing dynamics
  board.create('text', [0.15, function() { return getS().p + 0.08; }, '←'], { fontSize: 16, color: '#00897b', fixed: true });
  board.create('text', [0.85, function() { return getS().p + 0.08; }, '→'], { fontSize: 16, color: '#00897b', fixed: true });

  function update() {
    var s = getS();
    document.getElementById('val-alpha').textContent = s.alpha.toFixed(1);
    document.getElementById('val-p').textContent = s.p.toFixed(2);
    document.getElementById('val-v0').textContent = s.v0.toFixed(2);

    var eqs = getEquilibria();
    var disc = (s.p - s.v0) / s.alpha;
    var nc = disc > 0 ? Math.sqrt(disc) : 0;

    var html = '';
    if (s.v0 >= s.p) {
      html += '<span style="color:#00897b;"><strong>Adoção universal!</strong> Valor intrínseco já supera o preço.</span>';
    } else if (disc > 1) {
      html += '<span style="color:#C8102E;"><strong>Nenhuma adoção.</strong> Preço muito alto para a rede decolar.</span>';
    } else {
      html += '<strong>3 equilíbrios:</strong><br>';
      html += '• \\(n = 0\\): ninguém adota (estável)<br>';
      html += '• \\(n_c = ' + nc.toFixed(2) + '\\): massa crítica (instável)<br>';
      html += '• \\(n = 1\\): winner-takes-all (estável)<br>';
      html += '<em>Ultrapassar \\(n_c\\) → efeito bola de neve até \\(n=1\\).</em>';
    }

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-alpha').value = 2.0;
    document.getElementById('slider-p').value = 0.30;
    document.getElementById('slider-v0').value = 0.10;
    update();
  }

  ['slider-alpha','slider-p','slider-v0'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
