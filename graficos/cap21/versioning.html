<!DOCTYPE html>
<!--
  Versioning — Discriminação de preços em bens de informação
  Library: JSXGraph
  Reason: Sliders para qualidade e WTP mostram como criar versões
          "degradadas" extrai excedente sem custo marginal.
  Chapter 21 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Versioning de Bens de Informação</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(','\\)']] }, options: { enableMenu: false } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 10px; display: inline-block; border-radius: 2px; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Versioning (Shapiro & Varian)</h3>

    <div class="slider-group">
      <label>WTP tipo alto \(\theta_H\): <span class="val" id="val-tH">10</span></label>
      <input type="range" id="slider-tH" min="5" max="20" step="0.5" value="10">
    </div>
    <div class="slider-group">
      <label>WTP tipo baixo \(\theta_L\): <span class="val" id="val-tL">4</span></label>
      <input type="range" id="slider-tL" min="1" max="10" step="0.5" value="4">
    </div>
    <div class="slider-group">
      <label>Qualidade versão basic \(q_L\): <span class="val" id="val-qL">0.50</span></label>
      <input type="range" id="slider-qL" min="0.1" max="0.9" step="0.05" value="0.50">
    </div>
    <div class="slider-group">
      <label>Fração tipo alto \(\lambda\): <span class="val" id="val-lam">0.40</span></label>
      <input type="range" id="slider-lam" min="0.1" max="0.9" step="0.05" value="0.40">
    </div>

    <p style="font-size:0.78rem; color:#666; margin-top:0.3rem;">
      \(u_i = \theta_i \cdot q - p\). Versão premium: \(q_H = 1\).<br>
      CMg = 0 (bem de informação).
    </p>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> Lucro Premium</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#1565c0;"></span> Lucro Basic</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#00897b;"></span> Lucro preço único</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // Model: 2 types θH, θL with proportions λ, (1-λ)
  // Premium version: quality qH = 1, Basic: quality qL < 1
  // Utility: u = θ*q - p
  // IC constraint: θH*1 - pH >= θH*qL - pL (high type prefers premium)
  // IR constraint: θL*qL - pL >= 0 (low type participates)
  // Optimal: pL = θL*qL, pH = θH - θH*qL + θL*qL = θH - (θH - θL)*qL

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-0.08, 22, 1.12, -3],
    axis: false, showCopyright: false, showNavigation: false
  });

  board.create('axis', [[0,0],[1.05,0]], {
    ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 0.2 }
  });
  board.create('axis', [[0,0],[0,20]], {
    ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 5 }
  });
  board.create('text', [-0.06, 10, '<b>Preço</b>'], { fontSize: 11, fixed: true, anchorX: 'middle', rotate: 90 });
  board.create('text', [0.5, -2, '<b>Qualidade \\(q\\)</b>'], { fontSize: 11, fixed: true, anchorX: 'middle' });

  function getS() {
    return {
      tH: parseFloat(document.getElementById('slider-tH').value),
      tL: parseFloat(document.getElementById('slider-tL').value),
      qL: parseFloat(document.getElementById('slider-qL').value),
      lam: parseFloat(document.getElementById('slider-lam').value)
    };
  }

  // θH valuation line: p = θH * q
  board.create('functiongraph', [
    function(q) { return getS().tH * q; }, 0, 1.05
  ], { strokeColor: '#C8102E', strokeWidth: 1.5, dash: 3 });
  board.create('text', [1.02, function() { return getS().tH + 0.5; }, '\\(\\theta_H q\\)'], { fontSize: 9, color: '#C8102E', fixed: true });

  // θL valuation line: p = θL * q
  board.create('functiongraph', [
    function(q) { return getS().tL * q; }, 0, 1.05
  ], { strokeColor: '#1565c0', strokeWidth: 1.5, dash: 3 });
  board.create('text', [1.02, function() { return getS().tL + 0.5; }, '\\(\\theta_L q\\)'], { fontSize: 9, color: '#1565c0', fixed: true });

  // Premium point (q=1, pH)
  board.create('point', [
    1,
    function() { var s = getS(); return s.tH - (s.tH - s.tL) * s.qL; }
  ], { size: 7, fillColor: '#C8102E', strokeColor: '#C8102E', name: '', fixed: true });

  // Basic point (qL, pL)
  board.create('point', [
    function() { return getS().qL; },
    function() { var s = getS(); return s.tL * s.qL; }
  ], { size: 7, fillColor: '#1565c0', strokeColor: '#1565c0', name: '', fixed: true });

  // Single price point (q=1, best uniform)
  board.create('point', [
    1,
    function() {
      var s = getS();
      // Price = tH captures only λ, price = tL captures all
      var piH = s.lam * s.tH;
      var piL = s.tL;
      return piH >= piL ? s.tH : s.tL;
    }
  ], { size: 7, fillColor: '#00897b', strokeColor: '#00897b', name: '', fixed: true });

  function update() {
    var s = getS();
    if (s.tL >= s.tH) { s.tL = s.tH - 0.5; document.getElementById('slider-tL').value = s.tL; }

    document.getElementById('val-tH').textContent = s.tH.toFixed(1);
    document.getElementById('val-tL').textContent = s.tL.toFixed(1);
    document.getElementById('val-qL').textContent = s.qL.toFixed(2);
    document.getElementById('val-lam').textContent = s.lam.toFixed(2);

    // Versioning prices
    var pL = s.tL * s.qL;
    var pH = s.tH - (s.tH - s.tL) * s.qL;
    var piVersion = s.lam * pH + (1 - s.lam) * pL;

    // Single price: max(λ*tH, tL)
    var piHighOnly = s.lam * s.tH;
    var piLowAll = 1 * s.tL;
    var piSingle = Math.max(piHighOnly, piLowAll);
    var pSingle = piHighOnly >= piLowAll ? s.tH : s.tL;

    var gain = piVersion - piSingle;

    var html = '<strong>Versioning:</strong><br>';
    html += 'Premium: \\(p_H = ' + pH.toFixed(1) + '\\), Basic: \\(p_L = ' + pL.toFixed(1) + '\\)<br>';
    html += 'Lucro: \\(' + s.lam.toFixed(2) + ' \\times ' + pH.toFixed(1) + ' + ' + (1 - s.lam).toFixed(2) + ' \\times ' + pL.toFixed(1) + ' = ' + piVersion.toFixed(1) + '\\)<br>';
    html += '<strong>Preço único:</strong> \\(p = ' + pSingle.toFixed(1) + '\\), lucro = \\(' + piSingle.toFixed(1) + '\\)<br>';
    if (gain > 0) {
      html += '<span style="color:#00897b;"><strong>Ganho do versioning: +' + gain.toFixed(1) + '</strong> (' + (gain / piSingle * 100).toFixed(0) + '% a mais)</span>';
    } else {
      html += '<span style="color:#C8102E;">Versioning não compensa aqui — ajuste \\(q_L\\).</span>';
    }

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-tH').value = 10;
    document.getElementById('slider-tL').value = 4;
    document.getElementById('slider-qL').value = 0.50;
    document.getElementById('slider-lam').value = 0.40;
    update();
  }

  ['slider-tH','slider-tL','slider-qL','slider-lam'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
