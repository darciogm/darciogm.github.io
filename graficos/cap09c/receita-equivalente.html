<!DOCTYPE html>
<!--
  Revenue Equivalence — Comparando formatos de leilão
  Library: JSXGraph
  Reason: Slider para N licitantes mostra que receita esperada
          é idêntica em 1º e 2º preço sob IPV.
  Chapter 9c — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equivalência de Receita</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(','\\)']] }, options: { enableMenu: false } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    .panels { flex: 1 1 440px; max-width: 540px; }
    #jxgbox1 { width: 100%; height: 220px; border: 1px solid #ddd; border-radius: 6px 6px 0 0; }
    #jxgbox2 { width: 100%; height: 220px; border: 1px solid #ddd; border-top: none; border-radius: 0 0 6px 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 3px; display: inline-block; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .panels, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div class="panels">
    <div id="jxgbox1"></div>
    <div id="jxgbox2"></div>
  </div>
  <div class="controls">
    <h3>Equivalência de Receita</h3>

    <div class="slider-group">
      <label>Nº de licitantes \(N\): <span class="val" id="val-N">3</span></label>
      <input type="range" id="slider-N" min="2" max="10" step="1" value="3">
    </div>
    <div class="slider-group">
      <label>Valor máximo \(\bar{v}\): <span class="val" id="val-vbar">100</span></label>
      <input type="range" id="slider-vbar" min="50" max="200" step="10" value="100">
    </div>

    <p style="font-size:0.78rem; color:#666; margin-top:0.3rem;">
      Painel sup.: funções de lance (1º vs 2º preço).<br>
      Painel inf.: receita esperada — <strong>idêntica!</strong><br>
      \(v_i \sim U[0, \bar{v}]\), IPV, risco-neutros.
    </p>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> 1º preço: \(b(v) = v \cdot (N-1)/N\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#1565c0;"></span> 2º preço: \(b(v) = v\) (verdade)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#333; height:1px; border-top:2px dashed #333;"></span> 45° (lance = valor)</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // 1st price BNE: b(v) = v*(N-1)/N
  // 2nd price: b(v) = v (dominant strategy)
  // Expected revenue both: E[Rev] = vbar * (N-1)/(N+1)
  // E[2nd order stat of N draws from U[0,vbar]] = vbar*(N-1)/(N+1)

  function getS() {
    return {
      N: parseInt(document.getElementById('slider-N').value),
      vbar: parseFloat(document.getElementById('slider-vbar').value)
    };
  }

  // Panel 1: Bid functions
  var b1 = JXG.JSXGraph.initBoard('jxgbox1', {
    boundingbox: [-8, 220, 210, -20],
    axis: false, showCopyright: false, showNavigation: false
  });
  b1.create('axis', [[0,0],[200,0]], {
    ticks: { drawLabels: true, label: { fontSize: 9 }, minorTicks: 0, ticksDistance: 50 }
  });
  b1.create('axis', [[0,0],[0,210]], {
    ticks: { drawLabels: true, label: { fontSize: 9, anchorX: 'right', offset: [-6, 0] }, minorTicks: 0, ticksDistance: 50 }
  });
  b1.create('text', [-6, 105, '<b>\\(b(v)\\)</b>'], { fontSize: 10, fixed: true, anchorX: 'middle', rotate: 90 });
  b1.create('text', [100, -14, '<b>Valor \\(v\\)</b>'], { fontSize: 10, fixed: true, anchorX: 'middle' });

  // 45-degree line
  b1.create('functiongraph', [function(v) { return v; }, 0, 200], {
    strokeColor: '#333', strokeWidth: 1, dash: 3
  });

  // 1st price bid function
  b1.create('functiongraph', [
    function(v) { var s = getS(); return v * (s.N - 1) / s.N; }, 0, 200
  ], { strokeColor: '#C8102E', strokeWidth: 2.5 });

  // 2nd price: b(v) = v (same as 45° line but thicker)
  b1.create('functiongraph', [function(v) { return v; }, 0, 200], {
    strokeColor: '#1565c0', strokeWidth: 2.5, dash: 0
  });

  // Panel 2: Revenue as function of N
  var b2 = JXG.JSXGraph.initBoard('jxgbox2', {
    boundingbox: [-0.8, 220, 11, -20],
    axis: false, showCopyright: false, showNavigation: false
  });
  b2.create('axis', [[0,0],[10,0]], {
    ticks: { drawLabels: true, label: { fontSize: 9 }, minorTicks: 0, ticksDistance: 2 }
  });
  b2.create('axis', [[0,0],[0,210]], {
    ticks: { drawLabels: true, label: { fontSize: 9, anchorX: 'right', offset: [-6, 0] }, minorTicks: 0, ticksDistance: 50 }
  });
  b2.create('text', [-0.6, 105, '<b>\\(E[Rev]\\)</b>'], { fontSize: 10, fixed: true, anchorX: 'middle', rotate: 90 });
  b2.create('text', [5, -14, '<b>\\(N\\) (licitantes)</b>'], { fontSize: 10, fixed: true, anchorX: 'middle' });

  // Revenue curve (same for both formats!)
  b2.create('functiongraph', [
    function(n) { var s = getS(); if (n < 2) return NaN; return s.vbar * (n - 1) / (n + 1); }, 2, 10
  ], { strokeColor: '#00897b', strokeWidth: 2.5 });

  // Discrete points for integer N
  for (var nn = 2; nn <= 10; nn++) {
    (function(n) {
      b2.create('point', [
        n,
        function() { return getS().vbar * (n - 1) / (n + 1); }
      ], { size: 4, fillColor: '#00897b', strokeColor: '#00897b', name: '', fixed: true });
    })(nn);
  }

  // Current N highlight
  b2.create('point', [
    function() { return getS().N; },
    function() { var s = getS(); return s.vbar * (s.N - 1) / (s.N + 1); }
  ], { size: 7, fillColor: '#C8102E', strokeColor: '#C8102E', name: '', fixed: true });

  function update() {
    var s = getS();
    document.getElementById('val-N').textContent = s.N;
    document.getElementById('val-vbar').textContent = s.vbar.toFixed(0);

    var rev = s.vbar * (s.N - 1) / (s.N + 1);
    var shade = (s.N - 1) / s.N;

    var html = '<strong>1º preço:</strong> \\(b(v) = ' + shade.toFixed(2) + ' \\cdot v\\)<br>';
    html += 'Sombreamento: \\(' + ((1 - shade) * 100).toFixed(0) + '\\%\\) do valor<br>';
    html += '<strong>2º preço:</strong> \\(b(v) = v\\) (verdade)<br>';
    html += '<hr style="margin:0.3rem 0;">';
    html += '<strong style="color:#00897b;">Receita esperada (ambos):</strong><br>';
    html += '\\(E[Rev] = \\bar{v} \\cdot \\frac{N-1}{N+1} = ' + s.vbar + ' \\cdot \\frac{' + (s.N - 1) + '}{' + (s.N + 1) + '} = ' + rev.toFixed(1) + '\\)<br>';
    html += '<em>Equivalência de receita: mecanismos diferentes, mesma receita!</em>';

    document.getElementById('info').innerHTML = html;
    b1.update();
    b2.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-N').value = 3;
    document.getElementById('slider-vbar').value = 100;
    update();
  }

  ['slider-N','slider-vbar'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
