<!DOCTYPE html>
<!--
  Leilão de Segundo Preço (Vickrey) — Verdade como estratégia dominante
  Library: JSXGraph
  Reason: Sliders para valor real e lance mostram que b=v é ótimo
          independente do lance rival. Visualiza payoff em função do lance.
  Chapter 9c — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leilão de Segundo Preço (Vickrey)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(','\\)']] }, options: { enableMenu: false } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 3px; display: inline-block; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Leilão de Vickrey (2º Preço)</h3>

    <div class="slider-group">
      <label>Seu valor \(v_i\): <span class="val" id="val-v">70</span></label>
      <input type="range" id="slider-v" min="10" max="100" step="1" value="70">
    </div>
    <div class="slider-group">
      <label>Seu lance \(b_i\): <span class="val" id="val-b">70</span></label>
      <input type="range" id="slider-b" min="0" max="100" step="1" value="70">
    </div>
    <div class="slider-group">
      <label>Lance rival \(b_{-i}\): <span class="val" id="val-br">50</span></label>
      <input type="range" id="slider-br" min="0" max="100" step="1" value="50">
    </div>

    <p style="font-size:0.78rem; color:#666; margin-top:0.3rem;">
      Regra: maior lance ganha, paga o <strong>segundo</strong> maior lance.<br>
      Observe que \(b_i = v_i\) é sempre (fracamente) ótimo.
    </p>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#1565c0;"></span> Payoff em função de \(b_i\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E; height:1px; border-top:2px dashed #C8102E;"></span> Seu valor \(v_i\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#ff9800; height:1px; border-top:2px dashed #ff9800;"></span> Lance rival \(b_{-i}\)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#00897b; height:10px; opacity:0.3;"></span> Excedente do vencedor</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // Second-price auction: payoff = (v - b_{-i}) if b_i > b_{-i}, else 0
  // As function of b_i: payoff is a step function
  //   b_i < b_{-i}: payoff = 0
  //   b_i > b_{-i}: payoff = v - b_{-i} (constant, doesn't depend on b_i!)
  // So b_i = v is weakly dominant

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-8, 60, 108, -20],
    axis: false, showCopyright: false, showNavigation: false
  });

  board.create('axis', [[0,0],[100,0]], {
    ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 20 }
  });
  board.create('axis', [[0,0],[0,55]], {
    ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 10 }
  });
  board.create('text', [-6, 25, '<b>Payoff</b>'], { fontSize: 11, fixed: true, anchorX: 'middle', rotate: 90 });
  board.create('text', [50, -14, '<b>Seu lance \\(b_i\\)</b>'], { fontSize: 11, fixed: true, anchorX: 'middle' });

  function getS() {
    return {
      v: parseFloat(document.getElementById('slider-v').value),
      b: parseFloat(document.getElementById('slider-b').value),
      br: parseFloat(document.getElementById('slider-br').value)
    };
  }

  // Payoff function: step at b_{-i}
  // Left of b_{-i}: 0
  board.create('segment', [
    [0, 0],
    function() { return [getS().br, 0]; }
  ], { strokeColor: '#1565c0', strokeWidth: 3 });

  // Right of b_{-i}: v - b_{-i}
  board.create('segment', [
    function() { return [getS().br, Math.max(0, getS().v - getS().br)]; },
    function() { return [100, Math.max(0, getS().v - getS().br)]; }
  ], { strokeColor: '#1565c0', strokeWidth: 3 });

  // Vertical jump at b_{-i}
  board.create('segment', [
    function() { return [getS().br, 0]; },
    function() { return [getS().br, Math.max(0, getS().v - getS().br)]; }
  ], { strokeColor: '#1565c0', strokeWidth: 1, dash: 3 });

  // v_i vertical line
  board.create('line', [
    function() { return [getS().v, 0]; },
    function() { return [getS().v, 55]; }
  ], { strokeColor: '#C8102E', strokeWidth: 1.5, dash: 2, straightFirst: false, straightLast: false, point1: { visible: false }, point2: { visible: false } });
  board.create('text', [function() { return getS().v + 2; }, 50, '\\(v_i\\)'], { fontSize: 10, color: '#C8102E', fixed: true });

  // b_{-i} vertical line
  board.create('line', [
    function() { return [getS().br, 0]; },
    function() { return [getS().br, 55]; }
  ], { strokeColor: '#ff9800', strokeWidth: 1.5, dash: 2, straightFirst: false, straightLast: false, point1: { visible: false }, point2: { visible: false } });
  board.create('text', [function() { return getS().br + 2; }, 50, '\\(b_{-i}\\)'], { fontSize: 10, color: '#ff9800', fixed: true });

  // Current choice point
  board.create('point', [
    function() { return getS().b; },
    function() { var s = getS(); return s.b > s.br ? Math.max(0, s.v - s.br) : 0; }
  ], { size: 6, fillColor: '#00897b', strokeColor: '#00897b', name: '', fixed: true });

  // Surplus area when winning
  board.create('polygon', [
    function() { var s = getS(); return s.b > s.br ? [s.br, 0] : [0, 0]; },
    function() { var s = getS(); return s.b > s.br ? [100, 0] : [0, 0]; },
    function() { var s = getS(); return s.b > s.br ? [100, Math.max(0, s.v - s.br)] : [0, 0]; },
    function() { var s = getS(); return s.b > s.br ? [s.br, Math.max(0, s.v - s.br)] : [0, 0]; }
  ], {
    fillColor: '#00897b', fillOpacity: 0.1,
    borders: { strokeWidth: 0 },
    vertices: { visible: false }
  });

  function update() {
    var s = getS();
    document.getElementById('val-v').textContent = s.v.toFixed(0);
    document.getElementById('val-b').textContent = s.b.toFixed(0);
    document.getElementById('val-br').textContent = s.br.toFixed(0);

    var wins = s.b > s.br;
    var payoff = wins ? Math.max(0, s.v - s.br) : 0;

    var html = '';
    if (wins) {
      if (s.v >= s.br) {
        html += '<span style="color:#00897b;"><strong>Você venceu!</strong></span><br>';
        html += 'Pagamento: \\(' + s.br + '\\) (lance rival)<br>';
        html += 'Payoff: \\(v_i - b_{-i} = ' + s.v + ' - ' + s.br + ' = ' + payoff + '\\)<br>';
      } else {
        html += '<span style="color:#C8102E;"><strong>Venceu, mas pagou caro!</strong></span><br>';
        html += 'Payoff negativo: \\(' + s.v + ' - ' + s.br + ' = ' + (s.v - s.br) + '\\)<br>';
        html += '<em>Lance acima de \\(v_i\\) pode causar prejuízo!</em><br>';
      }
    } else {
      html += '<strong>Você perdeu.</strong> Payoff = 0.<br>';
    }

    if (s.b === s.v) {
      html += '<span style="color:#00897b;"><strong>✓ Lance = valor: estratégia dominante!</strong></span>';
    } else if (s.b < s.v) {
      html += '<em>Lance abaixo de \\(v_i\\): risco de perder leilão lucrativo.</em>';
    } else {
      html += '<em>Lance acima de \\(v_i\\): risco de vencer pagando mais que vale.</em>';
    }

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-v').value = 70;
    document.getElementById('slider-b').value = 70;
    document.getElementById('slider-br').value = 50;
    update();
  }

  ['slider-v','slider-b','slider-br'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
