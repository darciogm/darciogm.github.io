<!DOCTYPE html>
<!--
  Backward Induction — Indução retroativa em jogo sequencial
  Library: JSXGraph
  Reason: Slider para payoffs mostra como a solução por indução retroativa muda.
  Chapter 9b — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indução Retroativa</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(','\\)']] }, options: { enableMenu: false } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 460px; max-width: 560px; height: 400px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.7rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 0.15rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 560px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Indução Retroativa</h3>
    <p style="font-size:0.8rem; color:#555; margin-bottom:0.6rem;">
      Jogo de entrada: Entrante decide E (entrar) ou NE; Incumbente responde A (acomodar) ou G (guerra de preços).
    </p>

    <div class="slider-group">
      <label>Lucro Entrante se acomoda: <span class="val" id="val-ea">3</span></label>
      <input type="range" id="slider-ea" min="0" max="6" step="0.5" value="3">
    </div>
    <div class="slider-group">
      <label>Lucro Incumbente se acomoda: <span class="val" id="val-ia">2</span></label>
      <input type="range" id="slider-ia" min="0" max="6" step="0.5" value="2">
    </div>
    <div class="slider-group">
      <label>Lucro Entrante se guerra: <span class="val" id="val-eg">-1</span></label>
      <input type="range" id="slider-eg" min="-4" max="2" step="0.5" value="-1">
    </div>
    <div class="slider-group">
      <label>Lucro Incumbente se guerra: <span class="val" id="val-ig">0</span></label>
      <input type="range" id="slider-ig" min="-4" max="3" step="0.5" value="0">
    </div>
    <div class="slider-group">
      <label>Lucro Incumbente se NE: <span class="val" id="val-ine">5</span></label>
      <input type="range" id="slider-ine" min="1" max="8" step="0.5" value="5">
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-1, 10, 11, -1],
    axis: false, showCopyright: false, showNavigation: false
  });

  function getS() {
    return {
      ea: parseFloat(document.getElementById('slider-ea').value),
      ia: parseFloat(document.getElementById('slider-ia').value),
      eg: parseFloat(document.getElementById('slider-eg').value),
      ig: parseFloat(document.getElementById('slider-ig').value),
      ine: parseFloat(document.getElementById('slider-ine').value)
    };
  }

  // Tree nodes
  var root = [2, 7];    // Entrante decides
  var mid = [6, 7];     // Incumbente decides (after E)
  var ne = [2, 2];      // Not Enter terminal
  var acc = [9, 9];     // Accommodate terminal
  var war = [9, 5];     // War terminal

  // Branches
  var brNE = board.create('segment', [root, ne], { strokeColor: '#888', strokeWidth: 2 });
  var brE = board.create('segment', [root, mid], { strokeColor: '#888', strokeWidth: 2 });
  var brA = board.create('segment', [mid, acc], { strokeColor: '#888', strokeWidth: 2 });
  var brG = board.create('segment', [mid, war], { strokeColor: '#888', strokeWidth: 2 });

  // Highlight optimal path
  var optE = board.create('segment', [root, mid], { strokeColor: '#00897b', strokeWidth: 4, strokeOpacity: 0 });
  var optNE = board.create('segment', [root, ne], { strokeColor: '#00897b', strokeWidth: 4, strokeOpacity: 0 });
  var optA = board.create('segment', [mid, acc], { strokeColor: '#00897b', strokeWidth: 4, strokeOpacity: 0 });
  var optG = board.create('segment', [mid, war], { strokeColor: '#00897b', strokeWidth: 4, strokeOpacity: 0 });

  // Node markers
  board.create('point', root, { size: 6, fillColor: '#C8102E', strokeColor: '#C8102E', name: '', fixed: true });
  board.create('point', mid, { size: 6, fillColor: '#1565c0', strokeColor: '#1565c0', name: '', fixed: true });

  // Labels
  board.create('text', [root[0]-0.6, root[1]+0.5, '<b>Entrante</b>'], { fontSize: 12, color: '#C8102E', fixed: true });
  board.create('text', [mid[0]-0.2, mid[1]+0.5, '<b>Incumbente</b>'], { fontSize: 12, color: '#1565c0', fixed: true });

  // Branch labels
  board.create('text', [1.2, 5, 'NE'], { fontSize: 11, color: '#888', fixed: true });
  board.create('text', [4, 7.5, 'E'], { fontSize: 11, color: '#888', fixed: true });
  board.create('text', [7.8, 8.5, 'A'], { fontSize: 11, color: '#888', fixed: true });
  board.create('text', [7.8, 5.8, 'G'], { fontSize: 11, color: '#888', fixed: true });

  // Payoff labels (dynamic)
  var lblNE = board.create('text', [ne[0]-0.5, ne[1]-0.8, ''], { fontSize: 11, fixed: true });
  var lblAcc = board.create('text', [acc[0]+0.2, acc[1]+0.2, ''], { fontSize: 11, fixed: true });
  var lblWar = board.create('text', [war[0]+0.2, war[1]+0.2, ''], { fontSize: 11, fixed: true });

  function update() {
    var s = getS();
    document.getElementById('val-ea').textContent = s.ea.toFixed(1);
    document.getElementById('val-ia').textContent = s.ia.toFixed(1);
    document.getElementById('val-eg').textContent = s.eg.toFixed(1);
    document.getElementById('val-ig').textContent = s.ig.toFixed(1);
    document.getElementById('val-ine').textContent = s.ine.toFixed(1);

    // Payoff labels
    lblNE.setText('(0, ' + s.ine.toFixed(1) + ')');
    lblAcc.setText('(' + s.ea.toFixed(1) + ', ' + s.ia.toFixed(1) + ')');
    lblWar.setText('(' + s.eg.toFixed(1) + ', ' + s.ig.toFixed(1) + ')');

    // Backward induction:
    // Step 1: Incumbente chooses A if ia >= ig, else G
    var incChoosesA = s.ia >= s.ig;
    // Step 2: Entrante gets ea (if A) or eg (if G) from entering
    var entrantPayoffIfEnter = incChoosesA ? s.ea : s.eg;
    var enters = entrantPayoffIfEnter > 0; // NE gives 0

    // Highlight path
    optE.setAttribute({ strokeOpacity: enters ? 0.5 : 0 });
    optNE.setAttribute({ strokeOpacity: enters ? 0 : 0.5 });
    optA.setAttribute({ strokeOpacity: (enters && incChoosesA) ? 0.5 : 0 });
    optG.setAttribute({ strokeOpacity: (enters && !incChoosesA) ? 0.5 : 0 });

    var html = '<strong>Passo 1 (Incumbente):</strong><br>';
    html += incChoosesA ?
      'Acomoda (\\(' + s.ia.toFixed(1) + ' \\geq ' + s.ig.toFixed(1) + '\\))' :
      'Guerra (\\(' + s.ig.toFixed(1) + ' > ' + s.ia.toFixed(1) + '\\))';
    html += '<br><strong>Passo 2 (Entrante):</strong><br>';
    html += enters ?
      'Entra (payoff \\(' + entrantPayoffIfEnter.toFixed(1) + ' > 0\\))' :
      'Não entra (payoff \\(' + entrantPayoffIfEnter.toFixed(1) + ' \\leq 0\\))';
    html += '<br><span style="color:#00897b;"><strong>EPS: ' + (enters ? 'Entra' : 'Não entra') + ', ' + (incChoosesA ? 'Acomoda' : 'Guerra') + '</strong></span>';

    if (!enters && incChoosesA) {
      html += '<br><em style="font-size:0.78rem;">A ameaça de guerra não é crível — o incumbente acomodaria!</em>';
    }

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-ea').value = 3;
    document.getElementById('slider-ia').value = 2;
    document.getElementById('slider-eg').value = -1;
    document.getElementById('slider-ig').value = 0;
    document.getElementById('slider-ine').value = 5;
    update();
  }

  ['slider-ea','slider-ia','slider-eg','slider-ig','slider-ine'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });

  update();
</script>
</body>
</html>
