<!DOCTYPE html>
<!--
  Comprometimento e Vantagem de Stackelberg
  Library: JSXGraph
  Reason: Sliders para custo de comprometimento K e parâmetros de demanda mostram
          como investimento irreversível cria vantagem de primeiro movimento.
  Chapter 9b — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comprometimento e Stackelberg</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(','\\)']] }, options: { enableMenu: false } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .legend-swatch { width: 20px; height: 3px; display: inline-block; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox, .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>Stackelberg vs. Cournot</h3>

    <div class="slider-group">
      <label>Demanda \(a\): <span class="val" id="val-a">12</span></label>
      <input type="range" id="slider-a" min="6" max="20" step="1" value="12">
    </div>
    <div class="slider-group">
      <label>Custo marginal \(c\): <span class="val" id="val-c">2</span></label>
      <input type="range" id="slider-c" min="0" max="8" step="0.5" value="2">
    </div>
    <div class="slider-group">
      <label>Líder escolhe \(q_1\): <span class="val" id="val-q1">auto</span></label>
      <input type="range" id="slider-q1" min="0" max="10" step="0.25" value="-1">
    </div>

    <p style="font-size:0.78rem; color:#666; margin-top:0.3rem;">
      \(P = a - q_1 - q_2\), custo \(c \cdot q_i\).<br>
      Slider \(q_1\) no mínimo = ótimo de Stackelberg.
    </p>

    <div style="margin-top:0.6rem; margin-bottom:0.6rem;">
      <div class="legend-item"><span class="legend-swatch" style="background:#C8102E;"></span> Melhor resposta firma 1 (BR₁)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#1565c0;"></span> Melhor resposta firma 2 (BR₂)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#00897b; height:8px; width:8px; border-radius:50%;"></span> Cournot-Nash</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#ff9800; height:8px; width:8px; border-radius:50%;"></span> Stackelberg</div>
    </div>

    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  // P = a - q1 - q2, cost = c*qi
  // BR2(q1) = (a - c - q1)/2
  // BR1(q2) = (a - c - q2)/2
  // Cournot: q1 = q2 = (a-c)/3
  // Stackelberg leader: q1* = (a-c)/2, q2* = (a-c)/4

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-0.8, 12, 12, -0.8],
    axis: false, showCopyright: false, showNavigation: false
  });

  board.create('axis', [[0,0],[11,0]], {
    ticks: { drawLabels: true, label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 2 }
  });
  board.create('axis', [[0,0],[0,11]], {
    ticks: { drawLabels: true, label: { fontSize: 10, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 2 }
  });
  board.create('text', [-0.6, 5.5, '<b>\\(q_2\\)</b>'], { fontSize: 13, fixed: true, anchorX: 'middle', rotate: 90 });
  board.create('text', [5.5, -0.6, '<b>\\(q_1\\)</b>'], { fontSize: 13, fixed: true, anchorX: 'middle' });

  function getS() {
    var a = parseFloat(document.getElementById('slider-a').value);
    var c = parseFloat(document.getElementById('slider-c').value);
    var q1raw = parseFloat(document.getElementById('slider-q1').value);
    var q1star = (a - c) / 2; // Stackelberg optimal
    var q1 = q1raw < 0 ? q1star : q1raw;
    return { a: a, c: c, q1: q1, q1star: q1star, isAuto: q1raw < 0 };
  }

  // BR1: q1 = (a-c-q2)/2 => q2 = a-c - 2*q1
  board.create('functiongraph', [
    function(q1) { var s = getS(); return Math.max(0, (s.a - s.c) / 2 - q1 / 2); }, 0, 11
  ], { strokeColor: '#C8102E', strokeWidth: 2.5 });

  // BR2: q2 = (a-c-q1)/2
  board.create('functiongraph', [
    function(q1) { var s = getS(); return Math.max(0, (s.a - s.c - q1) / 2); }, 0, 11
  ], { strokeColor: '#1565c0', strokeWidth: 2.5 });

  // Isoprofit curves for firm 1 (through Stackelberg point)
  // π1 = (a - q1 - q2 - c)*q1 = k => q2 = a - c - q1 - k/q1
  board.create('functiongraph', [
    function(q1) {
      var s = getS();
      var q2s = Math.max(0, (s.a - s.c - s.q1) / 2);
      var k = (s.a - s.q1 - q2s - s.c) * s.q1;
      if (q1 <= 0.01) return NaN;
      var v = s.a - s.c - q1 - k / q1;
      return (v >= 0 && v <= 11) ? v : NaN;
    }, 0.1, 11
  ], { strokeColor: '#C8102E', strokeWidth: 1, dash: 3 });

  // Cournot point
  board.create('point', [
    function() { var s = getS(); return (s.a - s.c) / 3; },
    function() { var s = getS(); return (s.a - s.c) / 3; }
  ], { size: 6, fillColor: '#00897b', strokeColor: '#00897b', name: '', fixed: true });

  // Cournot label
  board.create('text', [
    function() { return (getS().a - getS().c) / 3 + 0.4; },
    function() { return (getS().a - getS().c) / 3 + 0.5; },
    'Cournot'
  ], { fontSize: 10, color: '#00897b', fixed: true });

  // Stackelberg point (on BR2)
  board.create('point', [
    function() { return getS().q1; },
    function() { var s = getS(); return Math.max(0, (s.a - s.c - s.q1) / 2); }
  ], { size: 6, fillColor: '#ff9800', strokeColor: '#ff9800', name: '', fixed: true });

  // Stackelberg label
  board.create('text', [
    function() { return getS().q1 + 0.4; },
    function() { var s = getS(); return Math.max(0, (s.a - s.c - s.q1) / 2) + 0.5; },
    function() { return getS().isAuto ? 'Stackelberg' : '\\(q_1\\) escolhido'; }
  ], { fontSize: 10, color: '#ff9800', fixed: true });

  // Horizontal line from q1 choice to BR2
  board.create('segment', [
    function() { return [getS().q1, 0]; },
    function() { var s = getS(); return [s.q1, Math.max(0, (s.a - s.c - s.q1) / 2)]; }
  ], { strokeColor: '#ff9800', strokeWidth: 1, dash: 2 });

  function update() {
    var s = getS();
    document.getElementById('val-a').textContent = s.a.toFixed(0);
    document.getElementById('val-c').textContent = s.c.toFixed(1);
    document.getElementById('val-q1').textContent = s.isAuto ? 'auto (' + s.q1.toFixed(1) + ')' : s.q1.toFixed(1);

    var qC = (s.a - s.c) / 3;
    var piC = qC * qC; // (a-c-2qC)*qC = qC^2 for symmetric Cournot
    var q2s = Math.max(0, (s.a - s.c - s.q1) / 2);
    var piL = (s.a - s.q1 - q2s - s.c) * s.q1;
    var piF = q2s * q2s;

    var html = '<strong>Cournot:</strong> \\(q_i^C = ' + qC.toFixed(1) + '\\), \\(\\pi_i^C = ' + piC.toFixed(1) + '\\)<br>';
    html += '<strong>Stackelberg:</strong><br>';
    html += '  Líder: \\(q_1 = ' + s.q1.toFixed(1) + '\\), \\(\\pi_1 = ' + piL.toFixed(1) + '\\)<br>';
    html += '  Seguidora: \\(q_2 = ' + q2s.toFixed(1) + '\\), \\(\\pi_2 = ' + piF.toFixed(1) + '\\)<br>';
    if (piL > piC) {
      html += '<span style="color:#00897b;">Líder ganha mais que em Cournot!</span>';
    } else {
      html += '<span style="color:#C8102E;">Líder não ganha vantagem nesse \(q_1\).</span>';
    }

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-a').value = 12;
    document.getElementById('slider-c').value = 2;
    document.getElementById('slider-q1').value = -1;
    update();
  }

  ['slider-a','slider-c','slider-q1'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
