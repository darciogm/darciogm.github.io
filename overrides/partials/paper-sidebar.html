<nav class="paper-sidebar md-nav md-nav--secondary">
  <label class="md-nav__title">This Paper</label>
  <ul class="md-nav__list">
    {% for item in paper_nav %}
    <li class="md-nav__item {% if item.url == paper_current_url %}md-nav__item--active{% endif %}">
      <a href="{{ item.url }}" class="md-nav__link {% if item.url == paper_current_url %}md-nav__link--active{% endif %}">
        {{ item.title }}
      </a>
    </li>
    {% endfor %}
  </ul>
</nav>

<style>
  .paper-sidebar {
    position: sticky;
    top: 4rem;
    max-height: calc(100vh - 5rem);
    overflow-y: auto;
    padding: 0.8rem 0;
    border-left: 1px solid var(--md-default-fg-color--lightest);
  }
  .paper-sidebar .md-nav__title {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0 0.8rem 0.5rem;
    color: var(--md-default-fg-color--light);
  }
  .paper-sidebar .md-nav__link--active {
    color: var(--md-primary-fg-color);
    font-weight: 600;
  }
</style>
