<!DOCTYPE html>
<!--
  Tragédia dos Comuns — Chapter 20
  Library: JSXGraph
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tragédia dos Comuns</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 440px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: .95rem; color: #C8102E; margin-bottom: .8rem; border-bottom: 1px solid #ddd; padding-bottom: .4rem; }
    .slider-group { margin-bottom: .7rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: .82rem; margin-bottom: .15rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: .8rem; padding: .8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: .82rem; line-height: 1.7; }
    .btn-reset { display: block; width: 100%; margin-top: .8rem; padding: .5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: .85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { flex-basis: 100%; width: 100%; max-width: 540px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 540px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>Capacidade (\(K\)): <span class="val" id="val-K">100</span></label>
        <input type="range" id="sl-K" min="40" max="200" step="5" value="100">
      </div>
      <div class="slider-group">
        <label>Usuários (\(N\)): <span class="val" id="val-N">10</span></label>
        <input type="range" id="sl-N" min="2" max="50" step="1" value="10">
      </div>
      <div class="slider-group">
        <label>Custo (\(w\)): <span class="val" id="val-w">2.0</span></label>
        <input type="range" id="sl-w" min="0.5" max="5" step="0.1" value="2.0">
      </div>
      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

<script>
  /*
    F(E) = aE - bE²,  a = K/10,  b = 0.1
    AP(E) = a - bE,  MP(E) = a - 2bE

    Social optimum: MP = w  =>  E* = (a-w)/(2b)
    Open access (N→∞): AP = w  =>  E_oa = (a-w)/b
    Nash (N users): FOC => AP + e_i·AP' = w  =>  E_N = N(a-w) / [b(N+1)]

    As N grows, E_N → E_oa. For small N, E_N < E_oa.
  */

  var K = 100, N = 10, w = 2.0;

  function a() { return K / 10; }
  var b = 0.1;
  function ap(e) { return Math.max(a() - b * e, 0); }
  function mp(e) { return a() - 2 * b * e; }
  function eSoc() { return Math.max((a() - w) / (2 * b), 0); }
  function eNash() { return Math.max(N * (a() - w) / (b * (N + 1)), 0); }
  function eOA() { return Math.max((a() - w) / b, 0); }

  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-12, 22, 110, -4],
    axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
  });

  // Axes
  board.create('axis', [[0,0],[105,0]], {
    ticks: { drawLabels: true, ticksDistance: 20, minorTicks: 0, label: { fontSize: 11 } },
    name: '', withLabel: false
  });
  board.create('text', [55, -2.8, '<b><i>E</i> (uso total)</b>'], {
    fontSize: 14, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false
  });
  board.create('axis', [[0,0],[0,20]], {
    ticks: { drawLabels: true, ticksDistance: 5, minorTicks: 0, label: { fontSize: 11, anchorX: 'right', offset: [-8, 0] } },
    name: '', withLabel: false
  });
  board.create('text', [-8, 11, '<b><i>$/unid.</i></b>'], {
    fontSize: 14, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
  });

  // --- Curves (1st quadrant) ---

  // AP
  board.create('functiongraph', [function(e) {
    if (e < 0) return NaN; var v = ap(e); return v > 0 ? v : NaN;
  }], { strokeColor: '#1565c0', strokeWidth: 2.5 });

  // MP
  board.create('functiongraph', [function(e) {
    if (e < 0) return NaN; return mp(e);
  }], { strokeColor: '#C8102E', strokeWidth: 2.5 });

  // Cost w
  board.create('functiongraph', [function(e) {
    return e >= 0 ? w : NaN;
  }], { strokeColor: '#333', strokeWidth: 2 });

  // --- Curve labels (at x-intercept + offset, clearly separated) ---
  board.create('text', [function(){ return eOA() + 3; }, 1.5, '<i>AP</i>'], {
    fontSize: 12, color: '#1565c0', fixed: true, highlight: false
  });
  board.create('text', [function(){ return a() / (2*b) + 3; }, 1.5, '<i>MP</i>'], {
    fontSize: 12, color: '#C8102E', fixed: true, highlight: false
  });
  board.create('text', [function(){ return eOA() + 3; }, function(){ return w + 1.2; }, '<i>w</i>'], {
    fontSize: 12, color: '#333', fixed: true, highlight: false
  });

  // --- Overuse shading (between E* and E_N) ---
  var nShade = 20;
  for (var i = 0; i < nShade; i++) {
    (function(idx) {
      var t0 = idx / nShade, t1 = (idx + 1) / nShade;
      board.create('polygon', [
        [function(){ return eSoc() + t0 * (eNash() - eSoc()); }, function(){ return w; }],
        [function(){ return eSoc() + t1 * (eNash() - eSoc()); }, function(){ return w; }],
        [function(){ return eSoc() + t1 * (eNash() - eSoc()); },
         function(){ var e = eSoc() + t1 * (eNash() - eSoc()); return ap(e); }],
        [function(){ return eSoc() + t0 * (eNash() - eSoc()); },
         function(){ var e = eSoc() + t0 * (eNash() - eSoc()); return ap(e); }]
      ], {
        fillColor: '#C8102E', fillOpacity: 0.15, borders: { strokeWidth: 0 },
        vertices: { visible: false }, hasInnerPoints: false, highlight: false
      });
    })(i);
  }

  // --- Equilibrium points ---

  // Nash (depends on N)
  board.create('point', [
    function(){ return eNash(); }, function(){ return w; }
  ], { name: '', size: 5, fillColor: '#1565c0', strokeColor: '#1565c0', fixed: true });
  board.create('text', [
    function(){ return eNash() + 2; }, function(){ return w + 2; },
    function(){ return '<span style="color:#1565c0;font-weight:700;"><i>E</i><sub>N</sub></span>'; }
  ], { fontSize: 11, fixed: true, highlight: false });

  // Social optimum
  board.create('point', [
    function(){ return eSoc(); }, function(){ return w; }
  ], { name: '', size: 5, fillColor: '#00897b', strokeColor: '#00897b', fixed: true });
  board.create('text', [
    function(){ return eSoc() - 2; }, function(){ return w + 2; },
    function(){ return '<span style="color:#00897b;font-weight:700;"><i>E</i>*</span>'; }
  ], { fontSize: 11, anchorX: 'right', fixed: true, highlight: false });

  // --- Dashed projection lines ---
  board.create('segment', [
    [function(){ return eNash(); }, function(){ return w; }],
    [function(){ return eNash(); }, 0]
  ], { strokeColor: '#1565c0', strokeWidth: 1, dash: 2, fixed: true });
  board.create('segment', [
    [function(){ return eSoc(); }, function(){ return w; }],
    [function(){ return eSoc(); }, 0]
  ], { strokeColor: '#00897b', strokeWidth: 1, dash: 2, fixed: true });

  // --- Sobreuso arrow ---
  board.create('segment', [
    [function(){ return eSoc(); }, -1.5],
    [function(){ return eNash(); }, -1.5]
  ], { strokeColor: '#C8102E', strokeWidth: 2.5, fixed: true, lastArrow: true });

  board.create('text', [
    function(){ return (eNash() + eSoc()) / 2; }, -2.8,
    'Sobreuso'
  ], { fontSize: 10, anchorX: 'middle', fixed: true, highlight: false,
       cssStyle: 'color:#C8102E;font-style:italic;font-weight:700;' });

  // --- Update ---
  function update() {
    K = parseFloat(document.getElementById('sl-K').value);
    N = parseFloat(document.getElementById('sl-N').value);
    w = parseFloat(document.getElementById('sl-w').value);
    document.getElementById('val-K').textContent = K.toFixed(0);
    document.getElementById('val-N').textContent = N.toFixed(0);
    document.getElementById('val-w').textContent = w.toFixed(1);

    var en = eNash(), es = eSoc(), eoa = eOA();
    var perUser = en / N;
    var outputN = a() * en - b * en * en;
    var outputS = a() * es - b * es * es;
    var profitN = outputN - w * en;
    var profitS = outputS - w * es;

    var html = '<b>Curvas:</b><br>';
    html += '\\(AP(E) = ' + a().toFixed(0) + ' - ' + b.toFixed(1) + 'E\\)<br>';
    html += '\\(MP(E) = ' + a().toFixed(0) + ' - ' + (2*b).toFixed(1) + 'E\\)<br>';
    html += '<hr style="margin:.3rem 0;border:none;border-top:1px solid #ddd;">';
    html += '<span style="color:#1565c0;font-weight:700;">Nash (' + N + ' usuários):</span><br>';
    html += '\\(E_N = \\frac{N(a-w)}{b(N+1)} = ' + en.toFixed(1) + '\\)<br>';
    html += 'Por usuário: ' + perUser.toFixed(1) + '<br>';
    html += 'Produção: ' + outputN.toFixed(1) + ', Lucro: ' + profitN.toFixed(1) + '<br>';
    html += '<span style="color:#00897b;font-weight:700;">Ótimo social (MP = w):</span><br>';
    html += '\\(E^* = ' + es.toFixed(1) + '\\)<br>';
    html += 'Produção: ' + outputS.toFixed(1) + ', Lucro: ' + profitS.toFixed(1) + '<br>';
    html += '<hr style="margin:.3rem 0;border:none;border-top:1px solid #ddd;">';
    html += '<span style="color:#C8102E;font-weight:700;">Sobreuso: ' + (en - es).toFixed(1) + '</span><br>';
    html += '<span style="font-size:0.78rem;color:#666;">Acesso aberto (\\(N \\to \\infty\\)): \\(E_{OA} = ' + eoa.toFixed(1) + '\\)</span>';

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('sl-K').value = 100;
    document.getElementById('sl-N').value = 10;
    document.getElementById('sl-w').value = 2.0;
    update();
  }

  ['sl-K','sl-N','sl-w'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
