<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>R Interativo — Otimização em Uma Variável</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'CMU Serif',Georgia,serif;background:#fff;color:#333;padding:1rem}.main-container{max-width:780px;margin:0 auto}.status-bar{padding:.5rem 1rem;border-radius:4px;font-size:.85rem;margin-bottom:1rem;text-align:center}.status-loading{background:#fff3e0;border:1px solid #ff9800;color:#e65100}.status-ready{background:#e8f5e9;border:1px solid #4caf50;color:#2e7d32}.status-error{background:#ffebee;border:1px solid #f44336;color:#c62828}.editor-container{border:1px solid #ddd;border-radius:6px;overflow:hidden;margin-bottom:1rem}.editor-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}.editor-header .lang-tag{background:#C8102E;color:#fff;padding:.15rem .5rem;border-radius:3px;font-size:.75rem;font-weight:700}textarea#r-code{width:100%;min-height:300px;padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.85rem;border:none;outline:none;resize:vertical;background:#fafafa;color:#333;line-height:1.5;tab-size:2}.btn-row{display:flex;gap:.5rem;margin-bottom:1rem}.btn-run{padding:.5rem 1.5rem;background:#C8102E;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:700}.btn-run:hover{background:#9a0c23}.btn-run:disabled{background:#ccc;cursor:not-allowed}.btn-reset{padding:.5rem 1.5rem;background:#fff;color:#666;border:1px solid #ddd;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit}.btn-reset:hover{background:#f5f5f5}.output-container{border:1px solid #ddd;border-radius:6px;overflow:hidden}.output-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd}#r-output{padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.82rem;background:#1e1e1e;color:#d4d4d4;min-height:120px;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}#r-plot{text-align:center;padding:.5rem;background:#fff}#r-plot img,#r-plot canvas{max-width:100%;border-radius:4px}.info-box{margin-top:1rem;padding:.8rem;background:#f8f8f8;border:1px solid #eee;border-radius:4px;font-size:.8rem;color:#666;line-height:1.5}html,body{margin:0!important;padding:0!important;overflow:visible!important}</style>
</head>
<body>
<div class="main-container">
  <div class="status-bar status-loading" id="status">Carregando WebR (~10s na primeira vez)...</div>
  <div class="editor-container">
    <div class="editor-header"><span>Edite o código e clique "Executar"</span><span class="lang-tag">R</span></div>
    <textarea id="r-code">
# Otimização em Uma Variável — CPO e CSO
# Cap. 2: Ferramentas Matemáticas

# Problema: maximizar f(x) = a*x - b*x^2 + c*x^3
# (cúbica com max e min locais)
a <- 12;  b <- 3;  c <- 0.2   # altere!

f   <- function(x)  a*x - b*x^2 + c*x^3
fp  <- function(x)  a - 2*b*x + 3*c*x^2   # f'(x)
fpp <- function(x) -2*b + 6*c*x            # f''(x)

# CPO: f'(x) = 0 => 3c*x^2 - 2b*x + a = 0
disc <- (2*b)^2 - 4*3*c*a
cat("=== CPO: f'(x) = 0 ===\n")
if (disc < 0) {
  cat("  Discriminante < 0: sem pontos críticos reais.\n")
} else {
  x1 <- (2*b - sqrt(disc)) / (2*3*c)
  x2 <- (2*b + sqrt(disc)) / (2*3*c)
  cat(sprintf("  x1 = %.3f   f''(x1) = %.3f  -> %s\n",
      x1, fpp(x1), ifelse(fpp(x1)<0, "MAXIMO LOCAL", "MINIMO LOCAL")))
  cat(sprintf("  x2 = %.3f   f''(x2) = %.3f  -> %s\n",
      x2, fpp(x2), ifelse(fpp(x2)<0, "MAXIMO LOCAL", "MINIMO LOCAL")))
  cat(sprintf("\n  f(x1) = %.3f\n  f(x2) = %.3f\n", f(x1), f(x2)))
}

# Gráfico
x <- seq(-2, 15, length.out = 400)
par(mfrow = c(1, 2), mar = c(4, 4, 3, 1))

# Painel 1: f(x)
plot(x, f(x), type = "l", col = "steelblue", lwd = 2,
     xlab = "x", ylab = "f(x)", main = "Função e pontos críticos")
abline(h = 0, col = "gray", lty = 3)
if (disc >= 0) {
  points(x1, f(x1), pch = 19, col = "#C8102E", cex = 1.5)
  points(x2, f(x2), pch = 17, col = "#2a7f2a", cex = 1.5)
  text(x1, f(x1)*1.15, sprintf("max (%.1f)", x1), col="#C8102E", font=2, cex=0.85)
  text(x2, f(x2)*0.85, sprintf("min (%.1f)", x2), col="#2a7f2a", font=2, cex=0.85)
}

# Painel 2: f'(x) e f''(x)
plot(x, fp(x), type = "l", col = "#C8102E", lwd = 2,
     xlab = "x", ylab = "Derivadas",
     main = "f'(x) e f''(x)",
     ylim = range(c(fp(x), fpp(x))))
lines(x, fpp(x), col = "#ff9800", lwd = 2, lty = 2)
abline(h = 0, col = "gray", lty = 3)
if (disc >= 0) {
  points(c(x1, x2), c(0, 0), pch = 19, col = "#333", cex = 1.3)
}
legend("topleft", legend = c("f'(x) = 0 → CPO", "f''(x) → CSO"),
       col = c("#C8102E", "#ff9800"), lwd = 2, lty = c(1,2), cex = 0.85)
</textarea>
  </div>
  <div class="btn-row">
    <button class="btn-run" id="btn-run" onclick="runCode()" disabled>Executar (R)</button>
    <button class="btn-reset" onclick="resetCode()">Restaurar código original</button>
  </div>
  <div class="output-container">
    <div class="output-header">Saída do R</div>
    <div id="r-output">Aguardando execução...</div>
    <div id="r-plot"></div>
  </div>
  <div class="info-box">
    <strong>WebR</strong> executa R no navegador. A CPO (f'=0) encontra candidatos; a CSO (f''&lt;0 ou &gt;0) classifica. Altere os coeficientes: o que acontece se c=0 (parábola)?
  </div>
</div>
<script type="module">
import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:620,height:340}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
</body>
</html>
