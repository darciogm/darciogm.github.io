<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebR — Equação de Mincer e Diferenciais Salariais</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#f8f9fa;padding:12px;overflow-x:hidden}.status-bar{padding:6px 12px;border-radius:6px;font-size:.85rem;margin-bottom:10px;text-align:center}.status-loading{background:#fff3cd;color:#856404}.status-ready{background:#d4edda;color:#155724}.status-error{background:#f8d7da;color:#721c24}textarea{width:100%;min-height:280px;font-family:'Fira Code',monospace;font-size:.85rem;padding:10px;border:2px solid #dee2e6;border-radius:8px;background:#1e1e1e;color:#d4d4d4;resize:vertical;tab-size:2;line-height:1.5}.btn-group{display:flex;gap:8px;margin:10px 0}button{padding:8px 20px;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:.9rem;transition:background .2s}#btn-run{background:#0d6efd;color:#fff}#btn-run:hover{background:#0b5ed7}#btn-run:disabled{background:#6c757d;cursor:not-allowed}#btn-reset{background:#6c757d;color:#fff}#btn-reset:hover{background:#5a6268}#r-output{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;font-family:'Fira Code',monospace;font-size:.82rem;white-space:pre-wrap;max-height:400px;overflow-y:auto;margin-top:8px;min-height:60px}#r-plot{text-align:center;margin-top:8px}#r-plot canvas{max-width:100%;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
</style>
</head>
<body>
<div id="status" class="status-bar status-loading">Carregando WebR...</div>
<textarea id="r-code">
# ============================================
# Equacao de Mincer e Diferenciais Salariais
# Exercicio Resolvido 17.3
# ============================================

# ln(w) = b0 + b1*S + b2*X + b3*X^2 + b4*D_fem + b5*D_negro
b0 <- 1.20
b1 <- 0.12   # retorno por ano de educacao
b2 <- 0.05   # retorno da experiencia
b3 <- -0.0007  # concavidade
b4 <- -0.18  # penalidade genero feminino
b5 <- -0.15  # penalidade raca negra

cat("====== EQUACAO DE MINCER ======\n")
cat("ln(w) = 1.20 + 0.12*S + 0.05*X - 0.0007*X^2")
cat(" - 0.18*D_fem - 0.15*D_negro\n\n")

# --- Retorno da educacao ---
cat("--- Retorno da educacao ---\n")
cat(sprintf("Cada ano adicional: +%.0f%% no salario\n", b1*100))
cat(sprintf("Ensino superior (16a) vs. medio (11a): +%.0f%%\n\n",
    (exp(b1*5) - 1)*100))

# --- Experiencia otima ---
X_star <- -b2 / (2*b3)
cat("--- Experiencia otima ---\n")
cat(sprintf("X* = %.1f anos\n", X_star))
cat(sprintf("Se comecou aos 18: pico salarial aos %.0f anos\n\n",
    18 + X_star))

# --- Diferenciais de genero e raca ---
cat("--- Diferenciais (mesma educacao e experiencia) ---\n")
gap_fem <- b4
gap_negro <- b5
gap_total <- b4 + b5

cat(sprintf("Mulher vs. Homem (branco): %.1f%% (exp: %.1f%%)\n",
    gap_fem*100, (exp(gap_fem)-1)*100))
cat(sprintf("Negro vs. Branco (homem): %.1f%% (exp: %.1f%%)\n",
    gap_negro*100, (exp(gap_negro)-1)*100))
cat(sprintf("Mulher negra vs. Homem branco: %.1f%% (exp: %.1f%%)\n\n",
    gap_total*100, (exp(gap_total)-1)*100))

# --- Perfis salariais para 4 grupos ---
cat("--- Perfis salariais (S=12, variando X) ---\n")
S <- 12
X_vals <- seq(0, 45, by = 5)
cat(sprintf("%-5s %-12s %-12s %-12s %-12s\n",
    "X", "H. Branco", "H. Negro", "M. Branca", "M. Negra"))
cat(strrep("-", 56), "\n")
for (X in X_vals) {
  w_HB <- exp(b0 + b1*S + b2*X + b3*X^2)
  w_HN <- exp(b0 + b1*S + b2*X + b3*X^2 + b5)
  w_MB <- exp(b0 + b1*S + b2*X + b3*X^2 + b4)
  w_MN <- exp(b0 + b1*S + b2*X + b3*X^2 + b4 + b5)
  cat(sprintf("%-5.0f %-12.2f %-12.2f %-12.2f %-12.2f\n",
      X, w_HB, w_HN, w_MB, w_MN))
}

# --- Grafico ---
par(mfrow = c(1, 2), mar = c(4.5, 4.5, 3, 1), bg = "#f8f9fa")

# Painel 1: Perfil experiencia-salario por grupo
X_seq <- seq(0, 45, length = 300)
cols <- c("#0d6efd", "#dc3545", "#198754", "#6f42c1")
grupos <- c("H. Branco", "H. Negro", "M. Branca", "M. Negra")
dummies <- list(c(0,0), c(0,1), c(1,0), c(1,1))

w_mat <- matrix(NA, length(X_seq), 4)
for (k in 1:4) {
  df <- dummies[[k]]
  w_mat[, k] <- exp(b0 + b1*S + b2*X_seq + b3*X_seq^2 +
                     b4*df[1] + b5*df[2])
}

plot(X_seq, w_mat[,1], type = "l", lwd = 3, col = cols[1],
     ylim = c(0, max(w_mat)*1.1),
     xlab = "Experiencia (anos)", ylab = "Salario-hora (R$)",
     main = paste0("Perfis salariais (S=", S, ")"))
for (k in 2:4) {
  lines(X_seq, w_mat[,k], lwd = 3, col = cols[k],
        lty = ifelse(k > 2, 2, 1))
}
abline(v = X_star, col = "#adb5bd", lty = 3)
text(X_star + 1, max(w_mat)*0.3,
     paste0("X* = ", round(X_star,1)),
     col = "#adb5bd", cex = 0.7, font = 2)

legend("topright", legend = grupos,
       col = cols, lwd = 3, lty = c(1,1,2,2),
       cex = 0.6, bg = "white")

# Painel 2: Retorno da educacao
S_seq <- seq(0, 20, length = 200)
X_fixo <- 10
w_educ <- exp(b0 + b1*S_seq + b2*X_fixo + b3*X_fixo^2)

plot(S_seq, w_educ, type = "l", lwd = 3, col = "#0d6efd",
     xlab = "Anos de escolaridade (S)",
     ylab = "Salario-hora (R$)",
     main = paste0("Retorno da educacao (X=", X_fixo, ")"))

# Marcos educacionais
S_marcos <- c(9, 12, 16)
nomes <- c("Fund.", "Medio", "Superior")
w_marcos <- exp(b0 + b1*S_marcos + b2*X_fixo + b3*X_fixo^2)
points(S_marcos, w_marcos, pch = 19, col = "#dc3545", cex = 1.5)
for (i in seq_along(S_marcos)) {
  text(S_marcos[i], w_marcos[i] * 1.1, nomes[i],
       col = "#dc3545", cex = 0.7, font = 2)
}

# Premio do superior vs medio
arrows(12, w_marcos[2], 16, w_marcos[3],
       col = "#198754", lwd = 2, length = 0.08)
text(14, (w_marcos[2]+w_marcos[3])/2 * 1.05,
     paste0("+", round((w_marcos[3]/w_marcos[2]-1)*100), "%"),
     col = "#198754", cex = 0.8, font = 2)
</textarea>
<div class="btn-group">
<button id="btn-run" disabled onclick="runCode()">&#9654; Executar</button>
<button id="btn-reset" onclick="resetCode()">&#8635; Resetar</button>
</div>
<div id="r-output">(Aguardando WebR...)</div>
<div id="r-plot"></div>
<script type="module">
import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:700,height:380}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
</body>
</html>
