<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebR — Barganha Sindical de Nash</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#f8f9fa;padding:12px;overflow-x:hidden}.status-bar{padding:6px 12px;border-radius:6px;font-size:.85rem;margin-bottom:10px;text-align:center}.status-loading{background:#fff3cd;color:#856404}.status-ready{background:#d4edda;color:#155724}.status-error{background:#f8d7da;color:#721c24}textarea{width:100%;min-height:280px;font-family:'Fira Code',monospace;font-size:.85rem;padding:10px;border:2px solid #dee2e6;border-radius:8px;background:#1e1e1e;color:#d4d4d4;resize:vertical;tab-size:2;line-height:1.5}.btn-group{display:flex;gap:8px;margin:10px 0}button{padding:8px 20px;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:.9rem;transition:background .2s}#btn-run{background:#0d6efd;color:#fff}#btn-run:hover{background:#0b5ed7}#btn-run:disabled{background:#6c757d;cursor:not-allowed}#btn-reset{background:#6c757d;color:#fff}#btn-reset:hover{background:#5a6268}#r-output{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;font-family:'Fira Code',monospace;font-size:.82rem;white-space:pre-wrap;max-height:400px;overflow-y:auto;margin-top:8px;min-height:60px}#r-plot{text-align:center;margin-top:8px}#r-plot canvas{max-width:100%;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
</style>
</head>
<body>
<div id="status" class="status-bar status-loading">Carregando WebR...</div>
<textarea id="r-code">
# ============================================
# Barganha Sindical de Nash
# Baseado no Exercicio 17.9
# ============================================

# Lucro da firma: pi = (100 - H)*H - w*H
# Utilidade do sindicato: U_S = (w - w0)*H
# Demanda por trabalho: H^d(w) = (100 - w)/2

w0 <- 10  # salario de reserva

cat("====== BARGANHA SINDICAL DE NASH ======\n")
cat("Lucro: pi = (100 - H)*H - w*H\n")
cat("Utilidade sindical: U_S = (w - w0)*H\n")
cat("Demanda: H^d(w) = (100 - w)/2\n")
cat("Salario de reserva: w0 =", w0, "\n\n")

# Demanda por trabalho
Hd <- function(w) (100 - w) / 2

# Lucro na demanda
pi_func <- function(w) {
  H <- Hd(w)
  (100 - H) * H - w * H
}

# Utilidade do sindicato na demanda
Us_func <- function(w) (w - w0) * Hd(w)

# Produto de Nash: max [(w-w0)*H]^beta * [pi]^(1-beta)
# Substituindo H = (100-w)/2:
# U_S = (w-w0)*(100-w)/2
# pi = (100-w)^2/4
# Nash: max [(w-w0)(100-w)/2]^beta * [(100-w)^2/4]^(1-beta)
# Tomando log e derivando:
# beta/(w-w0) - beta/(100-w) - 2(1-beta)/(100-w) = 0
# beta/(w-w0) = (beta + 2 - 2*beta)/(100-w) = (2-beta)/(100-w)
# beta*(100-w) = (2-beta)*(w-w0)
# w* = (beta*(100-w0) + 2*w0) / 2 = w0 + beta*(100-w0)/2

cat("--- Salario negociado por beta ---\n")
cat(sprintf("%-8s %-10s %-10s %-10s %-10s\n",
    "beta", "w*", "H*", "pi*", "U_S*"))
cat(strrep("-", 50), "\n")

beta_vals <- seq(0, 1, by = 0.1)
w_neg <- w0 + beta_vals * (100 - w0) / 2
H_neg <- Hd(w_neg)
pi_neg <- sapply(w_neg, pi_func)
Us_neg <- sapply(w_neg, Us_func)

for (i in seq_along(beta_vals)) {
  cat(sprintf("%-8.1f %-10.1f %-10.1f %-10.0f %-10.0f\n",
      beta_vals[i], w_neg[i], H_neg[i], pi_neg[i], Us_neg[i]))
}

cat("\nFormula: w* = w0 + beta*(100-w0)/2\n")
cat("beta=0: competitivo (w=w0, firma tem todo o poder)\n")
cat("beta=1: monopolio sindical (w=55, sindicato tem todo o poder)\n")

# --- Caso especifico beta = 0.5 ---
beta_ex <- 0.5
w_ex <- w0 + beta_ex * (100 - w0) / 2
H_ex <- Hd(w_ex)
pi_ex <- pi_func(w_ex)
Us_ex <- Us_func(w_ex)

cat(sprintf("\n--- Caso beta = %.1f ---\n", beta_ex))
cat(sprintf("w* = %.1f  H* = %.1f  pi* = %.0f  U_S* = %.0f\n",
    w_ex, H_ex, pi_ex, Us_ex))

# --- Grafico ---
par(mfrow = c(1, 2), mar = c(4.5, 4.5, 3, 1), bg = "#f8f9fa")

# Painel 1: Salario e emprego vs beta
plot(beta_vals, w_neg, type = "l", lwd = 3, col = "#dc3545",
     xlab = expression(beta ~ "(poder do sindicato)"),
     ylab = "",
     main = "Salario e emprego vs. poder sindical",
     ylim = c(0, 60))
par(new = TRUE)
plot(beta_vals, H_neg, type = "l", lwd = 3, col = "#0d6efd",
     lty = 2, axes = FALSE, xlab = "", ylab = "",
     ylim = c(0, 60))
axis(4, col = "#0d6efd", col.axis = "#0d6efd")
mtext("H*", side = 4, line = 2.5, col = "#0d6efd")

# beta = 0.5
abline(v = 0.5, col = "#adb5bd", lty = 3)
points(0.5, w_ex, pch = 19, col = "#dc3545", cex = 1.5)
points(0.5, H_ex, pch = 17, col = "#0d6efd", cex = 1.5)

legend("left",
       legend = c("w* (eixo esq.)", "H* (eixo dir.)"),
       col = c("#dc3545", "#0d6efd"),
       lwd = 3, lty = c(1, 2), cex = 0.65, bg = "white")

# Painel 2: Curva de contrato no espaco (w, H)
w_range <- seq(w0, 55, length = 200)
H_range <- Hd(w_range)

plot(H_range, w_range, type = "l", lwd = 3, col = "#6f42c1",
     xlab = "Emprego (H)", ylab = "Salario (w)",
     main = "Curva de demanda e equilibrios",
     xlim = c(0, 50), ylim = c(0, 60))

# Marcar pontos para beta = 0, 0.25, 0.5, 0.75, 1
beta_marks <- c(0, 0.25, 0.5, 0.75, 1)
w_marks <- w0 + beta_marks * (100 - w0) / 2
H_marks <- Hd(w_marks)
points(H_marks, w_marks, pch = 19,
       col = c("#198754", "#0d6efd", "#fd7e14", "#dc3545", "#6f42c1"),
       cex = 1.8)
for (i in seq_along(beta_marks)) {
  pos <- ifelse(i <= 3, 4, 2)
  text(H_marks[i], w_marks[i],
       paste0(" b=", beta_marks[i]),
       col = c("#198754", "#0d6efd", "#fd7e14", "#dc3545", "#6f42c1")[i],
       cex = 0.65, font = 2, pos = pos)
}

abline(h = w0, col = "#adb5bd", lty = 3)
text(5, w0 + 2, paste0("w0 = ", w0), col = "#adb5bd",
     cex = 0.7, font = 2)

legend("topright",
       legend = "Demanda H^d(w)",
       col = "#6f42c1", lwd = 3, cex = 0.65, bg = "white")
</textarea>
<div class="btn-group">
<button id="btn-run" disabled onclick="runCode()">&#9654; Executar</button>
<button id="btn-reset" onclick="resetCode()">&#8635; Resetar</button>
</div>
<div id="r-output">(Aguardando WebR...)</div>
<div id="r-plot"></div>
<script type="module">
import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:700,height:380}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
</body>
</html>
