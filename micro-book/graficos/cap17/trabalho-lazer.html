<!DOCTYPE html>
<!--
  Trabalho-Lazer: Escolha ótima — Chapter 17
  Library: JSXGraph
  Function types: Cobb-Douglas, Linear, Leontief, CES
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolha Trabalho-Lazer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    .jxgbox { flex: 1 1 420px; max-width: 480px; height: 400px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .fn-selector { display: flex; gap: 0.3rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
    .fn-btn { flex: 1; min-width: 55px; padding: 0.35rem 0.2rem; border: 2px solid #C8102E; border-radius: 4px; background: #fff; color: #C8102E; font-size: 0.72rem; font-family: inherit; cursor: pointer; text-align: center; font-weight: 600; }
    .fn-btn.active { background: #C8102E; color: #fff; }
    .fn-btn:hover:not(.active) { background: rgba(200,16,46,0.08); }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .jxgbox { flex-basis: 100%; width: 100%; max-width: 480px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 480px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox1" class="jxgbox"></div>
    <div class="controls">
      <h3>Função Utilidade</h3>
      <div class="fn-selector">
        <button class="fn-btn active" data-fn="cd" onclick="setFn('cd')">Cobb-Douglas</button>
        <button class="fn-btn" data-fn="linear" onclick="setFn('linear')">Linear</button>
        <button class="fn-btn" data-fn="leontief" onclick="setFn('leontief')">Leontief</button>
        <button class="fn-btn" data-fn="ces" onclick="setFn('ces')">CES</button>
      </div>
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>Salário \(w\): <span class="val" id="val-w">10</span></label>
        <input type="range" id="slider-w" min="2" max="30" step="0.5" value="10">
      </div>
      <div class="slider-group">
        <label>Renda não-salarial \(V\): <span class="val" id="val-V">0</span></label>
        <input type="range" id="slider-V" min="0" max="100" step="5" value="0">
      </div>
      <div class="slider-group">
        <label>\(\alpha\) (peso do consumo): <span class="val" id="val-alpha">0.50</span></label>
        <input type="range" id="slider-alpha" min="0.20" max="0.80" step="0.05" value="0.50">
      </div>
      <div class="slider-group">
        <label>\(T\) (horas disponíveis): <span class="val" id="val-T">24</span></label>
        <input type="range" id="slider-T" min="12" max="24" step="1" value="24">
      </div>
      <div class="slider-group" id="rho-group" style="display:none;">
        <label>\(\rho\) (CES): <span class="val" id="val-rho">-1.00</span></label>
        <input type="range" id="slider-rho" min="-5" max="0.9" step="0.1" value="-1">
      </div>
      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

<script>
  // U(C,L): utility over Consumption and Leisure
  // Budget: C + wL = wT + V => C = w(T-L) + V
  var currentFn = 'cd';

  var board = JXG.JSXGraph.initBoard('jxgbox1', {
    boundingbox: [-3.5, 850, 32, -45],
    axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
  });

  // Fixed axes
  board.create('axis', [[0,0],[30,0]], {
    ticks: { drawLabels: true, label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 4 },
    name: '', withLabel: false
  });
  board.create('text', [16, -30, '<b><i>L</i> (lazer)</b>'], {
    fontSize: 14, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false
  });
  board.create('axis', [[0,0],[0,850]], {
    ticks: { drawLabels: true, label: { fontSize: 11, anchorX: 'right', offset: [-8, 0] }, minorTicks: 0, ticksDistance: 100 },
    name: '', withLabel: false
  });
  board.create('text', [-2.5, 425, '<b><i>C</i> (consumo)</b>'], {
    fontSize: 14, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
  });

  // Dynamic objects array
  var dynObjs = [];
  function clearDyn() { dynObjs.forEach(function(o) { board.removeObject(o); }); dynObjs = []; }

  function getState() {
    return {
      w: parseFloat(document.getElementById('slider-w').value),
      V: parseFloat(document.getElementById('slider-V').value),
      alpha: parseFloat(document.getElementById('slider-alpha').value),
      T: parseFloat(document.getElementById('slider-T').value)
    };
  }
  function getRho() { return parseFloat(document.getElementById('slider-rho').value); }

  function setFn(fn) {
    currentFn = fn;
    document.querySelectorAll('.fn-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.fn === fn); });
    document.getElementById('rho-group').style.display = (fn === 'ces') ? '' : 'none';
    update();
  }

  function utilVal(C, L, a) {
    var b = 1 - a;
    if (C <= 0 || L <= 0) {
      if (currentFn === 'linear') return a * Math.max(C, 0) + b * Math.max(L, 0);
      return 0;
    }
    switch (currentFn) {
      case 'cd': return Math.pow(C, a) * Math.pow(L, b);
      case 'linear': return a * C + b * L;
      case 'leontief': return Math.min(C / a, L / b);
      case 'ces':
        var r = getRho();
        if (Math.abs(r) < 0.05) return Math.pow(C, a) * Math.pow(L, b);
        return Math.pow(a * Math.pow(C, r) + b * Math.pow(L, r), 1 / r);
    }
  }

  function icC(L, U, a) {
    var b = 1 - a;
    switch (currentFn) {
      case 'cd':
        if (L <= 0.01 || U <= 0) return NaN;
        return Math.pow(U / Math.pow(L, b), 1 / a);
      case 'linear':
        var v = (U - b * L) / a; return v >= 0 ? v : NaN;
      case 'leontief': return NaN;
      case 'ces':
        var r = getRho();
        if (Math.abs(r) < 0.05) { if (L <= 0.01 || U <= 0) return NaN; return Math.pow(U / Math.pow(L, b), 1 / a); }
        if (L <= 0.01) return NaN;
        var s = Math.pow(U, r) - b * Math.pow(L, r);
        if (s <= 0) return NaN;
        return Math.pow(s / a, 1 / r);
    }
  }

  function optimalLC(s) {
    var a = s.alpha, b = 1 - a;
    var M = s.w * s.T + s.V;
    var Ls, Cs;
    switch (currentFn) {
      case 'cd':
        Ls = b * M / s.w; Cs = a * M; break;
      case 'linear':
        if (b / s.w > a + 0.0001) { Ls = M / s.w; Cs = 0.01; }
        else if (a > b / s.w + 0.0001) { Ls = 0.01; Cs = M; }
        else { Ls = M / s.w / 2; Cs = M / 2; }
        break;
      case 'leontief':
        Ls = b * M / (a + b * s.w); Cs = (a / b) * Ls; break;
      case 'ces':
        var rho = getRho();
        if (Math.abs(rho) < 0.05) { Ls = b * M / s.w; Cs = a * M; }
        else {
          var sigma = 1 / (1 - rho);
          var CLratio = Math.pow((a * s.w) / b, sigma);
          if (!isFinite(CLratio) || CLratio < 0) { Ls = M / s.w; Cs = 0.01; }
          else { Ls = M / (CLratio + s.w); Cs = CLratio * Ls; }
        }
        break;
    }
    Ls = Math.min(Math.max(Ls, 0.01), s.T);
    Cs = Math.max(Cs, 0.01);
    return { L: Ls, C: Cs };
  }

  function update() {
    var s = getState();
    document.getElementById('val-w').textContent = s.w.toFixed(1);
    document.getElementById('val-V').textContent = s.V.toFixed(0);
    document.getElementById('val-alpha').textContent = s.alpha.toFixed(2);
    document.getElementById('val-T').textContent = s.T.toFixed(0);
    if (currentFn === 'ces') document.getElementById('val-rho').textContent = getRho().toFixed(2);

    var fullIncome = s.w * s.T + s.V;
    var opt = optimalLC(s);
    var hs = s.T - opt.L;
    var U = utilVal(opt.C, opt.L, s.alpha);

    clearDyn();

    // Budget line: C = w(T-L)+V = fullIncome - wL
    dynObjs.push(board.create('segment', [
      [0, fullIncome], [s.T + s.V / s.w, 0]
    ], { strokeColor: '#1565c0', strokeWidth: 2.5, fixed: true }));

    // Budget line slope label
    dynObjs.push(board.create('text', [1.5, fullIncome * 0.85,
      '<span style="font-size:10px;color:#1565c0;">incl. = −<i>w</i></span>'
    ], { fontSize: 10, anchorX: 'left', fixed: true, highlight: false }));

    // Endowment point
    dynObjs.push(board.create('point', [s.T, s.V], {
      size: 4, fillColor: '#666', strokeColor: '#666', name: '(<i>T</i>, <i>V</i>)', fixed: true,
      label: { fontSize: 10, offset: [8, -8], highlight: false }
    }));

    // Optimal point
    dynObjs.push(board.create('point', [opt.L, opt.C], {
      size: 5, fillColor: '#C8102E', strokeColor: '#C8102E', name: '(<i>L</i>*, <i>C</i>*)', fixed: true,
      label: { fontSize: 11, offset: [10, 8], highlight: false }
    }));

    // IC through optimal
    if (currentFn === 'leontief') {
      var vL = (1 - s.alpha) * U, vC = s.alpha * U;
      dynObjs.push(board.create('segment', [[vL, vC], [vL, 850]], { strokeColor: '#00897b', strokeWidth: 2, dash: 3, fixed: true }));
      dynObjs.push(board.create('segment', [[vL, vC], [32, vC]], { strokeColor: '#00897b', strokeWidth: 2, dash: 3, fixed: true }));
    } else {
      dynObjs.push(board.create('curve', [
        function(t) { return t; },
        (function(Uval, a) {
          return function(t) {
            if (t < 0.1) return NaN;
            var v = icC(t, Uval, a);
            return (v > 0 && v < 850) ? v : NaN;
          };
        })(U, s.alpha),
        0.1, 32
      ], { strokeColor: '#00897b', strokeWidth: 2, dash: 3 }));
    }

    // Dashed projection lines
    dynObjs.push(board.create('segment', [[opt.L, 0], [opt.L, opt.C]], { strokeColor: '#aaa', strokeWidth: 1, dash: 3, fixed: true }));
    dynObjs.push(board.create('segment', [[0, opt.C], [opt.L, opt.C]], { strokeColor: '#aaa', strokeWidth: 1, dash: 3, fixed: true }));

    // Info panel
    var html = '<div style="text-align:center;">';
    switch (currentFn) {
      case 'cd': html += '\\(U(C,L) = C^{\\alpha} L^{1-\\alpha}\\)'; break;
      case 'linear': html += '\\(U(C,L) = \\alpha C + (1\\!-\\!\\alpha) L\\)'; break;
      case 'leontief': html += '\\(U(C,L) = \\min(C/\\alpha,\\; L/(1\\!-\\!\\alpha))\\)'; break;
      case 'ces':
        var rho = getRho(), sigma = 1 / (1 - rho);
        html += '\\(U = (\\alpha C^{\\rho} + (1\\!-\\!\\alpha) L^{\\rho})^{1/\\rho}\\)';
        html += '<br><span style="font-size:0.78rem;">\\(\\sigma = ' + sigma.toFixed(2) + '\\)</span>';
        break;
    }
    html += '</div>';
    html += '<div style="margin-top:0.4rem;">';
    html += 'Renda plena: \\(M^* = wT + V = ' + fullIncome.toFixed(0) + '\\)<br>';
    html += '\\(L^* = ' + opt.L.toFixed(1) + '\\) horas de lazer<br>';
    html += '\\(h^* = T - L^* = ' + hs.toFixed(1) + '\\) horas de trabalho<br>';
    html += '\\(C^* = wh^* + V = ' + opt.C.toFixed(1) + '\\)';
    if (currentFn === 'linear') {
      var bangC = s.alpha, bangL = (1 - s.alpha) / s.w;
      if (bangC > bangL + 0.001) html += '<br><em>Solução de canto: só trabalho</em>';
      else if (bangL > bangC + 0.001) html += '<br><em>Solução de canto: só lazer</em>';
    }
    html += '</div>';

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-w').value = 10;
    document.getElementById('slider-V').value = 0;
    document.getElementById('slider-alpha').value = 0.50;
    document.getElementById('slider-T').value = 24;
    document.getElementById('slider-rho').value = -1;
    currentFn = 'cd';
    document.querySelectorAll('.fn-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.fn === 'cd'); });
    document.getElementById('rho-group').style.display = 'none';
    update();
  }

  ['slider-w','slider-V','slider-alpha','slider-T','slider-rho'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
