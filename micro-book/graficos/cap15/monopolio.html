<!DOCTYPE html>
<!--
  Monopoly Equilibrium — Interactive Graph (Chapter 14)
  Library: JSXGraph
  Shows: demand, MR, MC, monopoly equilibrium, profit, CS, DWL, competitive comparison
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equilíbrio de Monopólio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
.graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
 #jxgbox { flex: 1 1 420px; max-width: 520px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 300px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.7; }
    .info-box .section-title { font-weight: 700; color: #1565c0; margin-top: 0.4rem; }
    .info-box .section-title:first-child { margin-top: 0; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { flex-basis: 100%; width: 100%; max-width: 520px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 520px; }
    }
    /* anti-inflation-fix */
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>Intercepto da demanda \(a\): <span class="val" id="val-a">100</span></label>
        <input type="range" id="slider-a" min="40" max="150" step="1" value="100">
      </div>
      <div class="slider-group">
        <label>Inclinação da demanda \(b\): <span class="val" id="val-b">1.0</span></label>
        <input type="range" id="slider-b" min="0.2" max="3" step="0.1" value="1">
      </div>
      <div class="slider-group">
        <label>Custo marginal \(c\): <span class="val" id="val-c">20</span></label>
        <input type="range" id="slider-c" min="0" max="80" step="1" value="20">
      </div>
      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    var board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [-15, 120, 120, -15],
      axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
    });

    var xAxis = board.create('axis', [[0,0],[1,0]], {
      ticks: { drawLabels: true, minorTicks: 0, ticksDistance: 20, label: { fontSize: 11 } },
      name: '', withLabel: false
    });
    var xLabel = board.create('text', [60, -10, '<b><i>Q</i></b>'], {
      fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false
    });
    var yAxis = board.create('axis', [[0,0],[0,1]], {
      ticks: { drawLabels: true, minorTicks: 0, ticksDistance: 20, label: { fontSize: 11, anchorX: 'right', offset: [-8, 0] } },
      name: '', withLabel: false
    });
    var yLabel = board.create('text', [-11, 60, '<b><i>P</i></b>'], {
      fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
    });

    var pad = 15;
    function gp() {
      return {
        a: parseFloat(document.getElementById('slider-a').value),
        b: parseFloat(document.getElementById('slider-b').value),
        c: parseFloat(document.getElementById('slider-c').value)
      };
    }

    // DWL triangle (draw first so it's behind)
    var dwlPoly = board.create('polygon', [
      [function(){ var p=gp(); var qm=(p.a-p.c)/(2*p.b); return qm; }, function(){ var p=gp(); return (p.a+p.c)/2; }],
      [function(){ var p=gp(); return (p.a-p.c)/p.b; }, function(){ return gp().c; }],
      [function(){ var p=gp(); return (p.a-p.c)/(2*p.b); }, function(){ return gp().c; }]
    ], {
      fillColor: '#ff9800', fillOpacity: 0.25,
      borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false
    });

    // Profit rectangle
    var profitPoly = board.create('polygon', [
      [0, function(){ return gp().c; }],
      [function(){ var p=gp(); return (p.a-p.c)/(2*p.b); }, function(){ return gp().c; }],
      [function(){ var p=gp(); return (p.a-p.c)/(2*p.b); }, function(){ return (gp().a+gp().c)/2; }],
      [0, function(){ return (gp().a+gp().c)/2; }]
    ], {
      fillColor: '#00897b', fillOpacity: 0.18,
      borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false
    });

    // CS triangle
    var csPoly = board.create('polygon', [
      [0, function(){ return gp().a; }],
      [0, function(){ return (gp().a+gp().c)/2; }],
      [function(){ var p=gp(); return (p.a-p.c)/(2*p.b); }, function(){ return (gp().a+gp().c)/2; }]
    ], {
      fillColor: '#1565c0', fillOpacity: 0.18,
      borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false
    });

    // Demand curve (1st quadrant only)
    board.create('functiongraph', [function(q) { var p=gp(); if (q < 0) return NaN; var v = p.a - p.b*q; return v >= 0 ? v : NaN; }], {
      strokeColor: '#1565c0', strokeWidth: 2.5, name: 'Demanda'
    });
    board.create('text', [function(){ return gp().a/gp().b - 5; }, function(){ return 4; }], {
      name: '', anchorX: 'middle', fontSize: 13, color: '#1565c0', highlight: false,
      getText: function(){ return '<i>D</i>'; }
    });

    // MR curve (1st quadrant only)
    board.create('functiongraph', [function(q) { var p=gp(); if (q < 0) return NaN; var v = p.a - 2*p.b*q; return v >= 0 ? v : NaN; }], {
      strokeColor: '#C8102E', strokeWidth: 2, dash: 2, name: 'RMg'
    });
    board.create('text', [function(){ return gp().a/(2*gp().b) - 3; }, function(){ return 4; }], {
      name: '', anchorX: 'middle', fontSize: 13, color: '#C8102E', highlight: false,
      getText: function(){ return '<i>RMg</i>'; }
    });

    // MC line
    board.create('functiongraph', [function(q) { return gp().c; }], {
      strokeColor: '#00897b', strokeWidth: 2.5, name: 'CMg'
    });
    board.create('text', [function(){ return gp().a/gp().b - 2; }, function(){ return gp().c + 4; }], {
      name: '', anchorX: 'middle', fontSize: 13, color: '#00897b', highlight: false,
      getText: function(){ return '<i>CMg</i>'; }
    });

    // Monopoly point
    var ptQm = board.create('point', [
      function(){ var p=gp(); return (p.a-p.c)/(2*p.b); },
      function(){ return 0; }
    ], { visible: false });

    var ptMon = board.create('point', [
      function(){ var p=gp(); return (p.a-p.c)/(2*p.b); },
      function(){ var p=gp(); return (p.a+p.c)/2; }
    ], { name: '', size: 4, strokeColor: '#C8102E', fillColor: '#C8102E' });

    // Dashed lines from monopoly point
    board.create('segment', [
      [function(){ var p=gp(); return (p.a-p.c)/(2*p.b); }, function(){ return (gp().a+gp().c)/2; }],
      [0, function(){ return (gp().a+gp().c)/2; }]
    ], { strokeColor: '#999', strokeWidth: 1, dash: 3 });
    board.create('segment', [
      [function(){ var p=gp(); return (p.a-p.c)/(2*p.b); }, function(){ return (gp().a+gp().c)/2; }],
      [function(){ var p=gp(); return (p.a-p.c)/(2*p.b); }, 0]
    ], { strokeColor: '#999', strokeWidth: 1, dash: 3 });

    // Monopoly labels
    board.create('text', [
      -6, function(){ return (gp().a+gp().c)/2; },
      function(){ return '<i>P<sup>m</sup></i>'; }
    ], { fontSize: 12, color: '#C8102E', anchorX: 'right', highlight: false });
    board.create('text', [
      function(){ var p=gp(); return (p.a-p.c)/(2*p.b); }, function(){ return -pad * 0.3; },
      function(){ return '<i>Q<sup>m</sup></i>'; }
    ], { fontSize: 12, color: '#C8102E', anchorX: 'middle', highlight: false });

    // Competitive point
    var ptComp = board.create('point', [
      function(){ var p=gp(); return (p.a-p.c)/p.b; },
      function(){ return gp().c; }
    ], { name: '', size: 3, strokeColor: '#00897b', fillColor: '#00897b', strokeOpacity: 0.6, fillOpacity: 0.6 });

    board.create('segment', [
      [function(){ var p=gp(); return (p.a-p.c)/p.b; }, function(){ return gp().c; }],
      [function(){ var p=gp(); return (p.a-p.c)/p.b; }, 0]
    ], { strokeColor: '#999', strokeWidth: 1, dash: 3 });
    board.create('text', [
      function(){ var p=gp(); return (p.a-p.c)/p.b; }, -4,
      function(){ return '<i>Q<sup>c</sup></i>'; }
    ], { fontSize: 12, color: '#00897b', anchorX: 'middle', highlight: false });

    // Area labels — hidden when areas shrink too small
    board.create('text', [
      function(){ var p=gp(); return (p.a-p.c)/(4*p.b); },
      function(){ var p=gp(); return (p.a+p.c)/2 + (p.a - (p.a+p.c)/2)/3; },
      'EC'
    ], { fontSize: 12, color: '#1565c0', anchorX: 'middle', fontWeight: 'bold', highlight: false,
         visible: function(){ var p=gp(); return (p.a - p.c) > 10; } });

    board.create('text', [
      function(){ var p=gp(); return (p.a-p.c)/(4*p.b); },
      function(){ var p=gp(); return p.c + ((p.a+p.c)/2 - p.c)/2; },
      function(){ return '<i>π</i>'; }
    ], { fontSize: 12, color: '#00897b', anchorX: 'middle', fontWeight: 'bold', highlight: false,
         visible: function(){ var p=gp(); return (p.a - p.c) > 10; } });

    board.create('text', [
      function(){ var p=gp(); var qm=(p.a-p.c)/(2*p.b); var qc=(p.a-p.c)/p.b; return qm + (qc-qm)*0.4; },
      function(){ var p=gp(); return p.c + ((p.a+p.c)/2 - p.c)*0.3; },
      'PPM'
    ], { fontSize: 11, color: '#ff9800', anchorX: 'middle', fontWeight: 'bold', highlight: false,
         visible: function(){ var p=gp(); return (p.a - p.c) > 10; } });

    function updateInfo() {
      var p = gp();
      document.getElementById('val-a').textContent = p.a.toFixed(0);
      document.getElementById('val-b').textContent = p.b.toFixed(1);
      document.getElementById('val-c').textContent = p.c.toFixed(0);

      // Dynamic bounding box
      var qcMax = Math.max(10, (p.a - p.c) / p.b);
      var pMax = Math.max(10, p.a);
      pad = Math.max(qcMax, pMax) * 0.15;
      var xMax = qcMax + pad;
      var yMax = pMax + pad * 0.5;
      var tickDist = xMax <= 60 ? 10 : xMax <= 150 ? 20 : 50;
      board.setBoundingBox([-pad, yMax, xMax, -pad], false);
      xAxis.ticks[0].setAttribute({ ticksDistance: tickDist });
      yAxis.ticks[0].setAttribute({ ticksDistance: tickDist <= 20 ? 20 : tickDist });
      xLabel.moveTo([xMax / 2, -pad * 0.65]);
      yLabel.moveTo([-pad * 0.75, yMax / 2]);

      var qm = (p.a - p.c) / (2 * p.b);
      var pm = (p.a + p.c) / 2;
      var profit = (pm - p.c) * qm;
      var cs = 0.5 * (p.a - pm) * qm;
      var qc = (p.a - p.c) / p.b;
      var dwl = 0.5 * (pm - p.c) * (qc - qm);
      var lerner = (pm - p.c) / pm;

      var html = '<div class="section-title">Monopólio</div>';
      html += '\\(Q^m = ' + qm.toFixed(2) + '\\), \\(P^m = ' + pm.toFixed(2) + '\\)<br>';
      html += '\\(\\pi = ' + profit.toFixed(1) + '\\)<br>';
      html += '\\(EC = ' + cs.toFixed(1) + '\\), \\(PPM = ' + dwl.toFixed(1) + '\\)<br>';
      html += '\\(L = \\frac{P-CMg}{P} = ' + lerner.toFixed(3) + '\\)';
      html += '<div class="section-title">Concorrência Perfeita</div>';
      html += '\\(Q^c = ' + qc.toFixed(2) + '\\), \\(P^c = ' + p.c.toFixed(0) + '\\)<br>';
      var csComp = 0.5 * (p.a - p.c) * qc;
      html += '\\(EC^c = ' + csComp.toFixed(1) + '\\), \\(PPM = 0\\)';

      document.getElementById('info').innerHTML = html;
      board.update();
      if (window.MathJax && MathJax.typeset) MathJax.typeset();
    }

    function resetAll() {
      document.getElementById('slider-a').value = 100;
      document.getElementById('slider-b').value = 1;
      document.getElementById('slider-c').value = 20;
      updateInfo();
    }

    ['slider-a','slider-b','slider-c'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', updateInfo);
    });
    updateInfo();
  </script>
</body>
</html>
