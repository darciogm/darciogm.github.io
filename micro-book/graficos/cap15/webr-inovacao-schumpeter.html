<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebR — Inovação sob Monopólio vs. Concorrência</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f9fa;padding:12px;overflow-x:hidden}
.status-bar{padding:6px 12px;border-radius:6px;font-size:.85rem;margin-bottom:10px;text-align:center}
.status-loading{background:#fff3cd;color:#856404}
.status-ready{background:#d4edda;color:#155724}
.status-error{background:#f8d7da;color:#721c24}
textarea{width:100%;min-height:280px;font-family:'Fira Code',monospace;font-size:.85rem;padding:10px;border:2px solid #dee2e6;border-radius:8px;background:#1e1e1e;color:#d4d4d4;resize:vertical;tab-size:2;line-height:1.5}
.btn-group{display:flex;gap:8px;margin:10px 0}
button{padding:8px 20px;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:.9rem;transition:background .2s}
#btn-run{background:#0d6efd;color:#fff}
#btn-run:hover{background:#0b5ed7}
#btn-run:disabled{background:#6c757d;cursor:not-allowed}
#btn-reset{background:#6c757d;color:#fff}
#btn-reset:hover{background:#5a6268}
#r-output{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;font-family:'Fira Code',monospace;font-size:.82rem;white-space:pre-wrap;max-height:400px;overflow-y:auto;margin-top:8px;min-height:60px}
#r-plot{text-align:center;margin-top:8px}
#r-plot canvas{max-width:100%;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
</style>
</head>
<body>
<div id="status" class="status-bar status-loading">Carregando WebR...</div>
<textarea id="r-code">
# ============================================
# Inovacao sob monopolio vs. concorrencia
# Exercicio Resolvido 15.8 (Hipotese Schumpeteriana)
# ============================================

# --- Parametros ---
a <- 100     # demanda: p = a - q
c0 <- 40     # CMg inicial
# Investimento I reduz CMg: c(I) = c0 - sqrt(I)

cat("====== HIPOTESE SCHUMPETERIANA ======\n")
cat("Demanda: p =", a, "- q\n")
cat("CMg inicial =", c0, "\n")
cat("CMg apos P&D: c(I) =", c0, "- sqrt(I)\n\n")

# --- Monopolista ---
# Lucro(s) = (30 + s/2)^2 - s^2, onde s = sqrt(I)
# FOC: 30 - 3s/2 = 0 => s = 20 => I = 400
s_star <- 20
I_star <- s_star^2
c_new <- c0 - s_star

qm_new <- (a - c_new) / 2
pm_new <- a - qm_new
lucro_bruto <- (pm_new - c_new) * qm_new
lucro_liq <- lucro_bruto - I_star

# Sem inovacao
qm_old <- (a - c0) / 2
pm_old <- a - qm_old
lucro_old <- (pm_old - c0) * qm_old

cat("--- Monopolista ---\n")
cat("Sem P&D: q =", qm_old, "  p =", pm_old, "  lucro =", lucro_old, "\n")
cat("Investimento otimo: I* =", I_star, "\n")
cat("CMg novo:", c_new, " (reducao de", round((1 - c_new/c0)*100), "%)\n")
cat("Com P&D: q =", qm_new, "  p =", pm_new, "\n")
cat("Lucro bruto =", lucro_bruto, "  Lucro liquido =", lucro_liq, "\n")
cat("Ganho: +", lucro_liq - lucro_old, "\n\n")

# --- Concorrencia com spillover total ---
cat("--- Concorrencia (spillover total) ---\n")
cat("p = CMg => lucro = 0 para qualquer nivel de CMg\n")
cat("Investimento otimo: I* = 0 (ninguem recupera o custo)\n\n")

# --- Bem-estar social ---
qc_old <- a - c0
W_old_comp <- 0.5 * (a - c0) * qc_old  # EC = W sob competicao

qc_new <- a - c_new
W_new_mono <- 0.5*(a - pm_new)*qm_new + lucro_bruto  # EC + EP

PPM_old <- 0.5 * (pm_old - c0) * (qc_old - qm_old)
PPM_new <- 0.5 * (pm_new - c_new) * (qc_new - qm_new)

cat("--- Bem-estar social ---\n")
cat("Concorrencia sem inovacao: W =", W_old_comp, "\n")
cat("Monopolio sem inovacao:   W =", W_old_comp - PPM_old,
    " (PPM =", PPM_old, ")\n")
cat("Monopolio com inovacao:   W =", W_new_mono - I_star,
    " (PPM =", PPM_new, ", I =", I_star, ")\n\n")

cat("CONCLUSAO: O monopolista investe I* =", I_star, "em P&D,\n")
cat("reduzindo CMg de", c0, "para", c_new, ".\n")
cat("Sob concorrencia com spillover total, I* = 0.\n")
cat("Trade-off schumpeteriano: PPM vs. inovacao.\n")

# --- Grafico ---
par(mfrow = c(1, 2), mar = c(4.5, 4.5, 3, 1), bg = "#f8f9fa")

# Painel 1: Lucro vs investimento
I_seq <- seq(0, 1200, length = 300)
s_seq <- sqrt(I_seq)
lucro_seq <- (30 + s_seq/2)^2 - s_seq^2

plot(I_seq, lucro_seq, type = "l", lwd = 3, col = "#0d6efd",
     xlab = "Investimento em P&D (I)",
     ylab = "Lucro liquido",
     main = "Lucro do monopolista vs. P&D")
abline(v = I_star, col = "#dc3545", lty = 2, lwd = 1.5)
abline(h = lucro_old, col = "#adb5bd", lty = 3)
points(I_star, lucro_liq, pch = 19, col = "#dc3545", cex = 2)
text(I_star + 30, lucro_liq + 30, paste0("I* = ", I_star),
     col = "#dc3545", cex = 0.85, font = 2)
text(50, lucro_old + 30, "Sem P&D",
     col = "#adb5bd", cex = 0.75, font = 3)

# Painel 2: Antes vs depois
q_seq <- seq(0, 90, length = 300)
plot(q_seq, a - q_seq, type = "l", lwd = 3, col = "#0d6efd",
     ylim = c(0, 105), xlim = c(0, 90),
     xlab = "q", ylab = "p",
     main = "Equilibrio: antes e depois de P&D")
lines(q_seq, a - 2*q_seq, lwd = 2, col = "#6f42c1", lty = 2)
abline(h = c0, col = "#fd7e14", lwd = 2, lty = 3)
abline(h = c_new, col = "#198754", lwd = 2)

points(qm_old, pm_old, pch = 1, col = "#fd7e14", cex = 1.8)
points(qm_new, pm_new, pch = 19, col = "#198754", cex = 2)
arrows(qm_old + 1, pm_old - 1, qm_new - 1, pm_new + 1,
       col = "#dc3545", lwd = 2, length = 0.08)

text(qm_old + 3, pm_old + 3, "Antes", col = "#fd7e14", cex = 0.8, font = 2)
text(qm_new + 3, pm_new - 3, "Depois", col = "#198754", cex = 0.8, font = 2)

legend("topright",
       legend = c("Demanda", "RMg", paste0("CMg antes = ", c0),
                  paste0("CMg depois = ", c_new)),
       col = c("#0d6efd", "#6f42c1", "#fd7e14", "#198754"),
       lwd = c(3, 2, 2, 2), lty = c(1, 2, 3, 1),
       cex = 0.6, bg = "white")
</textarea>
<div class="btn-group">
<button id="btn-run" disabled onclick="runCode()">&#9654; Executar</button>
<button id="btn-reset" onclick="resetCode()">&#8635; Resetar</button>
</div>
<div id="r-output">(Aguardando WebR...)</div>
<div id="r-plot"></div>
<script type="module">
import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:700,height:380}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
</body>
</html>
