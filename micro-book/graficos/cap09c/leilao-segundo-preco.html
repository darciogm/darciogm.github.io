<!DOCTYPE html>
<!--
  Leilão de Segundo Preço (Vickrey) — Verdade como Estratégia Dominante
  Library: JSXGraph
  Chapter 9c — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leilão de Segundo Preço (Vickrey)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    .jxgbox { flex: 1 1 400px; max-width: 460px; height: 380px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .jxgbox { flex-basis: 100%; width: 100%; max-width: 460px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 460px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox1" class="jxgbox"></div>
  <div class="controls">
    <h3>Leilão de Vickrey</h3>
    <div class="slider-group">
      <label>Seu valor \(v_i\): <span class="val" id="val-v">60</span></label>
      <input type="range" id="slider-v" min="0" max="100" step="1" value="60">
    </div>
    <div class="slider-group">
      <label>Seu lance \(b_i\): <span class="val" id="val-b">60</span></label>
      <input type="range" id="slider-b" min="0" max="100" step="1" value="60">
    </div>
    <div class="slider-group">
      <label>Lance rival \(b_{-i}\): <span class="val" id="val-br">40</span></label>
      <input type="range" id="slider-br" min="0" max="100" step="1" value="40">
    </div>
    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  var board = JXG.JSXGraph.initBoard('jxgbox1', {
    boundingbox: [-15, 80, 110, -20],
    axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
  });

  board.create('axis', [[0,0],[110,0]], {
    ticks: { drawLabels: true, label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 20 }
  });
  board.create('text', [55, -14, '<b><i>Lance rival (b<sub>-i</sub>)</i></b>'], { fontSize: 12, fixed: true, anchorX: 'middle', highlight: false });
  board.create('axis', [[0,0],[0,80]], {
    ticks: { drawLabels: true, label: { fontSize: 11, anchorX: 'right', offset: [-8,0] }, minorTicks: 0, ticksDistance: 20 }
  });
  board.create('text', [-12, 40, '<b><i>Payoff</i></b>'], { fontSize: 12, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false });

  var objs = [];

  function draw() {
    for (var i = 0; i < objs.length; i++) board.removeObject(objs[i]);
    objs = [];

    var v = parseInt(document.getElementById('slider-v').value);
    var b = parseInt(document.getElementById('slider-b').value);
    var br = parseInt(document.getElementById('slider-br').value);

    document.getElementById('val-v').textContent = v;
    document.getElementById('val-b').textContent = b;
    document.getElementById('val-br').textContent = br;

    // Payoff function: if b > br, payoff = v - br; if b < br, payoff = 0; if b == br, payoff = (v-br)/2
    // Plot payoff as function of br for given b and v
    var xs = [], ys = [];
    for (var r = 0; r <= 100; r++) {
      xs.push(r);
      if (b > r) ys.push(v - r);
      else if (b === r) ys.push((v - r) / 2);
      else ys.push(0);
    }
    objs.push(board.create('curve', [xs, ys], { strokeColor: '#1565c0', strokeWidth: 2.5 }));

    // Step at b
    objs.push(board.create('segment', [[b, 0],[b, Math.max(v - b, 0)]], { strokeColor: '#1565c0', strokeWidth: 2.5, dash: 2 }));

    // Current point
    var payoff = (b > br) ? (v - br) : ((b === br) ? (v - br) / 2 : 0);
    objs.push(board.create('point', [br, Math.max(payoff, 0)], {
      name: '', size: 6, fillColor: '#C8102E', strokeColor: '#C8102E', fixed: true
    }));

    // v line (truth-telling threshold)
    objs.push(board.create('segment', [[v, -2],[v, 2]], { strokeColor: '#00897b', strokeWidth: 2 }));
    objs.push(board.create('text', [v, -8, 'v=' + v], { fontSize: 10, color: '#00897b', anchorX: 'middle', fixed: true, highlight: false }));

    // b line
    objs.push(board.create('segment', [[b, -2],[b, 2]], { strokeColor: '#e65100', strokeWidth: 2 }));
    objs.push(board.create('text', [b, 5, 'b=' + b], { fontSize: 10, color: '#e65100', anchorX: 'middle', fixed: true, highlight: false }));

    // Shade negative payoff region (if v - r < 0 and b > r, payoff is negative)
    if (b > v) {
      var negXs = [], negYs = [];
      for (var r = v; r <= b; r++) {
        negXs.push(r); negYs.push(v - r);
      }
      negXs.push(b); negYs.push(0);
      negXs.push(v); negYs.push(0);
      objs.push(board.create('curve', [negXs, negYs], {
        strokeWidth: 0, fillColor: 'rgba(200,16,46,0.15)', fillOpacity: 1
      }));
      objs.push(board.create('text', [(v + b) / 2, (v - (v + b) / 2) / 2 - 3, 'Risco!'], {
        fontSize: 10, color: '#C8102E', anchorX: 'middle', fixed: true, highlight: false
      }));
    }

    var won = (b > br) ? 'Sim' : ((b === br) ? 'Empate' : 'Nao');
    var html = '<div style="text-align:center;margin-bottom:0.3rem;">';
    html += 'Payoff = \\(\\begin{cases} v_i - b_{-i} & \\text{se } b_i > b_{-i} \\\\ 0 & \\text{se } b_i < b_{-i} \\end{cases}\\)';
    html += '</div>';
    html += 'Ganhou? <strong>' + won + '</strong><br>';
    html += 'Payoff: <strong style="color:' + (payoff >= 0 ? '#00897b' : '#C8102E') + ';">' + payoff.toFixed(1) + '</strong><br>';
    if (b !== v) {
      html += '<hr style="margin:0.3rem 0">';
      if (b > v) {
        html += '<span style="color:#C8102E;">Lance acima do valor: risco de pagar mais do que vale!</span>';
      } else {
        html += '<span style="color:#e65100;">Lance abaixo do valor: perde oportunidades lucrativas.</span>';
      }
    } else {
      html += '<hr style="margin:0.3rem 0">';
      html += '<span style="color:#00897b;"><strong>b = v</strong>: estrategia otima! O payoff nunca e negativo e nenhuma oportunidade lucrativa e perdida.</span>';
    }

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-v').value = 60;
    document.getElementById('slider-b').value = 60;
    document.getElementById('slider-br').value = 40;
    draw();
  }

  ['slider-v','slider-b','slider-br'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', draw);
  });
  draw();
</script>
</body>
</html>
