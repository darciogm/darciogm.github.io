<!DOCTYPE html>
<!--
  Equivalência de Receita: 1º Preço vs 2º Preço
  Library: Plotly.js
  Chapter 9c — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equivalência de Receita</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    .panels { flex: 1 1 420px; max-width: 520px; display: flex; flex-direction: column; gap: 0.5rem; }
    .plot-box { width: 100%; height: 240px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 260px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .panels { flex-basis: 100%; width: 100%; max-width: 520px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 520px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div class="panels">
    <div id="plotTop" class="plot-box"></div>
    <div id="plotBot" class="plot-box"></div>
  </div>
  <div class="controls">
    <h3>Parametros</h3>
    <div class="slider-group">
      <label>Licitantes \(N\): <span class="val" id="val-N">3</span></label>
      <input type="range" id="slider-N" min="2" max="10" step="1" value="3">
    </div>
    <div class="slider-group">
      <label>Val. max \(\bar{v}\): <span class="val" id="val-vmax">100</span></label>
      <input type="range" id="slider-vmax" min="50" max="200" step="10" value="100">
    </div>
    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  function update() {
    var N = parseInt(document.getElementById('slider-N').value);
    var vmax = parseFloat(document.getElementById('slider-vmax').value);
    document.getElementById('val-N').textContent = N;
    document.getElementById('val-vmax').textContent = vmax;

    var vs = [], bid1 = [], bid2 = [];
    for (var v = 0; v <= vmax; v += 1) {
      vs.push(v);
      bid1.push(v * (N - 1) / N); // 1st price BNE
      bid2.push(v); // 2nd price (truth-telling)
    }

    // Top panel: bid functions
    Plotly.react('plotTop', [
      { x: vs, y: bid1, mode: 'lines', line: { color: '#C8102E', width: 2.5 }, name: '1o preco: b(v) = v(N-1)/N' },
      { x: vs, y: bid2, mode: 'lines', line: { color: '#1565c0', width: 2.5, dash: 'dash' }, name: '2o preco: b(v) = v' }
    ], {
      margin: { l: 55, r: 15, t: 25, b: 35 },
      xaxis: { title: 'Valoracao (v)' },
      yaxis: { title: 'Lance b(v)' },
      showlegend: true,
      legend: { x: 0.02, y: 0.98, bgcolor: 'rgba(255,255,255,0.85)', font: { size: 9 } },
      font: { family: 'CMU Serif, Georgia, serif' }
    }, { responsive: true, displayModeBar: false });

    // Bottom panel: Expected revenue as function of N
    var Ns = [], rev = [];
    for (var n = 2; n <= 10; n++) {
      Ns.push(n);
      rev.push(vmax * (n - 1) / (n + 1));
    }

    Plotly.react('plotBot', [
      { x: Ns, y: rev, mode: 'lines+markers', line: { color: '#00897b', width: 2.5 },
        marker: { size: 7, color: '#00897b' }, name: 'E[Rev] = v_bar (N-1)/(N+1)' },
      { x: [N], y: [vmax * (N - 1) / (N + 1)], mode: 'markers',
        marker: { size: 12, color: '#C8102E', symbol: 'diamond' }, name: 'N atual', showlegend: true }
    ], {
      margin: { l: 55, r: 15, t: 10, b: 40 },
      xaxis: { title: 'Numero de licitantes (N)', dtick: 1 },
      yaxis: { title: 'Receita esperada' },
      showlegend: true,
      legend: { x: 0.02, y: 0.98, bgcolor: 'rgba(255,255,255,0.85)', font: { size: 9 } },
      font: { family: 'CMU Serif, Georgia, serif' }
    }, { responsive: true, displayModeBar: false });

    var ER = vmax * (N - 1) / (N + 1);
    var html = '<div style="text-align:center;margin-bottom:0.3rem;">';
    html += '\\(E[\\text{Rev}] = \\bar{v} \\cdot \\frac{N-1}{N+1} = ' + ER.toFixed(1) + '\\)';
    html += '</div>';
    html += 'A receita esperada e <strong>identica</strong> em ambos os formatos.<br>';
    html += 'Sombreamento no 1o preco: \\(' + ((1 / N) * 100).toFixed(1) + '\\%\\)<br>';
    html += '<hr style="margin:0.3rem 0">';
    html += '<div style="font-size:0.78rem;color:#666;">Teorema da Equivalencia de Receita (Myerson, 1981): com IPV, simetria e risco-neutralidade, todos os leiloes eficientes geram a mesma receita.</div>';

    document.getElementById('info').innerHTML = html;
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-N').value = 3;
    document.getElementById('slider-vmax').value = 100;
    update();
  }

  ['slider-N','slider-vmax'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
