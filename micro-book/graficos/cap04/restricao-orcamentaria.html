<!DOCTYPE html>
<!--
  Budget Constraint — Interactive Graph (Chapter 4)
  Library: JSXGraph
  Reason: JSXGraph provides native support for geometric constructions,
  draggable constrained points, polygon fills, and real-time label updates,
  making it ideal for budget-set visualizations with interactive sliders.
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restrição Orçamentária</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'CMU Serif', Georgia, serif;
      background: #ffffff;
      color: #333;
      padding: 1rem;
    }
.graph-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-start;
      justify-content: center;
    }
    #jxgbox {
      flex: 1 1 420px;
      max-width: 520px;
      height: 420px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .controls {
      flex: 0 1 280px;
      padding: 1rem;
      background: #f8f8f8;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .controls h3 {
      font-size: 0.95rem;
      color: #C8102E;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.4rem;
    }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .info-box .eq { text-align: center; margin: 0.3rem 0; color: #333; }
    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.5rem;
      background: #C8102E;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 700px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { flex-basis: 100%; max-width: 100%; }
      .controls { flex-basis: 100%; max-width: 100%; }
    }
    /* anti-inflation-fix */
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>Renda \(M\): <span class="val" id="val-M">50</span></label>
        <input type="range" id="slider-M" min="10" max="100" step="1" value="50">
      </div>
      <div class="slider-group">
        <label>Preço \(p_1\): <span class="val" id="val-p1">5</span></label>
        <input type="range" id="slider-p1" min="1" max="20" step="0.5" value="5">
      </div>
      <div class="slider-group">
        <label>Preço \(p_2\): <span class="val" id="val-p2">5</span></label>
        <input type="range" id="slider-p2" min="1" max="20" step="0.5" value="5">
      </div>

      <div class="info-box" id="info">
        <div class="eq" id="eq-budget"></div>
        <div class="eq" id="eq-slope"></div>
        <div class="eq" id="eq-intercepts"></div>
        <div class="eq" id="eq-point"></div>
      </div>
      <label style="font-size:0.82rem; cursor:pointer;">
        <input type="checkbox" id="chk-labels" checked onchange="toggleLabels()"> Mostrar labels
      </label>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    // Fixed bounding box: M max=100, p min=1 → max intercept=100
    // But typical use is M~50, p~5 → intercept~10. Use [0,25] as good default.
    var BB_MAX = 25;
    var board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [-2, BB_MAX, BB_MAX, -2],
      axis: false,
      showCopyright: false,
      showNavigation: false,
      keepAspectRatio: false
    });

    // Fixed axes — created once, never recreated
    board.create('axis', [[0,0],[1,0]], {
      ticks: { drawLabels: true, minorTicks: 0, ticksDistance: 5 },
      name: '', withLabel: false
    });
    board.create('axis', [[0,0],[0,1]], {
      ticks: { drawLabels: true, minorTicks: 0, ticksDistance: 5, label: { anchorX: 'right', offset: [-8, 0] } },
      name: '', withLabel: false
    });
    board.create('text', [BB_MAX / 2, -1.2, '<b><i>x</i><sub>1</sub></b>'],
      { fontSize: 15, fixed: true, anchorX: 'middle', highlight: false });
    board.create('text', [-1.2, BB_MAX / 2, '<b><i>x</i><sub>2</sub></b>'],
      { fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false });

    // Helper to read slider values
    function getParams() {
      return {
        M: parseFloat(document.getElementById('slider-M').value),
        p1: parseFloat(document.getElementById('slider-p1').value),
        p2: parseFloat(document.getElementById('slider-p2').value)
      };
    }

    // Budget line endpoints
    var ptA = board.create('point', [function() { return getParams().M / getParams().p1; }, 0], {
      visible: false
    });
    var ptB = board.create('point', [0, function() { return getParams().M / getParams().p2; }], {
      visible: false
    });

    // Feasible set (shaded polygon)
    var origin = board.create('point', [0, 0], { visible: false });
    var feasibleSet = board.create('polygon', [origin, ptA, ptB], {
      fillColor: '#1565c0',
      fillOpacity: 0.12,
      borders: { strokeWidth: 0 },
      vertices: { visible: false },
      hasInnerPoints: false
    });

    // Budget line
    var budgetLine = board.create('segment', [ptA, ptB], {
      strokeColor: '#C8102E',
      strokeWidth: 3
    });

    // Intercept labels
    var labelA = board.create('text', [
      function() { return getParams().M / getParams().p1; },
      -0.6,
      function() { return '\\(\\tfrac{M}{p_1}=' + (getParams().M / getParams().p1).toFixed(1) + '\\)'; }
    ], { fontSize: 10, color: '#C8102E', anchorX: 'middle', useMathJax: true });

    var labelB = board.create('text', [
      -0.2,
      function() { return getParams().M / getParams().p2 + 0.4; },
      function() { return '\\(\\tfrac{M}{p_2}=' + (getParams().M / getParams().p2).toFixed(1) + '\\)'; }
    ], { fontSize: 10, color: '#C8102E', anchorX: 'right', useMathJax: true });

    // Draggable point on budget line
    var dragPt = board.create('glider', [5, 5, budgetLine], {
      name: '',
      size: 5,
      strokeColor: '#00897b',
      fillColor: '#00897b'
    });

    // Label for draggable point
    var dragLabel = board.create('text', [
      function() { return dragPt.X() + 0.5; },
      function() { return dragPt.Y() + 0.8; },
      function() {
        return '(' + dragPt.X().toFixed(2) + ', ' + dragPt.Y().toFixed(2) + ')';
      }
    ], { fontSize: 13, color: '#00897b', fontWeight: 'bold' });

    var textLabels = [labelA, labelB, dragLabel];
    function toggleLabels() {
      var show = document.getElementById('chk-labels').checked;
      textLabels.forEach(function(t) { t.setAttribute({visible: show}); });
      board.update();
    }

    function updateInfo() {
      var p = getParams();
      document.getElementById('val-M').textContent = p.M.toFixed(0);
      document.getElementById('val-p1').textContent = p.p1.toFixed(1);
      document.getElementById('val-p2').textContent = p.p2.toFixed(1);

      document.getElementById('eq-budget').innerHTML =
        '\\(' + p.p1.toFixed(1) + 'x_1 + ' + p.p2.toFixed(1) + 'x_2 = ' + p.M.toFixed(0) + '\\)';
      document.getElementById('eq-slope').innerHTML =
        'Inclinação: \\(-p_1/p_2 = ' + (-p.p1 / p.p2).toFixed(3) + '\\)';
      document.getElementById('eq-intercepts').innerHTML =
        '\\(M/p_1 = ' + (p.M / p.p1).toFixed(1) + ',\\; M/p_2 = ' + (p.M / p.p2).toFixed(1) + '\\)';
      document.getElementById('eq-point').innerHTML =
        'Ponto: \\((' + dragPt.X().toFixed(2) + ',\\,' + dragPt.Y().toFixed(2) + ')\\)';

      board.update();
      if (window.MathJax && MathJax.typeset) MathJax.typeset();
    }

    function resetAll() {
      document.getElementById('slider-M').value = 50;
      document.getElementById('slider-p1').value = 5;
      document.getElementById('slider-p2').value = 5;
      updateInfo();
    }

    ['slider-M', 'slider-p1', 'slider-p2'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', updateInfo);
    });

    // Update info when point is dragged
    board.on('move', updateInfo);

    updateInfo();
  </script>
</body>
</html>
