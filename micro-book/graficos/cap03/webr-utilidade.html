<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R Interativo — Funções de Utilidade</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:'CMU Serif',Georgia,serif;background:#fff;color:#333;padding:1rem}.main-container{max-width:780px;margin:0 auto}.status-bar{padding:.5rem 1rem;border-radius:4px;font-size:.85rem;margin-bottom:1rem;text-align:center}.status-loading{background:#fff3e0;border:1px solid #ff9800;color:#e65100}.status-ready{background:#e8f5e9;border:1px solid #4caf50;color:#2e7d32}.status-error{background:#ffebee;border:1px solid #f44336;color:#c62828}.editor-container{border:1px solid #ddd;border-radius:6px;overflow:hidden;margin-bottom:1rem}.editor-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}.editor-header .lang-tag{background:#C8102E;color:#fff;padding:.15rem .5rem;border-radius:3px;font-size:.75rem;font-weight:700}textarea#r-code{width:100%;min-height:300px;padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.85rem;border:none;outline:none;resize:vertical;background:#fafafa;color:#333;line-height:1.5;tab-size:2}.btn-row{display:flex;gap:.5rem;margin-bottom:1rem}.btn-run{padding:.5rem 1.5rem;background:#C8102E;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:700}.btn-run:hover{background:#9a0c23}.btn-run:disabled{background:#ccc;cursor:not-allowed}.btn-reset{padding:.5rem 1.5rem;background:#fff;color:#666;border:1px solid #ddd;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit}.btn-reset:hover{background:#f5f5f5}.output-container{border:1px solid #ddd;border-radius:6px;overflow:hidden}.output-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd}#r-output{padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.82rem;background:#1e1e1e;color:#d4d4d4;min-height:120px;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}#r-plot{text-align:center;padding:.5rem;background:#fff}#r-plot img,#r-plot canvas{max-width:100%;border-radius:4px}.info-box{margin-top:1rem;padding:.8rem;background:#f8f8f8;border:1px solid #eee;border-radius:4px;font-size:.8rem;color:#666;line-height:1.5}html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="main-container">
  <div class="status-bar status-loading" id="status">Carregando WebR (~10s na primeira vez)...</div>
  <div class="editor-container">
    <div class="editor-header"><span>Edite o código e clique "Executar"</span><span class="lang-tag">R</span></div>
    <textarea id="r-code">
# Curvas de Indiferença — Comparando funções de utilidade
# Cap. 3: Preferências e Utilidade

# Escolha a função: "cobb-douglas", "ces", "quaselinear", "substitutos"
tipo <- "cobb-douglas"

# Parâmetros
a <- 0.5     # peso / expoente (significado varia por tipo)
rho <- -1    # só para CES: rho < 1, rho ≠ 0

# Grid de x
x <- seq(0.1, 10, length.out = 300)

# Níveis de utilidade para as curvas
U_levels <- c(2, 4, 6, 8)

# Cores
cores <- c("#C8102E", "#ff6b35", "#2a7f2a", "#1a5276")

par(mar = c(4, 4, 3, 1))
plot(NULL, xlim = c(0, 10), ylim = c(0, 10),
     xlab = "Bem 1 (x)", ylab = "Bem 2 (y)",
     main = paste("Curvas de Indiferença —", tipo))

for (i in seq_along(U_levels)) {
  U <- U_levels[i]
  y_ci <- switch(tipo,
    "cobb-douglas" = (U / x^a)^(1 / (1 - a)),
    "ces"          = ((U^rho - a * x^rho) / (1 - a))^(1/rho),
    "quaselinear"  = U - a * log(x),
    "substitutos"  = (U - a * x) / (1 - a)
  )
  y_ci[y_ci < 0 | is.nan(y_ci) | is.infinite(y_ci)] <- NA
  lines(x, y_ci, col = cores[i], lwd = 2)
}

legend("topright",
       legend = paste("U =", U_levels),
       col = cores, lwd = 2, cex = 0.85)

# TMS no ponto (2, 2) para Cobb-Douglas
if (tipo == "cobb-douglas") {
  x0 <- 2; y0 <- (U_levels[1] / x0^a)^(1/(1-a))
  TMS <- (a * y0) / ((1 - a) * x0)
  cat(sprintf("TMS no ponto (%.1f, %.2f) = %.4f\n", x0, y0, TMS))
  cat("Interpretação: o consumidor abriria mão de",
      sprintf("%.2f unidades de y por 1 unidade de x.\n", TMS))
}

cat("\nExperimente trocar 'tipo' para 'ces', 'quaselinear' ou 'substitutos'!\n")
cat("Para CES, tente rho = 0.5 (substitutos) vs rho = -5 (complementos).\n")
</textarea>
  </div>
  <div class="btn-row">
    <button class="btn-run" id="btn-run" onclick="runCode()" disabled>Executar (R)</button>
    <button class="btn-reset" onclick="resetCode()">Restaurar código original</button>
  </div>
  <div class="output-container">
    <div class="output-header">Saída do R</div>
    <div id="r-output">Aguardando execução...</div>
    <div id="r-plot"></div>
  </div>
  <div class="info-box">
    <strong>WebR</strong> executa R no navegador. Troque <code>tipo</code> para comparar Cobb-Douglas, CES, quaselinear e substitutos perfeitos. Altere <code>rho</code> na CES para ver a transição de substitutos a complementos.
  </div>
</div>
<script type="module">
  import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:520,height:420}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
</body>
