<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebR — Minimização de Custo: Isoquanta e Isocusto</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f9fa;padding:12px;overflow-x:hidden}
.status-bar{padding:6px 12px;border-radius:6px;font-size:.85rem;margin-bottom:10px;text-align:center}
.status-loading{background:#fff3cd;color:#856404}
.status-ready{background:#d4edda;color:#155724}
.status-error{background:#f8d7da;color:#721c24}
textarea{width:100%;min-height:280px;font-family:'Fira Code',monospace;font-size:.85rem;padding:10px;border:2px solid #dee2e6;border-radius:8px;background:#1e1e1e;color:#d4d4d4;resize:vertical;tab-size:2;line-height:1.5}
.btn-group{display:flex;gap:8px;margin:10px 0}
button{padding:8px 20px;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:.9rem;transition:background .2s}
#btn-run{background:#0d6efd;color:#fff}
#btn-run:hover{background:#0b5ed7}
#btn-run:disabled{background:#6c757d;cursor:not-allowed}
#btn-reset{background:#6c757d;color:#fff}
#btn-reset:hover{background:#5a6268}
#r-output{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;font-family:'Fira Code',monospace;font-size:.82rem;white-space:pre-wrap;max-height:400px;overflow-y:auto;margin-top:8px;min-height:60px}
#r-plot{text-align:center;margin-top:8px}
#r-plot canvas{max-width:100%;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
</style>
</head>
<body>
<div id="status" class="status-bar status-loading">Carregando WebR...</div>
<textarea id="r-code">
# ============================================
# Minimizacao de Custo: Isoquanta + Isocusto
# Cobb-Douglas: q = K^alpha * L^beta
# ============================================

# --- Parametros (altere e re-execute!) ---
alpha <- 0.4     # expoente do capital
beta  <- 0.6     # expoente do trabalho
w <- 8           # salario
v <- 2           # custo do capital
q0 <- 10         # nivel de produto alvo

# --- Demandas condicionais ---
s <- alpha + beta
Lc <- q0^(1/s) * (beta * v / (alpha * w))^(alpha/s)
Kc <- q0^(1/s) * (alpha * w / (beta * v))^(beta/s)
C_min <- w * Lc + v * Kc

# TMST no otimo
TMST <- (beta/alpha) * (Kc/Lc)
razao_precos <- w/v

cat("====== MINIMIZACAO DE CUSTO ======\n")
cat("Tecnologia: q = K^", alpha, " * L^", beta, "\n")
cat("Precos: w =", w, " v =", v, " | q0 =", q0, "\n\n")

cat("--- Solucao otima ---\n")
cat("L^c =", round(Lc, 4), "\n")
cat("K^c =", round(Kc, 4), "\n")
cat("C_min = w*Lc + v*Kc =", round(C_min, 4), "\n\n")

cat("--- Verificacao da tangencia ---\n")
cat("TMST = (beta/alpha)*(K/L) =", round(TMST, 4), "\n")
cat("w/v =", round(razao_precos, 4), "\n")
cat("TMST = w/v?", ifelse(abs(TMST - razao_precos) < 1e-6, "SIM!", "NAO"), "\n\n")

cat("--- Interpretacao ---\n")
cat("PMgL/w =", round((beta * q0 / Lc) / w, 4), "\n")
cat("PMgK/v =", round((alpha * q0 / Kc) / v, 4), "\n")
cat("Produto marginal por $ gasto e igual para ambos insumos!\n")

# --- Grafico ---
par(mar = c(4.5, 4.5, 3, 2), bg = "#f8f9fa")

L_max <- Lc * 3
K_max <- Kc * 3

# Isoquanta
L_seq <- seq(0.1, L_max, length = 500)
K_isoquanta <- (q0^(1/alpha) / L_seq^(beta/alpha))
K_isoquanta[K_isoquanta > K_max] <- NA

# Isocusto otima
K_isocusto <- (C_min - w * L_seq) / v
K_isocusto[K_isocusto < 0] <- NA

# Isocustos subotimas (mais caras)
C_high <- C_min * 1.3
K_high <- (C_high - w * L_seq) / v
K_high[K_high < 0] <- NA

C_low <- C_min * 0.75
K_low <- (C_low - w * L_seq) / v
K_low[K_low < 0] <- NA

plot(L_seq, K_isoquanta, type = "l", lwd = 3, col = "#0d6efd",
     xlab = "L (trabalho)", ylab = "K (capital)",
     main = paste0("Minimizacao de custo: q = K^", alpha, " L^", beta),
     xlim = c(0, L_max), ylim = c(0, K_max), cex.lab = 1.1)

lines(L_seq, K_isocusto, lwd = 2.5, col = "#dc3545")
lines(L_seq, K_high, lwd = 1.5, col = "#dc3545", lty = 3)
lines(L_seq, K_low, lwd = 1.5, col = "#dc3545", lty = 3)

# Ponto otimo
points(Lc, Kc, pch = 19, col = "#198754", cex = 2)
text(Lc, Kc,
     paste0("  (L*=", round(Lc, 1), ", K*=", round(Kc, 1), ")\n",
            "  C_min = ", round(C_min, 1)),
     pos = 4, cex = 0.85, col = "#198754", font = 2)

# Caminho de expansao (K/L constante)
L_exp <- seq(0, L_max, length = 100)
K_exp <- (Kc/Lc) * L_exp
lines(L_exp, K_exp, lwd = 1.5, col = "#6f42c1", lty = 2)

# Anotacoes
text(L_max * 0.7, 0.5, paste0("Incl. isocusto = -w/v = -", w/v),
     col = "#dc3545", cex = 0.8)

legend("topright",
       legend = c(paste0("Isoquanta (q=", q0, ")"),
                  paste0("Isocusto otima (C=", round(C_min, 1), ")"),
                  "Isocustos alternativas",
                  "Caminho de expansao"),
       col = c("#0d6efd", "#dc3545", "#dc3545", "#6f42c1"),
       lwd = c(3, 2.5, 1.5, 1.5), lty = c(1, 1, 3, 2),
       cex = 0.75, bg = "white")
</textarea>
<div class="btn-group">
<button id="btn-run" disabled onclick="runCode()">&#9654; Executar</button>
<button id="btn-reset" onclick="resetCode()">&#8635; Resetar</button>
</div>
<div id="r-output">(Aguardando WebR...)</div>
<div id="r-plot"></div>
<script type="module">
import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:620,height:460}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
</body>
</html>
