<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebR — Custo Econômico vs. Contábil</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f9fa;padding:12px;overflow-x:hidden}
.status-bar{padding:6px 12px;border-radius:6px;font-size:.85rem;margin-bottom:10px;text-align:center}
.status-loading{background:#fff3cd;color:#856404}
.status-ready{background:#d4edda;color:#155724}
.status-error{background:#f8d7da;color:#721c24}
textarea{width:100%;min-height:260px;font-family:'Fira Code',monospace;font-size:.85rem;padding:10px;border:2px solid #dee2e6;border-radius:8px;background:#1e1e1e;color:#d4d4d4;resize:vertical;tab-size:2;line-height:1.5}
.btn-group{display:flex;gap:8px;margin:10px 0}
button{padding:8px 20px;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:.9rem;transition:background .2s}
#btn-run{background:#0d6efd;color:#fff}
#btn-run:hover{background:#0b5ed7}
#btn-run:disabled{background:#6c757d;cursor:not-allowed}
#btn-reset{background:#6c757d;color:#fff}
#btn-reset:hover{background:#5a6268}
#r-output{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;font-family:'Fira Code',monospace;font-size:.82rem;white-space:pre-wrap;max-height:400px;overflow-y:auto;margin-top:8px;min-height:60px}
#r-plot{text-align:center;margin-top:8px}
#r-plot canvas{max-width:100%;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
</style>
</head>
<body>
<div id="status" class="status-bar status-loading">Carregando WebR...</div>
<textarea id="r-code">
# ============================================
# Custo Economico vs. Custo Contabil
# ============================================
# Caso: confeitaria artesanal em BH (Exercicio 11.1)

# --- Dados ---
receita       <- 480000
ingredientes  <- 120000
aluguel       <- 60000
salarios_func <- 96000
pro_labore    <- 48000

# Custos implicitos
salario_alternativo <- 84000   # oferta como chef
capital_proprio     <- 200000  # valor dos equipamentos
taxa_retorno        <- 0.10    # retorno alternativo

# --- Calculos ---
custos_explicitos <- ingredientes + aluguel + salarios_func + pro_labore
custo_oport_trabalho <- salario_alternativo - pro_labore
custo_oport_capital  <- capital_proprio * taxa_retorno
custos_implicitos    <- custo_oport_trabalho + custo_oport_capital
custo_economico      <- custos_explicitos + custos_implicitos

lucro_contabil  <- receita - custos_explicitos
lucro_economico <- receita - custo_economico

cat("========== DEMONSTRATIVO DE CUSTOS ==========\n\n")
cat("RECEITA TOTAL:", formatC(receita, format="f", big.mark=".", decimal.mark=",", digits=0), "\n\n")

cat("--- Custos Explicitos ---\n")
cat("  Ingredientes:    ", formatC(ingredientes, format="f", big.mark=".", decimal.mark=",", digits=0), "\n")
cat("  Aluguel:         ", formatC(aluguel, format="f", big.mark=".", decimal.mark=",", digits=0), "\n")
cat("  Salarios:        ", formatC(salarios_func, format="f", big.mark=".", decimal.mark=",", digits=0), "\n")
cat("  Pro-labore:      ", formatC(pro_labore, format="f", big.mark=".", decimal.mark=",", digits=0), "\n")
cat("  TOTAL EXPLICITO: ", formatC(custos_explicitos, format="f", big.mark=".", decimal.mark=",", digits=0), "\n\n")

cat("--- Custos Implicitos ---\n")
cat("  Custo oport. trabalho:", formatC(custo_oport_trabalho, format="f", big.mark=".", decimal.mark=",", digits=0), "\n")
cat("  Custo oport. capital: ", formatC(custo_oport_capital, format="f", big.mark=".", decimal.mark=",", digits=0), "\n")
cat("  TOTAL IMPLICITO:      ", formatC(custos_implicitos, format="f", big.mark=".", decimal.mark=",", digits=0), "\n\n")

cat("--- Resultados ---\n")
cat("  CUSTO ECONOMICO TOTAL:", formatC(custo_economico, format="f", big.mark=".", decimal.mark=",", digits=0), "\n")
cat("  Lucro contabil:       ", formatC(lucro_contabil, format="f", big.mark=".", decimal.mark=",", digits=0), "\n")
cat("  Lucro economico:      ", formatC(lucro_economico, format="f", big.mark=".", decimal.mark=",", digits=0), "\n\n")

if (lucro_economico > 0) {
  cat("=> Lucro economico POSITIVO: a confeitaria remunera\n")
  cat("   todos os fatores acima do custo de oportunidade.\n")
  cat("   Decisao racional: MANTER o negocio.\n")
} else if (lucro_economico == 0) {
  cat("=> Lucro NORMAL: a firma remunera exatamente\n")
  cat("   o custo de oportunidade de todos os fatores.\n")
} else {
  cat("=> Lucro economico NEGATIVO: os recursos renderiam\n")
  cat("   mais em uso alternativo. Considerar fechar.\n")
}

# --- Grafico comparativo ---
par(mar = c(5, 5, 3, 2), bg = "#f8f9fa")
dados <- matrix(c(custos_explicitos, custos_implicitos, 0,
                   custos_explicitos, 0, 0), nrow=3)
cores <- c("#dc3545", "#fd7e14", "#d4d4d4")
bp <- barplot(dados, beside = FALSE,
              names.arg = c("Custo\nEconomico", "Custo\nContabil"),
              col = cores[1:3],
              border = NA, ylim = c(0, receita * 1.15),
              ylab = "R$", main = "Custo Economico vs. Contabil",
              cex.names = 1.1, cex.lab = 1.1, las = 1)

# Linhas de receita e lucros
abline(h = receita, col = "#198754", lwd = 2, lty = 2)
text(mean(bp), receita, paste0("Receita = R$ ", formatC(receita/1000, format="f", digits=0), "k"),
     pos = 3, col = "#198754", font = 2, cex = 0.9)

# Anotacoes de lucro
arrows(bp[1], custo_economico, bp[1], receita, code = 3, col = "#0d6efd", lwd = 2, length = 0.08)
text(bp[1], (custo_economico + receita)/2,
     paste0("Lucro econ.\nR$ ", formatC(lucro_economico/1000, format="f", digits=0), "k"),
     col = "#0d6efd", font = 2, cex = 0.85)

arrows(bp[2], custos_explicitos, bp[2], receita, code = 3, col = "#6f42c1", lwd = 2, length = 0.08)
text(bp[2], (custos_explicitos + receita)/2,
     paste0("Lucro contab.\nR$ ", formatC(lucro_contabil/1000, format="f", digits=0), "k"),
     col = "#6f42c1", font = 2, cex = 0.85)

legend("topright", legend = c("Custos explicitos", "Custos implicitos"),
       fill = cores[1:2], border = NA, cex = 0.9, bg = "white")
</textarea>
<div class="btn-group">
<button id="btn-run" disabled onclick="runCode()">&#9654; Executar</button>
<button id="btn-reset" onclick="resetCode()">&#8635; Resetar</button>
</div>
<div id="r-output">(Aguardando WebR...)</div>
<div id="r-plot"></div>
<script type="module">
import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:620,height:400}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
</body>
</html>
