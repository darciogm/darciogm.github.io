<!DOCTYPE html>
<!--
  Agregação de Demandas — Soma Horizontal
  Library: JSXGraph
  Chapter 6 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregação de Demandas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    .jxgbox { flex: 1 1 420px; max-width: 500px; height: 400px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .jxgbox { flex-basis: 100%; width: 100%; max-width: 500px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 500px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox1" class="jxgbox"></div>
  <div class="controls">
    <h3>Preços de Reserva</h3>
    <div class="slider-group">
      <label>Cons. 1 — \(p_1^{\max}\): <span class="val" id="val-p1">10</span></label>
      <input type="range" id="slider-p1" min="2" max="20" step="0.5" value="10">
    </div>
    <div class="slider-group">
      <label>Cons. 2 — \(p_2^{\max}\): <span class="val" id="val-p2">7</span></label>
      <input type="range" id="slider-p2" min="2" max="20" step="0.5" value="7">
    </div>
    <div class="slider-group">
      <label>Cons. 3 — \(p_3^{\max}\): <span class="val" id="val-p3">4</span></label>
      <input type="range" id="slider-p3" min="2" max="20" step="0.5" value="4">
    </div>
    <div class="slider-group">
      <label>Preço \(p\): <span class="val" id="val-p">5.0</span></label>
      <input type="range" id="slider-p" min="0" max="20" step="0.25" value="5">
    </div>
    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  var board = JXG.JSXGraph.initBoard('jxgbox1', {
    boundingbox: [-2, 22, 35, -3],
    axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
  });

  board.create('axis', [[0,0],[35,0]], {
    ticks: { drawLabels: true, label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 5 }
  });
  board.create('text', [17, -2, '<b><i>Q</i></b>'], { fontSize: 13, fixed: true, anchorX: 'middle', highlight: false });
  board.create('axis', [[0,0],[0,22]], {
    ticks: { drawLabels: true, label: { fontSize: 11, anchorX: 'right', offset: [-8,0] }, minorTicks: 0, ticksDistance: 5 }
  });
  board.create('text', [-1.5, 20, '<b><i>p</i></b>'], { fontSize: 13, fixed: true, highlight: false });

  var objs = [];

  function demandI(p, pmax) {
    if (p >= pmax) return 0;
    return (pmax - p);
  }

  function draw() {
    for (var i = 0; i < objs.length; i++) board.removeObject(objs[i]);
    objs = [];

    var pm1 = parseFloat(document.getElementById('slider-p1').value);
    var pm2 = parseFloat(document.getElementById('slider-p2').value);
    var pm3 = parseFloat(document.getElementById('slider-p3').value);
    var pCur = parseFloat(document.getElementById('slider-p').value);

    document.getElementById('val-p1').textContent = pm1.toFixed(1);
    document.getElementById('val-p2').textContent = pm2.toFixed(1);
    document.getElementById('val-p3').textContent = pm3.toFixed(1);
    document.getElementById('val-p').textContent = pCur.toFixed(1);

    var pmaxAll = Math.max(pm1, pm2, pm3);
    var colors = ['#e65100','#1565c0','#2e7d32'];
    var pms = [pm1, pm2, pm3];
    var labels = ['D₁','D₂','D₃'];

    // Individual demands (thin dashed)
    for (var k = 0; k < 3; k++) {
      var xs = [], ys = [];
      for (var p = 0; p <= pms[k]; p += 0.2) {
        xs.push(demandI(p, pms[k]));
        ys.push(p);
      }
      xs.push(0); ys.push(pms[k]);
      objs.push(board.create('curve', [xs, ys], { strokeColor: colors[k], strokeWidth: 1.5, dash: 2 }));
      objs.push(board.create('text', [demandI(0, pms[k]) + 0.5, 0.8, labels[k]], {
        fontSize: 10, color: colors[k], fixed: true, highlight: false
      }));
    }

    // Market demand (horizontal sum)
    var sortedP = pms.slice().sort(function(a,b){return b-a;});
    var mktXs = [0], mktYs = [pmaxAll];
    for (var p = pmaxAll; p >= 0; p -= 0.15) {
      var qTotal = 0;
      for (var k = 0; k < 3; k++) qTotal += demandI(p, pms[k]);
      mktXs.push(qTotal);
      mktYs.push(p);
    }
    objs.push(board.create('curve', [mktXs, mktYs], { strokeColor: '#333', strokeWidth: 3 }));
    objs.push(board.create('text', [mktXs[mktXs.length-1] - 2, 0.8, '<b>D<sub>mkt</sub></b>'], {
      fontSize: 11, color: '#333', fixed: true, highlight: false
    }));

    // Current price line
    var qMkt = demandI(pCur, pm1) + demandI(pCur, pm2) + demandI(pCur, pm3);
    objs.push(board.create('line', [[0, pCur],[1, pCur]], {
      strokeColor: '#C8102E', strokeWidth: 1.5, dash: 3,
      straightFirst: false, straightLast: true,
      point1: { visible: false }, point2: { visible: false }
    }));
    if (qMkt > 0) {
      objs.push(board.create('point', [qMkt, pCur], {
        name: '', size: 4, fillColor: '#C8102E', strokeColor: '#C8102E', fixed: true
      }));
      objs.push(board.create('segment', [[qMkt, 0],[qMkt, pCur]], { strokeColor: '#C8102E', dash: 3, strokeWidth: 1 }));
    }

    // Kink lines (vertical dashes at entry prices)
    for (var k = 0; k < 3; k++) {
      objs.push(board.create('segment', [[0, pms[k]],[0.3, pms[k]]], {
        strokeColor: colors[k], strokeWidth: 1, dash: 2
      }));
    }

    var q1 = demandI(pCur, pm1), q2 = demandI(pCur, pm2), q3 = demandI(pCur, pm3);
    var html = '<div style="text-align:center;margin-bottom:0.3rem;">';
    html += '\\(Q_{\\text{mkt}} = \\sum_{h} x^h(p)\\)';
    html += '</div>';
    html += 'Ao preço \\(p = ' + pCur.toFixed(1) + '\\):<br>';
    html += '<span style="color:#e65100;">Cons. 1:</span> \\(q_1 = ' + q1.toFixed(1) + '\\)<br>';
    html += '<span style="color:#1565c0;">Cons. 2:</span> \\(q_2 = ' + q2.toFixed(1) + '\\)<br>';
    html += '<span style="color:#2e7d32;">Cons. 3:</span> \\(q_3 = ' + q3.toFixed(1) + '\\)<br>';
    html += '<strong>Total:</strong> \\(Q = ' + qMkt.toFixed(1) + '\\)';
    html += '<hr style="margin:0.3rem 0">';
    html += '<div style="font-size:0.78rem;color:#666;">A demanda de mercado é a <strong>soma horizontal</strong> das demandas individuais. Os "kinks" ocorrem nos preços de reserva.</div>';

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-p1').value = 10;
    document.getElementById('slider-p2').value = 7;
    document.getElementById('slider-p3').value = 4;
    document.getElementById('slider-p').value = 5;
    draw();
  }

  ['slider-p1','slider-p2','slider-p3','slider-p'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', draw);
  });
  draw();
</script>
</body>
</html>
