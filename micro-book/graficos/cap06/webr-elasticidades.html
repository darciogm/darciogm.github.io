<div class="main-container">

    <textarea id="r-code">
# Elasticidades Cruzadas e Classificação de Bens
# Cap. 6: Relações entre Bens
# Função CES: U(x1, x2) = (a*x1^rho + (1-a)*x2^rho)^(1/rho)

# Parâmetros (altere!)
a   <- 0.5     # peso do bem 1
rho <- 0.5     # rho -> 1: substitutos; rho -> -inf: complementos
m   <- 100     # renda
p2  <- 5       # preço fixo do bem 2

sigma <- 1 / (1 - rho)  # elasticidade de substituição

cat(sprintf("σ (elast. substituição) = %.2f\n", sigma))
cat(sprintf("rho = %.2f  →  bens são %s\n\n",
    rho, ifelse(sigma > 1, "SUBSTITUTOS líquidos",
          ifelse(sigma == 1, "Cobb-Douglas (σ=1)",
                 "COMPLEMENTOS líquidos"))))

# Demanda Marshalliana para CES (solução numérica via FOC)
# x1/x2 = (a/(1-a) * p2/p1)^sigma
p1_grid <- seq(1, 20, length.out = 200)
x1_marsh <- numeric(length(p1_grid))
x2_marsh <- numeric(length(p1_grid))

for (i in seq_along(p1_grid)) {
  p1 <- p1_grid[i]
  ratio <- (a / (1 - a) * p2 / p1)^sigma
  # x2 = m / (p2 + p1 * ratio)
  x2_marsh[i] <- m / (p2 + p1 * ratio)
  x1_marsh[i] <- ratio * x2_marsh[i]
}

# Elasticidade cruzada numérica: e_{1,p2}
dp2 <- 0.01
x1_alt <- numeric(length(p1_grid))
for (i in seq_along(p1_grid)) {
  p1 <- p1_grid[i]
  ratio_alt <- (a / (1 - a) * (p2 + dp2) / p1)^sigma
  x2_alt <- m / ((p2 + dp2) + p1 * ratio_alt)
  x1_alt[i] <- ratio_alt * x2_alt
}
e_cross <- (x1_alt - x1_marsh) / dp2 * p2 / x1_marsh

par(mfrow = c(1, 2), mar = c(4, 4, 3, 1))

# Painel 1: Demanda x1(p1)
plot(p1_grid, x1_marsh, type = "l", col = "#C8102E", lwd = 2,
     xlab = expression(p[1]), ylab = expression(x[1]),
     main = sprintf("Demanda x₁(p₁) | σ = %.1f", sigma))
grid()

# Painel 2: Elasticidade cruzada
plot(p1_grid, e_cross, type = "l", col = "#2a7f2a", lwd = 2,
     xlab = expression(p[1]),
     ylab = expression(e[list(1,p[2])]),
     main = "Elasticidade cruzada ε₁,p₂")
abline(h = 0, col = "gray", lty = 2)
grid()

cat(sprintf("\nNo ponto p1=5: ε₁,p₂ = %.3f  →  ", e_cross[which.min(abs(p1_grid - 5))]))
e_val <- e_cross[which.min(abs(p1_grid - 5))]
cat(ifelse(e_val > 0, "SUBSTITUTOS brutos\n", "COMPLEMENTOS brutos\n"))
</textarea>

<script type="module">
  import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:620,height:340}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
