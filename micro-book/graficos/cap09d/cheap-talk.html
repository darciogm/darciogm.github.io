<!DOCTYPE html>
<!--
  Cheap Talk: Modelo de Crawford-Sobel
  Library: Plotly.js
  Chapter 9d — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cheap Talk — Crawford-Sobel</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    .plot-box { flex: 1 1 420px; max-width: 520px; height: 400px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .plot-box { flex-basis: 100%; width: 100%; max-width: 520px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 520px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="plotDiv" class="plot-box"></div>
  <div class="controls">
    <h3>Crawford-Sobel</h3>
    <div class="slider-group">
      <label>Vies \(b\): <span class="val" id="val-b">0.10</span></label>
      <input type="range" id="slider-b" min="0.00" max="0.40" step="0.01" value="0.10">
    </div>
    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  function maxPartitions(b) {
    // N partitions exist iff b < 1/(2*N*(N-1))
    if (b <= 0.001) return 50; // effectively full revelation
    var N = 1;
    while (b < 1 / (2 * N * (N + 1))) N++; // N intervals exist if b < 1/(2N(N-1))
    // Actually: N intervals exist iff b < 1/(2N(N-1)). Let's find max N.
    N = 1;
    while (true) {
      var next = N + 1;
      if (b >= 1 / (2 * next * (next - 1))) break;
      N = next;
      if (N > 50) break;
    }
    return N;
  }

  function partitionPoints(N, b) {
    // Uniform partition for Crawford-Sobel: a_k = k/N + 2*b*k*(k-N)
    var pts = [0];
    for (var k = 1; k < N; k++) {
      var ak = k / N + 2 * b * k * (k - N);
      if (ak <= pts[pts.length - 1] || ak >= 1) break;
      pts.push(ak);
    }
    pts.push(1);
    return pts;
  }

  function update() {
    var b = parseFloat(document.getElementById('slider-b').value);
    document.getElementById('val-b').textContent = b.toFixed(2);

    var Nmax = maxPartitions(b);
    var pts = partitionPoints(Nmax, b);
    var actualN = pts.length - 1;

    // Build step function: receiver action = midpoint of each interval
    var thetas = [], actions = [], ideal = [];
    for (var i = 0; i < actualN; i++) {
      var lo = pts[i], hi = pts[i + 1];
      var mid = (lo + hi) / 2;
      // Step function
      thetas.push(lo); actions.push(mid);
      thetas.push(hi); actions.push(mid);
    }
    // Ideal action (45-degree line)
    for (var t = 0; t <= 1; t += 0.01) {
      ideal.push(t);
    }

    var traces = [];

    // Shade each partition interval
    var colors = ['rgba(21,101,192,0.08)','rgba(200,16,46,0.08)','rgba(0,137,123,0.08)','rgba(230,81,0,0.08)'];
    for (var i = 0; i < actualN; i++) {
      var lo = pts[i], hi = pts[i + 1];
      traces.push({
        x: [lo, hi, hi, lo], y: [0, 0, 1, 1], fill: 'toself',
        fillcolor: colors[i % colors.length], line: { width: 0 },
        showlegend: false, hoverinfo: 'skip'
      });
    }

    // Ideal line
    traces.push({
      x: ideal, y: ideal, mode: 'lines',
      line: { color: '#999', width: 1.5, dash: 'dash' },
      name: 'Acao ideal (a = theta)'
    });

    // Sender's ideal
    traces.push({
      x: ideal, y: ideal.map(function(t) { return t + b; }), mode: 'lines',
      line: { color: '#e65100', width: 1.5, dash: 'dot' },
      name: 'Ideal do sender (a = theta + b)'
    });

    // Receiver's action (step function)
    traces.push({
      x: thetas, y: actions, mode: 'lines',
      line: { color: '#1565c0', width: 2.5 },
      name: 'Acao do receptor'
    });

    // Partition boundaries
    var shapes = [];
    for (var i = 1; i < pts.length - 1; i++) {
      shapes.push({
        type: 'line', x0: pts[i], x1: pts[i], y0: 0, y1: 1,
        line: { color: '#C8102E', width: 1, dash: 'dot' }
      });
    }

    Plotly.react('plotDiv', traces, {
      margin: { l: 55, r: 20, t: 25, b: 50 },
      xaxis: { title: 'Estado do mundo (theta)', range: [0, 1.02] },
      yaxis: { title: 'Acao do receptor', range: [0, 1.1] },
      showlegend: true,
      legend: { x: 0.02, y: 0.98, bgcolor: 'rgba(255,255,255,0.85)', font: { size: 9 } },
      shapes: shapes,
      font: { family: 'CMU Serif, Georgia, serif' }
    }, { responsive: true, displayModeBar: false });

    var babbling = (actualN <= 1);
    var html = '<div style="text-align:center;margin-bottom:0.3rem;">';
    html += '\\(b = ' + b.toFixed(2) + '\\) — ';
    if (babbling) {
      html += '<strong style="color:#C8102E;">Babbling (nenhuma informacao)</strong>';
    } else {
      html += '<strong style="color:#1565c0;">' + actualN + ' intervalos</strong>';
    }
    html += '</div>';
    html += 'Particao: [';
    for (var i = 0; i < pts.length; i++) {
      html += pts[i].toFixed(2);
      if (i < pts.length - 1) html += ', ';
    }
    html += ']<br>';
    html += '<hr style="margin:0.3rem 0">';
    html += '<div style="font-size:0.78rem;color:#666;">';
    if (b < 0.01) html += 'Vies quase zero: revelacao (quase) completa.';
    else if (b >= 0.25) html += 'Vies muito alto: apenas babbling. "This parrot is no more!"';
    else html += 'Quanto maior o vies, menos intervalos — menos informacao credivel.';
    html += '</div>';

    document.getElementById('info').innerHTML = html;
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-b').value = 0.10;
    update();
  }

  document.getElementById('slider-b').addEventListener('input', update);
  update();
</script>
</body>
</html>
