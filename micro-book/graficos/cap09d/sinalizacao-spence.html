<!DOCTYPE html>
<!--
  Sinalização de Spence: Equilíbrio Separador e Agregador
  Library: JSXGraph
  Chapter 9d — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinalização de Spence</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    .jxgbox { flex: 1 1 420px; max-width: 500px; height: 400px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .jxgbox { flex-basis: 100%; width: 100%; max-width: 500px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 500px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox1" class="jxgbox"></div>
  <div class="controls">
    <h3>Modelo de Spence</h3>
    <div class="slider-group">
      <label>Produtividade \(\theta_H\): <span class="val" id="val-tH">2.0</span></label>
      <input type="range" id="slider-tH" min="1.5" max="4" step="0.1" value="2">
    </div>
    <div class="slider-group">
      <label>Produtividade \(\theta_L\): <span class="val" id="val-tL">1.0</span></label>
      <input type="range" id="slider-tL" min="0.5" max="2" step="0.1" value="1">
    </div>
    <div class="slider-group">
      <label>Prior \(p = P(\theta_H)\): <span class="val" id="val-p">0.50</span></label>
      <input type="range" id="slider-p" min="0.05" max="0.95" step="0.05" value="0.5">
    </div>
    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  var board = JXG.JSXGraph.initBoard('jxgbox1', {
    boundingbox: [-0.5, 4.5, 5, -0.5],
    axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
  });

  board.create('axis', [[0,0],[5,0]], {
    ticks: { drawLabels: true, label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 1 }
  });
  board.create('text', [2.5, -0.35, '<b><i>Educacao (e)</i></b>'], { fontSize: 12, fixed: true, anchorX: 'middle', highlight: false });
  board.create('axis', [[0,0],[0,4.5]], {
    ticks: { drawLabels: true, label: { fontSize: 11, anchorX: 'right', offset: [-8,0] }, minorTicks: 0, ticksDistance: 1 }
  });
  board.create('text', [-0.4, 4, '<b><i>w</i></b>'], { fontSize: 12, fixed: true, highlight: false });

  var objs = [];

  function draw() {
    for (var i = 0; i < objs.length; i++) board.removeObject(objs[i]);
    objs = [];

    var tH = parseFloat(document.getElementById('slider-tH').value);
    var tL = parseFloat(document.getElementById('slider-tL').value);
    var p = parseFloat(document.getElementById('slider-p').value);

    document.getElementById('val-tH').textContent = tH.toFixed(1);
    document.getElementById('val-tL').textContent = tL.toFixed(1);
    document.getElementById('val-p').textContent = p.toFixed(2);

    var maxE = 5;
    board.setBoundingBox([-maxE * 0.1, Math.max(tH, 4) * 1.15, maxE, -Math.max(tH, 4) * 0.12], false);

    // Cost functions: c(e, theta) = e / theta
    // IC for L not to mimic H: theta_H - e*/theta_L >= theta_L => e* >= theta_L*(theta_H - theta_L)
    // IC for H to signal: theta_H - e*/theta_H >= theta_L => e* <= theta_H*(theta_H - theta_L)
    var eMin = tL * (tH - tL); // minimum education for separation
    var eMax = tH * (tH - tL); // maximum education for separation
    var eStar = eMin; // least-cost separating equilibrium

    // Pooling wage
    var wPool = p * tH + (1 - p) * tL;

    // Indifference curves for L at (0, theta_L): w = theta_L + e/theta_L
    var icLxs = [], icLys = [];
    for (var e = 0; e <= maxE; e += 0.05) {
      icLxs.push(e);
      icLys.push(tL + e / tL);
    }
    objs.push(board.create('curve', [icLxs, icLys], { strokeColor: '#C8102E', strokeWidth: 1.5, dash: 2 }));
    objs.push(board.create('text', [maxE * 0.85, tL + maxE * 0.85 / tL + 0.15, 'IC<sub>L</sub>'], {
      fontSize: 9, color: '#C8102E', fixed: true, highlight: false
    }));

    // Indifference curves for H at (e*, theta_H): w = theta_H - (e*-e)/theta_H + ...
    // Actually IC for H through (e*, theta_H): u_H = theta_H - e*/theta_H
    // So w - e/theta_H = theta_H - e*/theta_H => w = theta_H + (e - e*)/theta_H
    var uH = tH - eStar / tH;
    var icHxs = [], icHys = [];
    for (var e = 0; e <= maxE; e += 0.05) {
      icHxs.push(e);
      icHys.push(uH + e / tH);
    }
    objs.push(board.create('curve', [icHxs, icHys], { strokeColor: '#1565c0', strokeWidth: 1.5, dash: 2 }));
    objs.push(board.create('text', [maxE * 0.85, uH + maxE * 0.85 / tH + 0.15, 'IC<sub>H</sub>'], {
      fontSize: 9, color: '#1565c0', fixed: true, highlight: false
    }));

    // Wage schedule (step function in separating eq)
    objs.push(board.create('segment', [[0, tL],[eStar, tL]], { strokeColor: '#333', strokeWidth: 2.5 }));
    objs.push(board.create('segment', [[eStar, tH],[maxE, tH]], { strokeColor: '#333', strokeWidth: 2.5 }));
    objs.push(board.create('segment', [[eStar, tL],[eStar, tH]], { strokeColor: '#333', strokeWidth: 2.5, dash: 3 }));

    // Separating region shading
    if (eMax > eMin) {
      objs.push(board.create('polygon', [[eMin, tH],[eMax, tH],[eMax, tH - 0.15],[eMin, tH - 0.15]], {
        fillColor: 'rgba(21,101,192,0.15)', borders: { strokeWidth: 0 }, vertices: { visible: false }
      }));
      objs.push(board.create('text', [(eMin + eMax) / 2, tH + 0.2, 'Regiao separadora'], {
        fontSize: 9, color: '#1565c0', anchorX: 'middle', fixed: true, highlight: false
      }));
    }

    // Points
    objs.push(board.create('point', [0, tL], { name: '', size: 5, fillColor: '#C8102E', strokeColor: '#C8102E', fixed: true }));
    objs.push(board.create('text', [0.15, tL - 0.2, '(0, \\(\\theta_L\\))'], { fontSize: 10, color: '#C8102E', fixed: true, highlight: false }));

    objs.push(board.create('point', [eStar, tH], { name: '', size: 5, fillColor: '#1565c0', strokeColor: '#1565c0', fixed: true }));
    objs.push(board.create('text', [eStar + 0.15, tH + 0.2, '(e*, \\(\\theta_H\\))'], { fontSize: 10, color: '#1565c0', fixed: true, highlight: false }));

    // Pooling wage line
    objs.push(board.create('line', [[0, wPool],[1, wPool]], {
      strokeColor: '#00897b', strokeWidth: 1.5, dash: 4,
      straightFirst: false, straightLast: true,
      point1: { visible: false }, point2: { visible: false }
    }));
    objs.push(board.create('text', [maxE * 0.7, wPool + 0.15, 'w<sub>pool</sub> = ' + wPool.toFixed(2)], {
      fontSize: 9, color: '#00897b', fixed: true, highlight: false
    }));

    var html = '<div style="text-align:center;margin-bottom:0.3rem;">';
    html += '\\(c(e, \\theta) = e / \\theta\\)';
    html += '</div>';
    html += '<strong>Separador:</strong> \\(e^* = ' + eStar.toFixed(2) + '\\)<br>';
    html += 'Regiao: \\([' + eMin.toFixed(2) + ', ' + eMax.toFixed(2) + ']\\)<br>';
    html += '<strong>Pooling:</strong> \\(w = ' + wPool.toFixed(2) + '\\)<br>';
    html += '<hr style="margin:0.3rem 0">';
    html += '<div style="font-size:0.78rem;color:#666;">Quando os tipos sao proximos (\\(\\theta_H \\approx \\theta_L\\)), a separacao exige sinalizacao cara. A educacao funciona como filtro, nao como investimento produtivo.</div>';

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-tH').value = 2;
    document.getElementById('slider-tL').value = 1;
    document.getElementById('slider-p').value = 0.5;
    draw();
  }

  ['slider-tH','slider-tL','slider-p'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', draw);
  });
  draw();
</script>
</body>
</html>
