<!DOCTYPE html>
<!--
  Seleção Adversa e Market Unraveling (Akerlof)
  Library: Plotly.js
  Chapter 9d — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seleção Adversa e Market Unraveling</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    .plot-box { flex: 1 1 420px; max-width: 520px; height: 400px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .plot-box { flex-basis: 100%; width: 100%; max-width: 520px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 520px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="plotDiv" class="plot-box"></div>
  <div class="controls">
    <h3>Mercado de Limoes</h3>
    <div class="slider-group">
      <label>Ganho de troca \(\alpha\): <span class="val" id="val-alpha">1.50</span></label>
      <input type="range" id="slider-alpha" min="1.05" max="3.00" step="0.05" value="1.50">
    </div>
    <div class="slider-group">
      <label>Rodadas max: <span class="val" id="val-rounds">10</span></label>
      <input type="range" id="slider-rounds" min="3" max="20" step="1" value="10">
    </div>
    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  function update() {
    var alpha = parseFloat(document.getElementById('slider-alpha').value);
    var maxR = parseInt(document.getElementById('slider-rounds').value);
    document.getElementById('val-alpha').textContent = alpha.toFixed(2);
    document.getElementById('val-rounds').textContent = maxR;

    // q ~ U[0,1], seller value = q, buyer value = alpha*q
    // Round 0: all types in market, E[q] = 0.5, buyer pays alpha*0.5
    // Only q <= alpha*0.5 stay. New E[q] = alpha*0.5/2 = alpha/4*...
    // Iterative: threshold_t, price_t = alpha * E[q | q <= threshold_{t-1}]
    var thresholds = [1]; // initially all types in
    var prices = [alpha * 0.5]; // buyer pays alpha * E[q|q<=1] = alpha/2
    var collapsed = false;

    for (var t = 1; t < maxR; t++) {
      var prevThresh = thresholds[t - 1];
      var price = prices[t - 1];
      // Sellers with q <= price stay (since seller value = q)
      var newThresh = Math.min(price, prevThresh);
      if (newThresh < 0.001) { collapsed = true; break; }
      thresholds.push(newThresh);
      // New price = alpha * E[q | q <= newThresh] = alpha * newThresh / 2
      prices.push(alpha * newThresh / 2);
    }

    var rounds = [];
    for (var i = 0; i < thresholds.length; i++) rounds.push(i);

    var traces = [
      { x: rounds, y: thresholds, mode: 'lines+markers', line: { color: '#C8102E', width: 2.5 },
        marker: { size: 7 }, name: 'Qualidade max no mercado' },
      { x: rounds, y: prices, mode: 'lines+markers', line: { color: '#1565c0', width: 2.5, dash: 'dash' },
        marker: { size: 7 }, name: 'Preco (alpha * E[q])' }
    ];

    Plotly.react('plotDiv', traces, {
      margin: { l: 55, r: 20, t: 25, b: 50 },
      xaxis: { title: 'Rodada de ajuste', dtick: 1 },
      yaxis: { title: 'Qualidade / Preco', range: [0, 1.1] },
      showlegend: true,
      legend: { x: 0.4, y: 0.98, bgcolor: 'rgba(255,255,255,0.85)', font: { size: 9 } },
      font: { family: 'CMU Serif, Georgia, serif' }
    }, { responsive: true, displayModeBar: false });

    var finalThresh = thresholds[thresholds.length - 1];
    var status = (collapsed || finalThresh < 0.01) ? '<strong style="color:#C8102E;">Mercado colapsou!</strong>' :
                 (finalThresh < 0.5 ? '<strong style="color:#e65100;">Mercado parcialmente sobrevive</strong>' :
                 '<strong style="color:#00897b;">Mercado sobrevive</strong>');

    var html = '<div style="text-align:center;margin-bottom:0.3rem;">';
    html += '\\(v_B = \\alpha q\\), \\(v_S = q\\), \\(q \\sim U[0,1]\\)';
    html += '</div>';
    html += status + '<br>';
    html += 'Qualidade max restante: \\(' + finalThresh.toFixed(3) + '\\)<br>';
    html += 'Rodadas ate convergencia: ' + thresholds.length + '<br>';
    html += '<hr style="margin:0.3rem 0">';
    if (alpha < 2) {
      html += '<div style="font-size:0.78rem;color:#C8102E;">Com \\(\\alpha < 2\\), o mercado colapsa: o ganho de troca nao compensa a assimetria de informacao.</div>';
    } else {
      html += '<div style="font-size:0.78rem;color:#00897b;">Com \\(\\alpha \\geq 2\\), o mercado sobrevive parcialmente.</div>';
    }

    document.getElementById('info').innerHTML = html;
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-alpha').value = 1.5;
    document.getElementById('slider-rounds').value = 10;
    update();
  }

  ['slider-alpha','slider-rounds'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
