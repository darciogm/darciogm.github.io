<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>R Interativo — Equilíbrio com Imposto</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'CMU Serif',Georgia,serif;background:#fff;color:#333;padding:1rem}.main-container{max-width:780px;margin:0 auto}.status-bar{padding:.5rem 1rem;border-radius:4px;font-size:.85rem;margin-bottom:1rem;text-align:center}.status-loading{background:#fff3e0;border:1px solid #ff9800;color:#e65100}.status-ready{background:#e8f5e9;border:1px solid #4caf50;color:#2e7d32}.status-error{background:#ffebee;border:1px solid #f44336;color:#c62828}.editor-container{border:1px solid #ddd;border-radius:6px;overflow:hidden;margin-bottom:1rem}.editor-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}.editor-header .lang-tag{background:#C8102E;color:#fff;padding:.15rem .5rem;border-radius:3px;font-size:.75rem;font-weight:700}textarea#r-code{width:100%;min-height:300px;padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.85rem;border:none;outline:none;resize:vertical;background:#fafafa;color:#333;line-height:1.5;tab-size:2}.btn-row{display:flex;gap:.5rem;margin-bottom:1rem}.btn-run{padding:.5rem 1.5rem;background:#C8102E;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:700}.btn-run:hover{background:#9a0c23}.btn-run:disabled{background:#ccc;cursor:not-allowed}.btn-reset{padding:.5rem 1.5rem;background:#fff;color:#666;border:1px solid #ddd;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit}.btn-reset:hover{background:#f5f5f5}.output-container{border:1px solid #ddd;border-radius:6px;overflow:hidden}.output-header{background:#f5f5f5;padding:.4rem 1rem;font-size:.8rem;color:#666;border-bottom:1px solid #ddd}#r-output{padding:.8rem 1rem;font-family:'Fira Code','Consolas',monospace;font-size:.82rem;background:#1e1e1e;color:#d4d4d4;min-height:120px;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}#r-plot{text-align:center;padding:.5rem;background:#fff}#r-plot img,#r-plot canvas{max-width:100%;border-radius:4px}.info-box{margin-top:1rem;padding:.8rem;background:#f8f8f8;border:1px solid #eee;border-radius:4px;font-size:.8rem;color:#666;line-height:1.5}html,body{margin:0!important;padding:0!important;overflow:visible!important}</style>
</head>
<body>
<div class="main-container">
  <div class="status-bar status-loading" id="status">Carregando WebR (~10s na primeira vez)...</div>
  <div class="editor-container">
    <div class="editor-header"><span>Edite o código e clique "Executar"</span><span class="lang-tag">R</span></div>
    <textarea id="r-code">
# Imposto e Incidência Tributária
# Cap. 1 — Quem realmente paga o imposto?

# Parâmetros (altere!)
a_d <- 100   # intercepto da demanda
b_d <- 2     # inclinação da demanda (Qd = a_d - b_d*P)
a_s <- 10    # intercepto da oferta
b_s <- 3     # inclinação da oferta  (Qs = a_s + b_s*P)
taxa <- 10   # imposto por unidade (R$)

# Equilíbrio SEM imposto
P0 <- (a_d - a_s) / (b_d + b_s)
Q0 <- a_d - b_d * P0

# Equilíbrio COM imposto (sobre o vendedor: S' desloca para cima)
# Novo equilíbrio: Qd = Qs => a_d - b_d*Pc = a_s + b_s*(Pc - t)
Pc <- (a_d - a_s + b_s * taxa) / (b_d + b_s)  # preço consumidor
Pp <- Pc - taxa                                  # preço produtor
Q1 <- a_d - b_d * Pc

# Incidência
inc_cons <- Pc - P0
inc_prod <- P0 - Pp
DWL <- 0.5 * taxa * (Q0 - Q1)

cat("=== Sem Imposto ===\n")
cat(sprintf("  P* = R$ %.2f   Q* = %.1f\n\n", P0, Q0))
cat("=== Com Imposto de R$ %.0f ===\n", taxa)
cat(sprintf("  P_consumidor = R$ %.2f\n", Pc))
cat(sprintf("  P_produtor   = R$ %.2f\n", Pp))
cat(sprintf("  Quantidade   = %.1f\n\n", Q1))
cat(sprintf("  Consumidor paga: R$ %.2f do imposto (%.0f%%)\n",
    inc_cons, 100*inc_cons/taxa))
cat(sprintf("  Produtor paga:   R$ %.2f do imposto (%.0f%%)\n",
    inc_prod, 100*inc_prod/taxa))
cat(sprintf("  Receita gov.:    R$ %.1f\n", taxa * Q1))
cat(sprintf("  Peso morto (DWL) = R$ %.1f\n", DWL))

# Gráfico
P_range <- seq(0, 50, length.out = 300)
Qd <- a_d - b_d * P_range
Qs <- a_s + b_s * P_range
Qs_tax <- a_s + b_s * (P_range - taxa)

par(mar = c(4, 4, 3, 1))
plot(Qd, P_range, type = "l", col = "#C8102E", lwd = 2,
     xlim = c(0, max(a_d, a_s + b_s*50)*0.6),
     ylim = c(0, 45),
     xlab = "Quantidade (Q)", ylab = "Preço (P)",
     main = "Incidência Tributária e Peso Morto")
lines(Qs, P_range, col = "#2a7f2a", lwd = 2)
lines(Qs_tax, P_range, col = "#2a7f2a", lwd = 2, lty = 2)

# Peso morto (triângulo)
polygon(c(Q1, Q0, Q1), c(Pc, P0, Pp),
        col = rgb(1, 0, 0, 0.15), border = NA)

# Receita do governo (retângulo)
rect(0, Pp, Q1, Pc, col = rgb(0, 0, 1, 0.08), border = "steelblue", lty = 2)

points(Q0, P0, pch = 19, col = "#333", cex = 1.5)
points(Q1, Pc, pch = 17, col = "#C8102E", cex = 1.3)
points(Q1, Pp, pch = 17, col = "#2a7f2a", cex = 1.3)

legend("topright",
       legend = c("Demanda", "Oferta", "Oferta + imposto",
                  "DWL", "Receita gov."),
       col = c("#C8102E","#2a7f2a","#2a7f2a","red","steelblue"),
       lwd = c(2,2,2,NA,NA), lty = c(1,1,2,NA,NA),
       fill = c(NA,NA,NA,rgb(1,0,0,0.15),rgb(0,0,1,0.08)),
       border = c(NA,NA,NA,"red","steelblue"),
       cex = 0.75, bg = "white")
text(Q0+2, P0+1, sprintf("E0 (%.0f, %.1f)", Q0, P0), cex=0.8, font=2)
</textarea>
  </div>
  <div class="btn-row">
    <button class="btn-run" id="btn-run" onclick="runCode()" disabled>Executar (R)</button>
    <button class="btn-reset" onclick="resetCode()">Restaurar código original</button>
  </div>
  <div class="output-container">
    <div class="output-header">Saída do R</div>
    <div id="r-output">Aguardando execução...</div>
    <div id="r-plot"></div>
  </div>
  <div class="info-box">
    <strong>WebR</strong> executa R no navegador. Altere as inclinações b_d e b_s: quem paga mais do imposto, o lado mais elástico ou o mais inelástico? E se b_d = b_s?
  </div>
</div>
<script type="module">
import{WebR}from'https://webr.r-wasm.org/latest/webr.mjs';const webR=new WebR(),s=document.getElementById('status'),b=document.getElementById('btn-run'),o=document.getElementById('r-output'),p=document.getElementById('r-plot');window._originalCode=document.getElementById('r-code').value;async function init(){try{await webR.init();s.textContent='WebR pronto!';s.className='status-bar status-ready';b.disabled=false}catch(e){s.textContent='Erro: '+e.message;s.className='status-bar status-error'}}window.runCode=async function(){const code=document.getElementById('r-code').value;b.disabled=true;o.textContent='Executando...';p.innerHTML='';try{const sh=await new webR.Shelter(),r=await sh.captureR(code,{withAutoprint:true,captureStreams:true,captureConditions:true,captureGraphics:{width:620,height:420}});let t='';for(const x of r.output){if(x.type==='stdout'||x.type==='stderr')t+=x.data+'\n'}o.textContent=t||'(sem saída)';if(r.images&&r.images.length>0){for(const img of r.images){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);p.appendChild(c)}}await sh.purge()}catch(e){o.textContent='Erro: '+e.message}b.disabled=false};window.resetCode=function(){document.getElementById('r-code').value=window._originalCode};init();(function(){function h(){window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight,src:location.href},'*')}new ResizeObserver(h).observe(document.body);h()})();
</script>
</body>
</html>
