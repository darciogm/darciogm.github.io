# Estimando Cobb-Douglas — Dados estilizados PIA/IBGE
# Cap. 10: Teoria da Produção

# Simular 25 setores industriais (baseado na PIA 2019)
set.seed(42)
n <- 25
alpha_true <- 0.35   # participação do capital
beta_true  <- 0.65   # participação do trabalho
A_true     <- 7.5    # PTF

ln_K <- rnorm(n, mean = 5.0, sd = 1.2)
ln_L <- rnorm(n, mean = 3.0, sd = 0.8)
ln_q <- log(A_true) + alpha_true * ln_K + beta_true * ln_L +
        rnorm(n, 0, 0.15)

# Regressão: ln(q) = ln(A) + alpha*ln(K) + beta*ln(L) + erro
fit <- lm(ln_q ~ ln_K + ln_L)
coefs <- coef(fit)

cat("=== Estimação MQO da Cobb-Douglas ===\n")
cat(sprintf("  ln(A) = %.3f  →  A = %.2f  (verdadeiro: %.2f)\n",
    coefs[1], exp(coefs[1]), A_true))
cat(sprintf("  α = %.3f  (verdadeiro: %.3f)\n", coefs[2], alpha_true))
cat(sprintf("  β = %.3f  (verdadeiro: %.3f)\n", coefs[3], beta_true))
cat(sprintf("  α + β = %.3f  →  %s\n\n",
    coefs[2] + coefs[3],
    ifelse(abs(coefs[2]+coefs[3]-1) < 0.1, "CRS ✓", "não-CRS")))
cat(sprintf("  R² = %.3f\n\n", summary(fit)$r.squared))

# Teste de CRS: H0: alpha + beta = 1
# Manualmente: regressão restrita
ln_q_adj <- ln_q - ln_L
ln_kl    <- ln_K - ln_L
fit_crs  <- lm(ln_q_adj ~ ln_kl)
cat("=== Teste de CRS (α + β = 1) ===\n")
rss_u <- sum(resid(fit)^2)
rss_r <- sum(resid(fit_crs)^2)
F_stat <- ((rss_r - rss_u) / 1) / (rss_u / (n - 3))
p_val  <- 1 - pf(F_stat, 1, n - 3)
cat(sprintf("  F = %.3f,  p-valor = %.3f\n", F_stat, p_val))
cat(sprintf("  %s H0 (CRS) a 5%%\n\n",
    ifelse(p_val > 0.05, "Não rejeita", "Rejeita")))

# Gráfico: ajuste
par(mfrow = c(1, 2), mar = c(4, 4, 3, 1))

# Painel 1: observado vs. predito
plot(fitted(fit), ln_q, pch = 19, col = "#C8102E",
     xlab = "ln(q) predito", ylab = "ln(q) observado",
     main = "Ajuste da Cobb-Douglas")
abline(0, 1, col = "gray", lty = 2, lwd = 1.5)
grid()

# Painel 2: Isoquantas estimadas
K_grid <- seq(0.5, 15, length.out = 200)
A_hat <- exp(coefs[1])
a_hat <- coefs[2]
b_hat <- coefs[3]

q_levels <- c(30, 60, 90)
plot(NULL, xlim = c(0, 15), ylim = c(0, 15),
     xlab = "Capital (K)", ylab = "Trabalho (L)",
     main = "Isoquantas Estimadas")
cores <- c("#C8102E", "#ff6b35", "#2a7f2a")
for (i in seq_along(q_levels)) {
  L_iso <- (q_levels[i] / (A_hat * K_grid^a_hat))^(1/b_hat)
  lines(K_grid, L_iso, col = cores[i], lwd = 2)
}
legend("topright",
       legend = paste("q =", q_levels),
       col = cores, lwd = 2, cex = 0.85)
grid()
