# Elasticidade de Substituição: CES, CD, Leontief, Linear
# Cap. 10 — Quão fácil é trocar K por L?

# CES: f(K,L) = (a*K^rho + (1-a)*L^rho)^(1/rho)
# sigma = 1/(1-rho): elasticidade de substituição
# rho -> 0: Cobb-Douglas (sigma=1)
# rho -> -inf: Leontief (sigma=0)
# rho = 1: Substitutos perfeitos (sigma=inf)

a <- 0.5   # peso do capital

cat("=== Isoquantas CES para diferentes sigma ===\n\n")
cat("sigma = 1/(1-rho):\n")
cat("  sigma -> 0: Leontief (proporcoes fixas)\n")
cat("  sigma = 1: Cobb-Douglas\n")
cat("  sigma -> inf: Substitutos perfeitos\n\n")

# Funções
ces <- function(K, L, rho) {
  if (abs(rho) < 0.01) return(K^a * L^(1-a))  # CD
  (a * K^rho + (1-a) * L^rho)^(1/rho)
}

# Gráfico: 4 valores de sigma
par(mfrow = c(2, 2), mar = c(4, 4, 3, 1))
K_grid <- seq(0.1, 20, length.out = 300)
q_bar <- 5  # isoquanta alvo

sigmas <- c(0.25, 0.5, 1, 3)
titles <- c("sigma=0.25 (quase Leontief)",
            "sigma=0.5",
            "sigma=1 (Cobb-Douglas)",
            "sigma=3 (quase substitutos)")

for (i in 1:4) {
  sigma <- sigmas[i]
  rho <- 1 - 1/sigma
  # Encontrar L na isoquanta: ces(K,L,rho) = q_bar
  L_iso <- sapply(K_grid, function(K) {
    # Resolver numericamente
    obj <- function(L) ces(K, L, rho) - q_bar
    tryCatch(uniroot(obj, c(0.01, 100))$root, error = function(e) NA)
  })

  plot(K_grid, L_iso, type = "l", col = "steelblue", lwd = 2,
       xlim = c(0, 20), ylim = c(0, 20),
       xlab = "K", ylab = "L", main = titles[i])
  # Raio K=L
  abline(0, 1, col = "gray", lty = 3)
  # TMST no ponto K=L
  K0 <- q_bar^(1/(a*rho + (1-a)*rho))  # aproximado
}

cat("Quanto MAIOR sigma, mais achatada a isoquanta\n")
cat("(mais facil substituir K por L).\n\n")

# Tabela de TMST
cat(sprintf("%-10s %-10s %-10s\n", "sigma", "rho", "Forma"))
cat(paste(rep("-", 35), collapse=""), "\n")
for (s in c(0.1, 0.5, 1, 2, 5, 100)) {
  r <- 1 - 1/s
  forma <- ifelse(s < 0.2, "~Leontief",
           ifelse(abs(s-1)<0.01, "Cobb-Douglas",
           ifelse(s > 10, "~Linear", "CES")))
  cat(sprintf("%-10.1f %-10.2f %-10s\n", s, r, forma))
}
</textarea>
