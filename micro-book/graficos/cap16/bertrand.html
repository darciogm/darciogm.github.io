<!DOCTYPE html>
<!--
  Bertrand Competition — Chapter 16
  Library: JSXGraph
  Shows: reaction functions in (p1, p2), Bertrand paradox, differentiated products
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Competição de Bertrand</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 420px; max-width: 520px; height: 460px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 310px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.7rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.83rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .toggle-group { margin-bottom: 0.8rem; display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .toggle-btn { padding: 0.35rem 0.6rem; border: 1px solid #C8102E; background: #fff; color: #C8102E; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-family: inherit; }
    .toggle-btn.active { background: #C8102E; color: #fff; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.7; }
    .info-box .section-title { font-weight: 700; color: #1565c0; margin-top: 0.3rem; }
    .info-box .section-title:first-child { margin-top: 0; }
    .hidden { display: none; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 880px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { flex-basis: 100%; width: 100%; max-width: 520px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 520px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Tipo de Produto</h3>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-homog" onclick="setMode('homog')">Homogêneo</button>
        <button class="toggle-btn" id="btn-diff" onclick="setMode('diff')">Diferenciado</button>
      </div>
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>CMg Firma 1 \(c_1\): <span class="val" id="val-c1">20</span></label>
        <input type="range" id="slider-c1" min="0" max="60" step="1" value="20">
      </div>
      <div class="slider-group">
        <label>CMg Firma 2 \(c_2\): <span class="val" id="val-c2">20</span></label>
        <input type="range" id="slider-c2" min="0" max="60" step="1" value="20">
      </div>
      <div id="params-diff" class="hidden">
        <div class="slider-group">
          <label>Tamanho do mercado \(\alpha\): <span class="val" id="val-alpha">100</span></label>
          <input type="range" id="slider-alpha" min="40" max="200" step="1" value="100">
        </div>
        <div class="slider-group">
          <label>Sensib. próprio preço \(\beta\): <span class="val" id="val-beta">2.0</span></label>
          <input type="range" id="slider-beta" min="1" max="5" step="0.1" value="2">
        </div>
        <div class="slider-group">
          <label>Sensib. preço rival \(\gamma\): <span class="val" id="val-gamma">1.0</span></label>
          <input type="range" id="slider-gamma" min="0.1" max="4" step="0.1" value="1">
        </div>
      </div>
      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

<script>
  var BB = [-12, 120, 120, -12];
  var bMode = 'homog';
  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: BB, axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
  });

  function rebuildBoard() {
    JXG.JSXGraph.freeBoard(board);
    board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: BB, axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
    });
  }

  function addAxes() {
    board.create('axis', [[0,0],[1,0]], {
      ticks: { drawLabels: true, minorTicks: 0, ticksDistance: 20, label: { fontSize: 11 } },
      name: '', withLabel: false
    });
    board.create('text', [60, -8, '<b><i>p</i><sub>1</sub></b>'], {
      fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false
    });
    board.create('axis', [[0,0],[0,1]], {
      ticks: { drawLabels: true, minorTicks: 0, ticksDistance: 20, label: { fontSize: 11, anchorX: 'right', offset: [-8, 0] } },
      name: '', withLabel: false
    });
    board.create('text', [-8, 60, '<b><i>p</i><sub>2</sub></b>'], {
      fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
    });
    // 45-degree line
    board.create('line', [[0,0],[1,1]], {
      strokeColor: '#ddd', strokeWidth: 1, dash: 4,
      point1: { visible: false }, point2: { visible: false }
    });
  }

  function setMode(m) {
    bMode = m;
    document.querySelectorAll('.toggle-btn').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('btn-' + m).classList.add('active');
    document.getElementById('params-diff').classList.toggle('hidden', m !== 'diff');
    updateGraph();
  }

  function updateGraph() {
    var c1 = parseFloat(document.getElementById('slider-c1').value);
    var c2 = parseFloat(document.getElementById('slider-c2').value);
    document.getElementById('val-c1').textContent = c1.toFixed(0);
    document.getElementById('val-c2').textContent = c2.toFixed(0);

    rebuildBoard();
    addAxes();

    if (bMode === 'homog') {
      // Cost lines
      board.create('segment', [[c1, 0],[c1, BB[1]]], {
        strokeColor: '#1565c0', strokeWidth: 1.5, dash: 3, fixed: true
      });
      board.create('segment', [[0, c2],[BB[2], c2]], {
        strokeColor: '#C8102E', strokeWidth: 1.5, dash: 3, fixed: true
      });
      board.create('text', [c1 + 2, BB[1] * 0.85, '<i>c</i><sub>1</sub>'], {
        fontSize: 12, color: '#1565c0', fixed: true, highlight: false
      });
      board.create('text', [BB[2] * 0.85, c2 + 3, '<i>c</i><sub>2</sub>'], {
        fontSize: 12, color: '#C8102E', fixed: true, highlight: false
      });

      // Equilibrium point
      var pe = Math.max(c1, c2);
      board.create('point', [pe, pe], {
        name: 'Equil. Bertrand', size: 6, strokeColor: '#00897b', fillColor: '#00897b', fixed: true,
        label: { fontSize: 12, color: '#00897b', offset: [10, 10], highlight: false }
      });

      // Reaction "curves" along 45° (for symmetric case, both undercut)
      if (Math.abs(c1 - c2) < 1) {
        board.create('segment', [[c1, c1], [BB[2] * 0.85, BB[2] * 0.85]], {
          strokeColor: '#1565c0', strokeWidth: 2.5, fixed: true
        });
      }

      // Dashed lines from equilibrium
      board.create('segment', [[pe, pe],[pe, 0]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });
      board.create('segment', [[pe, pe],[0, pe]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });

      var html = '<div class="section-title">Paradoxo de Bertrand</div>';
      html += 'Produtos homogêneos: \\(p_1^* = p_2^* = ' + pe.toFixed(0) + '\\)<br>';
      if (Math.abs(c1 - c2) < 1) {
        html += '\\(\\pi_1 = \\pi_2 = 0\\)<br>';
        html += 'Duas firmas bastam para resultado competitivo!';
      } else {
        html += 'Firma mais eficiente cobra \\(p = c_{rival}\\).<br>';
        html += 'Firma ineficiente: \\(\\pi = 0\\).';
      }
      document.getElementById('info').innerHTML = html;

    } else {
      // Differentiated Bertrand
      var alpha = parseFloat(document.getElementById('slider-alpha').value);
      var beta = parseFloat(document.getElementById('slider-beta').value);
      var gamma = parseFloat(document.getElementById('slider-gamma').value);
      document.getElementById('val-alpha').textContent = alpha.toFixed(0);
      document.getElementById('val-beta').textContent = beta.toFixed(1);
      document.getElementById('val-gamma').textContent = gamma.toFixed(1);

      // R1(p2): p1 = (alpha + gamma*p2 + beta*c1) / (2*beta) = A1 + k*p2
      // R2(p1): p2 = (alpha + gamma*p1 + beta*c2) / (2*beta) = A2 + k*p1
      var A1 = (alpha + beta * c1) / (2 * beta);
      var A2 = (alpha + beta * c2) / (2 * beta);
      var k = gamma / (2 * beta);

      if (k >= 1) {
        document.getElementById('info').innerHTML = '<strong>Sem equilíbrio interior.</strong> Ajuste \\(\\gamma < 2\\beta\\).';
        board.update();
        if (window.MathJax && MathJax.typeset) MathJax.typeset();
        return;
      }

      var p1s = (A1 + k * A2) / (1 - k * k);
      var p2s = (A2 + k * A1) / (1 - k * k);

      if (p1s < 0 || p2s < 0) {
        document.getElementById('info').innerHTML = '<strong>Equilíbrio com preços negativos.</strong> Ajuste os parâmetros.';
        board.update();
        if (window.MathJax && MathJax.typeset) MathJax.typeset();
        return;
      }

      // Adjust bounding box for this mode
      var maxP = Math.max(p1s, p2s, A1, A2) * 1.6;
      maxP = Math.max(maxP, 80);
      var pad = maxP * 0.1;
      BB = [-pad, maxP + pad, maxP + pad, -pad];
      JXG.JSXGraph.freeBoard(board);
      board = JXG.JSXGraph.initBoard('jxgbox', {
        boundingbox: BB, axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
      });
      // Re-add axes with adjusted tick distance
      var tickDist = maxP <= 80 ? 10 : maxP <= 150 ? 20 : 50;
      board.create('axis', [[0,0],[1,0]], {
        ticks: { drawLabels: true, minorTicks: 0, ticksDistance: tickDist, label: { fontSize: 11 } },
        name: '', withLabel: false
      });
      board.create('text', [maxP / 2, -pad * 0.7, '<b><i>p</i><sub>1</sub></b>'], {
        fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false
      });
      board.create('axis', [[0,0],[0,1]], {
        ticks: { drawLabels: true, minorTicks: 0, ticksDistance: tickDist, label: { fontSize: 11, anchorX: 'right', offset: [-8, 0] } },
        name: '', withLabel: false
      });
      board.create('text', [-pad * 0.7, maxP / 2, '<b><i>p</i><sub>2</sub></b>'], {
        fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
      });
      board.create('line', [[0,0],[1,1]], {
        strokeColor: '#ddd', strokeWidth: 1, dash: 4,
        point1: { visible: false }, point2: { visible: false }
      });

      // R1: p1 = A1 + k*p2 → in (p1,p2) space: segment from (A1, 0) to (A1+k*maxP, maxP)
      board.create('segment', [[A1, 0], [A1 + k * maxP, maxP]], {
        strokeColor: '#1565c0', strokeWidth: 2.5, fixed: true
      });
      board.create('text', [A1 + k * maxP * 0.8 + pad * 0.3, maxP * 0.85,
        '<i>R</i><sub>1</sub>(<i>p</i><sub>2</sub>)'], {
        fontSize: 12, color: '#1565c0', fixed: true, highlight: false
      });

      // R2: p2 = A2 + k*p1 → segment from (0, A2) to (maxP, A2+k*maxP)
      board.create('segment', [[0, A2], [maxP, A2 + k * maxP]], {
        strokeColor: '#C8102E', strokeWidth: 2.5, fixed: true
      });
      board.create('text', [maxP * 0.85, A2 + k * maxP * 0.85 + pad * 0.3,
        '<i>R</i><sub>2</sub>(<i>p</i><sub>1</sub>)'], {
        fontSize: 12, color: '#C8102E', fixed: true, highlight: false
      });

      // Nash equilibrium
      board.create('point', [p1s, p2s], {
        name: 'Nash', size: 5, strokeColor: '#00897b', fillColor: '#00897b', fixed: true,
        label: { fontSize: 12, color: '#00897b', offset: [10, 5], highlight: false }
      });
      board.create('segment', [[p1s, p2s],[p1s, 0]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });
      board.create('segment', [[p1s, p2s],[0, p2s]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });

      var q1s = alpha - beta * p1s + gamma * p2s;
      var q2s = alpha - beta * p2s + gamma * p1s;
      var pi1 = (p1s - c1) * q1s;
      var pi2 = (p2s - c2) * q2s;

      var html = '<div class="section-title">Demanda</div>';
      html += '\\(q_i = ' + alpha.toFixed(0) + ' - ' + beta.toFixed(1) + '\\,p_i + ' + gamma.toFixed(1) + '\\,p_j\\)';
      html += '<div class="section-title">Equilíbrio de Nash</div>';
      html += '\\(p_1^* = ' + p1s.toFixed(2) + '\\), \\(p_2^* = ' + p2s.toFixed(2) + '\\)<br>';
      html += '\\(q_1 = ' + q1s.toFixed(2) + '\\), \\(q_2 = ' + q2s.toFixed(2) + '\\)<br>';
      html += '\\(\\pi_1 = ' + pi1.toFixed(1) + '\\), \\(\\pi_2 = ' + pi2.toFixed(1) + '\\)<br>';
      html += 'Preços <strong>acima</strong> de CMg: diferenciação resolve o paradoxo.';
      document.getElementById('info').innerHTML = html;
    }

    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-c1').value = 20;
    document.getElementById('slider-c2').value = 20;
    document.getElementById('slider-alpha').value = 100;
    document.getElementById('slider-beta').value = 2;
    document.getElementById('slider-gamma').value = 1;
    BB = [-12, 120, 120, -12];
    bMode = 'homog';
    document.querySelectorAll('.toggle-btn').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('btn-homog').classList.add('active');
    document.getElementById('params-diff').classList.add('hidden');
    updateGraph();
  }

  document.querySelectorAll('input[type="range"]').forEach(function(el) {
    el.addEventListener('input', updateGraph);
  });
  updateGraph();
</script>
</body>
</html>
