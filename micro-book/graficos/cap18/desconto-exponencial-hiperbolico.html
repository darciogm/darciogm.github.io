<!DOCTYPE html>
<!--
  Desconto Exponencial vs Hiperbólico — Interactive Graph
  Library: Plotly.js
  Chapter 18 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desconto Exponencial vs Hiperbólico</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #plotly-chart { flex: 1 1 420px; max-width: 520px; height: 400px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.6rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      #plotly-chart { flex-basis: 100%; width: 100%; max-width: 520px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 520px; }
    }
    /* anti-inflation-fix */
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="plotly-chart"></div>
    <div class="controls">
      <h3>Parâmetros</h3>
      <div class="slider-group">
        <label>\(\delta\) (fator de desconto): <span class="val" id="val-delta">0.95</span></label>
        <input type="range" id="slider-delta" min="0.80" max="1.00" step="0.01" value="0.95">
      </div>
      <div class="slider-group">
        <label>\(\beta\) (viés presente): <span class="val" id="val-beta">0.70</span></label>
        <input type="range" id="slider-beta" min="0.50" max="1.00" step="0.01" value="0.70">
      </div>
      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    function update() {
      var delta = parseFloat(document.getElementById('slider-delta').value);
      var beta  = parseFloat(document.getElementById('slider-beta').value);
      document.getElementById('val-delta').textContent = delta.toFixed(2);
      document.getElementById('val-beta').textContent = beta.toFixed(2);

      var tMax = 20;
      var tValues = [];
      var expValues = [];
      var hypValues = [];
      var gapValues = [];

      for (var t = 0; t <= tMax; t++) {
        tValues.push(t);
        var expD = Math.pow(delta, t);
        var hypD = (t === 0) ? 1 : beta * Math.pow(delta, t);
        expValues.push(expD);
        hypValues.push(hypD);
        gapValues.push(expD - hypD);
      }

      // Gap fill (area between curves)
      var traceFill = {
        x: tValues.concat(tValues.slice().reverse()),
        y: expValues.concat(hypValues.slice().reverse()),
        fill: 'toself',
        fillcolor: 'rgba(200,16,46,0.15)',
        line: { color: 'rgba(200,16,46,0.4)', width: 1 },
        name: 'Viés presente (gap)',
        showlegend: true,
        type: 'scatter',
        hoverinfo: 'skip'
      };

      var traceExp = {
        x: tValues,
        y: expValues,
        type: 'scatter',
        mode: 'lines+markers',
        name: 'Exponencial: δᵗ',
        line: { color: '#1565c0', width: 3 },
        marker: { color: '#1565c0', size: 5 }
      };

      var traceHyp = {
        x: tValues,
        y: hypValues,
        type: 'scatter',
        mode: 'lines+markers',
        name: 'Quasi-hiperbólico: βδᵗ',
        line: { color: '#C8102E', width: 3, dash: 'dash' },
        marker: { color: '#C8102E', size: 5 }
      };

      var layout = {
        margin: { l: 55, r: 20, t: 30, b: 50 },
        xaxis: { title: { text: '<b><i>Períodos (t)</i></b>', font: { size: 13 } }, range: [-0.5, tMax + 0.5], dtick: 5 },
        yaxis: { title: { text: '<b><i>Fator de desconto</i></b>', font: { size: 13 } }, range: [0, 1.05] },
        showlegend: true,
        legend: { x: 0.35, y: 0.98, font: { size: 9 } },
        font: { family: 'Georgia, serif' },
        paper_bgcolor: '#fff',
        plot_bgcolor: '#fafafa',
        annotations: [{
          x: 3,
          y: (expValues[3] + hypValues[3]) / 2,
          text: '<b>Viés<br>presente</b>',
          showarrow: true,
          arrowhead: 2,
          ax: 50,
          ay: -30,
          font: { size: 11, color: '#C8102E' }
        }]
      };

      Plotly.newPlot('plotly-chart', [traceFill, traceExp, traceHyp], layout, { responsive: true, displayModeBar: false });

      // Info box
      var exp1  = Math.pow(delta, 1).toFixed(4);
      var exp5  = Math.pow(delta, 5).toFixed(4);
      var exp10 = Math.pow(delta, 10).toFixed(4);
      var hyp1  = (beta * Math.pow(delta, 1)).toFixed(4);
      var hyp5  = (beta * Math.pow(delta, 5)).toFixed(4);
      var hyp10 = (beta * Math.pow(delta, 10)).toFixed(4);
      var gap1  = (Math.pow(delta, 1) - beta * Math.pow(delta, 1)).toFixed(4);
      var gap5  = (Math.pow(delta, 5) - beta * Math.pow(delta, 5)).toFixed(4);
      var gap10 = (Math.pow(delta, 10) - beta * Math.pow(delta, 10)).toFixed(4);

      var html = '<div style="text-align:center;margin-bottom:0.4rem;">';
      html += 'Exp: \\(D(t) = \\delta^t\\) &nbsp; Quasi-hip: \\(D(t) = \\beta\\delta^t\\)';
      html += '</div>';
      html += '<table style="width:100%;font-size:0.78rem;border-collapse:collapse;">';
      html += '<tr style="border-bottom:1px solid #ddd;"><th></th><th style="color:#1565c0">Exp</th><th style="color:#C8102E">Q-Hip</th><th>Gap</th></tr>';
      html += '<tr><td>\\(t=1\\)</td><td>' + exp1 + '</td><td>' + hyp1 + '</td><td>' + gap1 + '</td></tr>';
      html += '<tr><td>\\(t=5\\)</td><td>' + exp5 + '</td><td>' + hyp5 + '</td><td>' + gap5 + '</td></tr>';
      html += '<tr><td>\\(t=10\\)</td><td>' + exp10 + '</td><td>' + hyp10 + '</td><td>' + gap10 + '</td></tr>';
      html += '</table>';
      html += '<hr style="margin:0.4rem 0">';
      html += '<div style="font-size:0.78rem;color:#666;">';
      html += 'Desconto relativo \\(t=0 \\to 1\\):<br>';
      html += '&nbsp; Exp: \\(' + delta.toFixed(2) + '\\) &nbsp; Q-Hip: \\(' + (beta * delta).toFixed(4) + '\\)<br>';
      html += 'Desconto relativo \\(t=5 \\to 6\\):<br>';
      html += '&nbsp; Exp: \\(' + delta.toFixed(2) + '\\) &nbsp; Q-Hip: \\(' + delta.toFixed(2) + '\\)';
      html += '</div>';
      html += '<div style="margin-top:0.3rem;font-size:0.78rem;color:#C8102E;">';
      html += '<strong>Inconsistência temporal:</strong> o agente quasi-hiperbólico desconta o futuro próximo (\\(t=0 \\to 1\\)) muito mais do que períodos distantes (\\(t=5 \\to 6\\)).';
      html += '</div>';

      document.getElementById('info').innerHTML = html;
      if (window.MathJax && MathJax.typeset) MathJax.typeset();
    }

    function resetAll() {
      document.getElementById('slider-delta').value = 0.95;
      document.getElementById('slider-beta').value = 0.70;
      update();
    }

    ['slider-delta', 'slider-beta'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', update);
    });
    update();
  </script>
</body>
</html>
