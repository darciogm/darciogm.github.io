<!DOCTYPE html>
<!--
  Regra de Hotelling: Trajetória de Preço e Extração de Recurso Exaurível
  Library: Plotly.js
  Chapter 18 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regra de Hotelling</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script>window.MathJax={tex:{inlineMath:[['\\(','\\)']]},options:{enableMenu:false}};</script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:'CMU Serif',Georgia,serif;background:#fff;color:#333;padding:1rem}.graph-container{display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-start;justify-content:center}.panels{flex:1 1 420px;max-width:520px;display:flex;flex-direction:column;gap:.5rem}.plot-box{width:100%;height:240px;border:1px solid #ddd;border-radius:6px}.controls{flex:0 1 280px;padding:1rem;background:#f8f8f8;border-radius:6px;border:1px solid #eee}.controls h3{font-size:.95rem;color:#C8102E;margin-bottom:.8rem;border-bottom:1px solid #ddd;padding-bottom:.4rem}.slider-group{margin-bottom:.8rem}.slider-group label{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.2rem}.slider-group label .val{font-weight:700;color:#C8102E}input[type=range]{width:100%;accent-color:#C8102E}.info-box{margin-top:.8rem;padding:.8rem;background:#fff;border:1px solid #ddd;border-radius:4px;font-size:.82rem;line-height:1.6}.btn-reset{display:block;width:100%;margin-top:.8rem;padding:.5rem;background:#C8102E;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit}.btn-reset:hover{background:#9a0c23}@media(max-width:860px){.graph-container{flex-direction:column;align-items:center}.panels,.controls{flex-basis:100%;width:100%;max-width:520px}}html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div class="panels">
    <div id="plotTop" class="plot-box"></div>
    <div id="plotBot" class="plot-box"></div>
  </div>
  <div class="controls">
    <h3>Regra de Hotelling</h3>
    <div class="slider-group">
      <label>Preco inicial \(p_0\): <span class="val" id="val-p0">20</span></label>
      <input type="range" id="slider-p0" min="5" max="50" step="1" value="20">
    </div>
    <div class="slider-group">
      <label>Taxa de juros \(r\) (%): <span class="val" id="val-r">5.0</span></label>
      <input type="range" id="slider-r" min="1" max="15" step="0.5" value="5">
    </div>
    <div class="slider-group">
      <label>Backstop \(\bar{p}\): <span class="val" id="val-pbar">80</span></label>
      <input type="range" id="slider-pbar" min="40" max="150" step="5" value="80">
    </div>
    <div class="slider-group">
      <label>Estoque inicial \(S_0\): <span class="val" id="val-S">100</span></label>
      <input type="range" id="slider-S" min="20" max="200" step="5" value="100">
    </div>
    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>
<script>
  function update(){
    var p0=parseFloat(document.getElementById('slider-p0').value);
    var r=parseFloat(document.getElementById('slider-r').value)/100;
    var pbar=parseFloat(document.getElementById('slider-pbar').value);
    var S0=parseFloat(document.getElementById('slider-S').value);
    document.getElementById('val-p0').textContent=p0;
    document.getElementById('val-r').textContent=(r*100).toFixed(1);
    document.getElementById('val-pbar').textContent=pbar;
    document.getElementById('val-S').textContent=S0;
    // p(t) = p0 * e^(rt) until p(t) = pbar
    var Tmax=Math.log(pbar/p0)/r;
    var ts=[],ps=[],exts=[],stock=[];
    var S=S0;
    var dt=0.5;
    for(var t=0;t<=Math.min(Tmax+5,60);t+=dt){
      ts.push(t);
      var pt=Math.min(p0*Math.exp(r*t),pbar);
      ps.push(pt);
      // Demand: q(t)=max(0, A - pt) with A=pbar
      var qt=Math.max(0,pbar-pt)*0.5;
      if(S<=0)qt=0;
      exts.push(qt);
      stock.push(Math.max(S,0));
      S-=qt*dt;
    }
    Plotly.react('plotTop',[
      {x:ts,y:ps,mode:'lines',line:{color:'#C8102E',width:2.5},name:'Preco p(t)'},
      {x:[0,ts[ts.length-1]],y:[pbar,pbar],mode:'lines',line:{color:'#00897b',width:1.5,dash:'dash'},name:'Backstop p_bar'}
    ],{
      margin:{l:55,r:15,t:20,b:30},xaxis:{title:''},yaxis:{title:'Preco'},
      showlegend:true,legend:{x:0.02,y:0.98,bgcolor:'rgba(255,255,255,0.85)',font:{size:9}},
      font:{family:'CMU Serif, Georgia, serif'}
    },{responsive:true,displayModeBar:false});
    Plotly.react('plotBot',[
      {x:ts,y:exts,mode:'lines',line:{color:'#1565c0',width:2},name:'Extracao q(t)'},
      {x:ts,y:stock,mode:'lines',line:{color:'#e65100',width:2,dash:'dash'},name:'Estoque S(t)'}
    ],{
      margin:{l:55,r:15,t:5,b:40},xaxis:{title:'Tempo (anos)'},yaxis:{title:'Quantidade'},
      showlegend:true,legend:{x:0.5,y:0.98,bgcolor:'rgba(255,255,255,0.85)',font:{size:9}},
      font:{family:'CMU Serif, Georgia, serif'}
    },{responsive:true,displayModeBar:false});
    var html='<div style="text-align:center;margin-bottom:0.3rem;">\\(p(t) = p_0 \\, e^{rt}\\)</div>';
    html+='Exaustao em \\(T \\approx '+Tmax.toFixed(1)+'\\) anos<br>';
    html+='Preco atinge backstop em \\(t = '+Tmax.toFixed(1)+'\\)<br>';
    html+='<hr style="margin:0.3rem 0"><div style="font-size:0.78rem;color:#666;">Juros altos aceleram a extracao — o futuro vale menos, entao extrai-se mais hoje.</div>';
    document.getElementById('info').innerHTML=html;
    if(window.MathJax&&MathJax.typeset)MathJax.typeset();
  }
  function resetAll(){document.getElementById('slider-p0').value=20;document.getElementById('slider-r').value=5;document.getElementById('slider-pbar').value=80;document.getElementById('slider-S').value=100;update();}
  ['slider-p0','slider-r','slider-pbar','slider-S'].forEach(function(id){document.getElementById(id).addEventListener('input',update);});
  update();
</script>
</body>
</html>
