<!DOCTYPE html>
<!--
  Custos de Troca e Lock-in: Poder de Mercado do Incumbente
  Library: JSXGraph
  Chapter 21 — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custos de Troca e Lock-in</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>window.MathJax={tex:{inlineMath:[['\\(','\\)']]},options:{enableMenu:false}};</script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:'CMU Serif',Georgia,serif;background:#fff;color:#333;padding:1rem}.graph-container{display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-start;justify-content:center}.jxgbox{flex:1 1 420px;max-width:500px;height:400px;border:1px solid #ddd;border-radius:6px}.controls{flex:0 1 280px;padding:1rem;background:#f8f8f8;border-radius:6px;border:1px solid #eee}.controls h3{font-size:.95rem;color:#C8102E;margin-bottom:.8rem;border-bottom:1px solid #ddd;padding-bottom:.4rem}.slider-group{margin-bottom:.8rem}.slider-group label{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.2rem}.slider-group label .val{font-weight:700;color:#C8102E}input[type=range]{width:100%;accent-color:#C8102E}.info-box{margin-top:.8rem;padding:.8rem;background:#fff;border:1px solid #ddd;border-radius:4px;font-size:.82rem;line-height:1.6}.btn-reset{display:block;width:100%;margin-top:.8rem;padding:.5rem;background:#C8102E;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit}.btn-reset:hover{background:#9a0c23}@media(max-width:860px){.graph-container{flex-direction:column;align-items:center}.jxgbox,.controls{flex-basis:100%;width:100%;max-width:500px}}html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox1" class="jxgbox"></div>
  <div class="controls">
    <h3>Lock-in e Poder de Mercado</h3>
    <div class="slider-group">
      <label>Custo de troca \(s\): <span class="val" id="val-s">3.0</span></label>
      <input type="range" id="slider-s" min="0" max="8" step="0.25" value="3">
    </div>
    <div class="slider-group">
      <label>Custo marginal \(c\): <span class="val" id="val-c">2.0</span></label>
      <input type="range" id="slider-c" min="0" max="6" step="0.25" value="2">
    </div>
    <div class="slider-group">
      <label>Intercepto demanda \(a\): <span class="val" id="val-a">12</span></label>
      <input type="range" id="slider-a" min="8" max="20" step="0.5" value="12">
    </div>
    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>
<script>
  var board=JXG.JSXGraph.initBoard('jxgbox1',{boundingbox:[-2,14,14,-2],axis:false,showCopyright:false,showNavigation:false,keepAspectRatio:false});
  board.create('axis',[[0,0],[14,0]],{ticks:{drawLabels:true,label:{fontSize:11},minorTicks:0,ticksDistance:2}});
  board.create('text',[7,-1.3,'<b><i>Q</i></b>'],{fontSize:13,fixed:true,anchorX:'middle',highlight:false});
  board.create('axis',[[0,0],[0,14]],{ticks:{drawLabels:true,label:{fontSize:11,anchorX:'right',offset:[-8,0]},minorTicks:0,ticksDistance:2}});
  board.create('text',[-1.5,13,'<b><i>p</i></b>'],{fontSize:13,fixed:true,highlight:false});
  var objs=[];
  function draw(){
    for(var i=0;i<objs.length;i++)board.removeObject(objs[i]);objs=[];
    var s=parseFloat(document.getElementById('slider-s').value);
    var c=parseFloat(document.getElementById('slider-c').value);
    var a=parseFloat(document.getElementById('slider-a').value);
    document.getElementById('val-s').textContent=s.toFixed(1);
    document.getElementById('val-c').textContent=c.toFixed(1);
    document.getElementById('val-a').textContent=a.toFixed(1);
    board.setBoundingBox([-a*0.15,a*1.1,a*1.1,-a*0.15],false);
    // Demand: p = a - Q. With switching cost s, effective price for incumbent can be c+s
    var Qcomp=(a-c); // competitive Q
    var pComp=c; // competitive price
    // With lock-in: incumbent can charge up to c+s (rival must undercut by s)
    var pLock=Math.min(c+s,a);
    var QLock=Math.max(a-pLock,0);
    // DWL
    objs.push(board.create('segment',[[0,a],[a,0]],{strokeColor:'#1565c0',strokeWidth:2.5}));
    objs.push(board.create('text',[a*0.9,a*0.08,'<i>D</i>'],{fontSize:11,color:'#1565c0',fixed:true,highlight:false}));
    // MC line
    objs.push(board.create('line',[[0,c],[1,c]],{strokeColor:'#00897b',strokeWidth:1.5,dash:3,straightFirst:false,straightLast:true,point1:{visible:false},point2:{visible:false}}));
    objs.push(board.create('text',[a*0.85,c+a*0.03,'MC='+c.toFixed(1)],{fontSize:10,color:'#00897b',fixed:true,highlight:false}));
    // Lock-in price
    if(s>0){
      objs.push(board.create('line',[[0,pLock],[1,pLock]],{strokeColor:'#C8102E',strokeWidth:2,dash:2,straightFirst:false,straightLast:true,point1:{visible:false},point2:{visible:false}}));
      objs.push(board.create('text',[a*0.7,pLock+a*0.03,'p=c+s='+pLock.toFixed(1)],{fontSize:10,color:'#C8102E',fixed:true,highlight:false}));
      // Profit rectangle
      if(QLock>0){
        objs.push(board.create('polygon',[[0,c],[QLock,c],[QLock,pLock],[0,pLock]],{fillColor:'rgba(200,16,46,0.12)',borders:{strokeWidth:0},vertices:{visible:false}}));
        objs.push(board.create('text',[QLock/2,(c+pLock)/2,'Lucro'],{fontSize:10,color:'#C8102E',anchorX:'middle',fixed:true,highlight:false}));
      }
      // DWL triangle
      if(QLock<Qcomp){
        objs.push(board.create('polygon',[[QLock,pLock],[Qcomp,c],[QLock,c]],{fillColor:'rgba(230,81,0,0.15)',borders:{strokeWidth:0},vertices:{visible:false}}));
        objs.push(board.create('text',[(QLock+Qcomp)/2+0.3,(c+pLock)/3+c*0.5,'DWL'],{fontSize:9,color:'#e65100',fixed:true,highlight:false}));
      }
    }
    // Points
    objs.push(board.create('point',[Qcomp,c],{name:'',size:4,fillColor:'#00897b',strokeColor:'#00897b',fixed:true}));
    if(QLock>0&&s>0)objs.push(board.create('point',[QLock,pLock],{name:'',size:4,fillColor:'#C8102E',strokeColor:'#C8102E',fixed:true}));
    var profit=QLock*s;
    var dwl=0.5*(Qcomp-QLock)*s;
    var html='<strong style="color:#C8102E;">Preco com lock-in:</strong> \\(p = c + s = '+pLock.toFixed(1)+'\\)<br>';
    html+='<strong>Lucro do incumbente:</strong> \\('+profit.toFixed(1)+'\\)<br>';
    html+='<strong style="color:#e65100;">Peso morto:</strong> \\('+dwl.toFixed(1)+'\\)<br>';
    html+='<hr style="margin:0.3rem 0"><div style="font-size:0.78rem;color:#666;">O custo de troca \\(s\\) permite ao incumbente cobrar acima do CMg. Quanto maior \\(s\\), maior o poder de mercado digital.</div>';
    document.getElementById('info').innerHTML=html;board.update();
    if(window.MathJax&&MathJax.typeset)MathJax.typeset();
  }
  function resetAll(){document.getElementById('slider-s').value=3;document.getElementById('slider-c').value=2;document.getElementById('slider-a').value=12;draw();}
  ['slider-s','slider-c','slider-a'].forEach(function(id){document.getElementById(id).addEventListener('input',draw);});
  draw();
</script>
</body>
</html>
