<!DOCTYPE html>
<!--
  Stackelberg vs Cournot: Comprometimento e Vantagem de Primeiro Movimento
  Library: JSXGraph
  Chapter 9b — Microeconomia
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackelberg vs Cournot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    .jxgbox { flex: 1 1 400px; max-width: 460px; height: 380px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.8rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.6; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 860px) {
      .graph-container { flex-direction: column; align-items: center; }
      .jxgbox { flex-basis: 100%; width: 100%; max-width: 460px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 460px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox1" class="jxgbox"></div>
  <div class="controls">
    <h3>Demanda Linear: \(P = a - Q\)</h3>
    <div class="slider-group">
      <label>Intercepto \(a\): <span class="val" id="val-a">12</span></label>
      <input type="range" id="slider-a" min="6" max="20" step="1" value="12">
    </div>
    <div class="slider-group">
      <label>Custo marginal \(c\): <span class="val" id="val-c">2</span></label>
      <input type="range" id="slider-c" min="0" max="10" step="0.5" value="2">
    </div>
    <div class="info-box" id="info"></div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>

<script>
  var board = JXG.JSXGraph.initBoard('jxgbox1', {
    boundingbox: [-1, 12, 12, -1],
    axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
  });

  board.create('axis', [[0,0],[12,0]], {
    ticks: { drawLabels: true, label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 2 }
  });
  board.create('text', [6, -0.7, '<b>\\(q_1\\)</b>'], { fontSize: 13, fixed: true, anchorX: 'middle', highlight: false });
  board.create('axis', [[0,0],[0,12]], {
    ticks: { drawLabels: true, label: { fontSize: 11, anchorX: 'right', offset: [-8,0] }, minorTicks: 0, ticksDistance: 2 }
  });
  board.create('text', [-0.7, 11, '<b>\\(q_2\\)</b>'], { fontSize: 13, fixed: true, highlight: false });

  var objs = [];

  function draw() {
    for (var i = 0; i < objs.length; i++) board.removeObject(objs[i]);
    objs = [];

    var a = parseFloat(document.getElementById('slider-a').value);
    var c = parseFloat(document.getElementById('slider-c').value);
    document.getElementById('val-a').textContent = a.toFixed(0);
    document.getElementById('val-c').textContent = c.toFixed(1);

    var am = a - c; // a - c
    if (am <= 0) { document.getElementById('info').innerHTML = '<strong style="color:#C8102E;">Requer a > c.</strong>'; return; }

    var qmax = am;
    board.setBoundingBox([-qmax * 0.1, qmax * 1.1, qmax * 1.1, -qmax * 0.1], false);

    // Best response functions: BR1(q2) = (a-c-q2)/2, BR2(q1) = (a-c-q1)/2
    // BR1: q1 on x-axis as function of q2 on y-axis => q1 = (am - q2)/2
    // Plot as q2 = am - 2*q1
    objs.push(board.create('segment', [[0, am], [am / 2, 0]], { strokeColor: '#C8102E', strokeWidth: 2.5 }));
    objs.push(board.create('text', [am / 2 + qmax * 0.02, qmax * 0.05, '<i>BR<sub>1</sub></i>'], {
      fontSize: 10, color: '#C8102E', fixed: true, highlight: false
    }));

    // BR2: q2 = (am - q1)/2
    objs.push(board.create('segment', [[0, am / 2], [am, 0]], { strokeColor: '#1565c0', strokeWidth: 2.5 }));
    objs.push(board.create('text', [am * 0.9, qmax * 0.05, '<i>BR<sub>2</sub></i>'], {
      fontSize: 10, color: '#1565c0', fixed: true, highlight: false
    }));

    // Cournot equilibrium: q1 = q2 = am/3
    var qC = am / 3;
    objs.push(board.create('point', [qC, qC], {
      name: '', size: 6, fillColor: '#00897b', strokeColor: '#00897b', fixed: true
    }));
    objs.push(board.create('text', [qC + qmax * 0.03, qC + qmax * 0.04, '<b>Cournot</b>'], {
      fontSize: 10, color: '#00897b', fixed: true, highlight: false
    }));

    // Stackelberg: q1S = am/2, q2S = am/4
    var q1S = am / 2;
    var q2S = am / 4;
    objs.push(board.create('point', [q1S, q2S], {
      name: '', size: 6, fillColor: '#e65100', strokeColor: '#e65100', fixed: true
    }));
    objs.push(board.create('text', [q1S + qmax * 0.03, q2S + qmax * 0.04, '<b>Stackelberg</b>'], {
      fontSize: 10, color: '#e65100', fixed: true, highlight: false
    }));

    // Dashed lines
    objs.push(board.create('segment', [[qC,0],[qC,qC]], { strokeColor: '#00897b', dash: 3, strokeWidth: 1 }));
    objs.push(board.create('segment', [[0,qC],[qC,qC]], { strokeColor: '#00897b', dash: 3, strokeWidth: 1 }));
    objs.push(board.create('segment', [[q1S,0],[q1S,q2S]], { strokeColor: '#e65100', dash: 3, strokeWidth: 1 }));
    objs.push(board.create('segment', [[0,q2S],[q1S,q2S]], { strokeColor: '#e65100', dash: 3, strokeWidth: 1 }));

    // Profits
    var pC = a - 2 * qC;
    var profC = (pC - c) * qC;
    var pS = a - q1S - q2S;
    var prof1S = (pS - c) * q1S;
    var prof2S = (pS - c) * q2S;

    var html = '<div style="text-align:center;margin-bottom:0.3rem;"><strong>\\(P = ' + a + ' - q_1 - q_2\\), \\(c = ' + c.toFixed(1) + '\\)</strong></div>';
    html += '<span style="color:#00897b;"><b>Cournot:</b></span> \\(q_i = ' + qC.toFixed(1) + '\\), \\(\\pi_i = ' + profC.toFixed(1) + '\\)<br>';
    html += '<span style="color:#e65100;"><b>Stackelberg:</b></span><br>';
    html += '&nbsp;&nbsp;Lider: \\(q_1 = ' + q1S.toFixed(1) + '\\), \\(\\pi_1 = ' + prof1S.toFixed(1) + '\\)<br>';
    html += '&nbsp;&nbsp;Seguidora: \\(q_2 = ' + q2S.toFixed(1) + '\\), \\(\\pi_2 = ' + prof2S.toFixed(1) + '\\)';
    html += '<hr style="margin:0.3rem 0">';
    html += '<div style="font-size:0.78rem;color:#666;">A lider produz mais e lucra mais — o comprometimento de mover primeiro confere vantagem estrategica.</div>';

    document.getElementById('info').innerHTML = html;
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-a').value = 12;
    document.getElementById('slider-c').value = 2;
    draw();
  }

  ['slider-a','slider-c'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', draw);
  });
  draw();
</script>
</body>
</html>
