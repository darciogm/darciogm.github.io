<!DOCTYPE html>
<!--
  CES Contínua: de Leontief a Substitutos Perfeitos
  Library: JSXGraph 1.8.0 + MathJax 3
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CES Contínua — Espectro de Substituibilidade</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.8.0/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.8.0/distrib/jsxgraphcore.js"></script>
  <script>window.MathJax={tex:{inlineMath:[['\\(','\\)']]},options:{enableMenu:false}};</script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'CMU Serif',Georgia,serif;background:#fff;color:#333;padding:.4rem .6rem}
    .graph-container{display:flex;flex-wrap:nowrap;gap:.8rem;align-items:flex-start;justify-content:center}
    #jxgbox{flex:0 0 520px;width:520px;height:520px;border:1px solid #ddd;border-radius:6px}
    .controls{flex:0 0 290px;padding:.7rem;background:#f8f8f8;border-radius:6px;border:1px solid #eee}
    .controls h3{font-size:.95rem;color:#C8102E;margin-bottom:.8rem;border-bottom:1px solid #ddd;padding-bottom:.4rem}
    .slider-group{margin-bottom:.8rem}
    .slider-group label{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.2rem}
    .slider-group label .val{font-weight:700;color:#C8102E}
    input[type="range"]{width:100%;accent-color:#C8102E}
    .info-box{margin-top:.8rem;padding:.8rem;background:#fff;border:1px solid #ddd;border-radius:4px;font-size:.82rem;line-height:1.7}
    .info-box .info-row{display:flex;justify-content:space-between;align-items:baseline}
    .info-box .info-label{color:#666}
    .info-box .info-val{font-weight:700;color:#333}
    .info-box .info-val.accent{color:#C8102E}
    .info-box .info-val.green{color:#00897b}
    .info-box .divider{border:none;border-top:1px solid #eee;margin:.4rem 0}
    .case-label{margin-top:.5rem;padding:.4rem .6rem;border-radius:4px;font-size:.82rem;text-align:center;font-weight:700}
    .case-leontief{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
    .case-cd{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
    .case-linear{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
    .case-inter{background:#f3e5f5;color:#7b1fa2;border:1px solid #ce93d8}
    .legend{display:flex;flex-wrap:wrap;gap:.8rem;margin-top:.6rem;font-size:.78rem;color:#666}
    .legend-item{display:flex;align-items:center;gap:.3rem}
    .legend-swatch{width:18px;height:3px;border-radius:2px}
    .btn-reset{display:block;width:100%;margin-top:.8rem;padding:.5rem;background:#C8102E;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit}
    .btn-reset:hover{background:#9a0c23}
    @media(max-width:860px){.graph-container{flex-direction:column;align-items:center}#jxgbox,.controls{flex-basis:100%;max-width:100%}}
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
  <div id="jxgbox"></div>
  <div class="controls">
    <h3>CES: Espectro de Substituibilidade</h3>
    <div class="slider-group">
      <label>\(\rho\): <span class="val" id="val-rho">0.00</span></label>
      <input type="range" id="sl-rho" min="-5" max="0.95" step="0.05" value="0">
    </div>
    <div class="slider-group">
      <label>\(\alpha\): <span class="val" id="val-alpha">0.50</span></label>
      <input type="range" id="sl-alpha" min="0.1" max="0.9" step="0.05" value="0.5">
    </div>
    <div class="info-box">
      <div style="text-align:center;margin-bottom:.4rem;color:#555;font-size:.8rem">
        \(U = (\alpha \, x_1^{\rho} + (1-\alpha) \, x_2^{\rho})^{1/\rho}\)
      </div>
      <hr class="divider">
      <div class="info-row"><span class="info-label">\(\rho\)</span><span class="info-val accent" id="info-rho">—</span></div>
      <div class="info-row"><span class="info-label">\(\sigma = 1/(1-\rho)\)</span><span class="info-val green" id="info-sigma">—</span></div>
      <hr class="divider">
      <div class="info-row"><span class="info-label">TMS no ponto (4, 8)</span><span class="info-val" id="info-tms">—</span></div>
    </div>
    <div class="case-label" id="case-box">—</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:#C8102E"></div> Curvas CES</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#999;height:2px;border-top:2px dashed #999"></div> 45° (\(x_1=x_2\))</div>
    </div>
    <button class="btn-reset" onclick="resetAll()">Resetar</button>
  </div>
</div>
<script>
var rho=0, alpha=0.5;

// CES utility: (alpha*x1^rho + (1-alpha)*x2^rho)^(1/rho)
// For rho close to 0, use Cobb-Douglas limit
// Indifference curve: given U=ubar, x2 as function of x1
function cesU(x1,x2){
  if(Math.abs(rho)<0.01){
    // Cobb-Douglas limit
    return Math.pow(x1,alpha)*Math.pow(x2,1-alpha);
  }
  var val=alpha*Math.pow(x1,rho)+(1-alpha)*Math.pow(x2,rho);
  if(val<=0)return 0;
  return Math.pow(val,1/rho);
}

function cesIC(ubar){
  return function(x1){
    if(x1<0.15)return 100;
    if(Math.abs(rho)<0.01){
      // CD: x1^alpha * x2^(1-alpha) = ubar => x2 = (ubar/x1^alpha)^(1/(1-alpha))
      var val=Math.pow(ubar/Math.pow(x1,alpha),1/(1-alpha));
      return val>12?12:val;
    }
    // CES: alpha*x1^rho + (1-alpha)*x2^rho = ubar^rho
    var target=Math.pow(ubar,rho);
    var remainder=target-alpha*Math.pow(x1,rho);
    if(remainder<=0)return 12;
    var x2rho=remainder/(1-alpha);
    if(x2rho<=0)return 12;
    var x2=Math.pow(x2rho,1/rho);
    return x2>12?12:x2;
  };
}

// TMS at point (x1,x2)
function cesTMS(x1,x2){
  if(Math.abs(rho)<0.01){
    return (alpha/(1-alpha))*(x2/x1);
  }
  return (alpha/(1-alpha))*Math.pow(x1/x2,rho-1);
}

var board=JXG.JSXGraph.initBoard('jxgbox',{
  boundingbox:[0,11.5,11.5,0],axis:false,showCopyright:false,showNavigation:false,keepAspectRatio:true  // Darcio: só 1º quadrante
});
board.create('axis',[[0,0],[11,0]],{name:'',withLabel:false,straightFirst:false,straightLast:false,ticks:{drawLabels:true,label:{fontSize:10},minorTicks:0,ticksDistance:2,tickEndings:[0,1]}});
board.create('axis',[[0,0],[0,11]],{name:'',withLabel:false,straightFirst:false,straightLast:false,ticks:{drawLabels:true,label:{fontSize:10,anchorX:'right',offset:[-8,0]},minorTicks:0,ticksDistance:2,tickEndings:[1,0]}});
board.create('text',[10.9,0.45,'<b><i>x₁</i></b>'],{fontSize:14,fixed:true,anchorX:'middle',highlight:false});
board.create('text',[0.4,10.9,'<b><i>x₂</i></b>'],{fontSize:14,fixed:true,anchorX:'middle',anchorY:'middle',highlight:false});

// 45-degree line
board.create('line',[[0,0],[10,10]],{strokeColor:'#999',strokeWidth:1,dash:3,straightFirst:false,straightLast:true,point1:{visible:false},point2:{visible:false}});

// Indifference curves
var uLevels=[2,3,4,5,6,7];
var icColors=['#ffcdd2','#ef9a9a','#e57373','#ef5350','#e53935','#c62828'];
var icCurves=[];
for(var i=0;i<uLevels.length;i++){
  (function(idx){
    icCurves.push(board.create('functiongraph',[function(x1){return cesIC(uLevels[idx])(x1);},0.15,11],{
      strokeColor:icColors[idx],strokeWidth:2,highlight:false
    }));
  })(i);
}

// Reference point (4,8)
board.create('point',[4,8],{size:4,fillColor:'#333',strokeColor:'#333',name:'(4, 8)',label:{fontSize:10,offset:[5,5]},fixed:true});

function updateAll(){
  rho=+document.getElementById('sl-rho').value;
  alpha=+document.getElementById('sl-alpha').value;

  // Snap to special values
  if(Math.abs(rho)<0.03) rho=0;

  document.getElementById('val-rho').textContent=rho.toFixed(2);
  document.getElementById('val-alpha').textContent=alpha.toFixed(2);
  document.getElementById('info-rho').textContent=rho.toFixed(2);

  var sigma=1/(1-rho);
  if(rho<-4.5) document.getElementById('info-sigma').textContent='≈ 0 (Leontief)';
  else if(Math.abs(rho)<0.03) document.getElementById('info-sigma').textContent='1.00 (Cobb-Douglas)';
  else if(rho>0.9) document.getElementById('info-sigma').textContent='≈ ∞ (Subst. perfeitos)';
  else document.getElementById('info-sigma').textContent=sigma.toFixed(2);

  var tms=cesTMS(4,8);
  document.getElementById('info-tms').textContent=tms.toFixed(3);

  // Case label
  var cb=document.getElementById('case-box');
  if(rho<=-4){
    cb.className='case-label case-leontief';
    cb.textContent='≈ Complementos Perfeitos (σ → 0)';
  } else if(Math.abs(rho)<0.03){
    cb.className='case-label case-cd';
    cb.textContent='Cobb-Douglas (σ = 1)';
  } else if(rho>=0.9){
    cb.className='case-label case-linear';
    cb.textContent='≈ Substitutos Perfeitos (σ → ∞)';
  } else if(rho<0){
    cb.className='case-label case-inter';
    cb.textContent='Substituição difícil (0 < σ < 1)';
  } else {
    cb.className='case-label case-inter';
    cb.textContent='Substituição fácil (σ > 1)';
  }

  board.update();
}

document.getElementById('sl-rho').addEventListener('input',updateAll);
document.getElementById('sl-alpha').addEventListener('input',updateAll);

function resetAll(){
  document.getElementById('sl-rho').value=0;
  document.getElementById('sl-alpha').value=0.5;
  rho=0;alpha=0.5;
  updateAll();
}
updateAll();
</script>
</body>
</html>
