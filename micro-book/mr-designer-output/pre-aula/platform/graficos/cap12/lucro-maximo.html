<!DOCTYPE html>
<!--
  Lucro Maximo: CMg = RMg — Interactive Graph
  Library: JSXGraph
  Chapter 12 — Microeconomia
  Focus: producer surplus + shutdown condition detail
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucro Maximo — CMg = RMg</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    .jxgbox { flex: 1 1 420px; max-width: 540px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 280px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: .95rem; color: #C8102E; margin-bottom: .8rem; border-bottom: 1px solid #ddd; padding-bottom: .4rem; }
    .slider-group { margin-bottom: .6rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: .85rem; margin-bottom: .2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .info-box { margin-top: .8rem; padding: .8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: .82rem; line-height: 1.5; }
    .legend { margin-top: .5rem; font-size: .78rem; line-height: 1.8; }
    .legend span { display: inline-block; width: 14px; height: 3px; margin-right: 4px; vertical-align: middle; }
    .btn-reset { display: block; width: 100%; margin-top: .8rem; padding: .5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: .85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    @media (max-width: 880px) { .graph-container { flex-direction: column; align-items: center; } .jxgbox { flex-basis: 100%; width: 100%; max-width: 540px; } .controls { flex-basis: 100%; width: 100%; max-width: 540px; } }
    /* anti-inflation-fix */
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox" class="jxgbox"></div>
    <div class="controls">
      <h3>Parametros</h3>
      <div class="slider-group">
        <label>Preco \(p\): <span class="val" id="val-p">22.00</span></label>
        <input type="range" id="sl-p" min="2" max="45" step="0.5" value="22">
      </div>
      <div class="slider-group">
        <label>CF: <span class="val" id="val-cf">60</span></label>
        <input type="range" id="sl-cf" min="10" max="120" step="5" value="60">
      </div>
      <div class="slider-group">
        <label>\(b\) (CV linear): <span class="val" id="val-b">18</span></label>
        <input type="range" id="sl-b" min="5" max="30" step="1" value="18">
      </div>
      <div class="slider-group">
        <label>\(c\) (CV quadr.): <span class="val" id="val-c">2.50</span></label>
        <input type="range" id="sl-c" min="0.5" max="5" step="0.25" value="2.5">
      </div>
      <div class="slider-group">
        <label>\(d\) (CV cubic.): <span class="val" id="val-d">0.18</span></label>
        <input type="range" id="sl-d" min="0.05" max="0.50" step="0.01" value="0.18">
      </div>
      <div class="legend">
        <span style="background:#C8102E"></span>CMg &nbsp;
        <span style="background:#1565c0"></span>CTMe &nbsp;
        <span style="background:#00897b"></span>CVMe &nbsp;
        <span style="background:#e65100;height:1px;border-top:2px dashed #e65100"></span>p = RMg
      </div>
      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

  <script>
    var board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: [-4.2, 56, 25, -7.5],
      axis: false, showCopyright: false, showNavigation: false
    });
    board.create('axis', [[0,0],[22,0]], { ticks: { drawLabels: true, minorTicks: 0, label: { fontSize: 9 } } });
    board.create('axis', [[0,0],[0,50]], { ticks: { drawLabels: true, minorTicks: 0, label: { fontSize: 9, anchorX: 'right', offset: [-8,0] } } });
    board.create('text', [12.5, -5.5, '<b><i>q</i></b>'], { fontSize: 14, fixed: true, anchorX: 'middle', highlight: false });
    board.create('text', [-3.5, 28, '<b>$</b>'], { fontSize: 14, fixed: true, anchorX: 'middle', rotate: 90, highlight: false });

    var objs = [];

    function CT(q, pp) { return pp.cf + pp.b*q - pp.c*q*q + pp.d*q*q*q; }
    function CV(q, pp) { return pp.b*q - pp.c*q*q + pp.d*q*q*q; }
    function CMg(q, pp) { return pp.b - 2*pp.c*q + 3*pp.d*q*q; }
    function CTMe(q, pp) { return q > 0.1 ? CT(q, pp) / q : NaN; }
    function CVMe(q, pp) { return q > 0.1 ? CV(q, pp) / q : NaN; }

    function draw() {
      for (var i = 0; i < objs.length; i++) board.removeObject(objs[i]);
      objs = [];

      var pr = parseFloat(document.getElementById('sl-p').value);
      var pp = {
        cf: parseFloat(document.getElementById('sl-cf').value),
        b: parseFloat(document.getElementById('sl-b').value),
        c: parseFloat(document.getElementById('sl-c').value),
        d: parseFloat(document.getElementById('sl-d').value)
      };
      document.getElementById('val-p').textContent = pr.toFixed(2);
      document.getElementById('val-cf').textContent = pp.cf.toFixed(0);
      document.getElementById('val-b').textContent = pp.b.toFixed(0);
      document.getElementById('val-c').textContent = pp.c.toFixed(2);
      document.getElementById('val-d').textContent = pp.d.toFixed(2);

      var qmax = 22, ymax = 50;

      // CMg curve
      var xs = [], ys = [];
      for (var q = 0.1; q <= qmax; q += 0.15) {
        var v = CMg(q, pp);
        if (v >= -3 && v <= ymax) { xs.push(q); ys.push(v); }
      }
      objs.push(board.create('curve', [xs, ys], { strokeColor: '#C8102E', strokeWidth: 2.5 }));

      // CTMe
      xs = []; ys = [];
      for (var q = 0.3; q <= qmax; q += 0.15) {
        var v = CTMe(q, pp);
        if (!isNaN(v) && v > 0 && v < ymax) { xs.push(q); ys.push(v); }
      }
      objs.push(board.create('curve', [xs, ys], { strokeColor: '#1565c0', strokeWidth: 2 }));

      // CVMe
      xs = []; ys = [];
      for (var q = 0.3; q <= qmax; q += 0.15) {
        var v = CVMe(q, pp);
        if (!isNaN(v) && v > 0 && v < ymax) { xs.push(q); ys.push(v); }
      }
      objs.push(board.create('curve', [xs, ys], { strokeColor: '#00897b', strokeWidth: 2 }));

      // Labels
      objs.push(board.create('text', [17, Math.min(CMg(17, pp)+2, ymax-2), 'CMg'], { fontSize: 10, color: '#C8102E', fixed: true }));
      objs.push(board.create('text', [19.5, Math.min(CTMe(19, pp)+1.5, ymax-2), 'CTMe'], { fontSize: 10, color: '#1565c0', fixed: true }));
      objs.push(board.create('text', [18.5, Math.min(CVMe(18, pp)-2.5, ymax-2), 'CVMe'], { fontSize: 10, color: '#00897b', fixed: true }));

      // Price line (= RMg for price taker)
      objs.push(board.create('line', [[0, pr], [qmax, pr]], {
        strokeColor: '#e65100', dash: 2, strokeWidth: 2, straightFirst: false, straightLast: false,
        point1: { visible: false }, point2: { visible: false }
      }));
      objs.push(board.create('text', [qmax - 2.5, pr + 1.5, 'p = RMg'], { fontSize: 10, color: '#e65100', fixed: true }));

      // Shutdown point: min CVMe at q = c/(2d)
      var qSD = pp.c / (2 * pp.d);
      var cvmeMin = CVMe(qSD, pp);

      // Min CTMe (Newton's method)
      var qMinCTMe = qSD + 2;
      for (var iter = 0; iter < 50; iter++) {
        var f = 2*pp.d*qMinCTMe*qMinCTMe*qMinCTMe - pp.c*qMinCTMe*qMinCTMe - pp.cf;
        var fp = 6*pp.d*qMinCTMe*qMinCTMe - 2*pp.c*qMinCTMe;
        if (Math.abs(fp) < 1e-10) break;
        qMinCTMe = qMinCTMe - f / fp;
        if (qMinCTMe < 0.5) qMinCTMe = 0.5;
      }
      var ctmeMinVal = CTMe(qMinCTMe, pp);

      // Find q* where p = CMg (on rising part)
      var A3 = 3 * pp.d, B3 = -2 * pp.c, C3 = pp.b - pr;
      var disc = B3 * B3 - 4 * A3 * C3;
      var qStar = NaN;
      if (disc >= 0) {
        var q1 = (-B3 + Math.sqrt(disc)) / (2 * A3);
        var q2 = (-B3 - Math.sqrt(disc)) / (2 * A3);
        var qInflect = pp.c / (3 * pp.d);
        if (q1 >= qInflect && q1 > 0) qStar = q1;
        else if (q2 >= qInflect && q2 > 0) qStar = q2;
        else if (q1 > 0) qStar = q1;
      }

      var shutdown = (pr < cvmeMin);
      var profit = 0, ps = 0;
      var status = '';

      if (shutdown) {
        status = 'FECHAR';
        profit = -pp.cf;

        // Shutdown region shading
        objs.push(board.create('text', [qmax/2, ymax*0.8, 'FIRMA FECHA: p < CVMe min'],
          { fontSize: 12, color: '#C8102E', anchorX: 'middle', fixed: true }));

        // Shade shutdown zone
        var shX = [0, qmax, qmax, 0];
        var shY = [0, 0, cvmeMin, cvmeMin];
        objs.push(board.create('polygon', [[0,0],[qmax,0],[qmax,cvmeMin],[0,cvmeMin]], {
          fillColor: 'rgba(200,16,46,0.06)', fillOpacity: 1,
          borders: { strokeColor: 'transparent' }, vertices: { visible: false }
        }));
      } else if (!isNaN(qStar) && qStar > 0 && qStar < qmax) {
        var ctmeAt = CTMe(qStar, pp);
        var cvmeAt = CVMe(qStar, pp);
        profit = (pr - ctmeAt) * qStar;

        // Producer surplus = integral of (p - CMg) from 0 to q*
        // Numerically approximate
        ps = 0;
        var dq = 0.1;
        for (var q = dq/2; q < qStar; q += dq) {
          var cmgVal = CMg(q, pp);
          if (pr > cmgVal) ps += (pr - cmgVal) * dq;
        }

        // Optimal point
        objs.push(board.create('point', [qStar, pr], { name: '', size: 5, color: '#C8102E', fixed: true }));
        objs.push(board.create('segment', [[qStar, 0], [qStar, pr]], { strokeColor: '#999', dash: 3, strokeWidth: 1 }));
        objs.push(board.create('text', [qStar, -2, 'q*'], { fontSize: 11, color: '#C8102E', anchorX: 'middle', fixed: true }));

        // Profit rectangle (p - CTMe) * q
        var rectColor = profit >= 0 ? 'rgba(0,137,123,0.15)' : 'rgba(200,16,46,0.15)';
        var rectBorder = profit >= 0 ? '#00897b' : '#C8102E';
        var yTop = Math.max(pr, ctmeAt);
        var yBot = Math.min(pr, ctmeAt);
        objs.push(board.create('polygon', [[0, yBot],[qStar, yBot],[qStar, yTop],[0, yTop]], {
          fillColor: rectColor, fillOpacity: 1, borders: { strokeColor: rectBorder, strokeWidth: 1 },
          vertices: { visible: false }
        }));

        // CTMe dashed at q*
        objs.push(board.create('segment', [[0, ctmeAt], [qStar, ctmeAt]], { strokeColor: '#1565c0', dash: 3, strokeWidth: 1 }));

        // Producer surplus shading (area between p and CMg curve)
        var psX = [0], psY = [pr];
        for (var q = 0.1; q <= qStar; q += 0.3) {
          var cmgVal = CMg(q, pp);
          if (cmgVal <= pr) { psX.push(q); psY.push(cmgVal); }
        }
        psX.push(qStar); psY.push(pr);
        psX.push(0); psY.push(pr);
        objs.push(board.create('curve', [psX, psY], {
          strokeWidth: 0, fillColor: 'rgba(21,101,192,0.08)', fillOpacity: 1
        }));

        status = profit >= 0 ? 'LUCRO' : 'PREJUIZO (opera)';
      }

      // Mark shutdown point
      if (qSD > 0 && qSD < qmax && cvmeMin > 0 && cvmeMin < ymax) {
        objs.push(board.create('point', [qSD, cvmeMin], { name: '', size: 3, color: '#00897b', fixed: true }));
        objs.push(board.create('text', [qSD + 0.5, cvmeMin - 2.5, 'Fecham.'], { fontSize: 8, color: '#00897b', fixed: true }));
      }

      // Info
      var info = document.getElementById('info');
      var html = '<div style="font-size:0.78rem;">\\(CT = ' + pp.cf + ' + ' + pp.b + 'q - ' + pp.c.toFixed(2) + 'q^2 + ' + pp.d.toFixed(2) + 'q^3\\)</div>';
      html += '<hr style="margin:.3rem 0">';

      if (shutdown) {
        html += '<div style="color:#C8102E;font-weight:700">Decisao: FECHAR</div>';
        html += '\\(p = ' + pr.toFixed(2) + ' < \\mathrm{CVMe}_{\\min} = ' + cvmeMin.toFixed(2) + '\\)<br>';
        html += '\\(\\pi = -CF = -' + pp.cf + '\\)';
      } else if (!isNaN(qStar)) {
        html += '<div style="font-weight:700;color:' + (profit >= 0 ? '#00897b' : '#C8102E') + '">' + status + '</div>';
        html += '\\(q^* = ' + qStar.toFixed(2) + '\\) &nbsp; (\\(p = CMg\\))<br>';
        html += '\\(CTMe(q^*) = ' + CTMe(qStar, pp).toFixed(2) + '\\)<br>';
        html += '\\(\\pi = (p - CTMe) \\times q = ' + profit.toFixed(2) + '\\)<br>';
        html += '<span style="color:#1565c0">Excedente do produtor: \\(' + ps.toFixed(1) + '\\)</span>';
      }

      html += '<hr style="margin:.3rem 0">';
      html += '<div style="font-size:.75rem;color:#666">';
      html += 'Preco de fechamento: \\(p_{\\text{shut}} = ' + cvmeMin.toFixed(2) + '\\)<br>';
      html += 'Break-even: \\(p_{\\text{BE}} = ' + ctmeMinVal.toFixed(2) + '\\)<br>';
      html += '<span style="color:#C8102E">\\(p < ' + cvmeMin.toFixed(2) + ' \\Rightarrow\\) firma fecha</span><br>';
      html += '<span style="color:#e65100">' + cvmeMin.toFixed(2) + ' \\leq p < ' + ctmeMinVal.toFixed(2) + ' \\Rightarrow\\) opera com prejuizo</span><br>';
      html += '<span style="color:#00897b">\\(p \\geq ' + ctmeMinVal.toFixed(2) + ' \\Rightarrow\\) lucro positivo</span>';
      html += '</div>';

      info.innerHTML = html;
      if (window.MathJax && MathJax.typeset) MathJax.typeset([info]);
      board.update();
    }

    function resetAll() {
      document.getElementById('sl-p').value = 22;
      document.getElementById('sl-cf').value = 60;
      document.getElementById('sl-b').value = 18;
      document.getElementById('sl-c').value = 2.5;
      document.getElementById('sl-d').value = 0.18;
      draw();
    }

    ['sl-p','sl-cf','sl-b','sl-c','sl-d'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', draw);
    });
    draw();
  </script>
</body>
</html>
