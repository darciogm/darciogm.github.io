<!DOCTYPE html>
<!--
  Price Discrimination — Chapter 15
  Library: JSXGraph
  Toggle: 1st degree, 2nd degree (two-part tariff), 3rd degree (two markets)
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discriminação de Preços</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
      options: { enableMenu: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'CMU Serif', Georgia, serif; background: #fff; color: #333; padding: 1rem; }
    .graph-container { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; }
    #jxgbox { flex: 1 1 420px; max-width: 520px; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
    .controls { flex: 0 1 320px; padding: 1rem; background: #f8f8f8; border-radius: 6px; border: 1px solid #eee; }
    .controls h3 { font-size: 0.95rem; color: #C8102E; margin-bottom: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 0.4rem; }
    .slider-group { margin-bottom: 0.7rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.83rem; margin-bottom: 0.2rem; }
    .slider-group label .val { font-weight: 700; color: #C8102E; }
    input[type="range"] { width: 100%; accent-color: #C8102E; }
    .toggle-group { margin-bottom: 0.8rem; display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .toggle-btn { padding: 0.35rem 0.7rem; border: 1px solid #C8102E; background: #fff; color: #C8102E; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-family: inherit; }
    .toggle-btn.active { background: #C8102E; color: #fff; }
    .info-box { margin-top: 0.8rem; padding: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; line-height: 1.7; }
    .info-box .section-title { font-weight: 700; color: #1565c0; margin-top: 0.3rem; }
    .info-box .section-title:first-child { margin-top: 0; }
    .btn-reset { display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    .btn-reset:hover { background: #9a0c23; }
    .hidden { display: none; }
    @media (max-width: 880px) {
      .graph-container { flex-direction: column; align-items: center; }
      #jxgbox { flex-basis: 100%; width: 100%; max-width: 520px; }
      .controls { flex-basis: 100%; width: 100%; max-width: 520px; }
    }
    html,body{margin:0!important;padding:0!important;overflow:visible!important}
  </style>
</head>
<body>
<div class="graph-container">
    <div id="jxgbox"></div>
    <div class="controls">
      <h3>Tipo de Discriminação</h3>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-1st" onclick="setMode('1st')">1º Grau</button>
        <button class="toggle-btn" id="btn-2nd" onclick="setMode('2nd')">2º Grau</button>
        <button class="toggle-btn" id="btn-3rd" onclick="setMode('3rd')">3º Grau</button>
      </div>

      <div id="params-common">
        <div class="slider-group">
          <label>Custo marginal \(c\): <span class="val" id="val-c">20</span></label>
          <input type="range" id="slider-c" min="5" max="60" step="1" value="20">
        </div>
      </div>

      <div id="params-1st">
        <div class="slider-group">
          <label>Intercepto \(a\): <span class="val" id="val-a1">100</span></label>
          <input type="range" id="slider-a1" min="40" max="150" step="1" value="100">
        </div>
        <div class="slider-group">
          <label>Inclinação \(b\): <span class="val" id="val-b1">1.0</span></label>
          <input type="range" id="slider-b1" min="0.5" max="3" step="0.1" value="1">
        </div>
      </div>

      <div id="params-2nd" class="hidden">
        <div class="slider-group">
          <label>Intercepto \(a\): <span class="val" id="val-a2">100</span></label>
          <input type="range" id="slider-a2" min="40" max="150" step="1" value="100">
        </div>
        <div class="slider-group">
          <label>Inclinação \(b\): <span class="val" id="val-b2">1.0</span></label>
          <input type="range" id="slider-b2" min="0.5" max="3" step="0.1" value="1">
        </div>
        <div class="slider-group">
          <label>Taxa fixa \(T\): <span class="val" id="val-T">500</span></label>
          <input type="range" id="slider-T" min="0" max="5000" step="50" value="500">
        </div>
      </div>

      <div id="params-3rd" class="hidden">
        <div class="slider-group">
          <label>Mercado 1 — \(a_1\): <span class="val" id="val-a3a">100</span></label>
          <input type="range" id="slider-a3a" min="40" max="150" step="1" value="100">
        </div>
        <div class="slider-group">
          <label>Mercado 1 — \(b_1\): <span class="val" id="val-b3a">1.0</span></label>
          <input type="range" id="slider-b3a" min="0.5" max="3" step="0.1" value="1">
        </div>
        <div class="slider-group">
          <label>Mercado 2 — \(a_2\): <span class="val" id="val-a3b">60</span></label>
          <input type="range" id="slider-a3b" min="30" max="120" step="1" value="60">
        </div>
        <div class="slider-group">
          <label>Mercado 2 — \(b_2\): <span class="val" id="val-b3b">2.0</span></label>
          <input type="range" id="slider-b3b" min="0.5" max="4" step="0.1" value="2">
        </div>
      </div>

      <div class="info-box" id="info"></div>
      <button class="btn-reset" onclick="resetAll()">Resetar</button>
    </div>
  </div>

<script>
  var BB = [-18, 140, 140, -18];
  var mode = '1st';
  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: BB, axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
  });

  function rebuildBoard() {
    JXG.JSXGraph.freeBoard(board);
    board = JXG.JSXGraph.initBoard('jxgbox', {
      boundingbox: BB, axis: false, showCopyright: false, showNavigation: false, keepAspectRatio: false
    });
  }

  function addAxes() {
    board.create('axis', [[0,0],[1,0]], {
      ticks: { drawLabels: true, minorTicks: 0, ticksDistance: 20, label: { fontSize: 11 } },
      name: '', withLabel: false
    });
    board.create('text', [70, -12, '<b><i>Q</i></b>'], {
      fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', highlight: false
    });
    board.create('axis', [[0,0],[0,1]], {
      ticks: { drawLabels: true, minorTicks: 0, ticksDistance: 20, label: { fontSize: 11, anchorX: 'right', offset: [-8, 0] } },
      name: '', withLabel: false
    });
    board.create('text', [-13, 70, '<b><i>P</i></b>'], {
      fontSize: 15, fixed: true, anchorX: 'middle', anchorY: 'middle', rotate: 90, highlight: false
    });
  }

  function setMode(m) {
    mode = m;
    document.querySelectorAll('.toggle-btn').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('btn-' + m).classList.add('active');
    document.getElementById('params-1st').classList.toggle('hidden', m !== '1st');
    document.getElementById('params-2nd').classList.toggle('hidden', m !== '2nd');
    document.getElementById('params-3rd').classList.toggle('hidden', m !== '3rd');
    updateGraph();
  }

  function getC() { return parseFloat(document.getElementById('slider-c').value); }

  // ========== 1st Degree ==========
  function draw1st() {
    var a = parseFloat(document.getElementById('slider-a1').value);
    var b = parseFloat(document.getElementById('slider-b1').value);
    var c = getC();
    document.getElementById('val-a1').textContent = a.toFixed(0);
    document.getElementById('val-b1').textContent = b.toFixed(1);

    addAxes();
    var qc = Math.max(0, (a - c) / b);

    // Shaded area: entire surplus captured by producer
    var pts = [[0, a]];
    for (var q = 0; q <= qc; q += qc / 50) pts.push([q, a - b * q]);
    pts.push([qc, c]); pts.push([0, c]);
    board.create('polygon', pts, {
      fillColor: '#00897b', fillOpacity: 0.2,
      borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false, highlight: false
    });

    // Curves (1st quadrant)
    board.create('functiongraph', [function(q) { return (q >= 0 && a - b*q >= 0) ? a - b*q : NaN; }],
      { strokeColor: '#1565c0', strokeWidth: 2.5 });
    board.create('functiongraph', [function(q) { return q >= 0 ? c : NaN; }],
      { strokeColor: '#00897b', strokeWidth: 2.5 });

    // Labels
    board.create('text', [a/b + 3, 3, '<i>D</i>'], { fontSize: 13, color: '#1565c0', fixed: true, highlight: false });
    board.create('text', [a/b + 3, c + 4, '<i>CMg</i>'], { fontSize: 13, color: '#00897b', fixed: true, highlight: false });
    board.create('point', [qc, c], { name: '', size: 4, strokeColor: '#C8102E', fillColor: '#C8102E', fixed: true });
    board.create('segment', [[qc, c],[qc, 0]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });
    board.create('text', [qc / 3, c + (a - c) * 0.35, '<i>π</i>'], { fontSize: 13, color: '#00897b', fontWeight: 'bold', fixed: true, highlight: false });

    var totalSurplus = 0.5 * (a - c) * qc;
    var html = '<div class="section-title">Curvas</div>';
    html += '\\(P = ' + a.toFixed(0) + ' - ' + b.toFixed(1) + '\\,Q\\), &ensp;\\(CMg = ' + c.toFixed(0) + '\\)';
    html += '<div class="section-title">Discriminação de 1º Grau</div>';
    html += 'Cada unidade vendida ao preço de reserva.<br>';
    html += '\\(Q = Q^c = ' + qc.toFixed(2) + '\\)<br>';
    html += '\\(\\pi = EC_{total} = ' + totalSurplus.toFixed(1) + '\\)<br>';
    html += '\\(EC = 0\\), \\(PPM = 0\\)<br>';
    html += 'Resultado <strong>eficiente</strong> (sem peso morto).';
    document.getElementById('info').innerHTML = html;
  }

  // ========== 2nd Degree ==========
  function draw2nd() {
    var a = parseFloat(document.getElementById('slider-a2').value);
    var b = parseFloat(document.getElementById('slider-b2').value);
    var c = getC();
    var T = parseFloat(document.getElementById('slider-T').value);
    document.getElementById('val-a2').textContent = a.toFixed(0);
    document.getElementById('val-b2').textContent = b.toFixed(1);
    document.getElementById('val-T').textContent = T.toFixed(0);

    addAxes();
    var qOpt = Math.max(0, (a - c) / b);
    var csAtC = 0.5 * (a - c) * qOpt;
    var effectiveT = Math.min(T, csAtC);

    // The CS triangle has height (a-c) and base qOpt.
    // T captures a fraction of it. For linear demand, T captures from the bottom:
    // the "price floor" that makes the remaining CS = csAtC - T.
    // Remaining CS = 0.5 * (a - pT) * qT where pT = a - b*qT
    // We need: 0.5*(a - pT)*(a-pT)/b = csAtC - effectiveT
    // => (a-pT)^2 / (2b) = csAtC - effectiveT
    // => pT = a - sqrt(2*b*(csAtC - effectiveT))
    var residualCS = csAtC - effectiveT;
    var pT = residualCS > 0 ? a - Math.sqrt(2 * b * residualCS) : a;
    var qT = residualCS > 0 ? (a - pT) / b : 0;

    if (T <= csAtC) {
      // Residual EC (lighter, upper triangle)
      if (residualCS > 0.1) {
        board.create('polygon', [[0, a], [0, pT], [qT, pT]], {
          fillColor: '#1565c0', fillOpacity: 0.15,
          borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false, highlight: false
        });
        board.create('text', [qT * 0.3, pT + (a - pT) * 0.35, 'EC'], {
          fontSize: 11, color: '#1565c0', fontWeight: 'bold', fixed: true, highlight: false
        });
      }
      // T captured (darker, trapezoid: pT line → demand curve → CMg)
      board.create('polygon', [[0, pT], [qT, pT], [qOpt, c], [0, c]], {
        fillColor: '#00897b', fillOpacity: 0.25,
        borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false, highlight: false
      });
      board.create('text', [qOpt * 0.3, c + (pT - c) * 0.45, '<i>T</i>'], {
        fontSize: 13, color: '#00897b', fontWeight: 'bold', fixed: true, highlight: false
      });
      // Dashed line at pT
      board.create('segment', [[0, pT], [qT, pT]], {
        strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true
      });
    }

    // Curves
    board.create('functiongraph', [function(q) { return (q >= 0 && a - b*q >= 0) ? a - b*q : NaN; }],
      { strokeColor: '#1565c0', strokeWidth: 2.5 });
    board.create('functiongraph', [function(q) { return q >= 0 ? c : NaN; }],
      { strokeColor: '#00897b', strokeWidth: 2.5 });

    // Labels
    board.create('text', [a/b + 3, 3, '<i>D</i>'], { fontSize: 13, color: '#1565c0', fixed: true, highlight: false });
    board.create('text', [a/b + 3, c + 4, '<i>CMg</i>'], { fontSize: 13, color: '#00897b', fixed: true, highlight: false });
    board.create('point', [qOpt, c], { name: '', size: 4, strokeColor: '#C8102E', fillColor: '#C8102E', fixed: true });
    board.create('segment', [[qOpt, c],[qOpt, 0]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });

    var html = '<div class="section-title">Curvas</div>';
    html += '\\(P = ' + a.toFixed(0) + ' - ' + b.toFixed(1) + '\\,Q\\), &ensp;\\(CMg = ' + c.toFixed(0) + '\\)';
    html += '<div class="section-title">Tarifa em Duas Partes</div>';
    html += 'Preço unitário \\(p = CMg = ' + c.toFixed(0) + '\\)<br>';
    html += 'Taxa fixa \\(T = ' + T.toFixed(0) + '\\)<br>';
    html += '\\(Q = ' + qOpt.toFixed(2) + '\\)<br>';
    html += 'EC máximo a \\(p=c\\): \\(' + csAtC.toFixed(1) + '\\)<br>';
    if (T <= csAtC) {
      html += '\\(\\pi = T = ' + effectiveT.toFixed(1) + '\\)<br>';
      html += 'EC residual: \\(' + (csAtC - effectiveT).toFixed(1) + '\\)<br>';
      html += 'Consumidor participa (\\(T \\leq EC\\)).';
    } else {
      html += '<strong style="color:#C8102E">\\(T > EC\\): consumidor não participa!</strong><br>';
      html += '\\(\\pi = 0\\). Reduza \\(T\\).';
    }
    if (Math.abs(T - csAtC) < 50) {
      html += '<br>\\(T \\approx EC\\): extrai quase todo o excedente.';
    }
    document.getElementById('info').innerHTML = html;
  }

  // ========== 3rd Degree ==========
  function draw3rd() {
    var a1 = parseFloat(document.getElementById('slider-a3a').value);
    var b1 = parseFloat(document.getElementById('slider-b3a').value);
    var a2 = parseFloat(document.getElementById('slider-a3b').value);
    var b2 = parseFloat(document.getElementById('slider-b3b').value);
    var c = getC();
    document.getElementById('val-a3a').textContent = a1.toFixed(0);
    document.getElementById('val-b3a').textContent = b1.toFixed(1);
    document.getElementById('val-a3b').textContent = a2.toFixed(0);
    document.getElementById('val-b3b').textContent = b2.toFixed(1);

    addAxes();

    // Demand 1 (1st quadrant)
    board.create('functiongraph', [function(q) { return (q >= 0 && a1 - b1*q >= 0) ? a1 - b1*q : NaN; }],
      { strokeColor: '#1565c0', strokeWidth: 2.5 });
    board.create('functiongraph', [function(q) { return (q >= 0 && a1 - 2*b1*q >= 0) ? a1 - 2*b1*q : NaN; }],
      { strokeColor: '#1565c0', strokeWidth: 1.5, dash: 2 });
    board.create('text', [a1/b1 + 3, 3, '<i>D</i><sub>1</sub>'], { fontSize: 12, color: '#1565c0', fixed: true, highlight: false });

    // Demand 2 (1st quadrant)
    board.create('functiongraph', [function(q) { return (q >= 0 && a2 - b2*q >= 0) ? a2 - b2*q : NaN; }],
      { strokeColor: '#C8102E', strokeWidth: 2.5 });
    board.create('functiongraph', [function(q) { return (q >= 0 && a2 - 2*b2*q >= 0) ? a2 - 2*b2*q : NaN; }],
      { strokeColor: '#C8102E', strokeWidth: 1.5, dash: 2 });
    board.create('text', [a2/b2 + 3, 3, '<i>D</i><sub>2</sub>'], { fontSize: 12, color: '#C8102E', fixed: true, highlight: false });

    // CMg
    board.create('functiongraph', [function(q) { return q >= 0 ? c : NaN; }],
      { strokeColor: '#00897b', strokeWidth: 2.5 });
    var maxX = Math.max(a1/b1, a2/b2);
    board.create('text', [maxX + 3, c + 4, '<i>CMg</i>'], { fontSize: 13, color: '#00897b', fixed: true, highlight: false });

    // Optimal quantities
    var q1 = Math.max(0, (a1 - c) / (2 * b1));
    var q2 = Math.max(0, (a2 - c) / (2 * b2));
    var p1 = a1 - b1 * q1;
    var p2 = a2 - b2 * q2;
    var pi1 = (p1 - c) * q1;
    var pi2 = (p2 - c) * q2;

    // Profit rectangles
    if (q1 > 0) {
      board.create('polygon', [[0,c],[q1,c],[q1,p1],[0,p1]], {
        fillColor: '#1565c0', fillOpacity: 0.12,
        borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false, highlight: false
      });
      board.create('point', [q1, p1], { name: '', size: 4, strokeColor: '#1565c0', fillColor: '#1565c0', fixed: true });
      board.create('segment', [[q1, p1],[q1, 0]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });
      board.create('segment', [[q1, p1],[0, p1]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });
    }
    if (q2 > 0) {
      board.create('polygon', [[0,c],[q2,c],[q2,p2],[0,p2]], {
        fillColor: '#C8102E', fillOpacity: 0.08,
        borders: { strokeWidth: 0 }, vertices: { visible: false }, hasInnerPoints: false, highlight: false
      });
      board.create('point', [q2, p2], { name: '', size: 4, strokeColor: '#C8102E', fillColor: '#C8102E', fixed: true });
      board.create('segment', [[q2, p2],[q2, 0]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });
      board.create('segment', [[q2, p2],[0, p2]], { strokeColor: '#999', strokeWidth: 1, dash: 3, fixed: true });
    }

    // Elasticities
    var eps1 = q1 > 0 ? -p1 / (b1 * q1) : 0;
    var eps2 = q2 > 0 ? -p2 / (b2 * q2) : 0;

    // Uniform pricing (numerical)
    var maxA = Math.max(a1, a2);
    var bestPu = c, bestPiU = 0;
    for (var pp = c; pp <= maxA; pp += 0.5) {
      var qq = Math.max(0,(a1-pp)/b1) + Math.max(0,(a2-pp)/b2);
      var piU = (pp - c) * qq;
      if (piU > bestPiU) { bestPiU = piU; bestPu = pp; }
    }

    var html = '<div class="section-title">Curvas</div>';
    html += '\\(P_1 = ' + a1.toFixed(0) + ' - ' + b1.toFixed(1) + '\\,Q\\), &ensp;';
    html += '\\(P_2 = ' + a2.toFixed(0) + ' - ' + b2.toFixed(1) + '\\,Q\\)<br>';
    html += '\\(CMg = ' + c.toFixed(0) + '\\)';
    html += '<div class="section-title">3º Grau: Dois Mercados</div>';
    html += '<strong style="color:#1565c0">Mercado 1:</strong> \\(P_1=' + p1.toFixed(1) + '\\), \\(Q_1=' + q1.toFixed(1) + '\\), \\(\\pi_1=' + pi1.toFixed(1) + '\\)<br>';
    html += '\\(|\\varepsilon_1|=' + Math.abs(eps1).toFixed(2) + '\\)<br>';
    html += '<strong style="color:#C8102E">Mercado 2:</strong> \\(P_2=' + p2.toFixed(1) + '\\), \\(Q_2=' + q2.toFixed(1) + '\\), \\(\\pi_2=' + pi2.toFixed(1) + '\\)<br>';
    html += '\\(|\\varepsilon_2|=' + Math.abs(eps2).toFixed(2) + '\\)<br>';
    html += '\\(\\pi_{total} = ' + (pi1 + pi2).toFixed(1) + '\\)';
    html += '<div class="section-title">Preço Uniforme</div>';
    html += '\\(P^u=' + bestPu.toFixed(1) + '\\), \\(\\pi^u=' + bestPiU.toFixed(1) + '\\)<br>';
    html += 'Ganho com discriminação: \\(' + (pi1 + pi2 - bestPiU).toFixed(1) + '\\)';
    document.getElementById('info').innerHTML = html;
  }

  // ========== Update logic ==========
  function updateGraph() {
    document.getElementById('val-c').textContent = getC().toFixed(0);
    rebuildBoard();
    if (mode === '1st') draw1st();
    else if (mode === '2nd') draw2nd();
    else draw3rd();
    board.update();
    if (window.MathJax && MathJax.typeset) MathJax.typeset();
  }

  function resetAll() {
    document.getElementById('slider-c').value = 20;
    document.getElementById('slider-a1').value = 100;
    document.getElementById('slider-b1').value = 1;
    document.getElementById('slider-a2').value = 100;
    document.getElementById('slider-b2').value = 1;
    document.getElementById('slider-T').value = 500;
    document.getElementById('slider-a3a').value = 100;
    document.getElementById('slider-b3a').value = 1;
    document.getElementById('slider-a3b').value = 60;
    document.getElementById('slider-b3b').value = 2;
    updateGraph();
  }

  document.querySelectorAll('input[type="range"]').forEach(function(el) {
    el.addEventListener('input', updateGraph);
  });
  updateGraph();
</script>
</body>
</html>
